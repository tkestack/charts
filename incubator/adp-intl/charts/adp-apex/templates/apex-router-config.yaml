kind: ConfigMap
apiVersion: v1
metadata:
  name: apex-router-config
  namespace: {{ .Release.Namespace }}
data:
  config.yaml: |
    mode: router
    name: apex
    listen_addr: 0.0.0.0:8083
    env: dev
    pid: /tmp/apex.pid
    profile: true
    debug: true
    local: false
    database:
      type: mysql
      dsn: "{{ if .Values.apex.database.dsn }}{{ .Values.apex.database.dsn }}{{ else }}{{ .Values.global.components.db.user }}:{{ .Values.global.components.db.password }}@tcp({{ .Values.global.components.db.host }}:{{ .Values.global.components.db.port }})/db_apex_private?charset=utf8&loc=Local&timeout=10s&parseTime=true{{ end }}"
      #dsn: "${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_apex_private?charset=utf8&loc=Local&timeout=10s&parseTime=true"
      polling_interval: 5s
    redis:
      addr: {{ (index .Values.global.components.redis.hosts 0) }}:6379
      password: "{{ .Values.global.components.redis.password }}"
    log:
      writer: file
      level: info
      file_name: /data/log/apex/apex.log
      file_max_age: 7
    registry:
      type: dns
    router:
      cache_size: 1024
      channel_key: "apex#client#channel"
      session_key_prefix: "apex#client#"
      cache_life_window: 10m
      cache_clean_window: 30m
