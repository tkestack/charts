apiVersion: v1
kind: Service
metadata:
  labels:
    app: adp-platform-permission-config
  name: adp-platform-permission-config
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: tcp-9090
      port: 9090
      protocol: TCP
      targetPort: 9090
    - name: tcp-9092
      port: 9092
      protocol: TCP
      targetPort: 9092
  selector:
    app: adp-platform-permission-config
  sessionAffinity: None
  type: ClusterIP
