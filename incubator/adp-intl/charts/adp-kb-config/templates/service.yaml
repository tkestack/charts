apiVersion: v1
kind: Service
metadata:
  labels:
    app: adp-kb-config
  name: adp-kb-config
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: tcp-8000
      port: 8000
      protocol: TCP
      targetPort: 8000
    - name: tcp-8081
      port: 8081
      protocol: TCP
      targetPort: 8081
    - name: tcp-9090
      port: 9090
      protocol: TCP
      targetPort: 9090
    - name: tcp-9092
      port: 9092
      protocol: TCP
      targetPort: 9092
  selector:
    app: adp-kb-config
  sessionAffinity: None
  type: ClusterIP