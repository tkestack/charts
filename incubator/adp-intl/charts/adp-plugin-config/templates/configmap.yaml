  llmsgw.yaml: |
    create_open: true

    invoke_open: true

    client:
      secret_id: ${INFRA_MIDDLEWARES_S3_COS_SECRETID} # capi secret_id
      secret_key: ${INFRA_MIDDLEWARES_S3_COS_SECRETKEY} # capi secret_key
      endpoint: apis.${INFRA_MIDDLEWARES_S3_COS_REGION}.tencentcloudapi.woa.com # capi endpoint
      region: ap-nanjing # capi region

    instance:
      instance_id: ins-fbdfd9be # llmsgw 实例ID
      app_id: aga-a54ccc08 # llmsgw 应用ID
      app_sse_url_format: ""
      app_streamable_url_format: ""

    scf_default:
      url_suffixes:
        - .in.ap-guangzhou.tencentscf.com
      scf_proxy: scf.ap-guangzhou-1.regioninvoke.oldhttpobj.production.polaris
      http_host_type: customHost

    create_default:
      Mode: proxy
      TargetSelect: random
      TargetHostRank: 10
      HttpHostType: targetHost
      InvokeLimitConfigStatus: false
      InvokeLimitConfig:
        Type: tokenBucket
        TokenBucketMaxNum: 20000
        TokenBucketRate: 1
        FunnelMaxNum: 20000
        FunnelRate: 1
        SlidingWindowMaxNum: 20000
        SlidingWindowSize: 1
        TimeWindow: 20000
        TimeWindowInterval: 1
        Timeout: 0
      Timeout: 60
      McpSecurityRules:
        - ID: mr-eb6bc341 # 验证码
          Status: open
          Act: watch
        - ID: mr-5c08d4bf # 密码凭证
          Status: open
          Act: watch
        - ID: mr-77c89b08 # 密钥
          Status: open
          Act: watch
        - ID: mr-f4887768 # 手机号
          Status: open
          Act: watch
        - ID: mr-62abbac2 # 身份证
          Status: open
          Act: watch
        - ID: mr-f7333a4b # 电子邮箱
          Status: open
          Act: watch
        - ID: mr-3e979564 # XSS注入检测
          Status: open
          Act: watch
        - ID: mr-ce5d442a # 腾讯云内网禁止访问
          Status: open
          Act: watch
        - ID: mr-f3425f9a # SQL注入检测
          Status: open
          Act: watch
        - ID: mr-9b03f278 # 核心文件非法访问检测
          Status: open
          Act: watch
        - ID: mr-2f320f90 # mcpTool投毒攻击检测
          Status: open
          Act: watch
        - ID: mr-91024dce # 服务端模版注入检测
          Status: open
          Act: watch
        - ID: mr-41edb942 # 服务器端请求伪造检测
          Status: open
          Act: watch
        - ID: mr-45719d86 # 文件上传攻击检测
          Status: open
          Act: watch
        - ID: mr-8d9969cd # 恶意机器人检测
          Status: open
          Act: watch
        - ID: mr-a3cfd583 # XML注入攻击检测
          Status: open
          Act: watch
        - ID: mr-3fc0f491 # 木马后门攻击检测
          Status: open
          Act: watch
      PluginConfigs:
        - PluginID: plg-f1a62e0c
          PluginName: 知识引擎大模型安全网关mcp请求插件
          Description: 知识引擎大模型安全网关mcp请求插件，针对请求进行权限校验、自定义限流等
          Status: true
          Level: 1
          PluginFormValues:
            - Field: requestUrl
              Value: https://testwss.testsite.woa.com/gateway/check
            - Field: responseUrl
              Value: https://testwss.testsite.woa.com/gateway/report
            - Field: onErrorAction
              Value:

    mcp_type_version:
      0: 2024-11-05 # sse(0)：2024-11-05
      1: 2025-06-18 # streamable(1)：2025-06-18

  main.yaml: |
    crypto: true
    official_config:
      user_name: ADP
      avatar_url: ""
      uin: "10000000"
      sub_uin: "10000000"
      permission_ids: ["adpPluginCenterView"]
    api_config:
      timeout: 30
      white_urls:
        - "bnss-test.woa.com"
        - 10.97.122.138
        - dfs.woa.com
        - "${INFRA_MIDDLEWARES_S3_COS_BUCKET}.cos.${INFRA_MIDDLEWARES_S3_COS_REGION}.myqcloud.com"
        - "${INFRA_MIDDLEWARES_S3_COS_BUCKET}.cos.${INFRA_MIDDLEWARES_S3_COS_REGION}.myqcloud.com"
        - "dfs-preview.woa.com"
        - "cos.${INFRA_MIDDLEWARES_S3_COS_REGION}.myqcloud.com"
      ports:
        - allow_all
        - 443
        - 80
        - 5000
        - 7988
    tool_ref_limit: 20
    plugin_check:
      plugin_name_min_len: 1
      plugin_name_max_len: 100
      plugin_desc_min_len: 1
      plugin_desc_max_len: 500
      tool_name_min_len: 1
      tool_name_max_len: 100
      tool_desc_min_len: 1
      tool_desc_max_len: 200
      max_page_size: 200
      tool_code_min_len: 1
      tool_code_max_len: 64000
      tool_example_max_len: 64000
      default_icon: "/adp/static/%E6%8F%92%E4%BB%B6-%E9%BB%98%E8%AE%A4.png"
      max_icon_size: 524288
      header_name_min_len: 1
      header_name_max_len: 50
      header_value_max_len: 5000
      mcp_url_max_len: 500
    mcp:
      sync_tick_interval: 300
      sync_batch_size: 10
      load_db_tick_interval: 24
      mcp_sync_interval: 180
      mcp_degrade_sync_interval: 600
      mcp_degrade_threshold: 3
      mcp_proxy_urls: ["https://{{ .Values.global.clb }}/v1/lke/mcp","http://{{ .Values.global.clb }}/v1/lke/mcp", "https://devwss.testsite.woa.com/v1/lke/mcp","https://testwss.testsite.woa.com/v1/lke/mcp"]
      white_urls: ["allow_all", "{{ .Values.global.clb }}","devwss.testsite.woa.com","testwss.testsite.woa.com","prewss.testsite.woa.com","lke.testsite.woa.com","qbmanusmcp.woa.com","aitool.woa.com","qgamedevflow.woa.com","mcp.pubnet.woa.com","market-agent-mcp.testsite.woa.com"]
      white_ports:
        - 80
        - 443
        - 8080
        - 18080
      describe_plugin_refresh: false
      # mcp插件对外地址
      external_mcp_gateway: "https://adp.tencentcloud.com"
      external_api_gateway: "https://adp.tencentcloud.com"
    storage_conf:
      type: cos
      cos_conf:
        secret_id: ${INFRA_MIDDLEWARES_S3_COS_SECRETID}
        secret_key: ${INFRA_MIDDLEWARES_S3_COS_SECRETKEY}
        region: ${INFRA_MIDDLEWARES_S3_COS_REGION}
        app_id: ${INFRA_MIDDLEWARES_S3_COS_APPID}
        bucket: ${INFRA_MIDDLEWARES_S3_COS_BUCKET}
        domain: myqcloud.com

    storage:
      {{ include "qbot.s3_storage" . }}
    app_tool_limit: 30
    knowledge_qa_tool:
      tool_name: KnowledgeRetrievalAnswer
      plugin_id: 3ad93aae-587e-4bcc-ae07-ad13bfb1aaca
      tool_id: 0ca8d482-1e77-462b-bc21-807c8f052f69
    ignore_perm_actions:
      - ListPlugins
      - CreatePlugin
      - ModifyPlugin
      - DeletePlugin
      - DescribePlugin
      - ListTools
      - CheckTool
      - ListToolRefs
      - CreateMCPPlugin
      - ModifyMCPPlugin
      - CheckMCPServer
    privacy_env : true

    cloud_api:
      secret_id: ""
      secret_key: ""
      account_host: account.test.tencentcloudapi.com
      version: "2018-12-25"

    white_list:
      enable: true
      plugin_ids: ["3de4a6c6-e055-4d78-9e09-c4410aee79e4"]
      key: BangBox_MCP
      keys: ["BangBox_MCP","Plan_Execute_Agent"]

    run_code:
      max_result_length: 2000000
      result_separator: "_______ResultSeparator_______"
      code_template: |-
        {{`
        import time
        import datetime
        import json
        import numpy
        import pandas
        import math
        import cmath
        import decimal
        import fractions
        import random
        import statistics
        import re
        import string
        import stringprep
        import collections
        import numbers
        import unicodedata

        lke_system_params=json.loads("""{{InputParamObject}}""")

        {{CodeContent}}

        main_result = main(lke_system_params)

        import json

        class SystemJsonEncoder(json.JSONEncoder):
          def default(self, obj):
              import numpy as np
              if isinstance(obj, np.timedelta64):
                  return str(obj)
              elif isinstance(obj, np.integer):
                  return int(obj)
              elif isinstance(obj, (np.void)):
                  return None
              elif isinstance(obj, np.floating):
                  return float(obj)
              elif isinstance(obj, np.complexfloating):
                  return {'real': obj.real, 'imag': obj.imag}
              elif isinstance(obj, np.bytes_):
                  return obj.decode('utf-8')
              elif isinstance(obj, np.str_):
                  return str(obj)
              elif isinstance(obj, np.datetime64):
                  return str(obj)
              elif isinstance(obj, np.ndarray):
                  return obj.tolist()
              elif isinstance(obj, pd.DataFrame):
                  return obj.to_dict()
              elif isinstance(obj, pd.Series):
                  return obj.to_list()
              return super(SystemJsonEncoder, self).default(obj)

        print("{{ResultSeparator}}")
        print(json.dumps(main_result, ensure_ascii=False, cls=SystemJsonEncoder))
        `}}

    data_sync_task:
      release_queue_length: 200
      release_items_per_batch: 10
    plugin_sub_uin_batch: 100

