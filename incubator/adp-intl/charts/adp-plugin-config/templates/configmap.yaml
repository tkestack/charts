              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
          - writer: file                              #本地文件日志
            level: info                               #本地文件滚动日志的级别
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
              stacktrace_key: stackTrace
