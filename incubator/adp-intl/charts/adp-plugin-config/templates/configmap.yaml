  trpc_go.yaml: |
    global:                             #全局配置
      namespace: ${POD_NAMESPACE}            #环境类型，分正式production和非正式development两种类型
      env_name: formal                    #环境名称，非正式环境下多环境的名称
      enable_set: false         #是否启用set
      full_set_name: adp   #set名
      local_ip: ${POD_IP}
      container_name: ${POD_NAME}

    server:                                            #服务端配置
      app: adp                                        #业务的应用名
      server: plugin-config                             #进程服务名
      bin_path: /app/bin/                   #二进制可执行文件和框架配置文件所在路径
      conf_path: /app/conf/                 #业务配置文件所在路径
      data_path: /app/data/                 #业务数据文件所在路径
      filter:                                          #针对所有service处理函数前后的拦截器列表
        - recovery                                     #拦截框架创建的业务处理协程panic
        - i18n-adp
        - opentelemetry                                # 天机阁
      stream_filter:
        - recovery                                     #拦截框架创建的业务处理协程panic
      admin:
        ip: ${POD_IP}
        port: 8081
      service:                                         #业务服务提供的service，可以有多个
        - name: trpc.KEP.plugin-config-server.PluginConfig      #service的路由名称
          ip: ${POD_IP}                            #服务监听ip地址 可使用占位符 ${ip},ip和nic二选一，优先ip
          port: 8000                #服务监听端口 可使用占位符 ${port}
          network: tcp                             #网络监听类型  tcp udp
          protocol: trpc               #应用层协议 trpc http
          timeout: 0                            #请求最长处理时间 单位 毫秒
          server_async: true                           #开启异步处理
          idletime: 600000                             # idletime，设置tcp空闲等待时间，避免耗时过长的操作导致trpc-go将tcp关闭
          filter:
            - session
            - permission
        - name: trpc.KEP.plugin-config-server.PluginConfigApi      #service的路由名称
          ip: ${POD_IP}                            #服务监听ip地址 可使用占位符 ${ip},ip和nic二选一，优先ip
          port: 8001                #服务监听端口 可使用占位符 ${port}
          network: tcp                             #网络监听类型  tcp udp
          protocol: trpc               #应用层协议 trpc http
          timeout: 0                            #请求最长处理时间 单位 毫秒
          server_async: true                           #开启异步处理
          idletime: 600000                             # idletime，设置tcp空闲等待时间，避免耗时过长的操作导致trpc-go将tcp关闭
        - name: trpc.KEP.plugin-config-server.PluginConfigHttp      #service的路由名称
          ip: ${POD_IP}                            #服务监听ip地址 可使用占位符 ${ip},ip和nic二选一，优先ip
          port: 8002                #服务监听端口 可使用占位符 ${port}
          network: tcp                             #网络监听类型  tcp udp
          protocol: http               #应用层协议 trpc http
          timeout: 0                            #请求最长处理时间 单位 毫秒
          server_async: true                           #开启异步处理
          idletime: 600000                             # idletime，设置tcp空闲等待时间，避免耗时过长的操作导致trpc-go将tcp关闭
        - name: trpc.KEP.plugin-config-server.RefreshTokenCron                # service 的路由名称
          ip: ${POD_IP}                            #服务监听ip地址 可使用占位符 ${ip},ip和nic二选一，优先ip
          port: 9001                                   # 服务监听端口 可使用占位符 ${port}
          network: "0 */2 * * * *?startAtOnce=1&scheduler=refreshTokenCronService"                     # 定时器 Cron 表达式：[second minute hour day month weekday] 如 "0 */5 * * * *" 的含义是每隔 5 分钟触发一次定时任务
          protocol: timer                              # 应用层协议
    client:                                            #客户端调用的后端配置
      timeout: 60000000                                    #针对所有后端的请求最长处理时间
      namespace: ${POD_NAMESPACE}                              #针对所有后端的环境
      filter:                                          #针对所有service处理函数前后的拦截器列表
        - opentelemetry
