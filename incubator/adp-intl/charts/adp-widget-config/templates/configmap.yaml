kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ .Release.Name }}-widget-config
  namespace: {{ .Release.Namespace }}
data:
  application.yaml: |
    infosec:
      disable: true
      evil_words:
    official_account_uins:
      - 700000920773
      - 700001046587
      - 10000000
      - 700001046587
    official_permission_ids:
      - adpWidgetCenterView
  error_en-US.json: |
    {
      "ErrInvalidFilterParam": "Invalid filter parameter",
      "ErrParameter": "Parameter error: %s",
      "ErrQueryFailed": "data query failed",
      "ErrCreateFailed": "create failed",
      "ErrCodeLabelExists": "Label name already exists",
      "ErrDeleteFailed": "delete failed",
      "ErrPermissionDenied": "Permission denied"
    }

  error_zh-CN.json: |
    {
      "ErrInvalidFilterParam": "无效的筛选参数",
      "ErrParameter": "参数错误: %s",
      "ErrQueryFailed": "数据查询失败",
      "ErrCreateFailed": "创建失败",
      "ErrCodeLabelExists": "标签标识已存在",
      "ErrDeleteFailed": "删除失败",
      "ErrPermissionDenied": "权限不足"
    }

  placeholder.yaml: |

    INFOSEC_TARGET: ip://adp-platform-content-moderation.${{ .Release.Namespace }}.svc.cluster.local:9090
    ADMIN_LOGIN_TARGET: ip://adp-app-admin-proxy.{{ .Release.Namespace }}.svc.cluster.local:9091
    ADMIN_API_TARGET: ip://adp-app-admin-proxy.{{ .Release.Namespace }}.svc.cluster.local:9092
    PLATFORM_LOGIN_TARGET: ip://adp-platform-manager.{{ .Release.Namespace }}.svc.cluster.local:9091
  trpc_go.yaml: |
    global:
      namespace: Production
    server:
      app: adp
      server: widget-config
      bin_path: /app/bin/
      conf_path: /app/conf/
      log_path: /app/logs/
      admin:
        ip: ${POD_IP}
        port: 8081
        read_timeout: 3000
        write_timeout: 60000
      filter:
        - recovery
        - i18n-adp
        - validation
        - debuglog
        - cle-route-propagator
        - opentelemetry
      service:
        - name: trpc.adp.widget_config.WidgetConfig
          ip: ${POD_IP}
          port: 8000
          network: tcp
          protocol: trpc
          server_async: true
          idletime: 600000
          filter:
            - session
            - permission
            - accesslog
        - name: trpc.adp.widget_config.WidgetConfigInner
          ip: ${POD_IP}
          port: 8001
          network: tcp
          protocol: trpc
          server_async: true
          idletime: 600000
    client:
      filter:
        - cle-route-propagator
        - opentelemetry
      service:
        - name: tdsql.adp.widget-config
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=10s&readTimeout=30s&writeTimeout=30s&parseTime=true&loc=Local
        - name: redis.adp.widget-config
          target: redis://${INFRA_MIDDLEWARES_REDIS_0_HOSTS}:6379/20
          password: ${INFRA_MIDDLEWARES_REDIS_0_PASSWORD}
          timeout: 800
        - callee: trpc.adp.platform_content_moderation.Infosec
          target: ip://adp-platform-content-moderation.${{ .Release.Namespace }}.svc.cluster.local:9090
          namespace: Production
          network: tcp
          protocol: trpc
          timeout: 3000
        - callee: trpc.KEP.bot_admin_config_server.Login
          namespace: Production
          target: ip://adp-app-admin-proxy.{{ .Release.Namespace }}.svc.cluster.local:9091
          protocol: trpc
          timeout: 3000
          env_name: test
        - callee: trpc.adp.app_admin_proxy.Api
          target: ip://adp-app-admin-proxy.{{ .Release.Namespace }}.svc.cluster.local:9092
          namespace: Production
          protocol: trpc
          timeout: 3000
        - callee: trpc.KEP.bot_admin_config_server.Api
          target: ip://adp-app-admin-proxy.{{ .Release.Namespace }}.svc.cluster.local:9092
          namespace: Production
          protocol: trpc
          timeout: 3000
        - callee: trpc.adp.platform_manager.Login
          namespace: Production
          target: ip://adp-platform-manager.{{ .Release.Namespace }}.svc.cluster.local:9091
          protocol: trpc
          timeout: 3000
    plugins:
      telemetry:
        opentelemetry:
          addr: {{ ((.Values.global.observability).apm).otlp | default "" }}
          tenant_id: adp
          sampler:
            fraction: 1
          traces:
            disable_trace_body: false
          metrics:
            {{- if ((.Values.global.observability).apm).registry }}
            registry_endpoints: ["{{ .Values.global.observability.apm.registry}}"]
            {{- end }}
          logs:
            enabled: true
            level: "debug"
            trace_log_mode: "disable"
          {{- if ((.Values.global.observability).apm).attributes }}
          attributes:
            {{- range $key, $value := .Values.global.observability.apm.attributes }}
          - key: {{ $key }}
            value: {{ $value }}
            {{- end }}
          {{- end }}
      log:
        default:
          - writer: console                         #控制台标准输出 默认
            level: info                            #标准输出日志的级别
            formatter: json
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
          - writer: file                            #本地文件日志
            level: debug                             #本地文件滚动日志的级别
            formatter: json
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
              stacktrace_key: stackTrace
            writer_config:
              filename: /app/logs/trpc.log  #本地文件滚动日志存放的路径
              write_mode: 2
              roll_type: time
              max_age: 7
              max_backups: 10
              compress: false
              time_unit: day
      config:
        file:
          providers:
            - name: rainbow
              path: /app/conf/
            - name: global
              appid: ${RAINBOW_APP_ID}  # appid
              group: global # 配置所属组
              type: kv   # 七彩石数据格式, kv(默认), table
              env_name: ${RAINBOW_ENV_NAME}
              timeout: 2000
              enable_client_provider: true
      i18n:
        i18n-adp:
          default_lang: zh-CN
          supported_languages:
            - zh-CN
            - en-US
          data_provider:
            type: rainbow
            prefix: widget
            error_prefix: error
            char_scaling_factor:
              zh-CN: 1
              en-US: 3
      registry:
        polaris:
      selector:
        polaris:
          enable_servicerouter: true

  widget_en-US.json: |
    {
      "澄清询问": "Clarify Question"
    }

  widget_zh-CN.json: |
    {
      "澄清询问": "澄清询问"
    }
