apiVersion: v1
kind: Service
metadata:
  labels:
    app: adp-widget-config
  name: adp-widget-config
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: adp-widget-config-8000
      port: 8000
      protocol: TCP
      targetPort: 8000
    - name: adp-widget-config-8001
      port: 8001
      protocol: TCP
      targetPort: 8001
    - name: adp-widget-config-8081
      port: 8081
      protocol: TCP
      targetPort: 8081
  selector:
    app: adp-widget-config
  sessionAffinity: None
  type: ClusterIP
