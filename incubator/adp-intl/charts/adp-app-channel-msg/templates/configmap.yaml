  placeholder.yaml: |
    NAMESPACE: Production
    ENV_NAME: formal
    RAINBOW_ENV_NAME: formal
    RAINBOW_GROUP: channel-msg-svr
    #没有引用，清理
    TRPC_KEP_CHANNEL_MSG_SVR_HTTP_TOKEN: 
    #没有引用，清理
    TRPC_KEP_CHANNEL_MSG_SVR_TRPC_TOKEN: 
    #没有引用，清理
    TRPC_KEP_TRPC_KEP_CHANNEL_MSG_SVR_API_TOKEN: 
    TRPC_AI_CLIENT_TARGET: dns://testwss.testsite.woa.com:443
    SESSIONS_END_POINT: lke.pre.tencentcloudapi.woa.com
    COMPONENT_APP_ID: {{ dig "wechat" "componentAppId" "" .Values.global }}
    WX_AUTHORIZE_CALLBACK_HOST: https://tde.xiaowei.cloud.tencent.com
    WX_AUTHORIZE_CALLBACK: /channel/callback/wx/test/authorize
    IS_PRIVATE: true
  trpc_go.yaml: |
    global:
      namespace: ${POD_NAMESPACE}
      env_name: dev
      enable_set: false
      full_set_name: adp
      local_ip: ${POD_IP}
      container_name: ${POD_NAME}
    server:
      app: adp
      server: app-channel
      bin_path: /usr/local/trpc/bin/
      conf_path: /usr/local/trpc/conf/
      data_path: /usr/local/trpc/data/
      filter:
        - recovery
        - i18n-adp
        - debuglog
        - cle-route-propagator
        - opentelemetry
      admin:
        ip: ${POD_IP}
        port: 8081
      service:
        - name: trpc.KEP.channel-msg-svr.HTTP
          ip: ${POD_IP}
          port: 8000
          network: tcp
          protocol: http_no_protocol
          timeout: 50000
          server_async: true
          idletime: 600000
        - name: trpc.KEP.channel-msg-svr.trpc
          ip: ${POD_IP}
          port: 8001
          network: tcp
          protocol: trpc
          timeout: 50000
          server_async: true
          idletime: 600000
          filter:
            - session
            - permission
        - name: trpc.KEP.trpc.KEP.channel-msg-svr.Api
          ip: ${POD_IP}
          port: 8002
          network: tcp
          protocol: trpc
          timeout: 50000
          server_async: true
          idletime: 600000
    plugins:
      config:
        file:
          providers:
            - name: rainbow
              path: /app/conf/
            - name: rainbow-comm
              path: /app/conf/
            - name: global
              appid: ${RAINBOW_APP_ID}
              group: global
              type: kv
              env_name: ${RAINBOW_ENV_NAME}
              timeout: 2000
              enable_client_provider: true
      telemetry:
        opentelemetry:
          addr: {{ ((.Values.global.observability).apm).otlp | default "" }}
          tenant_id: adp
          sampler:
            fraction: 1
          traces:
            disable_trace_body: false
          metrics:
            {{- if ((.Values.global.observability).apm).registry }}
            registry_endpoints: ["{{ .Values.global.observability.apm.registry}}"]
            {{- end }}
          logs:
            enabled: true
            level: "debug"
            trace_log_mode: "disable"
          {{- if ((.Values.global.observability).apm).attributes }}
          attributes:
            {{- range $key, $value := .Values.global.observability.apm.attributes }}
          - key: {{ $key }}
            value: {{ $value }}
            {{- end }}
          {{- end }}
      log:
        default:
          - writer: console
            level: debug
          - writer: file
            level: info
            writer_config:
              filename: /app/log/trpc.log
              max_size: 10
              max_backups: 10
              max_age: 7
              compress: false
      registry:
        polaris:
          register_self: false
          heartbeat_interval: 3000
          heartbeat_timeout: 1000
          service:
            - name: trpc.KEP.channel-msg-svr.HTTP
              namespace: ${POD_NAMESPACE}
              token: xxxxxxxxxxxx  #safe
            - name: trpc.KEP.channel-msg-svr.trpc
              namespace: ${POD_NAMESPACE}
              token: xxxxxxxxxxxx #safe
            - name: trpc.KEP.trpc.KEP.channel-msg-svr.Api
              namespace: ${POD_NAMESPACE}
              token: xxxxxxxxxxxx #safe
      selector:
        polaris:
          protocol: grpc
          enable_servicerouter: true
          enable_trans_meta: true
      i18n:
        i18n-adp:
          default_lang: zh-CN
          supported_languages:
            - zh-CN
            - en-US
          data_provider:
            type: rainbow
            prefix: channel-msg
            error_prefix: error
            char_scaling_factor:
              zh-CN: 1
              en-US: 3
    client:
      filter:
        - cle-route-propagator
        - opentelemetry
      service:
        - name: mysql.qbot.admin
          target: "dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local"
        - name: tdsql.tcadp.channel
          target: "dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local"
        - name: redis.qbot.admin
          network: tcp
          target: "ip://${INFRA_MIDDLEWARES_REDIS_0_HOSTS}:6379/2"
          password: ${INFRA_MIDDLEWARES_REDIS_0_PASSWORD}
          timeout: 800
        - name: wx.nginx
          target: ip://adp-app-channel-proxy.{{ .Release.Namespace }}.svc.cluster.local:8000
          network: tcp
          protocol: http
          timeout: 20000
        - name: wx.resource.nginx
          target: ip://adp-app-channel-proxy.{{ .Release.Namespace }}.svc.cluster.local:8001
          network: tcp
          protocol: http
          timeout: 20000
        - name: trpc.KEP.channel_token_svr.ChannelTokenService
          network: tcp
          protocol: trpc
          target: ip://adp-app-channel-token.{{ .Release.Namespace }}.svc.cluster.local:8000
          timeout: 2000
        - name: trpc.KEP.bot_admin_config_server.Admin
          network: tcp
          protocol: trpc
          target: ip://adp-app-admin-proxy.{{ .Release.Namespace }}.svc.cluster.local:9090
          timeout: 5000
        - callee: trpc.ai.client
          name: trpc.ai.client
          network: tcp
          protocol: http
          target: dns://{{ .Values.global.clb }}:{{ ternary 443 80 (eq .Values.global.scheme "https") }}
          timeout: 600000
        - callee: trpc.KEP.bot_admin_config_server.Login
          target: ip://adp-app-admin-proxy.{{ .Release.Namespace }}.svc.cluster.local:9091
          protocol: trpc
          timeout: 20000
        - name: trpc.KEP.bot_task_config_server.TaskConfig
          target: ip://adp-workflow-config.{{ .Release.Namespace }}.svc.cluster.local:8000
          timeout: 5000
        - callee: trpc.KEP.bot_knowledge_config_server.Api
          name: trpc.KEP.bot-knowledge-config-server.Api
          target: ip://adp-kb-config.{{ .Release.Namespace }}.svc.cluster.local:9092
          protocol: trpc
          timeout: 5000
        # admin Login
        - callee: trpc.KEP.bot_admin_config_server.Api
          target: ip://adp-app-admin-proxy.{{ .Release.Namespace }}.svc.cluster.local:9092
          protocol: trpc
          timeout: 20000
        # 知识库-内部接口
        - callee: trpc.adp.kb_config.Api
          name: trpc.KEP.bot-knowledge-config-server.Api
          target: ip://adp-kb-config.{{ .Release.Namespace }}.svc.cluster.local:9092
          protocol: trpc
          timeout: 5000
        # 工作流配置端-内部接口
        - callee: trpc.adp.workflow_config.WorkflowConfig
          target: ip://adp-workflow-config.{{ .Release.Namespace }}.svc.cluster.local:8000
          timeout: 5000
        # admin API
        - callee: trpc.adp.app_admin_proxy.Api
          target: ip://adp-app-admin-proxy.{{ .Release.Namespace }}.svc.cluster.local:9092
          protocol: trpc
          timeout: 20000
        # admin Login
        - callee: trpc.adp.app_admin_proxy.Login
          target: ip://adp-app-admin-proxy.{{ .Release.Namespace }}.svc.cluster.local:9091
          protocol: trpc
          timeout: 20000
        - callee: trpc.adp.chat_manage.Chat
          name: trpc.adp.chat_manage.Chat
          target: ip://adp-chat-manage.{{ .Release.Namespace }}.svc.cluster.local:9091
          protocol: trpc
          timeout: 20000
        - callee: trpc.adp.platform_manager.Login
          target: ip://adp-platform-manager.{{ .Release.Namespace }}.svc.cluster.local:9091
          protocol: trpc
          timeout: 20000
        - name: trpc.http.cos.Access
          network: tcp
          protocol: http
          target: dns://cos-internal.${INFRA_MIDDLEWARES_S3_COS_REGION}.tencentcos.cn
          timeout: 5000
