kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ .Release.Name }}-app-channel-msg
  namespace: {{ .Release.Namespace }}
data:
  application.yaml: |
    sync_time_out: 1800
    sync_stream_time_out: 5
    msg_menu_text_limit: 45
    msg_menu_item_num_limit: 10
    create_session_words:
      "新建对话": true
      "/new": true
      "/NEW": true
    reset_session_words:
      "清除上下文关联": true
      "/clear": true
      "/CLEAR": true
    session_secret_id: ${INFRA_MIDDLEWARES_S3_COS_SECRETID}
    session_secret_key: ${INFRA_MIDDLEWARES_S3_COS_SECRETKEY}
    session_end_point: ${SESSIONS_END_POINT}
    session_region: "${INFRA_MIDDLEWARES_S3_COS_REGION}"
    system_msg_err: "[System] Internal service error. Please try again later."
    system_msg_creation_session_success: "[System] New conversation started."
    system_msg_creation_session_failed: "[System] Failed to create new conversation. Please try again later."
    system_msg_reset_session_success: "[System] Context cleared."
    system_msg_reset_session_failed: "[System] Failed to clear context. Please try again later."
    channel_type_map:
      wechat: 10000
      wecom: 10002
      wxkf: 10004
      wecomrobot: 10009
      line: 10011
      telegram: 10012
    component_app_id: ${COMPONENT_APP_ID}
    wx_authorize_callback_host: {{ .Values.global.scheme }}://{{ .Values.global.clb }}  #需要填写用户自己申请的域名  需要能反代回到msg服务
    wx_authorize_callback: "/online/channel/callback/wx/authorize"
    sse_chat_path: /v1/qbot/chat/sse
    redirect_url: {{ .Values.global.scheme }}://{{ .Values.global.clb }}/adp/#/app/knowledge/release/channel?appid=%d&appType=knowledge_qa&spaceId=default_space
    redirect_url_with_space_id: {{ .Values.global.scheme }}://{{ .Values.global.clb }}/adp/#/app/knowledge/release/channel?appid=%d&appType=knowledge_qa&spaceId=%s
    get_wx_auth_code_max_limit : 3
    streaming_throttle: 250
    not_support_msg: Unsupported message type
    env: lke
    yuanqi_api_key: xxxx
    publish_yuanqi_url: /admin_api/v2/agent/publish/yuanqi
    publish_yingyongbao_url: /admin_api/v2/agent/publish/yinyongbao
    wx_nginx_l5: lke_https_forward_proxy
    wx_nginx_namespace: Test
    cos_secret_id: ${INFRA_MIDDLEWARES_S3_COS_SECRETID}
    cos_secret_key: ${INFRA_MIDDLEWARES_S3_COS_SECRETKEY}
    cos_bucket: ${INFRA_MIDDLEWARES_S3_COS_BUCKET}
    cos_region: "${INFRA_MIDDLEWARES_S3_COS_REGION}"
    get_ip_max_limit : 2000
    is_open_ip_max_limit_switch : false
    message_interval_time: 800ms
    wechat_msg_time_out: 20m
    deployment_mode:
      mode: "adp"
    default_greeting_content: "You can ask me:"
    uncertified_wx_reply_config:
      uncertified_reply_in_5s_wx_app_ids:
      continue_keywords:
        - "继续"
        - "继续。"
        - "【继续】"
        - "请继续"
        - "继续发"
      no_reply_notice: "正在思考中……可回复【继续】获取回答内容" # 5s 或 15s未回复提示
      reply_not_complete_notice: "回答未完成，可回复【继续】获取更多回答内容" # 回答未完成提示
      discard_continue_notice: "模型正在思考中，请稍后回复【继续】获取更多回答内容" # 忽略继续关键词通知
    storage:
      type: cos
      subPath: {{ .Values.global.components.s3.cos.subPath | quote }}
      cos_map:
        realtime:
          secret_id: {{ .Values.global.components.s3.cos.secretId }}
          secret_key: {{ .Values.global.components.s3.cos.secretKey }}
          app_id: {{ .Values.global.components.s3.cos.appId | quote }}
          region: {{ .Values.global.components.s3.cos.region }}
          bucket: {{ .Values.global.components.s3.cos.bucket }}
          domain: {{ .Values.global.components.s3.cos.domain }}
          expire_time: {{ .Values.global.components.s3.cos.expireTime | default "30m" }}
          credential_time: 10m

    # line 相关配置
    line_config:
      max_msg_per_push: 5
      text_buffer_max_rune: 1000
      loading_seconds: 60

    # telegram 相关配置
    telegram_config:
      text_buffer_max_rune: 1000

    # 构建菜单描述文本
    menu_select_text: "Please select an option:"


  channel-msg_en-US.json: |
    {}
  channel-msg_zh-CN.json: |
    {}
  env.yaml: |
    version: 2.0.0 # 固定值，不需要修改
    kind: env # 固定值，不需要修改
    metadata:
        name: formal # 环境名称 [选填]

