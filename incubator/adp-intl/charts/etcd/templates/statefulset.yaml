apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
  namespace: {{ .Release.Namespace }}
  labels:
    app: etcd
    app.kubernetes.io/name: etcd
    {{- if .Values.global.customLabels }}
    {{- range $key, $value := .Values.global.customLabels }}
    {{ $key }}: {{ $value | toString | quote }}
    {{- end }}
    {{- end }}
  {{- if .Values.global.customAnnotations }}
  annotations:
    {{- range $key, $value := .Values.global.customAnnotations }}
    {{ $key }}: {{ $value | toString | quote }}
    {{- end }}
  {{- end }}
spec:
  serviceName: etcd-headless
  replicas: {{ .Values.replicas | default 3 }}
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
        {{- if .Values.global.customLabels }}
        {{- range $key, $value := .Values.global.customLabels }}
        {{ $key }}: {{ $value | toString | quote }}
        {{- end }}
        {{- end }}
      {{- if .Values.global.customAnnotations }}
      annotations:
        {{- range $key, $value := .Values.global.customAnnotations }}
        {{ $key }}: {{ $value | toString | quote }}
        {{- end }}
      {{- end }}
    spec:
      containers:
        - name: etcd
          image: {{ (index .Values.images "etcd").url }}
          imagePullPolicy: IfNotPresent
          command:
            - etcd
          ports:
            - containerPort: {{ .Values.ports.client | default 2379 }}
              name: client
            - containerPort: {{ .Values.ports.peer | default 2380 }}
              name: peer
          env:
            - name: ETCD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ETCD_DATA_DIR
              value: /var/lib/etcd
            - name: ETCD_INITIAL_CLUSTER_STATE
              value: new
            - name: ETCD_INITIAL_CLUSTER_TOKEN
              value: etcd-cluster
            - name: ETCD_LISTEN_CLIENT_URLS
              value: http://0.0.0.0:2379
            - name: ETCD_ADVERTISE_CLIENT_URLS
              value: http://$(ETCD_NAME).etcd-headless.{{ .Release.Namespace }}.svc.cluster.local:2379
            - name: ETCD_LISTEN_PEER_URLS
              value: http://0.0.0.0:2380
            - name: ETCD_INITIAL_ADVERTISE_PEER_URLS
              value: http://$(ETCD_NAME).etcd-headless.{{ .Release.Namespace }}.svc.cluster.local:2380
            - name: ETCD_INITIAL_CLUSTER
              value: "etcd-0=http://etcd-0.etcd-headless.{{ .Release.Namespace }}.svc.cluster.local:2380,etcd-1=http://etcd-1.etcd-headless.{{ .Release.Namespace }}.svc.cluster.local:2380,etcd-2=http://etcd-2.etcd-headless.{{ .Release.Namespace }}.svc.cluster.local:2380"
            - name: ETCD_QUOTA_BACKEND_BYTES
              value: "{{ printf "%d" (int64 (.Values.quotaBackendBytes | default 4294967296)) }}"
            - name: ETCD_AUTO_COMPACTION_MODE
              value: "{{ .Values.autoCompaction.mode | default "periodic" }}"
            - name: ETCD_AUTO_COMPACTION_RETENTION
              value: "{{ .Values.autoCompaction.retention | default "1h" }}"
          resources:
            requests:
              cpu: {{ .Values.resources.cpu | default "2000m" }}
              memory: {{ .Values.resources.memory | default "4Gi" }}
            limits:
              cpu: {{ .Values.resources.cpu | default "2000m" }}
              memory: {{ .Values.resources.memory | default "4Gi" }}
          volumeMounts:
            - name: etcd-data
              mountPath: /var/lib/etcd
          livenessProbe:
            tcpSocket:
              port: 2379
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 2379
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: etcd-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.storage.storageClass }}
        storageClassName: {{ .Values.storage.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.storage.size | default "15Gi" }}
