  main.yaml: |
    is_private: true
    bot: 
      timeout: 200
      response_channel_size: 1000
    thought_icon: /qbot/public/icon/thinking.png
    workflow_icon: /qbot/public/icon/API.png
    max_iterations: 10
    thought_round_before: 2
    current_state_sys: you should tackle the system's response now!
    current_state_user: you should take action to user's query now!
    main_agent_tools:
      ask_user: "{\"type\":\"function\",\"function\":{\"name\":\"ask_user\",\"description\":\"Ask user for missing information\",\"parameters\":{\"type\":\"object\",\"properties\":{\"question\":{\"type\":\"string\",\"description\":\"the question or missing information you want to ask the user, DO NOT ask the same question as the user's question\"}},\"required\":[\"question\"]}}}"
      answer_directly: "{\"type\":\"function\",\"function\":{\"name\":\"answer_directly\",\"description\":\"Answer directly for simple objective, and wait for user's response\",\"parameters\":{\"type\":\"object\",\"properties\":{\"answer\":{\"type\":\"string\",\"description\":\"your complete and detailed and formatted answer to user, not a abstract\"}},\"required\":[\"answer\"]}}}"
      task_completed: "{\"type\":\"function\",\"function\":{\"name\":\"task_completed\",\"description\":\"The task has been completed and returns the final detailed answer to the user\",\"parameters\":{\"type\":\"object\",\"properties\":{\"final_answer\":{\"type\":\"string\",\"description\":\"your complete and detailed and formatted answer to user, not a abstract\"}},\"required\":[\"final_answer\"]}}}"
      task_done: "{\"type\":\"function\",\"function\":{\"name\":\"task_done\",\"description\":\"Call this tool when you have completed the task or when the task cannot be completed.\",\"parameters\":{\"type\":\"object\",\"properties\":{\"success\":{\"type\":\"boolean\",\"description\":\"Whether the task is finished or not. Return False if you cannot finish the task.\"},\"final_response\":{\"type\":\"string\",\"description\":\"Provide a comprehensive final response to user using the same language as the user. If the task is successfully completed, return the full execution result. If the task fails, summarize the reasons for the failure and offer possible solutions if possible.\"}},\"required\":[\"success\",\"final_response\"]}}}"
    clarification_tool_descriptions:
      message_clarify_single_choice: "向用户提出单选问题并等待回答。展示问题和预定义选项列表，用户需从中选择一项。适用于方案确认、模式选择、参数配置等需要明确单一选择的场景。调用后会阻塞等待，直到用户完成选择。"
      message_clarify_multi_choice: "向用户提出多选问题并等待回答。展示问题和选项列表，用户可以选择一个或多个答案，至少需要选择一项。适用于筛选条件、多维偏好、批量选择等需要多项选择的场景。调用后会阻塞等待，直到用户完成选择。"
      message_clarify_form: "向用户展示表单并收集文本信息。支持一次性填写一个或多个字段（单行/多行），用于补全任务所需的结构化输入。调用后会阻塞等待，直到用户提交表单后继续执行。"
      message_clarify_hybrid_form: "向用户展示混合表单并收集结构化信息。支持选择类与文本类控件在同一表单中组合使用（单选/多选/单行/多行/图片上传）。调用后会阻塞等待，直到用户提交表单后继续执行。"
    global_timeout: 1800
    procedure:
      thinking_model: 调用思考模型
      tool_call: 调用%s
    unsafe_domain:
      - cos.${INFRA_MIDDLEWARES_S3_COS_REGION}.myqcloud.com
    max_tool_response: 40960
    agent_model_map:
      lke-deepseek-r1: lke-deepseek-r1-agent
    mcp_unsafe_domain:
      - qbmanusmcp.woa.com
    kb_agent_config:
      sys_request: 
        - "要聪明、高效，尽量少的在数据库中检索。不要重复历史思考过程中调用，相同的调用总是会返回相同的结果。"
        - "根据历史动作，确定当前任务处理的进度，然后决定下一步检索什么。"
        - "如果你认为任务已经完成，并且不需要再次执行任务，则需要调用\"task_completed\"工具。适当提炼思考过程，让最终答案具备可读性。"
        - "如果你认为任务无法通过检索数据库解决，则需要调用\"task_completed\"工具，告知用户无法完成，并把你的思考过程和结果返回给用户。"
        - "每次只能调用一个工具，且只能调用一组参数。如果需要使用某个工具，应该仔细阅读说明以确保参数正确。不需要实际调用该工具，只需确定要使用哪个工具。只能使用给定的工具，不要使用不存在的工具。"
        - "不要使用相同参数调用同一个工具。更改工具参数，直到解决当前问题。"
        - "每个命令都有成本，因此要聪明而高效。力求以最少的步骤完成任务。"
        - "与数据库相关的问题，要优先自行生成SQL语句，然后调用SQLExecutor工具得到结果。"
        - "如果数据库中查询值返回为空值，统计的时候忽略空值。"
        - "使用SQLExecutor，一次仅能指定一个数据表，执行一条SQL语句。"
        - "如果SQLExecutor返回为空，请首先检查自己的SQL语句是否正确，不要反复执行相同的SQL语句；尝试用不同的SQL语句访问结果。"
        - "你的输出需要严格遵守以下格式，不要附加其他信息，仅替换“<>”中的内容:\nThought: <a short thought about what to do next, in Chinese>\nAction: <tool name>\nAction Input: <tool args in JSON format and MUST BE JSON FORMAT>\n"
      task_completed: "{\"type\":\"function\",\"function\":{\"name\":\"task_completed\",\"description\":\"The task has been completed and returns the final detailed answer to the user\",\"parameters\":{\"type\":\"object\",\"properties\":{\"final_answer\":{\"type\":\"string\",\"description\":\"your complete and detailed and formatted answer to user, not a abstract\"},\"source_file\":{\"type\":\"array\",\"items\":{\"type\":\"string\"},\"description\":\"relevant source file ids used in the process of answering the question\"}},\"required\":[\"final_answer\",\"source_file\"]}}}"
      task_done: " {\"type\":\"function\",\"function\":{\"name\":\"task_done\",\"description\":\"Call this tool when you have completed the task or when the task cannot be completed.\",\"parameters\":{\"type\":\"object\",\"properties\":{\"success\":{\"type\":\"boolean\",\"description\":\"Whether the task is finished or not. Return False if you cannot finish the task.\"},\"final_response\":{\"type\":\"string\",\"description\":\"Provide a comprehensive final response to user using the same language as the user. If the task is successfully completed, return the full execution result. If the task fails, summarize the reasons for the failure and offer possible solutions if possible.\"},\"source_file\":{\"type\":\"array\",\"items\":{\"type\":\"string\"},\"description\":\"relevant source file ids used in the process of answering the question\"}},\"required\":[\"success\",\"final_response\",\"source_file\"]}}}"
      tool_tmpl: "{{`{{- range .}}`}}{{`{{.Idx }}`}}. \"{{`{{ .Name }}`}}\": {{`{{ .Desc }}`}}. Args: {{`{{ .Args }}`}}\n\n{{`{{ end }}`}}"
