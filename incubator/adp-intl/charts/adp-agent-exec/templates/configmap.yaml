    plugins:
      telemetry:
        opentelemetry:
          addr: {{ ((.Values.global.observability).apm).otlp | default "" }}
          tenant_id: adp
          sampler:
            fraction: 1
          traces:
            disable_trace_body: false
          metrics:
            {{- if ((.Values.global.observability).apm).registry }}
            registry_endpoints: ["{{ .Values.global.observability.apm.registry}}"]
            {{- end }}
          logs:
            enabled: true
            level: "debug"
            trace_log_mode: "disable"
          {{- if ((.Values.global.observability).apm).attributes }}
          attributes:
            {{- range $key, $value := .Values.global.observability.apm.attributes }}
          - key: {{ $key }}
            value: {{ $value }}
            {{- end }}
          {{- end }}
      log:
        default:
          - writer: console
            level: error
          - writer: file
            level: debug
            writer_config:
              filename: /app/logs/trpc.log
              max_size: 100
              max_backups: 10
              max_age: 7
              compress: false
        agent:
            - writer: file
              level: info
              formatter: json
              writer_config:
                filename: /app/logs/agent.log
                write_mode: 2
                roll_type: size
                max_size: 500
                max_age: 7
                max_backups: 10
                compress: false
                time_unit: day
      config:
        file:
          providers:
            - name: rainbow
              path: /app/conf/
            - name: rainbow-comm
              path: /app/conf/
            - name: global
              appid: ${RAINBOW_APP_ID}  # appid
              group: global # 配置所属组
              type: kv   # 七彩石数据格式, kv(默认), table
              env_name: ${RAINBOW_ENV_NAME}
              timeout: 2000
              enable_client_provider: true
      i18n:
        i18n-adp:
          default_lang: zh-CN
          supported_languages:
            - zh-CN
            - en-US
          data_provider:
            type: rainbow
            prefix: agent
            error_prefix: error
            char_scaling_factor:
              zh-CN: 1
              en-US: 3
      registry:
        polaris:
      selector:
        polaris:
          enable_servicerouter: true
