      region: "${INFRA_MIDDLEWARES_S3_COS_REGION}"
      version: 2018-07-09
      action_end_point: 
        #DescribeMeasureDetailAggregation: billing.ap-guangzhou.tencentcloudapi.woa.com
      measure_strategy_method_addr: trpc.measure.openapi.resource.http
