      end_point: ${GATEWAY_MEASURE_END_POINT}
      req_method: POST
      region: "${INFRA_MIDDLEWARES_S3_COS_REGION}"
      version: 2018-07-09
      action_end_point: 
        #DescribeMeasureDetailAggregation: billing.ap-guangzhou.tencentcloudapi.woa.com
      action_intl_user:
        - DescribeAccountBalance
        - DescribeBillingAccountInner
    adp_gateway_measure:
      secret_id: ${ADP_GATEWAY_MEASURE_SECRET_ID}
      secret_key: ${ADP_GATEWAY_MEASURE_SECRET_KEY}
      end_point: ${ADP_GATEWAY_MEASURE_END_POINT}
