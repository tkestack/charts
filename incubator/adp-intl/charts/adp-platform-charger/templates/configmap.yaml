  trpc_go.yaml: |
    server:
      app: adp
      server: platform-charger
      admin:
        ip: ${POD_IP}
        port: 8081
      filter:
        - recovery
        - opentelemetry
        - validation
        - accesslog
        #  - prometheus
        - i18n-adp
      service:
        - name: qbot.finance.finance.Finance
          ip: ${POD_IP}
          port: 9090
          network: tcp
          protocol: trpc
          timeout: 30000
        - name: qbot.finance.finance.Api # service的路由名称，格式：`业务领域.功能模块.项目名.Pb定义的服务名`
          ip: ${POD_IP}
          port: 9091
          network: tcp
          protocol: trpc
          timeout: 10000
          filter:
            - session
            - permission

    plugins:
      telemetry:
        opentelemetry:
          addr: {{ ((.Values.global.observability).apm).otlp | default "" }}
          tenant_id: adp
          sampler:
            fraction: 1
          traces:
            disable_trace_body: false
          metrics:
            {{- if ((.Values.global.observability).apm).registry }}
            registry_endpoints: ["{{ .Values.global.observability.apm.registry}}"]
            {{- end }}
          logs:
            enabled: true
            level: "debug"
            trace_log_mode: "disable"
          {{- if ((.Values.global.observability).apm).attributes }}
          attributes:
            {{- range $key, $value := .Values.global.observability.apm.attributes }}
          - key: {{ $key }}
            value: {{ $value }}
            {{- end }}
          {{- end }}
      config:
        file:
          providers:
            - name: rainbow
              path: /app/conf/
            - name: global
              appid: ${RAINBOW_APP_ID}  # appid
              group: global # 配置所属组
              type: kv   # 七彩石数据格式, kv(默认), table
              env_name: ${RAINBOW_ENV_NAME}
              timeout: 2000
              enable_client_provider: true
      i18n:
        i18n-adp:
          default_lang: zh-CN
          supported_languages:
            - zh-CN
            - en-US
          data_provider:
            type: rainbow
            prefix: finance
            error_prefix: error
            char_scaling_factor:
              zh: 1
              en: 3
      log:
        default:
          - writer: console
            level: info
            caller_skip: 3
            formatter: json
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
              stacktrace_key: stackTrace
          - writer: file
            level: info
            formatter: json
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
              stacktrace_key: stackTrace
            writer_config:
              filename: /app/logs/trpc.log
              write_mode: 2
              roll_type: time
              max_age: 7
              max_backups: 10
              compress: false
              time_unit: day

    client:
      filter:
        - opentelemetry
      service:
        - name: mysql.finance.finance
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_finance?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: mysql.finance.finance.slave
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_finance?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: mysql.finance.wedata
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_finance?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: redis.finance.finance
          network: tcp
          target: ip://${INFRA_MIDDLEWARES_REDIS_0_HOSTS}:6379/10
          password: ${INFRA_MIDDLEWARES_REDIS_0_PASSWORD}
          timeout: 800
        - name: kafka.finance.finance.pay_producer
          target: kafka://${INFRA_MIDDLEWARES_KAFKA_0_HOSTS}:${INFRA_MIDDLEWARES_KAFKA_0_PORT}?topic=pay&compression=none&partitioner=random&requiredAcks=-1
          timeout: 5000
        - name: cloud.trade.gateway.http
          network: tcp
          protocol: http
          target: ""
          namespace: ${POD_NAMESPACE}
          timeout: 5000
        - name: qcloud.measure.http
          network: tcp
