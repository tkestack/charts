kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ .Release.Name }}-platform-op
  namespace: {{ .Release.Namespace }}
data:
  application.yaml: |
    andon_auth_tool_config: ${AndonAuthToolConf}
    default_search_doc_topn: 5
    max_corp_robot_quota: 2000
    is_preivew_doc: true
    gateway_api: ${GatewayApi}
    no_authorization_api:
      /opapi/login: true
      /opapi/vector_doc/search_release: true
      /opapi/vector_doc/search_preview: true
      /opapi/msg-record-agent/list: true
      /opapi/admin/api/filemanager/callback: true
      /opapi/qa-draw: true
    session:
      type: ti-gateway # 会话类型 rio(内部鉴权) password(账号密码鉴权) ti-gateway Ti网关鉴权
      jwt_secret:
      session_time: 24h # 会话保持时间
      account: admin
      password: 088B2BE8A4432E9861FD1408CF14E853 #safe md5加密
    audit:
      type: http
      https:
        app_id : {{ .Values.global.contentSecurity.appId }}
        tms_url: {{ .Values.global.contentSecurity.tmsUrl | default "" }} 
        ims_url: {{ .Values.global.contentSecurity.imsUrl | default "" }} 
        biz_type: {{ .Values.global.contentSecurity.bizType }} 
      infosec_biz_types:
        - code: QD_AI_TEXT
          desc: 通用策略（默认）
          type: tianyu
        - code: QD_CM
          desc: 政企行业策略
          type: tianyu
        - code: QD_JT
          desc: 交通行业策略
          type: tianyu
        - code: QD_ZF
          desc: 政法行业策略
          type: tianyu
        - code: QD_YL
          desc: 医疗行业策略
          type: tianyu
        - code: "QD_YL-1"
          desc: "医疗行业策略-1"
          type: tianyu
        - code: QD_JY
          desc: 教育行业策略
          type: tianyu
        - code: QD_DSL
          desc: 大参林文本策略
          type: tianyu
        - code: QD_JYYL
          desc: 教育医疗行业
          type: tianyu
        - code: QD_test
          desc: 内部测试
          type: tianyu
        - code: QD_TXYU
          desc: 腾讯音乐文本/图片/视频策略
          type: tianyu
        - code: QD_SJD
          desc: 上海交通大学文本/图片/视频策略
          type: tianyu
        - code: QD_DS
          desc: DeepSeek模型策略
          type: tianyu
        - code: QD_DS_API
          desc: QD_DS_API
          type: tianyu
        - code: qd_cbs
          desc: qd_cbs
          type: tianyu
        - code: QD_RY
          desc: 荣耀文本/图片/视频策略
          type: tianyu
        - code: QD_DS_API_535
          desc: QD_DS_API_535
          type: tianyu
        - code: QD_DS_API_yuanfufao
          desc: QD_DS_API_yuanfufao
          type: tianyu
        - code: QD_DS_API_RTS
          desc: QD_DS_API_RTS
          type: tianyu
        - code: QD_BRM
          desc: QD_BRM
          type: tianyu
        - code: QD_YSZS
          desc: QD_YSZS
          type: tianyu
        - code: QD_AI_IMAGE
          desc: QD_AI_IMAGE
          type: tianyu
        - code: TEXT_IMAGE_test
          desc: TEXT_IMAGE_test
          type: tianyu
        - code: QD_AI_AD
          desc: QD_AI_AD
          type: tianyu
        - code: QD_DS_1
          desc: DHL定制
          type: tianyu
    pangu: ${Pangu}
    taihu:
      filter_english_name:
      filter_department: 
        云智能三工作室: true
      passid: qbot
      token: 
      domain: http://api-idc.sgw.woa.com
      is_deptmember_url: /ebus/tof4_org/api/v1/Staff/IsDeptMember
      get_staff_baseinfo_url: /ebus/tof4_org/api/v1/staff/getstaffbaseinfo
    taihu_staff_base_info:
      filter_english_name:
      filter_department: 
        云智能三工作室: true
      passid: qbot
      token: 
      domain: http://api-idc.sgw.woa.com
      is_deptmember_url: /ebus/tof4_org/api/v1/Staff/IsDeptMember
      get_staff_baseinfo_url: /ebus/tof4_org/api/v1/staff/getstaffbaseinfo
    intent_category:
      search_engine: 搜索引擎类
      model_chat: 模型闲聊类
      self_awareness: 自我认知类
      knowledge_qa: 知识问答类
      FAQ: 问答
      工作流: 工作流
      自定义: 自定义
      image_caption: 图片识别
      image_qa: 图片问答
      mllm_cognition: 多模态阅读理解
      default: 意图未命中（兜底）
      文档问答: 文档问答
    host: qbot.woa.com
    is_report_audit_log: false

    s3_config:
      {{ if eq .Values.global.components.s3.providerType "cos" }}
      type: cos
      cos_map:
        adp_default:
          secret_id: ${INFRA_MIDDLEWARES_S3_COS_SECRETID}
          secret_key: ${INFRA_MIDDLEWARES_S3_COS_SECRETKEY}
          app_id: ${INFRA_MIDDLEWARES_S3_COS_APPID}
          region: ${INFRA_MIDDLEWARES_S3_COS_REGION}
          bucket: ${INFRA_MIDDLEWARES_S3_COS_BUCKET}
          domain: ${INFRA_MIDDLEWARES_S3_COS_DOMAIN}
          expire_time: 30m
        fileparser:
          secret_id: ${INFRA_MIDDLEWARES_S3_COS_SECRETID}
          secret_key: ${INFRA_MIDDLEWARES_S3_COS_SECRETKEY}
          app_id: ${INFRA_MIDDLEWARES_S3_COS_APPID}
          region: ${INFRA_MIDDLEWARES_S3_COS_REGION}
          bucket: ${INFRA_MIDDLEWARES_S3_COS_BUCKET}
          domain: ${INFRA_MIDDLEWARES_S3_COS_DOMAIN}
          expire_time: 30m
        realtime:
          secret_id: ${INFRA_MIDDLEWARES_S3_COS_SECRETID}
          secret_key: ${INFRA_MIDDLEWARES_S3_COS_SECRETKEY}
          app_id: ${INFRA_MIDDLEWARES_S3_COS_APPID}
          region: ${INFRA_MIDDLEWARES_S3_COS_REGION}
          bucket: ${INFRA_MIDDLEWARES_S3_COS_BUCKET}
          domain: ${INFRA_MIDDLEWARES_S3_COS_DOMAIN}
          expire_time: 30m
      {{ else if eq .Values.global.components.s3.providerType "minio" }}
      type: minio
      min_io_map:
        adp_default:
          secret_id: ${INFRA_MIDDLEWARES_S3_MINIO_ACCESSKEY}
          secret_key: ${INFRA_MIDDLEWARES_S3_MINIO_SECRETKEY}
          region: ""
          bucket: qbot
          sts_endpoint: http://{{ printf "minio.%s.svc.cluster.local" .Release.Namespace }}
          end_point: {{ .Values.global.clb }}
          use_https: {{ eq .Values.global.scheme "https" }}
          expire_time: 30m
        fileparser:
          secret_id: ${INFRA_MIDDLEWARES_S3_MINIO_ACCESSKEY}
          secret_key: ${INFRA_MIDDLEWARES_S3_MINIO_SECRETKEY}
          region: ""
          bucket: qbot
          sts_endpoint: http://{{ printf "minio.%s.svc.cluster.local" .Release.Namespace }}
          end_point: {{ .Values.global.clb }}
          use_https: {{ eq .Values.global.scheme "https" }}
          expire_time: 30m
        realtime:
          secret_id: ${INFRA_MIDDLEWARES_S3_MINIO_ACCESSKEY}
          secret_key: ${INFRA_MIDDLEWARES_S3_MINIO_SECRETKEY}
          region: ""
          bucket: qbot
          sts_endpoint: http://{{ printf "minio.%s.svc.cluster.local" .Release.Namespace }}
          end_point: {{ .Values.global.clb }}
          use_https: {{ eq .Values.global.scheme "https" }}
          expire_time: 30m
      {{ else if eq .Values.global.components.s3.providerType "s3" }}
      type: s3
      s3_map:
        adp_default:
          secret_id: ${INFRA_MIDDLEWARES_S3_AWS_ACCESSKEY}
          secret_key: ${INFRA_MIDDLEWARES_S3_AWS_SECRETKEY}
          region: ${INFRA_MIDDLEWARES_S3_AWS_REGION}
          bucket: ${INFRA_MIDDLEWARES_S3_AWS_BUCKET}
          endpoint: ${INFRA_MIDDLEWARES_S3_AWS_ENDPOINT}
          expire_time: 30m
        fileparser:
          secret_id: ${INFRA_MIDDLEWARES_S3_AWS_ACCESSKEY}
          secret_key: ${INFRA_MIDDLEWARES_S3_AWS_SECRETKEY}
          region: ${INFRA_MIDDLEWARES_S3_AWS_REGION}
          bucket: ${INFRA_MIDDLEWARES_S3_AWS_BUCKET}
          endpoint: ${INFRA_MIDDLEWARES_S3_AWS_ENDPOINT}
          expire_time: 30m
        realtime:
          secret_id: ${INFRA_MIDDLEWARES_S3_AWS_ACCESSKEY}
          secret_key: ${INFRA_MIDDLEWARES_S3_AWS_SECRETKEY}
          region: ${INFRA_MIDDLEWARES_S3_AWS_REGION}
          bucket: ${INFRA_MIDDLEWARES_S3_AWS_BUCKET}
          endpoint: ${INFRA_MIDDLEWARES_S3_AWS_ENDPOINT}
          expire_time: 30m
        {{ end }}

    export_fields: [
      [ "ID","id" ],
      [ "SessionID", "session_id" ],
      [ "RecordID", "record_id" ],
      [ "RecordIDLink", "记录链接" ],
      [ "RelatedRecordID", "related_record_id" ],
      [ "FromID", "from_id" ],
      [ "TraceID", "trace_id" ],
      [ "Question", "问题" ],
      [ "Answer", "答案" ],
      [ "IntentCategory", "意图分类" ],
      [ "IntentCategoryDesc", "意图分类描述" ],
      [ "ReplyMethod", "回复类型" ],
      [ "ReplyMethodDesc", "回复类型描述" ],
      [ "Label", "标签" ],
      [ "IsRewrite", "是否改写" ],
      [ "Reference", "引用来源" ],
      [ "KnowledgeRaw", "知识信息" ],
      [ "IsSearchEngine", "是否开启搜索引擎" ],
      [ "IsDeleted", "是否已删除" ],
      [ "Createtime", "创建时间" ],
      [ "Updatetime", "更新时间" ],
      [ "Type", "消息类型" ],
      [ "AppBizID", "app_biz_id" ],
      [ "FromType", "from_type" ],
      [ "ToID", "to_id" ],
      [ "ToType", "to_type" ],
      [ "HasRead", "has_read" ],
      [ "Score", "score" ],
      [ "Reason", "reason" ],
      [ "DirectlyReply", "是否直接作答" ],
      [ "Intent", "意图" ],
      [ "StatisticInfoRaw", "模型响应统计数据" ],
      [ "Prompt", "prompt" ],
      [ "PromptHistory", "prompt_history" ],
      [ "PromptRaw", "prompt_raw" ],
      [ "ResultCode", "result_code" ],
      [ "ResultType", "result_type" ],
      [ "RejectPrompt", "reject_prompt" ],
      [ "RewriteQuestion", "rewrite_question" ],
      [ "RewritePrompt", "rewrite_prompt" ],
      ["IntentPrompt","intent_prompt"],
      ["StageCostResult","阶段耗时"],
    ]

    no_permission_menus:
      - url: /
        redirect: /auth
        children:
          - label: 鉴权
            icon: fa fa-cube
            url: /auth_private
            schemaApi: 'get:/op/auth_private.json'
            rewrite: ''
            isDefaultPage: true
            visible: false
    menus:
      - url: /
        redirect: /user
        children:
          - label: 鉴权
            icon: fa fa-cube
            url: /auth
            schemaApi: 'get:/op/auth.json'
            rewrite: ''
            visible: false
            order: 99
          - label: 退出
            icon: fa fa-cube
            url: /logout
            schemaApi: 'get:/op/logout.json'
            rewrite: /logout
            visible: true
            order: 100
          - label: 用户及企业管理
            icon: fa fa-cube
            url: /usercorp
            redirect: /user
            visible: true
            order: 1
            children:
              - label: 用户审核管理
                icon: fa fa-cube
                url: /user
                schemaApi: 'get:/op/user.json'
                rewrite: /user/list
                visible: true
                order: 1
              - label: 企业管理
                icon: fa fa-cube
                url: /corp
                schemaApi: 'get:/op/corp.json'
                rewrite: /corp/corp_list
                visible: true
                order: 2
              - label: 企业员工管理
                icon: fa fa-cube
                url: /corp_staff
                schemaApi: 'get:/op/corp_staff.json'
                rewrite: /corp/staff_list
                visible: true
                order: 3
              - label: 企业QPM/TPM配置
                icon: fa fa-cube
                url: /corp_qpm_tpm
                schemaApi: 'get:/op/corp_qpm_tpm.json'
                rewrite: /corp/corp_qpm_tpm
                visible: true
                order: 7
              - label: 公共安全校验(scurl)白名单
                icon: fa fa-cube
                url: /corp_scurl_domain_wl/list
                schemaApi: 'get:/op/corp_scurl_domain_wl.json'
                rewrite: /corp_scurl_domain_wl/list
                visible: true
                order: 8
          - label: 知识库问答应用
            icon: fa fa-cube
            url: /robotmgr
            redirect: /robot
            visible: true
            order: 2
            children:
              - label: 知识库问答应用列表
                icon: fa fa-cube
                url: /robot
                schemaApi: 'get:/op/robot.json'
                rewrite: /robot/list
                visible: true
                order: 1
              - label: 知识库问答应用详情
                icon: fa fa-cube
                url: /robot/operate
                schemaApi: 'get:/op/robot_operate.json'
                rewrite: /robot/operate
                visible: false
                order: 2
                children:
                  - label: 查看解析结果
                    icon: fa fa-cube
                    url: /robot/parse_result_intervene
                    schemaApi: 'get:/op/robot_parse_result_intervene.json'
                    rewrite: /robot/parse_result_intervene
                    visible: false
                    order: 1
              - label: 全局干预知识库
                icon: fa fa-cube
                url: /global_knowledge
                schemaApi: 'get:/op/global_knowledge.json'
                rewrite: /global_knowledge/list
                visible: true
                order: 3
              - label: 点赞点踩记录
                icon: fa fa-cube
                url: /msg-record-score
                schemaApi: 'get:/op/msg_score.json'
                rewrite: /msg-record-score/list
                visible: true
                order: 4
              - label: 机器人可见性
                icon: fa fa-cube
                url: /robot_visibility
                schemaApi: 'get:/op/robot_visibility.json'
                rewrite: /robot_visibility/list
                visible: false
                order: 5
              - label: 意图识别管理
                icon: fa fa-cube
                url: /intent
                schemaApi: 'get:/op/intent.json'
                rewrite: /intent/list
                visible: true
                order: 6  
              - label: 全局消息记录
                icon: fa fa-cube
                url: /msg_record
                schemaApi: 'get:/op/global_msg_record.json'
                rewrite: /msg_record/list
                visible: true
                order: 7
              - label: 应用提槽深度
                icon: fa fa-cube
                url: /app/list_by_uin
                schemaApi: 'get:/op/robot_slot_level.json'
                rewrite: /app/list_by_uin
                visible: true
                order: 8
          - label: 模型广场
            icon: fa fa-cube
            url: /modelhub
            schemaApi: 'get:/op/modelhub.json'
            visible: true
            order: 3
          - label: 合规相关工具
            icon: fa fa-cube
            url: /sensitive
            redirect: /audit
            visible: {{ .Values.global.contentSecurity.auditSwitch }}
            order: 5
            children:
              - label: 内容安全校验
                icon: fa fa-cube
                url: /audit
                schemaApi: 'get:/op/audit.json'
                rewrite: /audit/content
                visible: false
                order: 1
              - label: 人工审核
                icon: fa fa-cube
                url: /appeal
                schemaApi: 'get:/op/appeal.json'
                rewrite: /appeal/list
                visible: {{ .Values.global.contentSecurity.auditSwitch }}
                order: 2
              - label: 黑白名单管理
                icon: fa fa-cube
                url: /keyword
                schemaApi: 'get:/op/keyword.json'
                rewrite: /keyword/list
                visible: false
                order: 3
          - label: 操作日志管理
            icon: fa fa-cube
            url: /log
            schemaApi: 'get:/op/operatorlog.json'
            rewrite: /log/list
            visible: true
            order: 6
          - label: POC管理
            icon: fa fa-cube
            url: /poc-project
            redirect: /poc-project/list
            visible: true
            order: 7
            children:
              - label: POC工具
                icon: fa fa-cube
                url: /poc-project/list
                schemaApi: 'get:/op/poc.json'
                rewrite: /poc-project/list
                visible: false
                order: 1
              - label: POC操作详情
                icon: fa fa-cube
                url: /poc-project/operate
                schemaApi: 'get:/op/poc_operate.json'
                rewrite: /poc-project/operate
                visible: false
                order: 2
              - label: POC跑测任务详情
                icon: fa fa-cube
                url: /poc-test-task/detail
                schemaApi: 'get:/op/poc_task_detail.json'
                rewrite: /poc-test-task/detail
                visible: false
                order: 3
          - label: 体验中心
            icon: fa fa-cube
            url: /exp_app
            schemaApi: 'get:/op/exp_app.json'
            visible: true
            order: 7
          - label: 模版中心
            icon: fa fa-cube
            url: /prompt_template/list
            schemaApi: 'get:/op/prompt_template.json'
            visible: true
            order: 88
          - label: 插件中心
            icon: fa fa-cube
            url: /plugin
            redirect: /plugin/list
            visible: true
            order: 99
            children:
              - label: 插件管理
                icon: fa fa-cube
                url: /plugin/list
                schemaApi: 'get:/op/plugin.json'
                rewrite: /plugin/list
                visible: true
                order: 1
              - label: 自定义插件列表
                icon: fa fa-cube
                url: /custom_plugin/list
                schemaApi: 'get:/op/custom_plugin.json'
                rewrite: /custom_plugin/list
                visible: true
                order: 2
          - label: widget label管理
            icon: fa fa-cube
            url: /widget_label/list
            schemaApi: 'get:/op/widget_label.json'
            visible: true
            order: 90
          - label: widget管理
            icon: fa fa-cube
            url: /widget/list
            schemaApi: 'get:/op/widget.json'
            visible: true
            order: 91

    task_prefix: op:task
    task_fetch_num: 100
    task_fetch_timeout: 2s
    task_fetch_period: 2s
    tasks:
      poc:
        runners: 5 # 处理协程数, 无法动态调整
        retry_wait_time: 1m # 重试等待时间
        max_retry: 3 # 最大重试次数
        timeout: 600m # 超时时间
        fail_timeout: 3s # 失败回调超时
        delay: 0s # 启动延迟
        batch: 1
        batch_size: 1
        stopped_resume_time: 720h
    sse_conn_options:
      conn_url: 'https://apex-cmlb-80-0.{{ .Release.Namespace }}.svc.cluster.local:80/v1/qbot/chat/experienceSse'
      conn_summary_url: 'https://apex-cmlb-80-0.{{ .Release.Namespace }}.svc.cluster.local:80/v1/qbot/chat/summary/sse'
      conn_knowledge_qa_url: 'https://apex-cmlb-80-0.{{ .Release.Namespace }}.svc.cluster.local:80/v1/qbot/chat/sse'
      timeout: 60s
    preview_filter_keys:
      search_preview: true
      search_preview_question: true
      search_rejected_question_preview: true
    release_filter_keys:
      search_release: true 
      search_release_question: true 
      search_rejected_question_release: true
    is_enable_app_permissions: false
    cls:
      secret_id: ${INFRA_MIDDLEWARES_S3_COS_SECRETID}
      secret_key: ${INFRA_MIDDLEWARES_S3_COS_SECRETKEY}
      topic_id: c8d1f14e-6c1f-49b1-b099-f04bf1aca8dd
      query_suffix: " AND \"created\" AND \"id\""
      region: ap-guangzhou
      end_point: cls.internal.tencentcloudapi.com

    hunyuan_user_log_download:
      max_hunyuan_user_log_num: 10000
      page_size: 100
    robot_default:
      app_default_model:
        knowledge_qa:
            - alias_name: 精调知识大模型标准版
              name: cs-normal
              desc:
            - alias_name: 精调知识大模型高级版
              name: cs-normal-70b
              desc:
              is_default: true
            - alias_name: 混元大模型标准版
              name: hunyuan-13B
              desc:
            - alias_name: 混元大模型高级版
              name: hunyuan
              desc:
            - alias_name: 金融行业大模型标准版
              name: finance-13b
              desc:
            - alias_name: 医学行业大模型标准版
              name: medical-6b
              desc:
        summary:
          - alias_name: 精调知识大模型标准版
            name: cs-normal
            desc:
          - alias_name: 精调知识大模型高级版
            name: cs-normal-70b
            desc:
          - alias_name: 混元大模型标准版
            name: hunyuan-13B
            desc:
          - alias_name: 混元大模型高级版
            name: hunyuan
            desc:
          - alias_name: 金融行业大模型标准版
            name: finance-13b
            desc:
          - alias_name: 金融行业大模型高级版
            name: finance-13b
            desc:
        classify:
          - alias_name: 精调知识大模型标准版
            name: cs-normal
            desc:
          - alias_name: 精调知识大模型高级版
            name: cs-normal-70b
            desc:
          - alias_name: 混元大模型标准版
            name: hunyuan-13B
            desc:
          - alias_name: 混元大模型高级版
            name: hunyuan
            desc:
          - alias_name: 金融行业大模型标准版
            name: finance-13b
            desc:
          - alias_name: 金融行业大模型高级版
            name: finance-13b
            desc:
      filters:
        search_image_image:
          doc_type: 6
          confidence: 0.85
          top_n: 1
          index_id: 10
          is_enable: true
