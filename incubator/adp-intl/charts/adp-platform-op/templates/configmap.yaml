  trpc_go.yaml: |
    global:                             #全局配置
      local_ip: ${POD_IP}
      container_name: ${POD_NAME}
    server:
      app: adp
      server: platform-op
      bin_path: /app/bin/                   #二进制可执行文件和框架配置文件所在路径
      conf_path: /app/conf/                 #业务配置文件所在路径
      data_path: /app/data/                 #业务数据文件所在路径
      filter:
        - recovery
      service:
        - name: trpc.adp.bot-op-server.Op
          ip: ${POD_IP}
          port: 8080
          network: tcp
          protocol: http_no_protocol
          timeout: 60000
        - name: trpc.adp.bot-op-server.CheckFeedback
          ip: ${POD_IP}
          port: 8081
          network: "0 */10 * * * *"
          protocol: timer
        - name: trpc.adp.bot-op-server.CheckFeedbackClassify
          ip: ${POD_IP}
          port: 8082
          network: "*/3 * * * * *"
          protocol: timer
          timeout: 300000
        - name: trpc.adp.bot-op-server.CreateFeedBackAndonTicket
          ip: ${POD_IP}
          port: 8083
          network: "0 */2 * * * *?scheduler=CreateFeedBackAndonTicket&holdTime=5"
          protocol: timer
          timeout: 300000
        - name: trpc.adp.bot-op-server.CheckFeedbackAndonStatus
          ip: ${POD_IP}
          port: 8084
          network: "0 */2 * * * *?scheduler=CheckFeedbackAndonStatus&holdTime=5"
          protocol: timer
          timeout: 300000
        - name: trpc.adp.bot-op-server.ClearHistoryDBPipelineDetail
          ip: ${POD_IP}
          port: 8085
          network: "0 0 */10 * * *?scheduler=ClearHistoryDBPipelineDetail&holdTime=10"
          protocol: timer
          timeout: 300000
        - name: trpc.adp.bot-op-server.SendNightMessage
          ip: ${POD_IP}
          port: 8086
          network: "0 0 8 * * *?scheduler=SendNightMessage&holdTime=5"
          protocol: timer
          timeout: 3000000
        - name: trpc.adp.bot-op-server.SyncInnerUserInfo
          ip: ${POD_IP}
          port: 8087
          network: "0 0 10 * * *?scheduler=SyncInnerUserInfo&holdTime=5"
          protocol: timer
          timeout: 3000000
    plugins:
      config:
        file:
          providers:
            - name: rainbow
              path: /app/conf/
            - name: global
              appid: ${RAINBOW_APP_ID}  # appid
              group: global # 配置所属组
              type: kv   # 七彩石数据格式, kv(默认), table
              env_name: ${RAINBOW_ENV_NAME}
              timeout: 2000
              enable_client_provider: true
      telemetry:
        opentelemetry:
          addr: {{ ((.Values.global.observability).apm).otlp | default "" }}
          tenant_id: adp
          sampler:
            fraction: 1
          traces:
            disable_trace_body: false
          metrics:
            {{- if ((.Values.global.observability).apm).registry }}
            registry_endpoints: ["{{ .Values.global.observability.apm.registry}}"]
            {{- end }}
          logs:
            enabled: true
            level: "debug"
            trace_log_mode: "disable"
          {{- if ((.Values.global.observability).apm).attributes }}
          attributes:
            {{- range $key, $value := .Values.global.observability.apm.attributes }}
          - key: {{ $key }}
            value: {{ $value }}
            {{- end }}
          {{- end }}
      log:
        default:
          - writer: console
            level: debug
            formatter: json
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
              stacktrace_key: stackTrace
          - writer: file
            level: info
            formatter: json
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
              stacktrace_key: stackTrace
            writer_config:
              filename: /app/logs/trpc.log
              write_mode: 2
              roll_type: time
              max_age: 7
              max_backups: 10
              compress: false
              time_unit: day
    client:
