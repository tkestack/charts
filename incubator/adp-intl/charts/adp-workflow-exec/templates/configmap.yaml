      "对话是否结束": "Is the Workflow End",
      "当前节点是否结束": "Is the Current Node Completed",
      "回复": "Reply",
      "是": "Yes",
      "否": "No",
      "已停止，可能原因：工作流被终止或运行被取消": "Stopped. Possible reasons: The workflow was terminated or the execution was canceled.",
      "未知错误": "Unknown error",
      "系统错误": "System error",
      "获取输入变量失败": "Failed to get input variables",
      "参数解析失败": "Parameter parsing failed",
      "参数引用解析失败": "Parameter reference parsing failed",
      "参数值不合法，请检查参数值是否正确": "Invalid parameter value, please check if the parameter value is correct",
      "运行时错误": "Runtime error",
      "工作流已运行结束": "Workflow has finished running",
      "数据长度超出限制": "Data length exceeds the limit",
      "获取应用模型信息失败": "Failed to get application model information",
      "获取账户计费状态失败": "Failed to get account billing status",
      "大模型资源不足": "Insufficient LLM resources",
      "大模型并发数超出限制": "LLM concurrency exceeds the limit",
      "专属并发大模型资源不足": "Insufficient VIP LLM resources",
      "专属并发大模型并发数超出限制": "VIP LLM concurrency exceeds the limit",
      "大模型请求超时": "LLM request timed out",
      "大模型请求失败": "LLM request failed",
      "大模型结果异常": "Abnormal LLM result",
      "大模型逻辑判断失败": "LLM logic judgment failed",
      "大模型请求的prompt超长": "Prompt for LLM request is too long",
      "大模型追问次数超过限制": "Number of follow-up questions for LLM exceeds the limit",
      "设置子工作流输入参数失败": "Failed to set input parameters for sub-workflow",
      "子工作流的节点运行异常": "Node execution exception in sub-workflow",
      "初始化子工作流失败": "Failed to initialize sub-workflow",
      "代码执行失败": "Code execution failed",
      "意图判断结果异常": "Abnormal intent judgment result",
      "循环条件判断失败": "Loop condition judgment failed",
      "循环超过系统最大循环次数": "Loop exceeds the system's maximum number of iterations",
      "知识库检索失败": "Knowledge base retrieval failed",
      "存在不支持的比较符": "Unsupported comparator exists",
      "逻辑判断异常，没有满足条件的分支": "Logic error: No conditional branch matched",
      "获取插件工具详情失败": "Failed to get plugin tool details",
      "调用工具异常": "Tool invocation exception",
      "工具结果异常": "Tool result exception",
      "调用API失败": "Failed to invoke API",
      "建立连接失败": "Failed to establish connection",
      "消息队列类型不支持": "Message queue type not supported",
      "初始化消息队列生产者失败": "Failed to initialize message queue producer",
      "消息队列生产者发送消息失败": "Message queue producer failed to send message",
      "批处理并行数不合法": "Invalid batch processing parallel number",
      "SQL执行失败": "Failed to execute SQL",
      "节点运行异常": "Node runtime exception",
      "思考": "Thinking",
      "调用工作流": "Invoke workflow",
      "该工作流中引用了其他工作流，其他工作流因‘未启用’导致不可用，请’启用‘后再进行测试。": "This workflow references other workflows, which are unavailable because they are 'not enabled'. Please 'enable' them before testing again.",
      "2006年01月02日 15:04:05": "January 02, 2006 15:04:05",
      "当前工作流配置错误，请调整后重新测试。": "Current workflow configuration is incorrect. Please adjust and retry.",

      "发生未知错误，请稍后再试，若问题频繁出现，请联系技术支持，报告该问题": "An unknown error has occurred. Please try again later. If the problem persists, please contact technical support to report this issue.",
      "发生系统错误，请稍后重试。若问题频繁出现，请联系技术支持，报告该问题。": "A system error has occurred. Please try again later. If the problem persists, please contact technical support to report this issue.",
      "1.检查该节点的输入配置，确保所有必需的参数都已正确设置。\n2.检查上游节点的输出，确认是否有提供该变量。": "1.Check the node's input configuration and ensure all required parameters are correctly set.\n2.Check the output of the upstream node to confirm that this variable is being provided.",
      "1.检查参数的格式。当输入为object类型的变量时，请检查并确保json语法的正确性。\n2.检查字段类型与节点要求是否一致。\n3.可考虑在上游节点进行参数的清洗或转义。": "1.Check the parameter format. When the input is a variable of type 'object', ensure the JSON syntax is correct.\n2.Verify that the field type matches the node's requirements.\n3.Consider cleaning or escaping the parameters in an upstream node.",
      "检查上游节点传递参数的正确性，可在调试面板中查看传入的参数。": "Check the correctness of the parameters passed from the upstream node. You can view the incoming parameters in the debug panel.",
      "1.检查参数的具体值，查看是否超出参数的合法范围。\n2.检查参数类型是否与节点接受类型一致。\n3.检查是否存在非法字符": "1.Check the parameter's specific value to see if it exceeds the valid range.\n2.Check if the parameter type is consistent with the type accepted by the node.\n3.Check if there are any invalid characters.",
      "1.检查输入数据的大小，尝试减小数据量。\n2.对于文本数据请考虑对文本进行摘要或分块处理。": "1.Check the size of the input data and try to reduce the data volume.\n2.For text data, consider summarizing the text or processing it in chunks.",
      "1.检查网络连接是否正常 \n2.确认当前配置无问题，当前用户有权限访问该模型": "1.Check if the network connection is working properly.\n2.Confirm that the current configuration is correct and that the user has permission to access the model.",
      "当前账户余额或配额不足以支持本次大模型调用，请充值或使用限时免费模型": "Your account balance or quota is insufficient for this request. Please top up your account or use a free model.",
      "同一时间发起的并发请求数量超过了系统或模型供应商的限制，建议降低当前节点的并发数。若业务需要高并发情况，请申请技术支持以提高并发限制": "The number of concurrent requests has exceeded the limit set by the system or the model provider. We recommend reducing the concurrency level for the current node. If your business requires higher concurrency, please contact technical support to request a limit increase.",
      "1.检查网络连接到服务商的延迟。\n2.尝试简化Prompt，减少模型的处理时间 \n3.使用“异常处理”功能，开启重试功能。": "1.Check the network latency to the service provider.\n2.Try simplifying the prompt to reduce the model's processing time.\n3.Use the \"exception handling\" feature to enable retries.",
      "请排查：API认证、账户配额、请求负载（的合法性及网络连通性。若仍无法解决，请提交工单。": "Please investigate the following: API authentication, account quota, the validity of the request payload, and network connectivity. If the issue persists, please submit a support ticket.",
      "大模型返回的结果格式不符合输出预期，多发于输出格式为JSON的情况，建议在Prompt中明确、清晰地制定输出格式，提供JSON示例。": "The format of the result from the large model does not match the expected output. This is a common issue, especially when the output format is JSON. We recommend clearly and explicitly defining the output format in the prompt and providing a JSON example.",
      "检查用于意图识别的Prompt是否足够清晰、无歧义、覆盖了足够广的情况。建议丰富和优化判断的示例，让模型更好地学习多种意图。": "Check if the prompt for intent recognition is clear, unambiguous, and covers a comprehensive range of scenarios. We recommend enriching and optimizing the examples to help the model better learn a wide variety of intents.",
      "发送给大模型的Prompt总长度超过了模型处理的上限，建议1.移除不必要的上下文或输入 2.对过长的上下文进行摘要处理再输入给模型。3.分块处理后再进行汇总 4.切换支持更长上下文的模型": "The total length of the prompt sent to the large language model exceeds its context window limit. We recommend:\n\n1.Remove unnecessary context or input.\nSummarize lengthy context before inputting it to the model.\n2.Process in chunks and then aggregate the results.\n3.Switch to a model with a larger context window.",
      "建议修改提示词，或使用更清晰的语言描述问题，以便于模型在追问次数的限制内完成任务": "Try refining your prompt or using clearer language to help the model complete the task within the attempt limit.",
      "1.检查子工作流调用节点的参数映射配置，确保父工作流的输出变量与子工作流的输入变量正确对应。\n2.检查参数的数据类型是否匹配。": "1.Check the parameter mapping configuration of the sub-workflow call node to ensure that the parent workflow's output variables are correctly mapped to the sub-workflow's input variables.\n2.Check if the data types of the parameters match.",
      "错误发生在子工作流内部，建议检查子工作流具体报错信息，以定位错误发生的位置与原因": "The error occurred within the sub-workflow. We recommend checking the sub-workflow's specific error message to pinpoint the location and cause of the issue.",
      "1.检查子工作流是否已发布且版本正确。\n2.检查子工作流的触发配置和基本参数是否有效。": "1.Check if the sub-workflow is published and the correct version is being used.\n2.Check if the sub-workflow's trigger configuration and basic parameters are valid.",
      "代码运行时发生错误。请查看代码节点具体的报错信息以进行修改": "An error occurred during code execution. Please check the specific error message in the code node to make corrections.",
      "1.检查意图的定义和示例语料是否充分和准确。\n2.检查输入的文本是否过于模糊或与定义的意图相差甚远。": "1.Verify that the intent definitions and their example data are both sufficient and correct.\n2.Determine if the input text is overly ambiguous or too different from any of the intended meanings.",
      "循环节点的退出条件表达式语法错误或判断逻辑异常，请检查表达式中的语法是否正确，条件表达式中引用的变量在循环过程中是否可用": "There is an issue with the loop's exit condition. The expression may contain a syntax error, or its evaluation logic might be incorrect. Please verify the syntax is correct and that all variables used in the expression are available throughout the loop's execution.",
      "1.建议检查循环条件设置，是否进入死循环 2.考虑使用数组循环": "1.Check the loop condition for an infinite loop.\n2.Consider using an array loop.",
      "建议查看节点文档，确认所有支持的比较运算符列表，将不支持的运算符更改为支持的等价逻辑": "Check the node documentation for the list of supported comparison operators and replace any unsupported operators with supported equivalent logic.",
      "请检查插件是否已经被正确安装并启用，检查网络连接与插件服务的运行状态": "Please check if the plugin is correctly installed and enabled, and verify the network connection and the status of the plugin service.",
      "插件工具的结果返回了非预期的内容，请重试。若问题频发，请联系插件相关开发者": "The plugin returned an unexpected result. Please try again. If the issue persists, contact the plugin developer.",
      "1.检查 API 的 URL、请求方法、Headers 和 Body 是否配置正确。\n2.验证 API 的认证信息是否有效。": "1. Check if the API URL, request method, Headers, and Body are configured correctly. \n2. Verify that the API authentication credentials are valid.",
      "可适当增加工具的最大轮询时间或调整轮询间隔的配置，检查被调用的异步任务是否存在内部异常导致无响应": "Consider increasing the tool's maximum polling time or adjusting the polling interval configuration. Also, check if the called asynchronous task has any internal exceptions that might be causing it to hang.",
      "无法连接到消息队列服务器，1.请检查Url、用户名、密码等信息填写正确。2.请检查网络连通性与防火墙规则": "Unable to connect to the message queue server. 1. Please verify that the URL, username, and password are correct. 2. Please check network connectivity and firewall rules.",
      "使用了平台不支持的消息队列类型，请检查消息队列设置": "An unsupported message queue type is being used. Please check your message queue settings.",
      "1.检查消息内容的大小是否超过限制。\n2.检查消息的序列化格式是否正确。\n3.检查 MQ 服务端的日志，看是否有接收错误。": "1. Check if the message size exceeds the limit. \n2. Verify that the message is serialized in the correct format. \n3. Check the MQ server logs for any receive errors.",
      "请检查批处理并行数设置，其值只能为正整数，小数、负数等其他类型皆不合法": "Please check the batch parallelism setting. Its value must be a positive integer; decimals, negative numbers, and other types are invalid.",
      "SQL执行失败。请检查您提交的SQL语句，确认其语法、表名及列名是否正确。建议将完整的SQL语句置于数据库客户端中手动执行，以获取数据库返回的详细错误信息。": "SQL execution failed. Please check the SQL statement you submitted and verify that its syntax, table names, and column names are correct. We recommend manually executing the complete SQL statement in a database client to retrieve the detailed error message from the database.",
      "请检查输入的变量，以保证转换后的JSON、数组、字符串格式正确": "Please check the input variables to ensure the resulting JSON, array, or string format is correct.",
      "请核查目标类型与方法是否受支持": "Please verify that the target type and method are supported.",
      "错误发生在子Agent内部，建议检查子Agent具体报错信息，以定位错误发生的位置与原因": "The error occurred within the sub-agent. Please check the specific error message from the sub-agent to identify the source and cause of the error.",
      "文件收集指令下发次数超出限制": "File collection instruction issuance frequency exceeds the limit.",
      "变量转换失败": " Variable conversion failed.",
      "失败" : " failed",
      "请上传" : "Please upload",
      "请补充相关信息" : "Please provide the relevant information.",
      "工具轮询超时" : "Tool polling timeout.",
      "KeyAsyncTaskNotSupportedByPackage": "The current plan does not support asynchronous tasks.",
      "循环节点执行失败": "Loop node execution failed"
    }
