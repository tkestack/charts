  trpc_go.yaml: |
    global:
      namespace: Production
    server:
      app: adp
      server: workflow-exec
      bin_path: /app/bin/
      conf_path: /app/conf/
      log_path: /app/logs/
      admin:
        ip: ${POD_IP}
        port: 8081
        read_timeout: 3000
        write_timeout: 60000
      filter:
        - recovery
        - i18n-adp
        - cle-route-propagator
        - chat-trace
        - opentelemetry
      service:
        - name: trpc.KEP.bot-workflow-dm-server.workflow-dm
          ip: ${POD_IP}
          port: 8000
          network: tcp
          protocol: trpc
          timeout: 601000
          server_async: true
          idletime: 600000
        - name: trpc.KEP.bot-workflow-dm-server.workflow-dm-http
          ip: ${POD_IP}
          port: 8001
          network: tcp
          protocol: http
          server_async: true
          idletime: 600000
        - name: trpc.KEP.bot-workflow-dm-server.workflow-dm-outer
          ip: ${POD_IP}
          port: 8002
          network: tcp
          protocol: trpc
          timeout: 50000
          server_async: true
          idletime: 600000
          filter:
            - session
            - permission
        - name: trpc.KEP.bot-workflow-dm-server.runtime-data-cleanup
          ip: ${POD_IP}
          port: 8005
          protocol: timer
          timeout: 120000
          network: "0 0 0 * * *?scheduler=runtime_data_cleanup&holdTime=30&startAtOnce=0&disable=0"

    client:                                            #客户端调用的后端配置
      timeout: 0                                    #针对所有后端的请求最长处理时间
      namespace: ${CLIENT_NAMESPACE}                           #针对所有后端的环境
      filter:
        - cle-route-propagator
        - chat-trace
      service:
        # redis（主要的存储）
        - name: redis.bot-workflow-dm-server
          target: redis://:${INFRA_MIDDLEWARES_REDIS_0_PASSWORD}@${INFRA_MIDDLEWARES_REDIS_0_HOSTS}:6379
        # 集群版的redis，用来存储运行的数据
        - name: redis-cluster.workflow-exec
          target: redis://:${INFRA_MIDDLEWARES_REDIS_0_PASSWORD}@${INFRA_MIDDLEWARES_REDIS_0_HOSTS}:6379
        # redis（并发控制依赖的redis）
        - name: redis.lke.limiter
          network: tcp
          protocol: redis
          target: ip://${INFRA_MIDDLEWARES_REDIS_0_HOSTS}:6379/4
          password: ${INFRA_MIDDLEWARES_REDIS_0_PASSWORD}
          timeout: 800
        # DB
        - name: mysql.qbot.qbot
          target: "dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_workflow_formal?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local"
        # 配置端的Prod DB
        - name: mysql.llm_workflow_formal_prod
          target: "dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_workflow_formal_prod?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local"
        # prompt的DB
        - name: mysql.adp.prompt
          target: "dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local"
        # TDSQL
        - name: tdsql.qbot.qbot
          target: "dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_workflow?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local"
        # cos
        - name: trpc.http.cos.Access
          namespace: Production
          network: tcp
          protocol: http
          target: {{ if eq .Values.global.components.s3.providerType "minio" }}{{ printf "ip://minio.%s.svc.cluster.local:80" .Release.Namespace }}{{- else if eq .Values.global.components.s3.providerType "obs" }}ip://{{ .Values.global.components.s3.obs.host }}:{{ .Values.global.components.s3.obs.port }}{{- else }} dns://cos-internal.${INFRA_MIDDLEWARES_S3_COS_REGION}.tencentcos.cn {{- end }}    
          timeout: 50000
        # widget
        - name: trpc.http.widget_view
          namespace: ${CLIENT_NAMESPACE}
          network: tcp
          protocol: http
          target: "ip://adp-markmap-service.{{ .Release.Namespace }}.svc.cluster.local:7001"
          timeout: 50000
        # widget-内部接口
        - callee: trpc.adp.widget_config.WidgetConfigInner
          target: ip://adp-widget-config.{{ .Release.Namespace }}.svc.cluster.local:8001
          protocol: trpc
          timeout: 10000

        ###################################################################################
        # 向量库
        - callee: trpc.smartassistant.vectordbmanager.VectorObj
          name: trpc.SmartAssistant.VectorDBManager.VectorObj
          target: "ip://adp-kb-vdb-proxy.{{ .Release.Namespace }}.svc.cluster.local:10001"
          namespace: ${CLIENT_NAMESPACE}
          env_name: ${ENV_NAME3}
          timeout: 60000
        # 应用配置-登录态接口
        - callee: trpc.KEP.bot_admin_config_server.Login
          target: ip://adp-app-admin-proxy.{{ .Release.Namespace }}.svc.cluster.local:9091
          namespace: ${CLIENT_NAMESPACE}
          env_name: ${ENV_NAME4}
          protocol: trpc
          timeout: 20000
        # 应用配置-内部接口
        - callee: trpc.KEP.bot_admin_config_server.Api
          namespace: ${CLIENT_NAMESPACE}
          target: "ip://adp-app-admin-proxy.{{ .Release.Namespace }}.svc.cluster.local:9092"
          env_name: ${ENV_NAME4}
          protocol: trpc
          timeout: 60000

        # 应用配置-内部接口
        - callee: trpc.adp.app_admin_proxy.Api
          namespace: ${CLIENT_NAMESPACE}
          target: "ip://adp-app-admin-proxy.{{ .Release.Namespace }}.svc.cluster.local:9092"
          env_name: ${ENV_NAME4}
          protocol: trpc
          timeout: 60000
        # 知识库-内部接口
        - callee: trpc.adp.kb_config.Api
          namespace: ${CLIENT_NAMESPACE}
          env_name: ${ENV_NAME4}
          protocol: trpc
          timeout: 60000
          target: ip://adp-kb-config.{{ .Release.Namespace }}.svc.cluster.local:9092
        # 插件配置端
        - callee: trpc.adp.plugin_config.PluginConfigApi
          target: "ip://adp-plugin-config.{{ .Release.Namespace }}.svc.cluster.local:8001"
          namespace: ${CLIENT_NAMESPACE}
          env_name: ${ENV_NAME2}
          timeout: 60000
        # 插件运行时
        - callee: trpc.adp.plugin_exec.PluginExec
          target: "ip://adp-plugin-exec.{{ .Release.Namespace }}.svc.cluster.local:8000"
          namespace: ${CLIENT_NAMESPACE}
          env_name: ${ENV_NAME2}
          timeout: 7200000
        # 代码执行
        - callee: trpc.adp.plugin_code_interpret.CodeExec
          target: "ip://adp-plugin-code-interpret.{{ .Release.Namespace }}.svc.cluster.local:8001"
          namespace: ${CLIENT_NAMESPACE}
          protocol: trpc
          timeout: 60000
        # 计费服务, @stanwei 提供。 需要升级废弃
        - callee: qbot.finance.finance.Finance
          namespace: ${CLIENT_NAMESPACE}
          env_name: ${ENV_NAME4}
          target: "ip://adp-platform-charger.{{ .Release.Namespace }}.svc.cluster.local:9090"
          network: tcp
          timeout: 30000
        # 计费服务
        - callee: trpc.adp.platform_charger.Finance
          namespace: ${CLIENT_NAMESPACE}
          env_name: ${ENV_NAME4}
          target: "ip://adp-platform-charger.{{ .Release.Namespace }}.svc.cluster.local:9090"
          network: tcp
          timeout: 30000
        # token计数
        - callee: trpc.adp.model_token_count.Tokenizer
          namespace: ${CLIENT_NAMESPACE}
          target: "ip://adp-model-token-count.{{ .Release.Namespace }}.svc.cluster.local:8000"
          timeout: 3000
        # 记忆服务
        - callee: trpc.adp.app_memory.MemoryInner
          target: "ip://adp-app-memory.{{ .Release.Namespace }}.svc.cluster.local:8001"
          namespace: ${CLIENT_NAMESPACE}
          env_name: ${ENV_NAME2}
          network: tcp
          timeout: 30000
        # agent服务
        - callee: trpc.adp.agent_exec.chat
          target: "ip://adp-agent-exec.{{ .Release.Namespace }}.svc.cluster.local:8000"
          namespace: ${CLIENT_NAMESPACE}
          network: tcp                    # 后端服务的网络类型 tcp udp 配置优先
          protocol: http                  # 应用层协议 trpc http
          timeout: 600000                  # 请求最长处理时间
          serialization: 2                # (0=pb, 1=JCE, 2=json, 3=flat_buffer, 4=bytes_flow)
        # 资源管理服务
        - callee: trpc.adp.resource_gallery.Admin
          target: ip://adp-resource-gallery.{{ .Release.Namespace }}.svc.cluster.local:9090
          namespace: ${CLIENT_NAMESPACE}
          env_name: ${ENV_NAME4}
          protocol: trpc
          timeout: 20000
        # 模型网关（embedding相关）
        - callee: trpc.adp.ai-gateway.api
          target: ip://adp-ai-gateway.{{ .Release.Namespace }}.svc.cluster.local:9090
          namespace: ${CLIENT_NAMESPACE}
          network: tcp
          protocol: http
          timeout: 1800000
        # 知识问答服务
        - callee: trpc.adp.rag_exec.Chat
          target: "ip://adp-rag-exec.{{ .Release.Namespace }}.svc.cluster.local:8001"
          namespace: ${CLIENT_NAMESPACE}
          network: tcp
          protocol: trpc
          timeout: 300000
        # 资源管理服务-登录态接口
        - callee: trpc.adp.resource_gallery.Login
          target: ip://adp-resource-gallery.{{ .Release.Namespace }}.svc.cluster.local:9092
          namespace: ${CLIENT_NAMESPACE}
          env_name: ${ENV_NAME4}
          protocol: trpc
          timeout: 50000
        # 平台管理服务-内部接口
        - callee: trpc.adp.platform_manager.Admin
          namespace: ${CLIENT_NAMESPACE}
          target: ip://adp-platform-manager.{{ .Release.Namespace }}.svc.cluster.local:9090
          protocol: trpc
          timeout: 6000
        # 平台管理服务-登录态接口
        - callee: trpc.adp.platform_manager.Login
          namespace: ${CLIENT_NAMESPACE}
          target: ip://adp-platform-manager.{{ .Release.Namespace }}.svc.cluster.local:9091
          protocol: trpc
          timeout: 6000
        # 数据上报服务
        - callee: trpc.adp.platform_metrology.Api
          namespace: ${CLIENT_NAMESPACE}
          target: "ip://adp-platform-metrology.{{ .Release.Namespace }}.svc.cluster.local:8000"
          protocol: trpc
          timeout: 20000
          env_name: ${ENV_NAME4}
        - name: trpc.adp.kb_retrieval.Retrieval
          namespace: Test
          target: ip://adp-kb-retrieval.{{ .Release.Namespace }}.svc.cluster.local:9090
          timeout: 30000
        - name: trpc.adp.kb_retrieval.DirectIndex
          namespace: Test
          target: ip://adp-kb-retrieval.{{ .Release.Namespace }}.svc.cluster.local:9091
          timeout: 30000


    plugins:
      telemetry:
        opentelemetry:
          addr: {{ ((.Values.global.observability).apm).otlp | default "" }}
          tenant_id: adp
          sampler:
            fraction: 1
          traces:
            disable_trace_body: false
          metrics:
            {{- if ((.Values.global.observability).apm).registry }}
            registry_endpoints: ["{{ .Values.global.observability.apm.registry}}"]
            {{- end }}
          logs:
            enabled: true
            level: "debug"
            trace_log_mode: "disable"
          {{- if ((.Values.global.observability).apm).attributes }}
          attributes:
            {{- range $key, $value := .Values.global.observability.apm.attributes }}
          - key: {{ $key }}
            value: {{ $value }}
            {{- end }}
          {{- end }}
      log:
        default:
          - writer: console
            level: error
          - writer: file
            level: debug
            writer_config:
              filename: /app/logs/trpc.log
              max_size: 100
              max_backups: 10
              max_age: 7
              compress: false
      config:
        file:
          providers:
            - name: rainbow
              path: /app/conf/
            - name: rainbow-comm
              path: /app/conf/
            - name: global
              appid: ${RAINBOW_APP_ID}  # appid
              group: global # 配置所属组
              type: kv   # 七彩石数据格式, kv(默认), table
              env_name: ${RAINBOW_ENV_NAME}
              timeout: 2000
              enable_client_provider: true
      i18n:
        i18n-adp:
            default_lang: zh-CN
            supported_languages:
                - zh-CN
                - en-US
            data_provider:
                type: rainbow
                prefix: dm
                error_prefix: error
                char_scaling_factor:
                    zh-CN: 1
                    en-US: 3
