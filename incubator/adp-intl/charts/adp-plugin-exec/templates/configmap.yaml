              - name: "ImageBase64"
                required: false
                type: "string"
                description: "图片的Base64值。要求图片经Base64编码后不超过7M，分辨率建议600*800以上，支持PNG、JPG、JPEG、BMP格式。如果有ImageUrl，使用ImageUrl"
              - name: "IsPdf"
                required: false
                type: "boolean"
                description: "是否开启PDF识别，默认值为false，开启后可同时支持图片和PDF的识别"
              - name: "PdfPageNumber"
                required: false
                type: "integer"
                description: "需要识别的PDF页面的对应页码，仅支持PDF单页识别,默认值1"
              - name: "IsWords"
                required: false
                type: "boolean"
                description: "是否返回单字信息，默认值为false，注：仅ConfigID配置为OCR时支持。"
