                required: false
                description: "磨皮程度，取值范围[0,100]。0不磨皮，100代表最高程度。默认值10"
              - name: "FaceLifting"
                type: "integer"
                required: false
                description: "瘦脸程度，取值范围[0,100]。0不瘦脸，100代表最高程度。默认值70"
              - name: "EyeEnlarging"
                type: "integer"
                required: false
                description: "大眼程度，取值范围[0,100]。0不大眼，100代表最高程度。默认值70"
      - name: "detect_ai_fake_faces"
        headers: []
        official_charge: true
        tools:
          - name: "DetectAIFakeFaces"
            handler_name: "DetectAIFakeFaces"
            description: "提供对人脸图片、视频的防攻击检测能力，可针对性有效识别高仿真的AIGC换脸、高清翻拍、批量黑产攻击、水印等攻击痕迹。"
            properties:
              - name: "FaceInput"
                type: "string"
                required: false
                description: "传入需要检测的人脸图片或人脸视频（当前仅支持单人脸检测），使用base64编码的形式。图片支持jpg、png格式，视频支持mp4、avi、flv格式。"
              - name: "FaceInputType"
                type: "integer"
                required: false
                description: "传入的类型。取值范围：1：传入的是图片类型。2：传入的是视频类型。"
              - name: "Url"
                type: "string"
                required: false
                description: "传入图片或视频的url地址，当FaceInput为空时有效"
      - name: "wxpay"
        headers: []
        tools:
          - name: "create-native-payment"
            mcp_tool_handler: "WxPay"
            description: "微信支付Native下单接口（服务商模式），生成支付二维码链接"
            properties:
              - name: "description"
                required: true
                type: "string"
                description: "商品描述"
              - name: "amount"
                required: true
                type: "integer"
                description: "订单金额（单位：分）"
          - name: "query-order-by-out-trade-no"
            mcp_tool_handler: "WxPay"
            description: "通过商户订单号查询微信支付订单状态（服务商模式）"
            properties:
              - name: "out_trade_no"
                required: true
                type: "string"
                description: "商户订单号（6-32位字母数字组合）"
      - name: "wxpay_formal"
        headers: ["WECHATPAY_SUB_MCHID"]
        tools:
          - name: "create-native-payment"
            mcp_tool_handler: "WxPayFormal"
            description: "微信支付Native下单接口（服务商模式），生成支付二维码链接"
            properties:
              - name: "description"
                required: true
                type: "string"
                description: "商品描述"
              - name: "amount"
                required: true
                type: "integer"
                description: "订单金额（单位：分）"
          - name: "query-order-by-out-trade-no"
            mcp_tool_handler: "WxPayFormal"
            description: "通过商户订单号查询微信支付订单状态（服务商模式）"
            properties:
              - name: "out_trade_no"
                required: true
                type: "string"
                description: "商户订单号（6-32位字母数字组合）"
  trpc_go.yaml: |
    global:                             #全局配置
      namespace: ${POD_NAMESPACE}           #环境类型，分正式production和非正式development两种类型
      env_name: formal                    #环境名称，非正式环境下多环境的名称
      enable_set: false         #是否启用set
      full_set_name: adp   #set名
      local_ip: ${POD_IP}
      container_name: ${POD_NAME}

    server:                                            #服务端配置
      app: adp                                         #业务的应用名
      server: plugin-exec                       #进程服务名
      bin_path: /app/bin/                   #二进制可执行文件和框架配置文件所在路径
      conf_path: /app/conf/                 #业务配置文件所在路径
      data_path: /app/data/                 #业务数据文件所在路径
      filter:                                          #针对所有service处理函数前后的拦截器列表
        - recovery
        - i18n-adp
        - opentelemetry                               # 天机阁
      admin:
        ip: ${POD_IP}  # admin 的 ip，配置网卡 nic 也可以
        port: 8081     # admin 的 port，必须同时配置这里的 ip port 才会启动 admin 
      service:                                          #业务服务提供的service，可以有多个
        - name: trpc.KEP.plugin-exec-server.PluginExec  #service的路由名称
          ip: ${POD_IP}                                 #服务监听ip地址 可使用占位符 ${ip},ip和nic二选一，优先ip
          port: 8000                                    #服务监听端口 可使用占位符 ${port}
          network: tcp                                  #网络监听类型  tcp udp
          protocol: trpc                                #应用层协议 trpc http
          timeout: 7200000                               #请求最长处理时间 单位 毫秒
          server_async: true                            #开启异步处理
          idletime: 7200000                             # idletime，设置tcp空闲等待时间，避免耗时过长的操作导致trpc-go将tcp关闭
        - name: trpc.KEP.plugin-exec-server.PluginMCP  #service的路由名称
          ip: ${POD_IP}                                 #服务监听ip地址 可使用占位符 ${ip},ip和nic二选一，优先ip
          port: 8001                                    #服务监听端口 可使用占位符 ${port}
          network: tcp                                  #网络监听类型  tcp udp
          protocol: http_no_protocol                                #应用层协议 trpc http
          timeout: 600000                               #请求最长处理时间 单位 毫秒
          server_async: true                            #开启异步处理
          idletime: 6000000                             # idletime，设置tcp空闲等待时间，避免耗时过长的操作导致trpc-go将tcp关闭
        - name: trpc.KEP.plugin-exec-server.PluginGateway  #service的路由名称
          ip: ${POD_IP}                                 #服务监听ip地址 可使用占位符 ${ip},ip和nic二选一，优先ip
          port: 8002                                    #服务监听端口 可使用占位符 ${port}
          network: tcp                                  #网络监听类型  tcp udp
          protocol: http_no_protocol                    #应用层协议 trpc http
          timeout: 600000                               #请求最长处理时间 单位 毫秒
          server_async: true                            #开启异步处理
          idletime: 6000000                             # idletime，设置tcp空闲等待时间，避免耗时过长的操作导致trpc-go将tcp关闭
        - name: trpc.KEP.plugin-exec-server.PluginMCPStreamableSL  #service的路由名称
          ip: ${POD_IP}                                 #服务监听ip地址 可使用占位符 ${ip},ip和nic二选一，优先ip
          port: 8003                                    #服务监听端口 可使用占位符 ${port}
          network: tcp                                  #网络监听类型  tcp udp
          protocol: http_no_protocol                    #应用层协议 trpc http
          timeout: 600000                               #请求最长处理时间 单位 毫秒
          server_async: true                            #开启异步处理
          idletime: 6000000                             # idletime，设置tcp空闲等待时间，避免耗时过长的操作导致trpc-go将tcp关闭

    client:                                            #客户端调用的后端配置
      filter:                                          #针对所有service处理函数前后的拦截器列表
        - opentelemetry
      service:
        - name: mysql.llm.plugin
