                description: "excel 文件的 URL 地址。"
          - name: "QueryExcelToPDF" # 创建任务
            handler_name: "QueryExcelToPDF" # 创建任务
            description: "查询 excel 转换为 pdf 结果。需要根据 ExcelToPDF 接口返回的 task_id 调用此接口查询转换结果。"
            properties:
              - name: "task_id"
                required: true
                type: "string"
                description: "任务ID。"
      - name: "image_to_office"
        headers: []
        tools:
          - name: "ImageToWord" # 图片转Word
            handler_name: "ImageToWord"
            description: "支持图片转换为 word 文件，并尽可能保留原文件格式。"
            properties:
              - name: "file_urls"
                required: true
