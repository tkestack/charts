                items:
                  type: "string"
          - name: "ImageToExcel" # 图片转Excel
            handler_name: "ImageToExcel"
            description: "支持图片转换为 excel 文件，并尽可能保留原文件格式。"
            properties:
              - name: "file_urls"
                required: true
                type: "array"
                description: "图片的 URL 地址。仅支持 JPG、PNG、BMP 格式的图片。"
                items:
                  type: "string"
