            properties:
              - name: "task_id"
                required: true
                type: "string"
                description: "任务ID。"
          - name: "PDFToExcel" # PDF转Excel
            handler_name: "PDFToExcel"
            description: "支持 pdf 转换为 excel 文件，并尽可能保留原文件格式。"
