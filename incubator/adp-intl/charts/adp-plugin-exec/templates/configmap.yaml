      - name: "office_to_pdf"
        headers: []
        tools:
          - name: "WordToPDF" # Word转PDF
            handler_name: "WordToPDF"
            description: "支持 word 转换为 pdf 文件，并尽可能保留原文件格式。"
            properties:
              - name: "file_url"
                required: true
                type: "string"
                description: "word 文件的 URL 地址。"
          - name: "QueryWordToPDF" # 创建任务
            handler_name: "QueryWordToPDF" # 创建任务
