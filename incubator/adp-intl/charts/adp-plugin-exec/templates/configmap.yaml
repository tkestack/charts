                type: "string"
                required: false
                description: "图片的Url。对应图片base64编码后大小不可超过5M。，单边分辨率不超过4000。Url、Image必须提供一个，如果都提供，只使用Url，支持PNG、JPG、JPEG、BMP，不支持GIF图片。暂不支持带有alpha透明通道的图片"
