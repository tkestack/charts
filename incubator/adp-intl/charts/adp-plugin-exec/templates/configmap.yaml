  mcp_server_1.yaml: |
    servers:
      - name: "image_creation"
        headers: ["REGION","SECRET_ID","SECRET_KEY"]
        tools:
          - name: "ReplaceBackground"
            handler_name: "ReplaceBackground"
            description: "商品背景生成"
            properties:
              - name: "ProductUrl"
                type: "string"
                required: true
                description: "商品原图 Url。图片限制：单边分辨率小于4000，长宽比在2:5 ~ 5:2之间，转成 Base64 字符串后小于 6MB，格式支持 jpg、jpeg、png、bmp、tiff、webp"
              - name: "Prompt"
                type: "string"
                required: true
                description: "对新背景的文本描述。最多支持256个 utf-8 字符，支持中、英文"
              - name: "Product"
                type: "string"
                required: true
                description: "商品图中的商品主体名称。最多支持50个 utf-8 字符，支持中、英文"
      - name: "image_recognition"
        headers: ["REGION","SECRET_ID","SECRET_KEY"]
        tools:
          - name: "DetectLabelPro"
            handler_name: "DetectLabelPro"
            description: "通用图像标签"
            properties:
              - name: "ImageUrl"
                type: "string"
                required: false
                description: "图片URL地址。图片限制：图片格式：PNG、JPG、JPEG、BMP。图片大小：所下载图片经Base64编码后不超过4M。图片下载时间不超过3秒，推荐将图片存储在腾讯云COS"
              - name: "ImageBase64"
                type: "string"
                required: false
                description: "图片Base64编码数据。与ImageUrl同时存在时优先使用ImageUrl字段，图片限制：图片格式：PNG、JPG、JPEG、BMP。图片大小：经Base64编码后不超过4M。注意：图片需要Base64编码，并且要去掉编码头部"
      - name: "english_correction"
        headers: ["REGION","SECRET_ID","SECRET_KEY"]
        tools:
          - name: "CorrectMultiImage"
            handler_name: "CorrectMultiImage"
            description: "多图像识别批改"
            properties:
              - name: "Image"
                type: "array"
                required: true
                description: "图片的url链接或base64数据。每张图片数据作为数组的一个元素，数组个数与图片个数保持一致。存放类别依据InputType而定，url与base64编码不能混合使用"
                items:
                  type: "string"
              - name: "InputType"
                type: "integer"
                required: true
                description: "图片类型，0表示Image字段是图片所在的url，1表示Image字段是base64编码后的图像数据"
      - name: "medical_report"
        headers: ["REGION","SECRET_ID","SECRET_KEY"]
        tools:
          - name: "TurnPdfToObject"
            handler_name: "TurnPdfToObject"
            description: "体检报告PDF文件结构化"
            properties:
              - name: "PdfBase64"
                type: "string"
                required: false
                description: "体检报告PDF文件信息, 支持传PDF文件的Base64编码字符"
              - name: "PdfUrl"
                type: "string"
                required: false
                description: "体检报告PDF的url，如果与PdfBase64同时填写以PdfBase64为准"
      - name: "math_correction"
        headers: ["REGION","SECRET_ID","SECRET_KEY"]
        tools:
          - name: "Evaluation"
            handler_name: "Evaluation"
            description: "速算题目批改"
            properties:
              - name: "ImageBase64"
                type: "string"
                description: "图片数据，需要使用base64对图片的二进制数据进行编码，与url参数二者填一即可，如果同时填写以base64为准"
              - name: "ImageUrl"
                type: "string"
                description: "图片的url，与ImageBase64参数二者填一即可 如果同时填写以base64为准"
      - name: "sgweb_search"
        tools:
          - name: "SougouWebSearch"
            handler_name: "SougouWebSearch"
            description: "搜狗搜索工具，支持对全网范围进行网页搜索。"
            properties:
              - name: "Query"
                required: true
                type: "string"
                description: "检索内容，建议长为128字节（约40～64个中英文字符）； 1.超过128字节的query，只会用前128字节进行搜索"
              - name: "Insite"
                required: false
                type: "string"
                description: "指定网址搜索，仅支持单域名筛选，例如:zhihu.com"  
      - name: "general_ocr"
        headers: ["SECRET_ID","SECRET_KEY"]
        tools:
          - name: "GeneralAccurateOCR"
            handler_name: "GeneralAccurateOCR"
            description: "Used to detect and recognize characters in an image."
            properties:
              - name: "ImageUrl"
                required: false
                type: "string"
                description: "URL address of image. (This field is not supported outside Chinese mainland) The image cannot exceed 7 MB after being Base64-encoded. A resolution above 600x800 is recommended. PNG, JPG, JPEG, and BMP formats are supported. We recommend you store the image in Tencent Cloud, as a Tencent Cloud URL can guarantee higher download speed and stability. The download speed and stability of non-Tencent Cloud URLs may be low."
              - name: "ImageBase64"
                required: false
                type: "string"
                description: "Base64-encoded value of image. The image cannot exceed 7 MB in size after being Base64-encoded. A resolution above 600x800 is recommended. PNG, JPG, JPEG, and BMP formats are supported. Either `ImageUrl` or `ImageBase64` of the image must be provided; if both are provided, only ImageUrl will be used."
              - name: "IsPdf"
                required: false
                type: "boolean"
                description: "Whether to enable PDF recognition. Default value:false. If you enable this feature, both images and PDF files can be recognized."
              - name: "PdfPageNumber"
                required: false
                type: "integer"
                description: "Number of a PDF page that needs to be recognized. Currently, only one single page can be recognized. This parameter takes effect only if a PDF file is uploaded and `IsPdf` is set to `true`. Default value:1"
      - name: "question_ocr"
        headers: ["SECRET_ID","SECRET_KEY"]
        tools:              
          - name: "QuestionOCR"
            handler_name: "QuestionOCR"
            description: "试题识别"
            properties:
              - name: "ImageUrl"
                required: false
                type: "string"
                description: "图片的Url地址。所下载图片经Base64编码后不超过10M，分辨率建议600*800以上，支持PNG、JPG、JPEG、BMP格式。载时间不超过3秒"
              - name: "ImageBase64"
                required: false
                type: "string"
                description: "图片的Base64值。所下载图片经Base64编码后不超过10M，分辨率建议600*800以上，支持PNG、JPG、JPEG、BMP格式。如果有ImageUrl，使用ImageUrl"
              - name: "IsPdf"
                required: false
                type: "boolean"
                description: "是否开启PDF识别，默认值为false，开启后可同时支持图片和PDF的识别"
              - name: "PdfPageNumber"
                required: false
                type: "integer"
                description: "需要识别的PDF页面的对应页码，仅支持PDF单页识别,默认值1"
      - name: "send_sms"
        headers: ["REGION","SECRET_ID","SECRET_KEY"]
        tools:
          - name: "SendSms"
            handler_name: "SendSms"
            description: "SendSms"
            properties:
              - name: "PhoneNumberSet"
                required: true
                type: "array"
                description: "Target mobile number in the E.164 standard in the format of +[country/region code][mobile number]. Up to 200 mobile numbers are supported in one request (which should be all Chinese mainland mobile numbers or all global mobile numbers)."
