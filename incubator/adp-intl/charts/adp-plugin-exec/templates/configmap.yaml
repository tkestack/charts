        {{`下面我会给你用户当前问题question、当前检索结果search_result。你的任务是依据上述内容生成答案来回答用户问题，在答案中使用[num]来注明这个信息来源是来自哪篇搜索文章。请注意现在的时间是{{.CurDate}}。
