                type: "string"
                required: false
                description: "图片的 Base64 值。支持的图片格式：PNG、JPG、JPEG，暂不支持 GIF 格式。支持的图片大小：所下载图片经Base64编码后不超过 10M。图片下载时间不超过 3 秒。图片的 ImageUrl、ImageBase64 必须提供一个，如果都提供，只使用 ImageUrl。"
              - name: "ConfigId"
                type: "string"
                required: false
                description: "配置id支持"
      - name: "change_age_pic"
        headers: []
        official_charge: true
        tools:
          - name: "ChangeAgePic"
            handler_name: "ChangeAgePic"
            description: "上传一张人脸图片，实现人脸年龄变化功能，可以让人脸看起来更年轻或更成熟。"
            properties:
              - name: "Image"
                type: "string"
