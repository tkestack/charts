                description: "SMS signature information which is encoded in UTF-8. You must enter an approved signature (such as Tencent Cloud). The signing information can be viewed on the Signatures page in [Global SMS](https://console.tencentcloud.com/smsv2/isms-sign)."
              - name: "TemplateParamSet"
                required: false
