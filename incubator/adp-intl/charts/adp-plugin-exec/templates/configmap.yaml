      - name: "search_faces"
        headers: ["SECRET_ID","SECRET_KEY","REGION"]
        tools:
          - name: "SearchFaces"
            handler_name: "SearchFacesIntl"
            description: "Used to recognize top K persons in one or more groups who are similar to the person in a given image and rank the similarity in descending order. Up to 10 faces in an image can be recognized at a time, and up to 100 groups can be searched in at a time."
            properties:
              - name: "GroupIds"
                required: true
                type: "array"
                description: "List of groups to be searched in (up to 100). The array element value is the GroupId in the CreateGroup API. You cannot search for groups using different algorithm model versions (FaceModelVersion) at a time."
                items:
                  type: "string"
              - name: "Url"
                required: false
                type: "string"
                description: "Image URL. The image cannot exceed 5 MB in size after being Base64-encoded. The long side cannot exceed 4,000 px for images in JPG format or 2,000 px for images in other formats. Either Url or Image must be provided; if both are provided, only Url will be used. PNG, JPG, JPEG, and BMP images are supported, while GIF images are not."
              - name: "Image"
                required: false
                type: "string"
                description: "Base64-encoded image data, which cannot exceed 5 MB. The long side cannot exceed 4,000 px for images in JPG format or 2,000 px for images in other formats. PNG, JPG, JPEG, and BMP images are supported, while GIF images are not."
      - name: "wxpay"
