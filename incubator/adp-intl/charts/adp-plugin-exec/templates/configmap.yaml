    custom_code:
      max_result_length: 200000
      result_separator: "_______ResultSeparator_______"
      code_template: |-
        {{`import time
        import datetime
        import json
        import numpy
        import pandas
        import math
        import cmath
        import decimal
        import fractions
        import random
        import statistics
        import re
        import string
        import stringprep
        import collections
        import numbers
        import unicodedata

        lke_system_params=json.loads("""{{InputParamObject}}""")

        {{CodeContent}}

        main_result = main(lke_system_params)

        import json

        class SystemJsonEncoder(json.JSONEncoder):
          def default(self, obj):
              import numpy as np
              if isinstance(obj, np.timedelta64):
                  return str(obj)
              elif isinstance(obj, np.integer):
                  return int(obj)
              elif isinstance(obj, (np.void)):
                  return None
              elif isinstance(obj, np.floating):
                  return float(obj)
              elif isinstance(obj, np.complexfloating):
                  return {'real': obj.real, 'imag': obj.imag}
              elif isinstance(obj, np.bytes_):
                  return obj.decode('utf-8')
              elif isinstance(obj, np.str_):
                  return str(obj)
              elif isinstance(obj, np.datetime64):
                  return str(obj)
              elif isinstance(obj, np.ndarray):
                  return obj.tolist()
              elif isinstance(obj, pd.DataFrame):
                  return obj.to_dict()
              elif isinstance(obj, pd.Series):
                  return obj.to_list()
              return super(SystemJsonEncoder, self).default(obj)

        print("{{ResultSeparator}}")
        print(json.dumps(main_result, ensure_ascii=False, cls=SystemJsonEncoder))`}}

