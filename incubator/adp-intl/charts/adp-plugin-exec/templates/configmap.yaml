                type: "string"
                required: false
                description: "返回图片类型，url：返回图片链接，base64：返回base64编码。默认为url。"
      - name: "swap_gender_pic"
        headers: []
        official_charge: true
        tools:
          - name: "SwapGenderPic"
            handler_name: "SwapGenderPic"
            description: "用户上传一张人脸图片，基于人脸编辑与生成算法，输出一张人脸性别转换的图片。男变女可实现美颜、淡妆、加刘海和长发的效果；女变男可实现加胡须、变短发的效果。"
            properties:
              - name: "Image"
                type: "string"
                required: false
                description: "图片base64数据，base64编码后大小不可超过5M，单边分辨率不超过4000。支持PNG、JPG、JPEG、BMP，不支持GIF图片。Image和Url必须提供一个，如果都提供，只使用Url。"
              - name: "Url"
                type: "string"
                required: false
                description: "图片的Url地址。对应图片base64编码后大小不可超过5M，单边分辨率不超过4000。支持PNG、JPG、JPEG、BMP，不支持GIF图片。Image和Url必须提供一个，如果都提供，只使用Url。"
              - name: "Gender"
                type: "integer"
                required: true
                description: "性别转换类型，0表示男变女，1表示女变男。"
              - name: "RspImgType"
                type: "string"
                required: false
                description: "返回图片类型，url：返回图片链接，base64：返回base64编码。默认为url。"
      - name: "text_to_image_fast"
        headers: []
        official_charge: true
        tools:
          - name: "TextToImageFast"
            handler_name: "TextToImageFast"
            description: "根据输入的文本描述，智能生成与之相关的结果图（极速版）"
            properties:
              - name: "Prompt"
                required: true
                type: "string"
                description: "文本描述。算法将根据输入的文本智能生成与之相关的图像。建议详细描述画面主体、细节、场景等，文本描述越丰富，生成效果越精美。不能为空，推荐使用中文。最多可传256个utf-8字符。"
              - name: "Resolution"
                required: false
                type: "string"
                description: "生成图分辨率，默认1024:1024。持的图像宽高比例: 1:1，3:4，4:3，9:16，16:9。支持的长边分辨率: 160，200，225，258，512，520，608，768，1024，1080，1280，1600，1620，1920，2048，2400，2560，2592，3440，3840，4096。"
              - name: "Seed"
                required: false
                type: "integer"
                description: "随机种子，默认随机。0：随机种子生成。不传：随机种子生成。正数：固定种子生成。"
              - name: "Image"
                required: false
                type: "object"
                description: "参考图。Base64 和 Url 必须提供一个，如果都提供以 Url 为准。当传入Image参数时，Style和Resolution参数不生效，输出图分辨率将保持Image传入图分辨率。图片限制：单边分辨率大于128且小于2048；图片小于6M；格式支持 jpg、jpeg、png、bmp、tiff、webp。"
                properties:
                  - name: "Url"
                    type: "string"
                    required: false
                    description: "图片Url"
                  - name: "Base64"
                    type: "string"
                    required: false
                    description: "图片Base64"
              - name: "Style"
                required: false
                type: "string"
                description: "生成的图片风格，参考值：1：宫崎骏风格；2：新海诚风格；3：去旅行风格；4：水彩风格；5：像素风格；6：童话世界风格；7：奇趣卡通风格；8：赛博朋克风格；9：极简风格；10：复古风格；11：暗黑系风格；12：波普风风格；13：糖果色风格；14：胶片电影风格；15：素描风格；16：水墨画风格；17：油画风格；18：粉笔风格；19：粘土风格；20：毛毡风格；21：刺绣风格；22：彩铅风格；23：莫奈风格；24：毕加索风格；25：穆夏风格；26：古风二次元风格；27：都市二次元风格；28：悬疑风格；29：校园风格；30：都市异能风格。"
              - name: "LogoAdd"
                required: false
                type: "integer"
                description: "为生成结果图添加标识的开关，默认为1。1：添加标识。0：不添加标识。"
                default: 1
              - name: "LogoParam"
                required: false
                type: "object"
                description: "标识内容设置。默认在生成结果图右下角添加“图片由 AI 生成”字样，您可根据自身需要替换为其他的标识图片。"
                properties:
                  - name: "LogoUrl"
                    type: "string"
                    required: false
                    description: "水印Url"
                  - name: "LogoImage"
                    type: "string"
                    required: false
                    description: "水印Base64，Url和Base64二选一传入，如果都提供以Url为准。"
                  - name: "LogoRect"
                    type: "object"
                    required: false
                    description: "水印图片位于生成结果图中的坐标，将按照坐标对标识图片进行位置和大小的拉伸匹配。"
                    properties:
                      - name: "X"
                        type: "integer"
                        required: false
                        description: "左上角X坐标"
                      - name: "Y"
                        type: "integer"
                        required: false
                        description: "左上角Y坐标"
                      - name: "Width"
                        type: "integer"
                        required: false
                        description: "方框宽度"                   
                      - name: "Height"
                        type: "integer"
                        required: false
                        description: "方框高度" 
              - name: "RspImgType"
                required: false
                type: "string"
                description: "返回图像方式（base64或url) ，二选一，默认为url。url 有效期为1小时。"
      - name: "general_ocr"
        headers: []
        official_charge: true
        tools:
          - name: "GeneralAccurateOCR"
            handler_name: "GeneralAccurateOCR"
            description: "通用印刷体识别（高精度版）"
