  stateless_mcp_server_1.yaml: |
    servers:
      - name: "adp_mcp"
        headers: ["APP_KEY", "VISITOR_BIZ_ID"]
        tools:
          - name: "Check"
            mcp_tool_handler: "AppAsMcpCheck"
            description: "校验APP_KEY合法性"
          - name: "Chat"
            mcp_tool_handler: "AppAsMcpChat"
            description: "与APP进行对话"
            properties:
              - name: "Query"
                type: "string"
                required: true
                description: "用户输入Query"
      - name: "extract_doc_multi_ocr"
        official_charge: true
        tools:
          - name: "ExtractDocMulti"
            handler_name: "ExtractDocMulti"
            description: "支持识别并提取场景复杂、版式多等结构化场景的字段信息。"
            properties:
              - name: "ImageUrl"
                type: "string"
                required: false
                description: "图片的 Url 地址。支持的图片格式：PNG、JPG、JPEG，WORD，EXCEL，暂不支持 GIF 格式。支持的图片大小：所下载图片经 Base64 编码后不超过 10M。图片下载时间不超过 3 秒。"
              - name: "ImageBase64"
                type: "string"
                required: false
                description: "图片的 Base64 值。支持的图片格式：PNG、JPG、JPEG，WORD，EXCEL，暂不支持 GIF 格式。支持的图片大小：所下载图片经Base64编码后不超过 10M。。图片的 ImageUrl、ImageBase64 必须提供一个，如果都提供，只使用 ImageUrl。"
              - name: "ConfigId"
                type: "string"
                required: false
                description: "配置id支持"
              - name: "ItemNamesShowMode"
                type: "boolean"
                required: false
                description: "true:仅输出自定义字段,false:输出默认字段+自定义字段,默认true"
              - name: "EnableCoord"
                type: "boolean"
                required: false
                description: "是否开启全文字段坐标值的识别"
              - name: "ReturnFullText"
                type: "boolean"
                required: false
                description: "是否开启全文字段识别"
              - name: "ItemNames"
                type: "array"
                required: false
                description: "自定义结构化功能需返回的字段名称，例：若客户想新增返回姓名、性别两个字段的识别结果，则输入ItemNames=[\"姓名\"，\"性别\"]"
                items:
                  type: "string"
      - name: "pdf_to_office"
        headers: []
        tools:
          - name: "PDFToWord" # PDF转Word
            handler_name: "PDFToWord"
