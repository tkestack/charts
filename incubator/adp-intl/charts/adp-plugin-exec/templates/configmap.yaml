                required: false
                type: "string"
                description: "pdf 文件的密码。"
              - name: "page_num"
                required: false
                type: "integer"
                description: "需要转换的页数。"
          - name: "QueryPDFToExcel" # 创建任务
            handler_name: "QueryPDFToExcel" # 创建任务
            description: "查询 pdf 转换为 excel 结果。需要根据 PDFToExcel 接口返回的 task_id 调用此接口查询转换结果。"
            properties:
              - name: "task_id"
                required: true
                type: "string"
