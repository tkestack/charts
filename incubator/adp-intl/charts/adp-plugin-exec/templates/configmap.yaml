      - name: "text_to_image_fast"
        headers: ["SECRET_ID","SECRET_KEY","REGION"]
        tools:
          - name: "TextToImageFast"
            handler_name: "TextToImageFast"
            description: "根据输入的文本描述，智能生成与之相关的结果图（极速版）"
            properties:
              - name: "Prompt"
                required: true
                type: "string"
                description: "文本描述。算法将根据输入的文本智能生成与之相关的图像。建议详细描述画面主体、细节、场景等，文本描述越丰富，生成效果越精美。不能为空，推荐使用中文。最多可传256个utf-8字符。"
              - name: "Resolution"
                required: false
                type: "string"
                description: "生成图分辨率，默认1024:1024。持的图像宽高比例: 1:1，3:4，4:3，9:16，16:9。支持的长边分辨率: 160，200，225，258，512，520，608，768，1024，1080，1280，1600，1620，1920，2048，2400，2560，2592，3440，3840，4096。"
              - name: "Seed"
                required: false
                type: "integer"
                description: "随机种子，默认随机。0：随机种子生成。不传：随机种子生成。正数：固定种子生成。"
              - name: "Image"
                required: false
                type: "object"
                description: "参考图。Base64 和 Url 必须提供一个，如果都提供以 Url 为准。当传入Image参数时，Style和Resolution参数不生效，输出图分辨率将保持Image传入图分辨率。图片限制：单边分辨率大于128且小于2048；图片小于6M；格式支持 jpg、jpeg、png、bmp、tiff、webp。"
                properties:
                  - name: "Url"
                    type: "string"
                    required: false
                    description: "图片Url"
                  - name: "Base64"
                    type: "string"
                    required: false
                    description: "图片Base64"
              - name: "Style"
                required: false
                type: "string"
                description: "生成的图片风格，参考值：1：宫崎骏风格；2：新海诚风格；3：去旅行风格；4：水彩风格；5：像素风格；6：童话世界风格；7：奇趣卡通风格；8：赛博朋克风格；9：极简风格；10：复古风格；11：暗黑系风格；12：波普风风格；13：糖果色风格；14：胶片电影风格；15：素描风格；16：水墨画风格；17：油画风格；18：粉笔风格；19：粘土风格；20：毛毡风格；21：刺绣风格；22：彩铅风格；23：莫奈风格；24：毕加索风格；25：穆夏风格；26：古风二次元风格；27：都市二次元风格；28：悬疑风格；29：校园风格；30：都市异能风格。"
              - name: "LogoAdd"
                required: false
                type: "integer"
                description: "为生成结果图添加标识的开关，默认为1。1：添加标识。0：不添加标识。"
                default: 1
              - name: "LogoParam"
                required: false
                type: "object"
                description: "标识内容设置。默认在生成结果图右下角添加“图片由 AI 生成”字样，您可根据自身需要替换为其他的标识图片。"
                properties:
                  - name: "LogoUrl"
                    type: "string"
                    required: false
                    description: "水印Url"
                  - name: "LogoImage"
                    type: "string"
                    required: false
                    description: "水印Base64，Url和Base64二选一传入，如果都提供以Url为准。"
                  - name: "LogoRect"
                    type: "object"
                    required: false
                    description: "水印图片位于生成结果图中的坐标，将按照坐标对标识图片进行位置和大小的拉伸匹配。"
                    properties:
                      - name: "X"
                        type: "integer"
                        required: false
                        description: "左上角X坐标"
                      - name: "Y"
                        type: "integer"
                        required: false
                        description: "左上角Y坐标"
                      - name: "Width"
                        type: "integer"
                        required: false
                        description: "方框宽度"                   
                      - name: "Height"
                        type: "integer"
                        required: false
                        description: "方框高度" 
              - name: "RspImgType"
                required: false
                type: "string"
                description: "返回图像方式（base64或url) ，二选一，默认为url。url 有效期为1小时。"
      - name: "video_understand"
        headers: ["SECRET_ID","SECRET_KEY"]
        tools:
          - name: "VideoUnderstand"
            handler_name: "VideoUnderstand"
            description: "根据输入的视频文件地址或视频帧，理解并返回具体的视频内容。"
            properties:
              - name: "VideoFrames"
                required: false
                type: "array"
                description: "视频帧列表，传入视频帧的url"
                items:
                  type: "string"
              - name: "VideoUrl"
                required: false
                type: "string"
                description: "视频的Url。支持mpeg4/x264 mp4格式、avi格式、ogv,webm格式，视频时长支持2s～10min，最大支持传入数量为512帧"
              - name: "Fps"
                required: false
                type: "number"
                description: "控制视频抽帧频率，取值范围为 0.1 ~5，表示每隔 1/fps秒抽取一帧，默认为1s抽取一帧"
              - name: "Query"
                required: false
                type: "string"
                description: "用户查询问题"      
      - name: "video_make"
        headers: ["APP_KEY","ACCESS_TOKEN"]
        tools:
          - name: "VideoMakeNoTrain"
            handler_name: "VideoMakeNoTrain"
            description: "无需训练，即可基于一个真人照片或视频素材，通过输入文本或音频，生成人物说话口型与输入内容相匹配的新视频。"
            properties: 
              - name: "VideoOrPhoto"
                required: true
                type: "integer"
                description: "视频或图片，该字段必填。0：模板视频URL，1：模板照片URL"
              - name: "DriverType"
                required: false
                type: "string"
                description: "驱动类型。Text：文本驱动，要求InputSsml字段必填；OriginalVoice：原声音频驱动，要求InputAudioUrl字段必填。"
              - name: "RefVideoUrl"
                required: false
                type: "string"
                description: "模板视频URL，VideoOrPhoto为0时必填；支持mp4、mov、avi格式，文件大小不超过5G,单边像素要求在360-4096之间,视频时长支持1 - 600秒，建议时长在10秒到120秒。"
              - name: "RefPhotoUrl"
                required: false
                type: "string"
                description: "模板照片URL，VideoOrPhoto为1时必填；格式支持 jpg、jpeg、png、bmp、webp，文件大小必须在10M内，图片单边分辨率要求在[192~4096]之间，图片宽高比在1:2到2:1范围内，需要有真人或类真人的卡通人脸，避免上传无人脸、人脸不完整、不清晰、偏转角度过大、嘴部被遮挡的图片"
              - name: "InputSsml"
                required: false
                type: "string"
                description: "播报文本内容，支持 SSML 标签，支持的标签类型<phoneme>、<break>、<word>、<sub>、<say-as>、<insert-action>,不少于4个字（字数按 unicode 字符数计算）,上限300字"
              - name: "InputAudioUrl"
                required: false
                type: "string"
                description: "驱动数智人的音频URL。DriverType为OriginalVoice时，该字段必填。支持wav、mp3、wma、m4a、aac、ogg格式，时长不超过10分钟，不少于1秒，大小不超过100MB"
              - name: "SpeechParam"
                required: false
                type: "object"
                description: "定义音频的详细参数。DriverType 为 Text 时，该字段必填。"
                properties:
                  - name: "Speed"
                    type: "number"
                    required: false
                    description: "语速（1.0为正常语速，范围[0.5-1.5]，值为0.5时播报语速最慢，值为1.5时播报语速最快。DriverType 为 Text 时，该字段必填。"
                  - name: "TimbreKey"
                    type: "string"
                    required: false
                    description: "音色 key，DriverType 为Text时，该字段必填。在 male_1-20、female_1-23（即男声1-20、女声1-23）间的音色不支持音量调节。"
          - name: "DescribeTimbre"
            handler_name: "DescribeTimbre"
            description: "查询客户拥有的声音资产信息，包括复刻声音和公共声音"
            properties:
              - name: "PageIndex"
                required: true
                type: "integer"
                description: "当前页"
              - name: "PageSize"
                required: true
                type: "integer"
                description: "页面大小（最大不超过100）"
              - name: "TimbreKey"
                required: false
                type: "string"
                description: "数智人音色 code，支持精确匹配"
              - name: "TimbreName"
                required: false
                type: "string"
                description: "数智人音色名称，支持模糊匹配"
          - name: "GetProgress"
            handler_name: "GetProgress"
            description: "通过 TaskId 来查询任务的制作进度和结果，当返回值里的 Progress 字段值为100时，即可通过 MediaUrl 获取最终音视频的下载地址，如果是视频制作也会返回 SubtitlesUrl 字段获取最终 SRT 字幕地址。"
            properties:
              - name: "TaskId"
                required: true
                type: "string"
                description: "任务ID"
      - name: "smart_structural_ocr_v2"
        headers: ["SECRET_ID","SECRET_KEY", "REGION"]
        tools:
          - name: "SmartStructuralOCRV2"
            handler_name: "SmartStructuralOCRV2Intl"
            description: "Supports recognizing and extracting field information from structured scenarios such as standardized ID cards and certificates, invoices/receipts, and forms."
            properties:
              - name: "ImageUrl"
                type: "string"
                required: false
                description: "The URL of the image. Supported image formats:PNG, JPG, and JPEG. GIF is currently not supported. Supported image size:The downloaded image after Base64 encoding can be up to 7 MB. "
              - name: "ImageBase64"
                type: "string"
                required: false
                description: "The Base64-encoded value of the image. Supported image formats:PNG, JPG, and JPEG. GIF is currently not supported. Supported image size:The downloaded image after Base64 encoding can be up to 7 MB. The download time of the image cannot exceed 3s.Either ImageUrl or ImageBase64 of the image must be provided. If both are provided, only ImageUrl is used."
              - name: "IsPdf"
                type: "boolean"
                required: false
                description: "Whether to enable PDF recognition. Default value:false. If you enable this feature, both images and PDF files can be recognized."
              - name: "PdfPageNumber"
                type: "integer"
                required: false
                description: "The number of the PDF page that needs to be recognized. Only one single PDF page can be recognized. This parameter is valid if the uploaded file is a PDF and the value of IsPdf is true. Default value:1."
      - name: "extract_doc_multi_ocr"
        headers: ["SECRET_ID","SECRET_KEY", "REGION"]
        tools:
          - name: "ExtractDocMulti"
            handler_name: "ExtractDocMultiIntl"
            description: "Supports recognizing and extracting field information from structured scenarios with complex content and diverse layouts."
            properties:
              - name: "ImageUrl"
                type: "string"
                required: false
                description: "The Url address of the image. supported image formats:PNG, JPG, JPEG, WORD, EXCEL. GIF format is not currently supported. supported image size:no more than 10M after Base64 encoding. image download time should not exceed 3 seconds."
              - name: "ImageBase64"
                type: "string"
                required: false
                description: "The Base64 value of the image. supported image formats:PNG, JPG, JPEG, WORD, EXCEL. GIF format is not currently supported. supported image size:no more than 10M after encoding the downloaded image with Base64. image download time:no more than 3 seconds. supported image pixels:between 20-10000px. either ImageUrl or ImageBase64 must be provided. if both are provided, only use ImageUrl."
              - name: "ConfigId"
                type: "string"
                required: false
                description: "Configuration ID support"
      - name: "hunyuan_3D_global"
        headers: ["SECRET_ID","SECRET_KEY","REGION"]
        tools:
          - name: "SubmitHunyuanTo3DProJob"
            handler_name: "SubmitHunyuanTo3DProJob"
            description: "Submit a Hunyuan 3D job to generate a JobId based on the input prompt/image."
            properties:
              - name: "Prompt"
                required: false
                type: "string"
                description: "Content description for Text-to-3D mode. Supports up to 1024 UTF-8 characters. Note: It is mutually exclusive with `ImageBase64` and `ImageUrl`; only one of the three can be provided."
              - name: "ImageBase64"
                required: false
                type: "string"
                description: "Base64-encoded image data for Image-to-3D mode. Supported formats: jpg, png, jpeg, webp. The unilateral resolution must be between 128 and 5000 pixels. The encoded file size should not exceed 8MB. Note: It is mutually exclusive with `Prompt` and `ImageUrl`."
              - name: "ImageUrl"
                required: false
                type: "string"
                description: "URL of the input image for Image-to-3D mode. Image requirements are the same as for `ImageBase64`. Note: It is mutually exclusive with `Prompt` and `ImageBase64`."
              - name: "MultiViewImages"
                required: false
                type: "array"
                description: "Array of multi-view images for the model. Each view angle allows only one image. Image requirements: encoded size <= 8MB, unilateral resolution between 128-5000 pixels, supports jpg or png format."
                items:
                  type: "object"
                  properties:
                    - name: "ViewType"
                      required: false
                      type: "string"
                      description: "The type of view angle. Valid values: `back` (back view), `left` (left view), `right` (right view)."
                    - name: "ViewImageUrl"
                      required: false
                      type: "string"
                      description: "The URL of the image for this view angle."
                    - name: "ViewImageBase64"
                      required: false
                      type: "string"
                      description: "The Base64-encoded data of the image for this view angle."
              - name: "EnablePBR"
                required: false
                type: "boolean"
                description: "Specifies whether to enable PBR material generation. Default is `false`. Note: This parameter does not take effect when `GenerateType` is `Geometry`."
              - name: "FaceCount"
                required: false
                type: "integer"
                description: "The face count of the generated 3D model. Default is 500000. Supported range: 40,000 - 1,500,000."
              - name: "GenerateType"
                required: false
                type: "string"
                description: "The type of generation task. Default is `Normal`. Valid values: `Normal` (generates a textured geometry model), `LowPoly` (generates a model with intelligent polygon reduction), `Geometry` (generates a geometry model without texture), `Sketch` (generates a model from a sketch or line drawing; in this mode, `Prompt` and image input can be used together)."
              - name: "PolygonType"
                required: false
                type: "string"
                description: "Polygon type, indicates the composition of the model surface mesh. This parameter only takes effect when `GenerateType` is set to `LowPoly`. Default is `triangle`. Valid values: `triangle` (triangle faces), `quadrilateral` (a mix of quadrilateral and triangle faces)."
          - name: "QueryHunyuanTo3DProJob"
            handler_name: "QueryHunyuanTo3DProJob"
            description: "Query the Hunyuan 3D job results by JobId, and output files and preview images."
            properties:
              - name: "JobId"
                required: true
                type: "string"
                description: "Task ID."
      - name: "permit_ocr"
