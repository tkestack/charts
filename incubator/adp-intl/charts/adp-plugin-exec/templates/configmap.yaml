        tools:
          - name: "PermitOCR"
            handler_name: "PermitOCR"
            description: "This API is used to recognize the fields on an exit/entry permit (card) for traveling to and from Hong Kong, Macao, or Taiwan, including place of issuance, issuing authority, validity period, gender, date of birth, name in English, name in Chinese, and document number."
            properties:
              - name: "ImageUrl"
                required: false
                type: "string"
                description: "The URL of the image. Supported image formats:PNG, JPG, and JPEG. GIF is currently not supported. Supported image size:The downloaded image after Base64 encoding can be up to 7 MB. The download time of the image cannot exceed 3s. Either ImageUrl or ImageBase64 of the image must be provided. If both are provided, only ImageUrl is used."
              - name: "ImageBase64"
                required: false
                type: "string"
                description: "The Base64-encoded value of the image. Supported image formats:PNG, JPG, and JPEG. GIF is currently not supported. Supported image size:The downloaded image after Base64 encoding can be up to 7 MB. The download time of the image cannot exceed 3s. Either ImageUrl or ImageBase64 of the image must be provided. If both are provided, only ImageUrl is used."
              - name: "CropPortrait"
                required: false
                type: "boolean"
                description: "Whether to return the profile photo, default is false."
      - name: "general_basic_ocr"
        headers: []
        tools:
          - name: "GeneralBasicOCR"
            handler_name: "GeneralBasicOCR"
            description: "Used to detect and recognize characters in an image"
            properties:
              - name: "ImageBase64"
                required: false
                type: "string"
                description: "Base64-encoded value of image/PDF. The image/PDF cannot exceed 7 MB after being Base64-encoded. A resolution above 600x800 is recommended. PNG, JPG, JPEG, BMP, and PDF formats are supported."
              - name: "ImageUrl"
                required: false
                type: "string"
                description: "URL address of image/PDF. (This field is not supported outside Chinese mainland) The image/PDF cannot exceed 7 MB after being Base64-encoded. A resolution above 600x800 is recommended. PNG, JPG, JPEG, BMP, and PDF formats are supported."
              - name: "Scene"
                required: false
                type: "string"
                description: "Reserved field."
              - name: "LanguageType"
                required: false
                type: "string"
                description: "Language to recognize The language can be automatically recognized or manually specified. Chinese-English mix (zh) is selected by default. Mixed characters in English and each supported language can be recognized together."
              - name: "IsPdf"
                required: false
                type: "boolean"
                description: "Whether to enable PDF recognition. Default value:false. After this feature is enabled, both images and PDF files can be recognized at the same time."
              - name: "PdfPageNumber"
                required: false
                type: "integer"
                description: "Page number of the PDF page that needs to be recognized. Only one single PDF page can be recognized. This parameter is valid if the uploaded file is a PDF and the value of the IsPdf parameter is true. Default value:1."
              - name: "IsWords"
                required: false
                type: "boolean"
                description: "Whether to return the character information. Default value:false"
      - name: "mainland_permit_ocr"
        headers: []
        tools:
          - name: "MainlandPermitOCR"
            handler_name: "MainlandPermitOCR"
            description: "Used to recognize all fields on the front of a mainland travel permit for Hong Kong, Macao, or Taiwan residents."
            properties:
              - name: "ImageBase64"
                required: false
                type: "string"
                description: "The Base64-encoded value of the image. Supported image formats:PNG, JPG, and JPEG. GIF is currently not supported. Supported image size:The downloaded image after Base64 encoding can be up to 7 MB. The download time of the image cannot exceed 3s. Either ImageUrl or ImageBase64 of the image must be provided. If both are provided, only ImageUrl is used."
              - name: "ImageUrl"
                required: false
                type: "string"
                description: "The URL of the image. Supported image formats:PNG, JPG, and JPEG. GIF is currently not supported. Supported image size:The downloaded image after Base64 encoding can be up to 7 MB. The download time of the image cannot exceed 3s."
              - name: "RetProfile"
                required: false
                type: "boolean"
                description: "Whether to return the ID photo. By default, the ID photo is not returned."
      - name: "hmt_resident_permit_ocr"
        headers: []
        tools:
          - name: "HmtResidentPermitOCR"
            handler_name: "HmtResidentPermitOCR"
            description: "Used to recognize key fields on the front and back sides of a residence permit for Hong Kong, Macao, or Taiwan residents."
            properties:
              - name: "ImageBase64"
                required: false
                type: "string"
                description: "The Base64-encoded value of the image. Supported image formats:PNG, JPG, and JPEG. GIF is currently not supported. Supported image size:The downloaded image after Base64 encoding can be up to 7 MB. The download time of the image cannot exceed 3s. Either ImageUrl or ImageBase64 of the image must be provided. If both are provided, only ImageUrl is used."
              - name: "ImageUrl"
                required: false
                type: "string"
                description: "The URL of the image. Supported image formats:PNG, JPG, and JPEG. GIF is currently not supported. Supported image size:The downloaded image after Base64 encoding can be up to 7 MB. The download time of the image cannot exceed 3s."
              - name: "CardSide"
                required: false
                type: "string"
                description: "FRONT:The side with the profile photo. BACK:The side with the national emblem. If this parameter is not specified, the system will automatically determine the ID card side."
      - name: "hkid_card_ocr"
        headers: []
        tools:
          - name: "HKIDCardOCR"
            handler_name: "HKIDCardOCR"
            description: "Used to recognize key fields on the photo side of a Hong Kong (China) identity card."
            properties:
              - name: "ImageBase64"
                required: false
                type: "string"
                description: "Base64 string of the image Supported image formats:PNG, JPG, JPEG. GIF is not supported yet. Supported image size:The downloaded image cannot exceed 7 MB after being Base64-encoded, and it cannot take longer than 3 seconds to download the image."
              - name: "ImageUrl"
                required: false
                type: "string"
                description: "URL address of image. (This field is not supported outside Chinese mainland) Supported image formats:PNG, JPG, JPEG. GIF is currently not supported. Supported image size:the downloaded image cannot exceed 3 MB after being Base64-encoded. The download time of the image cannot exceed 3 seconds."
              - name: "ReturnHeadImage"
                required: false
                type: "boolean"
                description: "Whether to return identity photo."
      - name: "video_face_fusion"
        headers: ["SECRET_ID", "SECRET_KEY", "REGION"]
        tools:
          - name: "SubmitVideoFaceFusionJob"
            handler_name: "SubmitVideoFaceFusionJob"
            description: "Submit an asynchronous video face fusion task. After a task is submitted, the Job ID, estimated completion time, and current queue length will be returned."
            properties:
              - name: "ProjectId"
                required: true
                type: "string"
                description: "Activity ID. Check it in the video face fusion console."
              - name: "ModelId"
                required: true
                type: "string"
                description: "Material ID. Check it in the video face fusion console."
              - name: "MergeInfos"
                required: true
                type: "array"
                description: "Face position information on the user face image and material template image. Only one entry is allowed."
                items:
                  type: "object"
                  properties:
                    - name: "Image"
                      required: false
                      type: "string"
                      description: "Input image Base64 code. Either the Base64 code or URL must be provided. If both are provided, URL prevails. Material image limitation:face size > 34×34 pixels; image size > 64×64 pixels. Supported formats:JPG or PNG."
                    - name: "Url"
                      required: false
                      type: "string"
                      description: "Input image URL. Either the Base64 code or URL must be provided. If both are provided, URL prevails. Material image limitation:face size > 34×34 pixels; image size > 64×64 pixels. Supported formats:JPG or PNG."
                    - name: "InputImageFaceRect"
                      required: false
                      type: "object"
                      description: "Face position information (face box) on the uploaded image. Width and height are no less than 30."
                      properties:
                        - name: "X"
                          type: "integer"
                          description: "Top-left X-axis coordinate of the face box."
                        - name: "Y"
                          type: "integer"
                          description: "Top-left Y-axis coordinate of the face box."
                        - name: "Width"
                          type: "integer"
                          description: "Face box width."
                        - name: "Height"
                          type: "integer"
                          description: "Face box height."
                    - name: "TemplateFaceID"
                      required: false
                      type: "string"
                      description: "Material face ID. If this parameter is left blank, the largest face is used by default."
                    - name: "TemplateFaceRect"
                      required: false
                      type: "object"
                      description: "Face position information (face box) on the template. If this parameter is left blank, the largest face is used by default. Width and height are no less than 30."
                      properties:
                        - name: "X"
                          type: "integer"
                          description: "Top-left X-axis coordinate of the face box."
                        - name: "Y"
                          type: "integer"
                          description: "Top-left Y-axis coordinate of the face box."
                        - name: "Width"
                          type: "integer"
                          description: "Face box width."
                        - name: "Height"
                          type: "integer"
                          description: "Face box height."
              - name: "LogoParam"
                required: false
                type: "object"
                description: "Video watermark logo parameter."
                properties:
                  - name: "LogoRect"
                    required: false
                    type: "object"
                    description: "Coordinates of the logo image in the fusion result image. The logo image will be stretched according to the coordinates."
                    properties:
                      - name: "X"
                        required: false
                        type: "integer"
                        description: "Top-left X-axis coordinate of the logo box."
                      - name: "Y"
                        required: false
                        type: "integer"
                        description: "Top-left Y-axis coordinate of the logo box."
                      - name: "Width"
                        required: false
                        type: "integer"
                        description: "Logo box width."
                      - name: "Height"
                        required: false
                        type: "integer"
                        description: "Logo box height."
                  - name: "LogoUrl"
                    required: false
                    type: "string"
                    description: "Logo image URL. Either the Base64 code or URL must be provided. If both are provided, URL prevails. Supported image format:JPG or PNG."
                  - name: "LogoImage"
                    required: false
                    type: "string"
                    description: "Logo image Base64 code. Either the Base64 code or URL must be provided. If both are provided, URL prevails. Supported image format:JPG or PNG."
              - name: "UserDesignatedUrl"
                required: false
                type: "string"
                description: "COS pre-signed URL (PUT method). If this parameter is specified, the video after fusion will be uploaded to this URL. Note:If upload to this URL fails, the video will be uploaded to the default address of Tencent Cloud."
              - name: "UserIp"
                required: false
                type: "string"
                description: "User IP address."
              - name: "MetaData"
                required: false
                type: "array"
                description: "Video metadata field."
                items:
                  type: "object"
                  properties:
                    - name: "MetaKey"
                      required: false
                      type: "string"
                      description: "Metadata key."
                    - name: "MetaValue"
                      required: false
                      type: "string"
                      description: "Metadata value."
          - name: "QueryVideoFaceFusionJob"
            handler_name: "QueryVideoFaceFusionJob"
            description: "Query the progress and status of video face fusion tasks by Job ID."
            properties:
              - name: "JobId"
                required: true
                type: "string"
                description: "Job ID of the video face fusion task."
      - name: "fuse_face"
        headers: ["SECRET_ID", "SECRET_KEY", "REGION"]
        tools:
          - name: "FuseFace"
            handler_name: "FuseFace"
            description: "This API is used to perform the fusion of a single face, multiple faces, and specified faces with the material template by uploading face images. Users can add logos to generated images."
            properties:
              - name: "ProjectId"
                required: true
                type: "string"
                description: "Activity ID. Check the ID in the Face Fusion console."
              - name: "ModelId"
                required: true
                type: "string"
                description: "Material ID. Check the ID in the Face Fusion console."
              - name: "RspImgType"
                required: true
                type: "string"
                description: "Image return method (url or base64). You cannot use both methods at the same time. The URL is valid for 7 days."
              - name: "MergeInfos"
                required: true
                type: "array"
                description: "Face position information on the user face image and material template image. No more than 6 entries."
                items:
                  type: "object"
                  properties:
                    - name: "Image"
                      required: false
                      type: "string"
                      description: "Enter the image Base64 code. Either the Base64 code or URL must be provided. If both are provided, URL prevails. Material image limitation: face size in the image greater than 34×34 pixels; image size greater than 64×64 pixels. Supported image format: JPG or PNG."
                    - name: "Url"
                      required: false
                      type: "string"
                      description: "Enter the image URL. Either the Base64 code or URL must be provided. If both are provided, URL prevails. Material image limitation: face size in the image greater than 34×34 pixels; image size greater than 64×64 pixels. Supported image format: JPG or PNG."
                    - name: "InputImageFaceRect"
                      required: false
                      type: "object"
                      description: "Face position information (face box) on the uploaded image. Width and height are no less than 30."
                      properties:
                        - name: "X"
                          type: "integer"
                          description: "Top-left X-axis coordinate of the face box."
                        - name: "Y"
                          type: "integer"
                          description: "Top-left Y-axis coordinate of the face box."
                        - name: "Width"
                          type: "integer"
                          description: "Face box width."
                        - name: "Height"
                          type: "integer"
                          description: "Face box height."
                    - name: "TemplateFaceID"
                      required: false
                      type: "string"
                      description: "Material face ID. If this parameter is left blank, the largest face is used by default."
                    - name: "TemplateFaceRect"
                      required: false
                      type: "object"
                      description: "Face position information (face box) on the template. If this parameter is left blank, the largest face is used by default. This parameter applies to scenes where custom material templates are used for fusion. Width and height are no less than 30."
                      properties:
                        - name: "X"
                          type: "integer"
                          description: "Top-left X-axis coordinate of the face box."
                        - name: "Y"
                          type: "integer"
                          description: "Top-left Y-axis coordinate of the face box."
                        - name: "Width"
                          type: "integer"
                          description: "Face box width."
                        - name: "Height"
                          type: "integer"
                          description: "Face box height."
              - name: "LogoAdd"
                required: false
                type: "integer"
                description: "Switch indicating whether to add a synthesis logo to the fusion result image. Default value: 1. 1: add logo 0: do not add logo. It is recommended to use an obvious logo to indicate that the result image uses face fusion technology and is synthesized by AI."
              - name: "LogoParam"
                required: false
                type: "object"
                description: "Logo content settings. By default, the text 'Synthesized by AI' is added to the bottom right corner of the fusion result image. You can also use other texts."
                properties:
                  - name: "LogoRect"
                    required: false
                    type: "object"
                    description: "Coordinates of the logo image in the fusion result image. The logo image will be stretched according to the coordinates."
                    properties:
                      - name: "X"
                        required: false
                        type: "integer"
                        description: "Top-left X-axis coordinate of the logo box."
                      - name: "Y"
                        required: false
                        type: "integer"
                        description: "Top-left Y-axis coordinate of the logo box."
                      - name: "Width"
                        required: false
                        type: "integer"
                        description: "Logo box width."
                      - name: "Height"
                        required: false
                        type: "integer"
                        description: "Logo box height."
                  - name: "LogoUrl"
                    required: false
                    type: "string"
                    description: "Logo image URL. Either the Base64 code or URL must be provided. If both are provided, URL prevails. Supported image format: JPG or PNG."
                  - name: "LogoImage"
                    required: false
                    type: "string"
                    description: "Logo image Base64 code. Either the Base64 code or URL must be provided. If both are provided, URL prevails. Supported image format: JPG or PNG."
              - name: "FuseParam"
                required: false
                type: "object"
                description: "Fusion parameter."
                properties:
                  - name: "ImageCodecParam"
                    required: false
                    type: "object"
                    description: "Image encoding parameter."
                    properties:
                      - name: "MetaData"
                        required: false
                        type: "array"
                        description: "Metadata. The number of metadata entries cannot exceed 1."
                        items:
                          type: "object"
                          properties:
                            - name: "MetaKey"
                              required: false
                              type: "string"
                              description: "Metadata key."
                            - name: "MetaValue"
                              required: false
                              type: "string"
                              description: "Metadata value."
      - name: "detect_ai_fake_faces"
        headers: ["SECRET_ID","SECRET_KEY", "REGION"]
        tools:
          - name: "DetectAIFakeFaces"
            handler_name: "DetectAIFakeFaces"
            description: "Based on the multimodal AI large model algorithm, it provides anti-attack detection capabilities for facial images and videos. It can effectively identify highly simulated AIGC face-changing, high-definition remakes, batch black market attacks, watermarks and other attack traces, and enhance the anti-counterfeiting security capabilities of images and videos."
            properties:
              - name: "FaceInput"
                type: "string"
                required: false
                description: "Enter the image or video with a face to be detected, in base64 encoding. Images support JPG and PNG formats, and videos support MP4, AVI, and FLV formats."
              - name: "FaceInputType"
                type: "integer"
                required: false
                description: "The type of input is 1- The input type is a picture 2- The input type is a video Others - Return error code InvalidParameter"
              - name: "Url"
                type: "string"
                required: false
                description: "Pass in the URL of the image or video; effective when FaceInput is empty."
