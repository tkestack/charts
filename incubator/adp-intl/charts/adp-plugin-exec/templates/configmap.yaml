              - name: "ImageUrl"
                required: false
                type: "string"
                description: "图片的Url地址。支持格式：PNG、JPG、JPEG，不支持GIF格式。所下载图片经 Base64 编码后不超过10M。图片下载时间不超过3秒。支持的图片像素：需介于20-10000px之间。"
              - name: "ImageBase64"
                required: false
                type: "string"
                description: "图片的Base64值。支持格式：PNG、JPG、JPEG，不支持GIF格式。所下载图片经Base64编码后不超过10M。图片下载时间不超过3秒。支持的图片像素：需介于20-10000px之间。如果都提供，只使用 ImageUrl"
      - name: "qrcode_ocr"
        headers: ["SECRET_ID","SECRET_KEY"]
        tools:
          - name: "QrcodeOCR"
            handler_name: "QrcodeOCR"
            description: "二维码和条形码识别"
            properties:
              - name: "ImageUrl"
                required: false
                type: "string"
                description: "图片的 Url 地址。要求图片经Base64编码后不超过 7M，支持PNG、JPG、JPEG格式。"
              - name: "ImageBase64"
                required: false
                type: "string"
                description: "图片的Base64值。要求图片经Base64编码后不超过7M，支持PNG、JPG、JPEG格式。图片的ImageUrl、ImageBase64必须提供一个，如果都提供，只使用ImageUrl。"
      - name: "smart_ocr_pro"
        headers: ["SECRET_ID","SECRET_KEY"]
        tools:
          - name: "SmartStructuralPro"
            handler_name: "SmartStructuralPro"
            description: "智能结构化高级版识别"
            properties:
              - name: "ImageUrl"
                required: false
                type: "string"
                description: "图片的Url地址。支持格式：PNG、JPG、JPEG，WORD，EXCEL，不支持GIF格式。大小：下载后经Base64编码后不超过7M。图片下载时间不超过3秒。像素：需介于20-10000px之间。"
              - name: "ImageBase64"
                required: false
                type: "string"
                description: "格式：PNG、JPG、JPEG，WORD，EXCEL，不支持GIF格式。大小：所下载图片经Base64编码后不超过7M。下载时间不超过3秒。像素：需介于20-10000px之间。如果都提供，只使用ImageUrl。"
      - name: "tx_meeting"
        headers: ["SECRET_ID","SECRET_KEY","APP_ID","SDK_ID"]
        tools:
          - name: "GetMeetingRecordList"
            handler_name: "GetMeetingRecordList"
            description: "查询腾讯会议会议录制列表"
            properties:
              - name: "UserId"
                type: "string"
                description: "用户ID"
                required: true
              - name: "MeetingCode"
                type: "string"
                description: "会议code"
                required: false
              - name: "StartTime"
                type: "string"
                description: "查询起始时间戳，UNIX 时间戳（单位秒），时间区间不允许超过31天"
                required: true
              - name: "EndTime"
                type: "string"
                description: "查询结束时间戳，UNIX 时间戳（单位秒），时间区间不允许超过31天"
                required: true
          - name: "GetRecordDetail"
            handler_name: "GetRecordDetail"
            description: "查询腾讯会议单个会议的录制详情，录制详情包括文件、转写、纪要"
            properties:
              - name: "UserId"
                type: "string"
                description: "用户ID"
                required: true
              - name: "RecordFileId"
                type: "string"
                description: "录制文件 ID，列表接口返回的 record_file_id"
                required: true
      - name: "image_outpainting"
        headers: ["REGION","SECRET_ID","SECRET_KEY"]
        tools:
          - name: "ImageOutpainting"
            handler_name: "ImageOutpainting"
            description: "支持对输入图像按指定宽高比实现智能扩图。"
            properties:
              - name: "Ratio"
                required: true
                type: "string"
                description: "扩展后的比例（宽:高），需要不等于原图比例。支持：1:1、4:3、3:4、16:9、9:16"
              - name: "InputImage"
                required: false
                type: "string"
                description: "输入图Base64数据。Base64和Url必须提供一个，如果都提供以Url为准。图片限制：单边分辨率小于5000且大于128，转成Base64字符串后小于6MB，格式支持 jpg、jpeg、png、bmp、tiff、webp"
              - name: "InputUrl"
                required: false
                type: "string"
                description: "输入图Url。Base64和Url必须提供一个，如果都提供以Url为准。图片限制：单边分辨率小于5000且大于128，转成Base64字符串后小于6MB，格式支持 jpg、jpeg、png、bmp、tiff、webp"
      - name: "sketch_to_image"
        headers: ["REGION","SECRET_ID","SECRET_KEY"]
        tools:
          - name: "SketchToImage"
            handler_name: "SketchToImage"
            description: "支持上传一张黑白线稿图，按照指定的主体对象以及样式、颜色、材质、风格等的文本描述prompt ，对线稿图进行色彩填充与细节描绘，得到一张完整绘制的图像。"
            properties:
              - name: "Prompt"
                required: true
                type: "string"
                description: "用于线稿生图的文本描述。最多支持200个utf-8字符。建议格式：线稿中的主体对象+画面场景+配色/材质/元素/风格等"
              - name: "InputImage"
                required: false
                type: "string"
                description: "线稿图Base64数据。Base64和Url必须提供一个，如果都提供以Url为准。图片限制：黑白线稿图片，单边分辨率小于5000且大于128，转成Base64字符串后小于6MB，格式支持 jpg、jpeg、png、bmp、tiff、webp"
              - name: "InputUrl"
                required: false
                type: "string"
                description: "线稿图Url。Base64和Url必须提供一个，如果都提供以Url为准。图片限制：黑白线稿图片，单边分辨率小于5000且大于128，转成Base64字符串后小于6MB，格式支持 jpg、jpeg、png、bmp、tiff、webp"
      - name: "refine_image"
        headers: ["REGION","SECRET_ID","SECRET_KEY"]
        tools:
          - name: "RefineImage"
            handler_name: "RefineImage"
            description: "将图像变清晰，增强图像细节。变清晰后的图片将保持原图比例，长边为2048。"
            properties:
              - name: "InputImage"
                required: false
                type: "string"
                description: "输入图Base64数据。Base64和Url必须提供一个，如果都提供以Url为准。图片限制：转成Base64字符串后小于6MB，格式支持 jpg、jpeg、png、bmp、tiff、webp"
              - name: "InputUrl"
                required: false
                type: "string"
                description: "输入图Url。Base64和Url必须提供一个，如果都提供以Url为准。图片限制：转成Base64字符串后小于6MB，格式支持 jpg、jpeg、png、bmp、tiff、webp"
      - name: "tmt_text_translate"
        headers: ["REGION","SECRET_ID","SECRET_KEY"]
        tools:
          - name: "TextTranslate"
            handler_name: "TextTranslate"
            description: "Text Translate"
            properties:
              - name: "SourceText"
                required: true
                type: "string"
                description: "The texts to be translated, which must be encoded in UTF-8 and can contain up to 2,000 characters in a request. For non-pure texts such as those with HTML tags, the translation may fail."
              - name: "Source"
                required: true
                type: "string"
                description: "Source languages. For supported options, see:https://www.tencentcloud.com/document/product/1161/50435"
              - name: "Target"
                required: true
                type: "string"
                description: "Target language. For the list of supported target languages for each source language, see:https://www.tencentcloud.com/document/product/1161/50435"
      - name: "tmt_lang_detect"
        headers: ["REGION","SECRET_ID","SECRET_KEY"]
        tools:
          - name: "LanguageDetect"
            handler_name: "LanguageDetect"
            description: "语种识别"
            properties:
              - name: "Text"
                required: true
                type: "string"
                description: "待识别的文本，文本统一使用utf-8格式编码，非utf-8格式编码字符会翻译失败。单次请求的文本长度需要低于2000。"
      - name: "detect_product"
        headers: ["REGION","SECRET_ID","SECRET_KEY"]
        tools:
          - name: "DetectProduct"
            handler_name: "DetectProduct"
            description: "支持识别图片中包含的商品，能够输出商品的品类名称、类别。支持一张图片多个商品的识别。"
            properties:
              - name: "ImageBase64"
                required: false
                type: "string"
                description: "图片经过base64编码的内容。最大不超过4M。与ImageUrl同时存在时优先使用ImageUrl字段。注意：图片需要base64编码，并且要去掉编码头部"
              - name: "ImageUrl"
                required: false
                type: "string"
                description: "图片URL地址。图片限制：•图片格式：PNG、JPG、JPEG。•图片大小：所下载图片经Base64编码后不超过4M。图片下载时间不超过3秒。建议：•图片像素：大于50*50像素，否则影响识别效果"
      - name: "crop_image"
        headers: ["REGION","SECRET_ID","SECRET_KEY"]
        tools:
          - name: "CropImage"
            handler_name: "CropImage"
            description: "根据输入的裁剪比例，智能判断一张图片的最佳裁剪区域。"
            properties:
              - name: "Width"
                required: true
                type: "integer"
                description: "需要裁剪区域的宽度，与Height共同组成所需裁剪的图片宽高比例。输入数字请大于0、小于图片宽度的像素值"
              - name: "Height"
                required: true
                type: "integer"
                description: "需要裁剪区域的高度，与Width共同组成所需裁剪的图片宽高比例。输入数字请大于0、小于图片高度的像素值。宽高比例会简化为最简分数，即如果Width输入10、Height输入20，会简化为1：2。宽高比例建议取值在[1, 2.5]之间，超过这个范围可能会影响效果"
              - name: "ImageUrl"
                required: false
                type: "string"
                description: "图片URL地址。图片限制：•图片格式：PNG、JPG、JPEG。•图片大小：所下载图片经Base64编码后不超过4M。图片下载时间不超过3秒。建议：•图片像素：大于50*50像素，否则影响识别效果"
              - name: "ImageBase64"
                required: false
                type: "string"
                description: "图片经过base64编码的内容。最大不超过4M。与ImageUrl同时存在时优先使用ImageUrl字段。注意：图片需要base64编码，并且要去掉编码头部"
      - name: "text_english_correct"
        headers: ["SECRET_ID","SECRET_KEY"]
        tools:
          - name: "TextEnglishCorrect"
            handler_name: "TextEnglishCorrect"
            description: "覆盖英语学习全周期，提供高考价值、高人评拟合度的纯文本英文作文批改"
            properties:
              - name: "Content"
                required: true
                type: "string"
                description: "作文文本"
      - name: "change_clothes"
        headers: ["REGION","SECRET_ID","SECRET_KEY"]
        tools:
          - name: "ChangeClothes"
            handler_name: "ChangeClothes"
            description: "上传正面全身模特照和服装平铺图，生成模特换装后的图片。生成的换装图片分辨率和模特照分辨率一致。"
            properties:
              - name: "ModelUrl"
                required: true
                type: "string"
                description: "模特图片Url。图片限制：单边分辨率小于3000，且大于512，转成Base64字符串后小于8MB，具体要求可查看文档https://cloud.tencent.com/document/api/1668/108532"
              - name: "ClothesUrl"
                required: true
                type: "string"
                description: "服装图片Url。图片限制：单边分辨率小于3000，且大于512，转成Base64字符串后小于8MB，具体要求可查看文档https://cloud.tencent.com/document/api/1668/108532" 
              - name: "ClothesType"
                required: true
                type: "string"
                description: "服装类型，需要和服装图片保持一致。取值：Upper-body：上衣，Lower-body：下装，Dress：连衣裙" 
      - name: "generate_avatar"
        headers: ["REGION","SECRET_ID","SECRET_KEY"]
        tools:
          - name: "GenerateAvatar"
            handler_name: "GenerateAvatar"
            description: "将根据输入的人像、宠物照片，生成风格百变的头像。"
            properties:
              - name: "InputImage"
                required: false
                type: "string"
                description: "输入图Base64数据。Base64和Url必须提供一个，如果都提供以Url为准。图片限制：黑白线稿图片，单边分辨率小于5000且大于128，转成Base64字符串后小于6MB，格式支持 jpg、jpeg、png、bmp、tiff、webp"
              - name: "InputUrl"
                required: false
                type: "string"
                description: "输入图Url。Base64和Url必须提供一个，如果都提供以Url为准。图片限制：黑白线稿图片，单边分辨率小于5000且大于128，转成Base64字符串后小于6MB，格式支持 jpg、jpeg、png、bmp、tiff、webp" 
              - name: "Type"
                required: false
                type: "string"
                description: "图像类型，默认为人像。human：人像头像，仅支持人像图片输入，建议避免上传无人、多人、人像过小的图片。pet：萌宠贴纸，仅支持动物图片输入，建议避免上传无动物、多动物、动物过小的图片" 
              - name: "Style"
                required: false
                type: "string"
                description: "头像风格，仅在人像模式下生效。若使用人像模式，请在文档【https://cloud.tencent.com/document/product/1668/107741】列表中选择期望的风格，传入风格编号，不传默认使用flower风格。若使用萌宠贴纸模式，无需选择风格，该参数不生效" 
      - name: "image_to_image"
        headers: ["REGION","SECRET_ID","SECRET_KEY"]
        tools:
          - name: "ImageToImage"
            handler_name: "ImageToImage"
            description: "Provides generative image-to-image style transfer capabilities, intelligently producing a styled image based on the input image and text description."
            properties:
              - name: "InputImage"
                required: false
                type: "string"
                description: "Base64 code of the input mage. Either the Base64 code or URL must be provided. If both are provided, URL prevails. Image restrictions:The single-edge resolution must be less than 5,000 and greater than 50, and the size after Base64 encoding must be less than 8 MB. Supported formats include JPG, JPEG, PNG, BMP, TIFF and WEBP."
              - name: "InputUrl"
                required: false
                type: "string"
                description: "URL of the input mage. Either the Base64 code or URL must be provided. If both are provided, URL prevails. Image restrictions:The single-edge resolution must be less than 5,000 and greater than 50, and the size after Base64 encoding must be less than 8 MB. Supported formats include JPG, JPEG, PNG, BMP, TIFF and WEBP." 
              - name: "Prompt"
                required: false
                type: "string"
                description: "Text description. It is used to increase the possibility that the generation result contains the described content. A maximum of 256 UTF-8 characters are supported." 
              - name: "Styles"
                required: false
                type: "array"
                description: "Image style. Select the desired style from the Image Style List【https://www.tencentcloud.com/document/product/1238/63504】and enter the style number. It is recommended to use only one style. If no style is specified, 201 (anime style) is used by default." 
                items:
                  type: "string"
      - name: "drug_instruction_object"
        headers: ["REGION","SECRET_ID","SECRET_KEY"]
        tools:
          - name: "DrugInstructionObject"
            handler_name: "DrugInstructionObject"
            description: "药品说明书结构化"
            properties:
              - name: "PdfBase64"
                type: "string"
                required: false
                description: "药品说明书信息信息, 支持传PDF文件的Base64编码字符"
              - name: "PdfUrl"
                type: "string"
                required: false
                description: "药品说明书PDF的url，如果与PdfBase64同时填写以PdfBase64为准"
      - name: "image_to_object"
        headers: ["REGION","SECRET_ID","SECRET_KEY"]
        tools:
          - name: "ImageToObject"
            handler_name: "ImageToObject"
            description: "医疗报告图片结构化"
            properties:
              - name: "ImageBase64"
                type: "string"
                required: false
                description: "图片信息, 支持传图片的Base64编码字符"
              - name: "ImageUrl"
                type: "string"
                required: false
                description: "图片的url，如果与ImageBase64同时填写以ImageBase64为准"
              - name: "Type"
                type: "integer"
                required: true
                description: "报告类型，目前支持11（检验报告），12（检查报告），15（病理报告），28（出院报告），29（入院报告），210（门诊病历），212（手术记录），218（诊断证明），363（心电图），27（内窥镜检查），215（处方单），219（免疫接种证明），301（C14呼气试验）。如果不清楚报告类型，可以使用分类引擎，该字段传0（同时IsUsedClassify字段必须为True，否则无法输出结果）"
              - name: "IsUsedClassify"
                type: "boolean"
                required: true
                description: "是否使用分类引擎，当不确定报告类型时，可以使用收费的报告分类引擎服务。若该字段为False，则Type字段不能为0，否则无法输出结果。"

  mcp_server_2.yaml: |
    servers:
      - name: "lexiang_ai_search"
        headers: ["AppSecret","AppKey", "StaffId"]
        tools:
          - name: "LexianglaKnowledge"
            handler_name: "LexianglaKnowledge"
            description: "查询腾讯乐享知识库"
            properties:
              - name: "query"
                type: "string"
                required: true
                description: "用户输入的问题，最长1024字符"
              - name: "top_n"
                type: "integer"
                required: true
                description: "指定输出rerank后排名前几的文档（1-50），建议控制在20以内"
              - name: "targets"
                type: "array"
                required: false
                description: "知识范围，可以通过传入参数限制知识来源的范围，仅支持指定单一知识范围，不传则默认为全站知识"
                items:
                  type: "object"
                  properties:
                    - name: "type"
                      type: "string"
                      required: false
                      description: "表示范围类型，可设置为space(知识库)/team(团队空间）"
                    - name: "id"
                      type: "string"
                      required: false
                      description: "space(知识库)对应id获取位置：指定知识库url链接中“space/xxx”，xxx为知识库id"
      - name: "english"
        headers: ["SECRET_ID","SECRET_KEY", "REGION"]
        tools:
          - name: "EnglishOCR"
            handler_name: "EnglishOCR"
            description: "支持图像英文文字的检测和识别，返回文字内容。"
            properties:
              - name: "ImageUrl"
                required: false
                type: "string"
                description: "图片的Url地址。支持图片格式：PNG、JPG、JPEG，暂不支持GIF格式。下载图片经Base64编码后不超过7M。图片下载时间不超过 3 秒。像素须介于20-10000px之间。如果都提供，只使用ImageUrl。"
              - name: "ImageBase64"
                required: false
                type: "string"
                description: "图片的Base64值。支持图片格式：PNG、JPG、JPEG，暂不支持GIF格式。下载图片经Base64编码后不超过7M。图片下载时间不超过3秒。像素须介于20-10000px之间。如果都提供，只使用ImageUrl。"
      - name: "advertise"
        headers: ["SECRET_ID","SECRET_KEY", "REGION"]
        tools:
          - name: "AdvertiseOCR"
            handler_name: "AdvertiseOCR"
            description: "支持广告商品图片内文字的检测和识别，返回文字内容。"
            properties:
              - name: "ImageUrl"
                required: false
                type: "string"
                description: "图片的 Url 地址。图片经Base64编码后不超过7M，分辨率建议600*800以上，支持PNG、JPG、JPEG、BMP格式。"
              - name: "ImageBase64"
                required: false
                type: "string"
                description: "图片的Base64值。要求图片经Base64编码后不超过7M，分辨率建议600*800以上，支持PNG、JPG、JPEG、BMP格式。图片的ImageUrl、ImageBase64必须提供一个，如果都提供，只使用ImageUrl。"
      - name: "bank_car"
        headers: ["SECRET_ID","SECRET_KEY", "REGION"]
        tools:
          - name: "BankCardOCR"
            handler_name: "BankCardOCR"
            description: "支持识别卡号、卡类型、卡名字、银行信息、有效期。"
            properties:
              - name: "ImageUrl"
                required: false
                type: "string"
                description: "图片的Url地址。图片经Base64编码后不超过7M，分辨率建议500*800以上，支持PNG、JPG、JPEG、BMP格式。建议卡片部分占据图片2/3以上。"
              - name: "ImageBase64"
                required: false
                type: "string"
                description: "图片的Base64值。要求图片经Base64编码后不超过7M，分辨率建议500*800以上，支持PNG、JPG、JPEG、BMP格式。建议卡片部分占据图片2/3以上。如果都提供，只使用ImageUrl。"
      - name: "enterprise_license"
        headers: ["SECRET_ID","SECRET_KEY", "REGION"]
        tools:
