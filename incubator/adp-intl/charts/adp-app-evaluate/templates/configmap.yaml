kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ .Release.Name }}-app-evaluate
  namespace: {{ .Release.Namespace }}
data:
  application.yaml: |
    delete_limit: 300
    is_private: ${IS_PRIVATE}
    finance:
      key_expire: 1800
      default_qpm: 50
      default_tpm: 100000
      ds_default_qpm: ${APP_DS_DEFAULT_QPM}
      ds_default_tpm: ${APP_DS_DEFAULT_TPM}
    sse_conn_options: ${SSE_CONN_OPTIONS}
    handle_tasks:
      - "upload_sample_set"
      - "delete_sample_set"
      - "export_sample_set"
      - "create_evaluation"
      - "delete_evaluation"
      - "export_evaluation"
      - "exec_evaluation"
      - "migrate_evaluation"
    task_prefix: evaluate:task
    task_fetch_num: 100
    task_fetch_timeout: 2s
    task_fetch_period: 2s
    task_pool_num: ${APP_TASK_POOL_NUM}
    tasks: ${TASKS}
    sample_rule:
      min_row: 1
      max_row: 10000
      max_custom_column:
        max_column: 10
        max_length: 20
      max_session_num: 100
      check_row: 100
      excel_head:
        - session_id
        - request_id
        - query
        - custom_variables
      cell_limit:
        min_length: 0
        max_length: 12000
      export_excel_head:
        - session_id
        - request_id
        - query
        - custom_variables
    file_type_size:
      xlsx: 20971520
    evaluation_rule:
      name_limit: 20
      set_limit: 5
      compare_limit: 3
      update_stat_interval: 5000
      code: 
      avg_input_token: 500
      avg_output_token: 500
      avg_cost_time: 3000
    storage:
      type: cos
      video_domain: "{{ .Values.global.clb }}"
      cos_map:
        offline:
          secret_id: ${INFRA_MIDDLEWARES_S3_COS_SECRETID}
          secret_key: ${INFRA_MIDDLEWARES_S3_COS_SECRETKEY}
          app_id: ${INFRA_MIDDLEWARES_S3_COS_APPID}
          region: ${INFRA_MIDDLEWARES_S3_COS_REGION}
          bucket: ${INFRA_MIDDLEWARES_S3_COS_BUCKET}
          domain: ${INFRA_MIDDLEWARES_S3_COS_DOMAIN}
          expire_time: 30m
          credential_time: 10m
    space_limiter_account: ${SPACE_LIMITER_ACCOUNT}
    local_cache:
      app_cache:
        switch: true
        capacity: 10000
        expiration: 1800
        update_cache_interval: 30
    run_code:
      MaxResultLength: 1000
      ResultSeparator: "_______ResultSeparator_______"
      MaxAppParallel: 5
      CodeTemplate: |-
        import time
        import datetime
        import json
        import numpy
        import pandas
        import math
        import cmath
        import decimal
        import fractions
        import random
        import statistics
        import re
        import string
        import stringprep
        import collections
        import numbers
        import unicodedata
        lke_system_params=json.loads("""{{`{{InputParamObject}}`}}""")
        {{`{{CodeContent}}`}}
        main_result = main(lke_system_params)
        import json
        class SystemJsonEncoder(json.JSONEncoder):
          def default(self, obj):
              import numpy as np
              if isinstance(obj, np.timedelta64):
                  return str(obj)
              elif isinstance(obj, np.integer):
                  return int(obj)
              elif isinstance(obj, (np.void)):
                  return None
              elif isinstance(obj, np.floating):
                  return float(obj)
              elif isinstance(obj, np.complexfloating):
                  return {'real': obj.real, 'imag': obj.imag}
              elif isinstance(obj, np.bytes_):
                  return obj.decode('utf-8')
              elif isinstance(obj, np.str_):
                  return str(obj)
              elif isinstance(obj, np.datetime64):
                  return str(obj)
              elif isinstance(obj, np.ndarray):
                  return obj.tolist()
              elif isinstance(obj, pd.DataFrame):
                  return obj.to_dict()
              elif isinstance(obj, pd.Series):
                  return obj.to_list()
              return super(SystemJsonEncoder, self).default(obj)
        print("{{`{{ResultSeparator}}`}}")
        print(json.dumps(main_result, ensure_ascii=False, cls=SystemJsonEncoder))

