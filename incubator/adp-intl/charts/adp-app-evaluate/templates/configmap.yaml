  trpc_go.yaml: |
    global:                             #全局配置
      namespace: ${POD_NAMESPACE}            #环境类型，分正式production和非正式development两种类型
      env_name: formal                    #环境名称，非正式环境下多环境的名称
      enable_set: false         #是否启用set
      full_set_name: adp   #set名
      local_ip: ${POD_IP}
      container_name: ${POD_NAME}
    server:                                            #服务端配置
      app: adp                                        #业务的应用名
      server: app-evaluate                         #进程服务名
      bin_path: /app/bin/                   #二进制可执行文件和框架配置文件所在路径
      conf_path: /app/conf/                 #业务配置文件所在路径
      data_path: /app/data/                 #业务数据文件所在路径
      filter:                                          #针对所有service处理函数前后的拦截器列表
        - recovery                                     #拦截框架创建的业务处理协程panic
        - i18n-adp  # 在recovery filter之后引用，避免filter里的错误覆盖掉i18n错误
        - opentelemetry
      admin:
        ip: ${POD_IP}
        port: 8081
      service:                                         #业务服务提供的service，可以有多个
        - name: trpc.KEP.bot-evaluate-config-server.Admin   # service的路由名称，格式：`业务领域.功能模块.项目名.Pb定义的服务名`
          ip: ${POD_IP}                              #服务监听ip地址 可使用占位符 ${ip},ip和nic二选一，优先ip
          port: 9090   # 服务监听端口
          network: tcp   # 网络监听类型 tcp/udp
          protocol: trpc   # 应用层协议 trpc/restful
          timeout: 50000   # 请求最长处理时间，单位毫秒
          filter:
            - session
            - permission
            - logMetaFilter
        - name: trpc.KEP.bot-evaluate-config-server.Api   # service的路由名称，格式：`业务领域.功能模块.项目名.Pb定义的服务名`
          ip: ${POD_IP}                              #服务监听ip地址 可使用占位符 ${ip},ip和nic二选一，优先ip
          port: 9091   # 服务监听端口
          network: tcp   # 网络监听类型 tcp/udp
          protocol: trpc   # 应用层协议 trpc/restful
          timeout: 50000   # 请求最长处理时间，单位毫秒
          filter:
            - logMetaFilter
    plugins:                                          #插件配置
      config:
        file:
          providers:
            - name: rainbow
              path: /app/conf/
            - name: global
              appid: ${RAINBOW_APP_ID}  # appid
              group: global # 配置所属组
              type: kv   # 七彩石数据格式, kv(默认), table
              env_name: ${RAINBOW_ENV_NAME}
              timeout: 2000
              enable_client_provider: true
      telemetry:
        opentelemetry:
          addr: {{ ((.Values.global.observability).apm).otlp | default "" }}
          tenant_id: adp
          sampler:
            fraction: 1
          traces:
            disable_trace_body: false
          metrics:
            {{- if ((.Values.global.observability).apm).registry }}
            registry_endpoints: ["{{ .Values.global.observability.apm.registry}}"]
            {{- end }}
          logs:
            enabled: true
            level: "debug"
            trace_log_mode: "disable"
          {{- if ((.Values.global.observability).apm).attributes }}
          attributes:
            {{- range $key, $value := .Values.global.observability.apm.attributes }}
          - key: {{ $key }}
            value: {{ $value }}
            {{- end }}
          {{- end }}
      log:                                            #日志配置
        default:                                      #默认日志的配置，可支持多输出
          - writer: console                           #控制台标准输出 默认
            level: debug                              #标准输出日志的级别
          - writer: file                              #本地文件日志
            level: debug                               #本地文件滚动日志的级别
            writer_config:
              filename: /app/logs/trpc.log    #本地文件滚动日志存放的路径
              max_size: 10                              #本地文件滚动日志的大小 单位 MB
              max_backups: 10                           #最大日志文件数
              max_age: 7                                #最大日志保留天数
              compress:  false                          #日志文件是否压缩
      i18n:
        i18n-adp:
          default_lang: zh-CN
          supported_languages:
            - zh-CN
            - en-US
          data_provider:
            type: rainbow
            prefix: evaluate
            error_prefix: error
            char_scaling_factor:
              zh: 1
              en: 3
    client:
      service:
        - name: mysql.tcadp.evalution
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: tdsql.tcadp.evalution
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: redis.tcadp.evalution
          target: redis://:${INFRA_MIDDLEWARES_REDIS_0_PASSWORD}@${INFRA_MIDDLEWARES_REDIS_0_HOSTS}:6379/2
          timeout: 5000
        - callee: trpc.KEP.bot_admin_config_server.Login
          target: ${TARGET_BOT_ADMIN_LOGIN}
          protocol: trpc
          timeout: 20000
        - callee: trpc.adp.app_admin_proxy.Api
          target: ${TARGET_BOT_ADMIN_API}
          protocol: trpc
          timeout: 20000
        - callee: trpc.KEP.bot_admin_config_server.Api
          target: ${TARGET_BOT_ADMIN_API}
          protocol: trpc
          timeout: 20000

        - name: trpc.http.cos.Access
          network: tcp
          protocol: http
          target: dns://cos-internal.${INFRA_MIDDLEWARES_S3_COS_REGION}.tencentcos.cn
          timeout: 5000
        - callee: trpc.KEP.code_interpreter_dispatcher.CodeExec
          target: ${TARGET_CODE_EXEC}
          protocol: trpc
          timeout: 60000
        - name: trpc.KEP.ai-gateway.Api
