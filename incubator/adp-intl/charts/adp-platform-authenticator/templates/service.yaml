apiVersion: v1
kind: Service
metadata:
  labels:
    app: adp-platform-authenticator
  name: adp-platform-authenticator
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: tcp-9090
      port: 9090
      protocol: TCP
      targetPort: 9090
  selector:
    app: adp-platform-authenticator
  sessionAffinity: None
  type: ClusterIP
