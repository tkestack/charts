        "join.qq.com" : {
          "BatchLimit": 5,
          "GroupLimit": 5,
          "MainContentThreshold": 0.3,
          "ContentBytesThreshold": 200,
          "FailThreshold": 0.5,
          "BatchFetchSleep": 10,
          "CSSSelector": ".post_box"
        },
        "nuaa.91job.org.cn":{
          "BatchLimit": 5,
          "GroupLimit": 5,
          "MainContentThreshold": 0.3,
          "ContentBytesThreshold": 200,
          "FailThreshold": 0.5,
          "BatchFetchSleep": 6,
          "CSSSelector":"#recruitment-announcement-list > div > div > div > div > div > div > div > table > tbody > tr > td > a"
        }
      },
      "URLWhiteList": {
        "3009014594":[
          "lib.tsinghua.edu.cn",
          "www.tsinghua.edu.cn"
        ]
      },
      "AutoUpdateList": ["1924489468235778112","1788032699535982592","1707741546843766784"],
      "WhiteCosList": ["{{ .Values.global.components.s3.cos.bucket }}.cos.{{ .Values.global.components.s3.cos.region }}.{{ .Values.global.components.s3.cos.domain }}"]
    }

