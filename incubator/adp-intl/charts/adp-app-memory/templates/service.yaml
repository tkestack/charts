apiVersion: v1
kind: Service
metadata:
  labels:
    app: adp-app-memory
  name: adp-app-memory
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: adp-app-memory-8000
      port: 8000
      protocol: TCP
      targetPort: 8000
    - name: adp-app-memory-8001
      port: 8001
      protocol: TCP
      targetPort: 8001
    - name: adp-app-memory-8081
      port: 8081
      protocol: TCP
      targetPort: 8081
    - name: adp-app-memory-9001
      port: 9001
      protocol: TCP
      targetPort: 9001
  selector:
    app: adp-app-memory
  sessionAffinity: None
  type: ClusterIP
