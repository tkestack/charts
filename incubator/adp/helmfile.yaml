# Helmfile for tke-access-test
# 用于管理多个 Helm Charts 的部署

# 依赖检查器全局配置
dependencyChecker:
  # 检查间隔（秒）
  checkInterval: 5
  # 最大重试次数（120次 * 5秒 = 10分钟）
  maxRetries: 120
  # 是否启用详细日志
  verbose: true

# Helmfile 配置
helmDefaults:
  # 等待所有资源就绪
  wait: true
  # 超时时间（秒）
  timeout: 600
  # 如果 release 不存在则创建，存在则更新
  createNamespace: true
  # 强制更新
  force: false
  # 原子操作：如果失败则回滚
  atomic: true
  # 清理失败的 release
  cleanupOnFail: true
  # Helm 命令的额外参数
  args:
    - "--debug"


# Release 配置
releases:
  # 1. ti-common - 公共资源，最先部署
  - name: ti-common
    chart: ./charts/ti-common
    namespace: default
    installed: {{ env "TI_COMMON_ENABLED" | default "true" }}
    wait: true
    timeout: 600

  # 2. etcd - 基础存储服务
  - name: etcd
    chart: ./charts/etcd
    namespace: default
    installed: {{ env "ETCD_ENABLED" | default "true" }}
    wait: true
    timeout: 600

  #####################  ti-base  #######################

  # 3. lke-accessmanagerserver - 访问管理服务
  - name: lke-access-managerserver
    chart: ./charts/lke-access-managerserver
    namespace: default
    installed: {{ env "LKE_ACCESSMANAGERSERVER_ENABLED" | default "true" }}
    wait: true
    timeout: 600
    needs:
      - etcd

  # 5. lke-aiconfmanagerserver - AI配置管理服务
  - name: lke-aiconf-manager
    chart: ./charts/lke-aiconf-manager
    namespace: default
    installed: {{ env "LKE_AICONFMANAGERSERVER_ENABLED" | default "true" }}
    wait: true
    timeout: 600
    needs:
      - etcd

  # 6. lke-ti-auth-web - 认证前端服务
  - name: lke-ti-auth-web
    chart: ./charts/lke-ti-auth-web
    namespace: default
    installed: {{ env "LKE_TI_AUTH_WEB_ENABLED" | default "true" }}
    wait: true
    timeout: 600
    needs:
      - etcd

  # 7. lke-ti-gateway - 网关服务
