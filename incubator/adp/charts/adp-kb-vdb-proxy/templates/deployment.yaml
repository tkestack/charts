apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    configmap.reloader.stakater.com/reload: "adp-kb-vdb-proxy"
    ti.cloud.tencent.com/resource-quota: unlimited
    {{- if .Values.global.customAnnotations }}
    {{- range $key, $value := .Values.global.customAnnotations }}
    {{ $key }}: {{ $value | toString | quote }}
    {{- end }}
    {{- end }}
  labels:
    app: adp-kb-vdb-proxy
    {{- if .Values.global.customLabels }}
    {{- range $key, $value := .Values.global.customLabels }}
    {{ $key }}: {{ $value | toString | quote }}
    {{- end }}
    {{- end }}
  name: adp-kb-vdb-proxy
  namespace: {{ .Release.Namespace }}
spec:
  {{- if eq .Values.global.clusterSize "minimal" }}
  replicas: 1
  {{- else if eq .Values.global.clusterSize "standard" }}
  replicas: 2
  {{- else }}
  replicas: 3
  {{- end }}
  selector:
    matchLabels:
      app: adp-kb-vdb-proxy
  template:
    metadata:
      labels:
        app: adp-kb-vdb-proxy
        {{- if .Values.global.customLabels }}
        {{- range $key, $value := .Values.global.customLabels }}
        {{ $key }}: {{ $value | toString | quote }}
        {{- end }}
        {{- end }}
      {{- if .Values.global.customAnnotations }}
      annotations:
        {{- range $key, $value := .Values.global.customAnnotations }}
        {{ $key }}: {{ $value | toString | quote }}
        {{- end }}
      {{- end }}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - adp-kb-vdb-proxy
              topologyKey: kubernetes.io/hostname
            weight: 1
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: GPUName
                    operator: DoesNotExist
            - weight: 100
              preference:
                matchExpressions:
                  - key: product
                    operator: In
                    values:
                      - lke
      serviceAccountName: adp-kb-vdb-proxy-controllers
      priorityClassName: system-cluster-critical
      {{- if eq (include "needInitContainer" .) "true" }}
      serviceAccountName: adp-reader
      {{- end }}
      initContainers:
        {{- include "dependencyChecker.initContainer" . | nindent 8 }}
      containers:
        - env:
            - name: DEPLOYMENT_ENVIRONMENT
              value: TKE
            - name: __AppEnname
              value: VectorDBManager
            - name: __ProjectEnname
              value: yunxiaoweipingtai
            - name: __AppGroupEnname
              value: SmartAssistant
            - name: __Env
              value: test-env
            - name: __EnvId
              value: '48486'
            - name: __Region
              value: ap-guangzhou
            - name: __PolarisNamespace
              value: Development
            - name: __DefaultAppMark
              value: 9209_84121_VectorDBManager
            - name: DOCKER_ENV
              value: formal
            - name: APP
              value: SmartAssistant
            - name: SERVER
              value: VectorDBManager
            - name: APP_NAME
              value: SmartAssistant
            - name: SERVER_NAME
              value: vector-db-manager #当前服务配置有写死vector-db-manager名称
            - name: SET_NAME
              value: ..
            - name: IS_GRAY
              value: 'N'
            - name: NAMESPACE
              value: Development
            - name: CONTAINER_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
          image: {{ include "resolveImageUrl" (dict "url" (index .Values.images "adp-kb-vdb-proxy").url "context" .) }}
          imagePullPolicy: Always
          lifecycle:
            preStop:
              exec:
                command:
                  - sleep
                  - '70'
          name: main-container
          #command: ["bash","/usr/local/app/start.sh"]
          # command: ["bash","-c","while true; do sleep 30; done"]
          readinessProbe:
            failureThreshold: 2
            initialDelaySeconds: 40
            periodSeconds: 3
            successThreshold: 1
            timeoutSeconds: 5
            tcpSocket:
              port: 10001
          livenessProbe:
            failureThreshold: 2
            initialDelaySeconds: 10
            periodSeconds: 3
            successThreshold: 1
            tcpSocket:
              port: 10001
            timeoutSeconds: 2
          {{- if eq .Values.global.clusterSize "minimal" }}
          resources:
            limits:
              cpu: "500m"
              memory: "1Gi"
            requests:
              cpu: "125m"
              memory: "512Mi"
          {{- else if eq .Values.global.clusterSize "standard" }}
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
            requests:
              cpu: "500m"
              memory: "512Mi"
          {{- else }}
          resources:
            limits:
              cpu: "2"
              memory: "2Gi"
            requests:
              cpu: "1"
              memory: "1Gi"
          {{- end }}
          securityContext:
            privileged: true
          stdin: true
          tty: true
          volumeMounts:
            - mountPath: /etc/localtime
              mountPropagation: HostToContainer
              name: host-time
            - mountPath: /app/log
              name: applog
              subPathExpr: $(POD_NAME)
            - mountPath: /app/conf/trpc_go.yaml
              name: config
              subPath: trpc_go.yaml
            - mountPath: /app/conf/application.yaml
              name: config
              subPath: application.yaml
            - mountPath: /app/conf/placeholder.yaml
              name: config
              subPath: placeholder.yaml
            - mountPath: /app/conf/vector-db-manager.json
              name: config
              subPath: vector-db-manager.json
            - mountPath: /usr/local/trpc/configmap/vector-db-manager.json #当前服务配置有写死vector-db-manager名称
              name: config
              subPath: vector-db-manager.json
            - mountPath: /app/conf/infrastructure.yaml
              name: infrastructure
              subPath: infrastructure.yaml
      restartPolicy: Always
      securityContext: {}
      terminationGracePeriodSeconds: 80
      volumes:
        {{- include "dependencyChecker.volumes" . | nindent 8 }}
        - name: applog
          hostPath:
            path: /data/ti-platform/log/adp-kb-vdb-proxy
            type: DirectoryOrCreate
        - name: config-trpc
          configMap:
            name: adp-kb-vdb-proxy-trpc
        - name: config
          configMap:
            name: {{ .Release.Name }}-kb-vdb-proxy
        - name: host-time
          hostPath:
            path: /etc/localtime

        - configMap:
            defaultMode: 420
            name: infrastructure
          name: infrastructure
