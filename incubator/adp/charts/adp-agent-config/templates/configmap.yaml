  main.yaml: |
    storage:
      {{ include "qbot.s3_storage" . }}
    experience_center_uin: 100000000
    knowledge_qa_tool:
      tool_name: KnowledgeRetrievalAnswer
      plugin_id: 3ad93aae-587e-4bcc-ae07-ad13bfb1aaca
      tool_id: 0ca8d482-1e77-462b-bc21-807c8f052f69
      tool_id_map: 
        0ca8d482-1e77-462b-bc21-807c8f052f69: KnowledgeRetrievalAnswer
        080bbce6-b02b-466e-a152-967c1546eb05: BoundedKnowledgeQA
        cf5b121f-57d7-47c1-937a-2f9993ec0a63: Text2SQL
    kb_agent:
      agent_id: 27dbdeda-3cbc-461b-8f6e-4ea659f19a93
      handoff_description: 负责 <典型场景> 的知识库问答 Agent，可回答该场景中的相关问题。
    workflow_tool:
      icon_url: "https://${INFRA_MIDDLEWARES_S3_COS_BUCKET}.cos.${INFRA_MIDDLEWARES_S3_COS_REGION}.myqcloud.com/_adp_/qbot/public/workflow-tool.svg"
    agent_config:
      default_starting_agent_handoff_description: 
      default_history_limit: 5
      import_icon_dir: {{ (.Values.global.components.s3.cos).subPath | default "" }}
    clarification:
      widget_configs:
        - widget_id: 3b65b7ac63504c63855caff4ff872ce2
          clarification_widget_type: 1
        - widget_id: f68c478e080749a090e0ebec1b6f4d2d
          clarification_widget_type: 2
        - widget_id: 8da86e24c79f4fb29e5c150fe6636929
          clarification_widget_type: 3
        - widget_id: 2c3e4c2d15464c13a31c35eb5e82f9f6
          clarification_widget_type: 4
    agent_check:
      agent_name_min_len: 1
      agent_name_max_len: 100
      agent_handoff_description_min_len: 0
      agent_handoff_description_max_len: 0
      agent_instructions_min_len: 0
      agent_instructions_max_len: 20000 # 若动态拉取不到模型配置，则启用此处限制
      max_page_size: 200
      default_icon: "/qbot/public/static/lke/agent-robot.png"
      max_icon_size: 524288
      agent_limit: 10 # 同一应用下Agent数量限制
      agent_tool_limit: 50 # 同一应用下Agent工具数量限制
      tool_limit_whitelist: # 主要用于hank效果测试
        "100034812856": 300  
    data_sync_task:
      release_queue_length: 200
      release_items_per_batch: 100

    task_config:
      task_prefix: agent-config-server:task
      task_fetch_num: 400
      task_fetch_timeout: 10s
      task_fetch_period: 2s
      task_max_timeout: 1h
      tasks:
        agent_app_delete:
          runners: 5 #处理协程数，无法动态调整
          retry_wait_time: 1m #重试等待时间
          max_retry: 2 #最大重试次数
          timeout: 5m #超时时间
          fail_timeout: 3s # 失败回调超时
          delay: 0s #启动延迟
          batch:  1
          batch_size: 0
          stopped_resume_time: 720h
    agent_app_delete_config:
      delete_batch_size: 10
      query_batch_size: 10
    pe_config:
      tool_info:
        read_file:
          plugin_id: "3de4a6c6-e055-4d78-9e09-c4410aee79e4"
