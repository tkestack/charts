  placeholder.yaml: |

    COS_TARGET: dns://cos-internal.ap-guangzhou.tencentcos.cn
  trpc_go.yaml: |
    global:
      namespace: Production
    server:
      app: adp
      server: agent-config
      bin_path: /app/bin/
      conf_path: /app/conf/
      log_path: /app/logs/
      admin:
        ip: ${POD_IP}
        port: 8081
        read_timeout: 3000
        write_timeout: 60000
      filter:
        - recovery
        - debuglog
        - i18n-adp
        - cle-route-propagator
        - opentelemetry
        - cos_rewrite
      service:
        - name: trpc.KEP.agent-config-server.AgentConfig
          ip: ${POD_IP}
          port: 8000
          network: tcp
          protocol: trpc
          server_async: true
          idletime: 600000
          filter:
            - session
        - name: trpc.KEP.agent-config-server.AgentConfigApi
          ip: ${POD_IP}
          port: 8001
          network: tcp
          protocol: trpc
          server_async: true
          idletime: 600000
        - name: trpc.KEP.agent-config-server.TimerCheckAgentSchedulerTasks
          ip: ${POD_IP}
          port: 8002
          network: "0 */2 * * * * ?startAtOnce=0&scheduler=redis&holdTime=60"
          protocol: timer
          timeout: 120000
        - name: trpc.KEP.agent-config-server.TimerMarkedInvalidAgentRecords
          ip: ${POD_IP}
          port: 8003
          network: "0 0 2 * * *"
          protocol: timer
          timeout: 600000
        - name: trpc.KEP.agent-config-server.TimerCleanDeletedAgentsMonthly
          ip: ${POD_IP}
          port: 8004
          network: "0 0 3 1 * *"
          protocol: timer
          timeout: 600000
    client:
      filter:
        - debuglog
        - cle-route-propagator
        - opentelemetry
      service:
        - name: redis.plugin-config-server
          target: redis://:${INFRA_MIDDLEWARES_REDIS_0_PASSWORD}@${INFRA_MIDDLEWARES_REDIS_0_HOSTS}:6379/23
        - name: mysql.db_llm_plugin
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_plugin?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: mysql.db_llm_prod_plugin
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_plugin_prod?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: trpc.redis.agent_config
          target: redis://:${INFRA_MIDDLEWARES_REDIS_0_PASSWORD}@${INFRA_MIDDLEWARES_REDIS_0_HOSTS}:6379/25
        - name: trpc.mysql.agent_config
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_plugin?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: trpc.mysql.agent_config_prod
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_plugin_prod?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: mysql.qbot.admin
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: trpc.tcadp.agent.tdsql
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - callee: trpc.KEP.plugin_config_server.PluginConfigApi
