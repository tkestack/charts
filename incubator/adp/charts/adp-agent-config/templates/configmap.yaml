        - callee: trpc.adp.kb_config.Api
          target: ip://adp-kb-config.{{ .Release.Namespace }}.svc.cluster.local:9092
          namespace: Production
          protocol: trpc
          timeout: 60000
        - callee: trpc.adp.resource_gallery.Admin
          namespace: Production
          target: ip://adp-resource-gallery.{{ .Release.Namespace }}.svc.cluster.local:9090
          protocol: trpc
          timeout: 20000
        - callee: trpc.adp.widget_config.WidgetConfigInner
          namespace: Production
          target: ip://adp-widget-config.{{ .Release.Namespace }}.svc.cluster.local:8001
          protocol: trpc
          timeout: 60000
        - callee: trpc.adp.platform_manager.Login
          namespace: Production
          target: ip://adp-platform-manager.{{ .Release.Namespace }}.svc.cluster.local:9091
          protocol: trpc
          timeout: 60000
        - callee: trpc.adp.platform_manager.Admin
          namespace: Production
          target: ip://adp-platform-manager.{{ .Release.Namespace }}.svc.cluster.local:9090
          protocol: trpc
          timeout: 60000
        - callee: trpc.adp.app_config.Admin
          target: ip://adp-app-config.{{ .Release.Namespace }}.svc.cluster.local:9090
          namespace: Production
          protocol: trpc
          timeout: 10000
        - name: trpc.http.cos.Access
          network: tcp
          protocol: http
          target: dns://cos-internal.${INFRA_MIDDLEWARES_S3_COS_REGION}.tencentcos.cn
          timeout: 5000
    plugins:
      telemetry:
        opentelemetry:
          addr: {{ ((.Values.global.observability).apm).otlp | default "" }}
          tenant_id: adp
          sampler:
            fraction: 1
          traces:
            disable_trace_body: false
          metrics:
            {{- if ((.Values.global.observability).apm).registry }}
            registry_endpoints: ["{{ .Values.global.observability.apm.registry}}"]
            {{- end }}
          logs:
            enabled: true
            level: "debug"
            trace_log_mode: "disable"
          {{- if ((.Values.global.observability).apm).attributes }}
          attributes:
            {{- range $key, $value := .Values.global.observability.apm.attributes }}
          - key: {{ $key }}
            value: {{ $value }}
            {{- end }}
          {{- end }}
      log:
        default:
          - writer: console
            level: error
          - writer: file
            level: debug
            writer_config:
              filename: /app/logs/trpc.log
              max_size: 100
              max_backups: 10
              max_age: 7
              compress: false
      config:
        file:
          providers:
            - name: rainbow
              path: /app/conf/
            - name: rainbow-comm
              path: /app/conf/
            - name: global
              appid: ${RAINBOW_APP_ID}  # appid
              group: global # 配置所属组
              type: kv   # 七彩石数据格式, kv(默认), table
              env_name: ${RAINBOW_ENV_NAME}
              timeout: 2000
              enable_client_provider: true
      i18n:
        i18n-adp:
          default_lang: zh-CN
          supported_languages:
            - zh-CN
            - en-US
          data_provider:
            type: rainbow
            prefix: agent-config
            error_prefix: error
            char_scaling_factor:
              zh-CN: 1
              en-US: 3
      registry:
        polaris:
      selector:
        polaris:
          enable_servicerouter: true
      filter:
        cos_rewrite:
          path_prefixes:
            - /public
            - /qbot
