        - name: trpc.kafka.consumer.service.user_stat
          address: ${INFRA_MIDDLEWARES_KAFKA_0_HOSTS}:${INFRA_MIDDLEWARES_KAFKA_0_PORT}?topics=msg_record_binlog&group=bot-data-statistics-msg-user&batch=20&batchFlush=2000
          protocol: kafka
        - name: trpc.kafka.consumer.service.check_task
          address: ${INFRA_MIDDLEWARES_KAFKA_0_HOSTS}:${INFRA_MIDDLEWARES_KAFKA_0_PORT}?topics=t_check_task-formal&group=bot-data-statistics-check-task&batch=50&batchFlush=2000
          protocol: kafka
        - name: trpc.KEP.bot-data-statistics-server.TriggerHistoryTask   #service的路由名称,
          ip: ${POD_IP}   #网卡 ipport配置二选一，主要用于分布式定时器的互斥
          port: 9095   #服务监听端口 可使用占位符 ${port}
          network: 0 * * * * *?holdTime=5     # 该定时器同时在所有机器运行
          protocol: timer   #应用层协议
          timeout: 5000   # 异步处理不会超时
        - name: trpc.KEP.bot-data-statistics-server.TriggerMsgLogCountTask   #service的路由名称,
          ip: ${POD_IP}   #网卡 ipport配置二选一，主要用于分布式定时器的互斥
          port: 9096   #服务监听端口 可使用占位符 ${port}
          network: 5 2-59/5 * * * *?scheduler=statistics&holdTime=240
          protocol: timer   #应用层协议
          timeout: 240000
        - name: trpc.KEP.bot-data-statistics-server.TriggerMsgUserCountTask   #service的路由名称,
          ip: ${POD_IP}   #网卡 ipport配置二选一，主要用于分布式定时器的互斥
          port: 9097   #服务监听端口 可使用占位符 ${port}
          network: 5 2-59/5 * * * *?scheduler=statistics&holdTime=240
          protocol: timer   #应用层协议
          timeout: 240000
        - name: trpc.KEP.bot-data-statistics-server.TriggerMsgFeedbackCountTask   #service的路由名称,
          ip: ${POD_IP}   #网卡 ipport配置二选一，主要用于分布式定时器的互斥
          port: 9098   #服务监听端口 可使用占位符 ${port}
          network: 5 2-59/5 * * * *?scheduler=statistics&holdTime=240
          protocol: timer   #应用层协议
          timeout: 240000
        - name: trpc.KEP.bot-data-statistics-server.TriggerCleanExpiredStaticalData   #service的路由名称,
          ip: ${POD_IP}   #网卡 ipport配置二选一，主要用于分布式定时器的互斥
          port: 9099   #服务监听端口 可使用占位符 ${port}
          network: 0 5 0 * * *?scheduler=statistics&holdTime=3600
          protocol: timer   #应用层协议
          timeout: 3600000
        - name: trpc.KEP.bot-data-statistics-server.TriggerCounterTask   #service的路由名称,
          ip: ${POD_IP}   #网卡 ipport配置二选一，主要用于分布式定时器的互斥
          port: 9105   #服务监听端口 可使用占位符 ${port}
          network: 0 */5 * * * *?scheduler=statistics&holdTime=240
          protocol: timer   #应用层协议
          timeout: 3600000
        - name: trpc.KEP.bot-data-statistics-server.TriggerCleanExpiredContentRecognition   #service的路由名称,
          ip: ${POD_IP}   #网卡 ipport配置二选一，主要用于分布式定时器的互斥
          port: 9101   #服务监听端口 可使用占位符 ${port}
          network: 0 5 0 * * *?scheduler=statistics&holdTime=3600
          protocol: timer   #应用层协议
          timeout: 3600000
        - name: trpc.KEP.bot-data-statistics-server.TriggerCleanExpiredAlarmHistory #service的路由名称,
          ip: ${POD_IP}   #网卡 ipport配置二选一，主要用于分布式定时器的互斥
          port: 9103 #服务监听端口 可使用占位符 ${port}
          network: 0 */30 * * * *?scheduler=statistics&holdTime=120
          protocol: timer #应用层协议
          timeout: 3600000
        - name: trpc.KEP.bot-data-statistics-server.TriggerPrivateMsgRecordEtl #私有化专用，定时 ETL t_msg_record 至 t_msg_log 及 t_msg_daily_user
          ip: localhost #网卡 ipport配置二选一，主要用于分布式定时器的互斥
          port: 9100 #服务监听端口 可使用占位符 ${port}
          network: "0/10 * * * * *?holdTime=5" # 每 10秒触发一次
          protocol: timer #应用层协议
          timeout: 3600000
        - name: trpc.KEP.bot-data-statistics-server.TriggerCleanExpiredScheduleTask #私有化专用，定时清理 t_schedule_task 表
          ip: localhost #网卡 ipport配置二选一，主要用于分布式定时器的互斥
          port: 9101 #服务监听端口 可使用占位符 ${port}
          network: "0 10 0 * * *?scheduler=statistics&holdTime=10" # 每天跑一次
          protocol: timer #应用层协议
          timeout: 10000
        - name: trpc.KEP.bot-data-statistics-server.TriggerCleanMsgLogTask #私有化专用，定时清理 t_msg_log 及 t_msg_daily_user 表数据
          ip: localhost #网卡 ipport配置二选一，主要用于分布式定时器的互斥
          port: 9102 #服务监听端口 可使用占位符 ${port}
          network: "0 20 0 * * *?scheduler=statistics&holdTime=3600" # 每 10秒解发一次
          protocol: timer #应用层协议
          timeout: 3600000
        - name: trpc.KEP.bot-data-statistics-server.TriggerPrivateCheckTaskEtl # 私有化专用, 定时 ETL t_check_task 至 es
          ip: localhost
          port: 9103
          network: "0/10 * * * * *?holdTime=5" # 每 10秒触发一次
          protocol: timer #应用层协议
          timeout: 5000
        - name: trpc.kafka.consumer.platform_metrology.report
          address: ${INFRA_MIDDLEWARES_KAFKA_0_HOSTS}:${INFRA_MIDDLEWARES_KAFKA_0_PORT}?topics=platform_metrology_report&group=bot-data-statistics-report&batch=100&batchFlush=2000
          protocol: kafka
    plugins:                                          #插件配置
      telemetry:
        opentelemetry:
          addr: {{ ((.Values.global.observability).apm).otlp | default "" }}
          tenant_id: adp
          sampler:
            fraction: 1
          traces:
            disable_trace_body: false
          metrics:
            {{- if ((.Values.global.observability).apm).registry }}
            registry_endpoints: ["{{ .Values.global.observability.apm.registry}}"]
            {{- end }}
          logs:
            enabled: true
            level: "debug"
            trace_log_mode: "disable"
          {{- if ((.Values.global.observability).apm).attributes }}
          attributes:
            {{- range $key, $value := .Values.global.observability.apm.attributes }}
          - key: {{ $key }}
            value: {{ $value }}
            {{- end }}
          {{- end }}
      log:                                            #日志配置
        default:                                  #默认日志的配置，可支持多输出
          - writer: console                         #控制台标准输出 默认
            level: info                            #标准输出日志的级别
            formatter: json
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
          - writer: file                            #本地文件日志
            level: info                             #本地文件滚动日志的级别
            formatter: json
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
              stacktrace_key: stackTrace
            writer_config:
              filename: /app/logs/trpc.log  #本地文件滚动日志存放的路径
              write_mode: 2
              roll_type: time
              max_age: 7
              max_backups: 10
              compress: false
              time_unit: day
        clues:
          - writer: console                         #控制台标准输出 默认
            level: info                            #标准输出日志的级别
          - writer: file
            level: info
            formatter: json
            writer_config:
              filename: /app/logs/clues.log
              write_mode: 2
              roll_type: time
              max_age: 7
              max_backups: 10
              compress: false
              time_unit: day
      i18n:
        i18n-adp:
          default_lang: zh-CN
          supported_languages:
            - zh-CN
            - en-US
          data_provider:
            type: rainbow
            prefix: bot-data-statistics-server
            error_prefix: errors
            char_scaling_factor:
              zh: 1
              en: 3
      config:
        file:
          providers:
            - name: rainbow
              path: /app/conf/
            - name: global
              appid: ${RAINBOW_APP_ID}  # appid
              group: global # 配置所属组
              type: kv   # 七彩石数据格式, kv(默认), table
              env_name: ${RAINBOW_ENV_NAME}
              timeout: 2000
              enable_client_provider: true
      registry: #服务注册配置
        polaris: #北极星名字注册服务的配置
          register_self: false
          heartbeat_interval: 3000                    #名字注册服务心跳上报间隔
          heartbeat_timeout: 1000                     #名字服务心跳超时
          service:
            - name: trpc.KEP.bot-data-statistics-server.Api      #service name 与上面的service配置一一对应
              namespace: Test                #环境类型，分正式Production和非正式Development两种类型
              token: e145f79eac6b4eeea2e89983691ccd46               #服务注册所需要的 token
      selector: #针对用户自定义的selector的配置
        polaris: #针对polaris整体api的内部配置
          protocol: grpc                              #名字服务远程交互协议类型
    client:
      namespace: Test
      filter:
        - opentelemetry
      service:
        - name: mysql.data.statistics
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
