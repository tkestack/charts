kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ .Release.Name }}-platform-metrology
  namespace: {{ .Release.Namespace }}
data:
  application.yaml: |
    is_private: ${is_private}
    is_dedicated_cloud: ${is_dedicated_cloud}
    mongo_database: lke-data-statistics
    schedule_task_touch_seconds: 10               # 任务运行时多久 touch 一次
    schedule_task_untouch_tick: 15                # 多少周期没 touch 认为任务超时
    schedule_task_list_unfinish_task_size: 10     # 每批查找未完成任务的数量 默认为 schedule_task_worker_count * 2
    schedule_task_worker_count: 5                 # 任务并行数量， 默认为 cpu 核数 *3
    schedule_task_lookback_seconds: 86400         # 每次定时任务触发时，需要检查过去一段时间内是否有任务遗漏
    clean_statical_expired_period_days: 366       # 清理统计数据时，清理多久前的数据, 默认 366
    clean_schedule_task_expired_period_days: 366  # 清理多久前的任务数据 默认 366
    clean_alarm_history_expired_period_days: 180  # 清理告警历史数据时 默认 30
    clean_msg_log_period_days: 210                # 清理多久前的 t_msg_log 数据， 默认 210
    fetch_msg_record_batch_size: 100              # 每次从 t_msg_record 表中取数据的数量 默认 100
    fetch_msg_record_workers: 10                  # 从 t_msg_record 清洗至 t_msg_log 并发数量 默认 10

    msg_log_to_kafka: ${MSG_LOG_TO_KAFKA}

    es_config:
      name: trpc.elasticsearch.lke.admin
      url: "http://${INFRA_MIDDLEWARES_ES_0_HOSTS}:${INFRA_MIDDLEWARES_ES_0_PORT}"
      user: ${INFRA_MIDDLEWARES_ES_0_USER}
      password: ${INFRA_MIDDLEWARES_ES_0_PASSWORD}
      timeout: 8000
      log:
        enabled: true
        request_enabled: true
        request_body: true
      index_name:
        content_recognition: content_recognition
        content_recognition_stats: content_recognition_stats

    record_trace:
      index_name: chat_procedure_trace
      item_limit: 1000
      max_depth: 3
      flush_interval: 1
      es_config:
        name: trpc.elasticsearch.adp.chat_trace
        url: http://${INFRA_MIDDLEWARES_ES_0_HOSTS}:${INFRA_MIDDLEWARES_ES_0_PORT}
        user: ${INFRA_MIDDLEWARES_ES_0_USER}
        password: ${INFRA_MIDDLEWARES_ES_0_PASSWORD}
        timeout: 8000
        enable_compatibility_mode: false


    storage:
      {{- if eq .Values.global.components.s3.providerType "minio" }}
      type: minio
      min_io_map:
        offline:
          secret_id: ${INFRA_MIDDLEWARES_S3_MINIO_ACCESSKEY}
          secret_key: ${INFRA_MIDDLEWARES_S3_MINIO_SECRETKEY}
          region: ""
          bucket: ${INFRA_MIDDLEWARES_S3_MINIO_BUCKET}
          sts_endpoint: http://{{ printf "minio.%s.svc.cluster.local" .Release.Namespace }}
          end_point: {{ printf "minio.%s.svc.cluster.local" .Release.Namespace }}
          use_https: {{ eq .Values.global.scheme "https" }}
          expire_time: 30m
          credential_time: 10m
        realtime:
          secret_id: ${INFRA_MIDDLEWARES_S3_MINIO_ACCESSKEY}
          secret_key: ${INFRA_MIDDLEWARES_S3_MINIO_SECRETKEY}
          region: ""
          bucket: ${INFRA_MIDDLEWARES_S3_MINIO_BUCKET}
          sts_endpoint: http://{{ printf "minio.%s.svc.cluster.local" .Release.Namespace }}
          end_point: {{ printf "minio.%s.svc.cluster.local" .Release.Namespace }}
          use_https: {{ eq .Values.global.scheme "https" }}
          expire_time: 30m
          credential_time: 10m
      {{- else if eq .Values.global.components.s3.providerType "s3" }}
      type: s3
      s3_map:
        offline:
          secret_id: ${INFRA_MIDDLEWARES_S3_AWS_ACCESSKEY}
          secret_key: ${INFRA_MIDDLEWARES_S3_AWS_SECRETKEY}
          region: ${INFRA_MIDDLEWARES_S3_AWS_REGION}
          bucket: ${INFRA_MIDDLEWARES_S3_AWS_BUCKET}
          endpoint: ${INFRA_MIDDLEWARES_S3_AWS_ENDPOINT}
          expire_time: 30m
          credential_time: 10m
        realtime:
          secret_id: ${INFRA_MIDDLEWARES_S3_AWS_ACCESSKEY}
          secret_key: ${INFRA_MIDDLEWARES_S3_AWS_SECRETKEY}
          region: ${INFRA_MIDDLEWARES_S3_AWS_REGION}
          bucket: ${INFRA_MIDDLEWARES_S3_AWS_BUCKET}
          endpoint: ${INFRA_MIDDLEWARES_S3_AWS_ENDPOINT}
          expire_time: 30m
          credential_time: 10m
      {{- else }}
      type: cos
      cos_map:
        offline:
          secret_id: ${INFRA_MIDDLEWARES_S3_COS_SECRETID}
          secret_key: ${INFRA_MIDDLEWARES_S3_COS_SECRETKEY}
          app_id: ${INFRA_MIDDLEWARES_S3_COS_APPID}
          region: ${INFRA_MIDDLEWARES_S3_COS_REGION}
          bucket: ${INFRA_MIDDLEWARES_S3_COS_BUCKET}
          domain: ${INFRA_MIDDLEWARES_S3_COS_DOMAIN}
          expire_time: 30m
          credential_time: 10m
        realtime:
          secret_id: ${INFRA_MIDDLEWARES_S3_COS_SECRETID}
          secret_key: ${INFRA_MIDDLEWARES_S3_COS_SECRETKEY}
          app_id: ${INFRA_MIDDLEWARES_S3_COS_APPID}
          region: ${INFRA_MIDDLEWARES_S3_COS_REGION}
          bucket: ${INFRA_MIDDLEWARES_S3_COS_BUCKET}
          domain: ${INFRA_MIDDLEWARES_S3_COS_DOMAIN}
          expire_time: 30m
          credential_time: 10m
      {{- end }}
      file_limit:
        offline:
          - type_name: document_200
            types: [pdf,doc,docx,ppt,mhtml,pptx,wps,ppsx,key,pages]
            size: 200
          - type_name: document_20
            types: [xlsx,xls,md,txt,csv,html,json,log,xml,xmind,numbers]
            size: 20
          - type_name: image
            types: [jpg,png,jpeg,tiff,bmp,gif]
            size: 50
          - type_name: zip
            types: [zip]
            size: 5
          - type_name: video
            types: [wmv,3gp,avi,f4v,m4v,mp4,mpg,ogv,vob,mov,flv,mkv,rm,rmvb,mpeg,webm]
            size: 2048
          - type_name: meida_50
            types: [mp3,wav,aac,flac]
            size: 50
        realtime:
          - type_name: document
            types: [doc,docx,ppt,pptx,pdf,txt,xls,xlsx,md] 
            size: 20 
          - type_name: document_md
            types: [md,csv,json] 
            size: 20
          - type_name: image
            types: [jpg,png,jpeg,bmp,webp]
            size: 20
          - type: video
            types: [mp4,mkv,avi,mov,wmv]
            size: 100
          - type: media
            types: [mp3,wav,pcm,m4a,arm,aac,flac]
            size: 100
          - type_name: zip
            types: [zip]
            size: 100
            security_white_list:
              700000306554: 2160h
              700001861322: 2160h
              700001617213: 2160h
              700001873366: 720h
              700001046587: 720h
              700001667238: 720h
    task:
      task_prefix: platformMetrology:task
      task_fetch_num: 400
      task_fetch_timeout: 2s
      task_fetch_period: 2s
      tasks:
        export:
          runners: 2 #处理协程数，无法动态调整
          retry_wait_time: 1m #重试等待时间
          max_retry: 10 #最大重试次数
          timeout: 10m #超时时间
          fail_timeout: 3s # 失败回调超时
          delay: 0s #启动延迟
          batch:  3
          batch_size: 0
          stopped_resume_time: 720h
    max_export_count: 100000

    alarm:
      cron_scheduler:
        enabled: true
        cron_expr: "0 */10 * * * *"  
        lock_hold_time: 30s         # 锁持有时间30秒
      max_name_length: 50
      max_expression_count: 10
      max_alarm_history_id: 10000
      wecom_url_reg: "qyapi.weixin.qq.com"
      feishu_url_reg: "open.feishu.cn"
      dingtalk_url_reg: "oapi.dingtalk.com"
      alarm_strategy_handle:
        worker_count: 100
        queue_size: 1000
      sink:
        tencent_sms: 1
        tencent_email: 1
        wecom: 1
        ding_talk: 1
        feishu: 1
        webhook: 1


    tencent_cloud_config:
      sts_endpoint: ${TC_STS_ENDPOINT}
      sts_region: ${TC_STS_REGION}
      sms:
        secret_id: ${TC_SMS_SECRET_ID}
        secret_key: ${TC_SMS_SECRET_KEY}
        service_role: ${TC_SMS_SERVICE_ROLE}
        credential_duration: 30m
        endpoint: ${TC_SMS_ENDPOINT}
        region: ${TC_SMS_REGION}
        uin_map: ${TC_SMS_UIN_MAP}

      ses:
        secret_id: ${TC_SES_SECRET_ID}
        secret_key: ${TC_SES_SECRET_KEY}
        service_role: ${TC_SES_SERVICE_ROLE}
        credential_duration: 30m
        endpoint: ${TC_SES_ENDPOINT}
        region: ${TC_SES_REGION}
        uin_map: ${TC_SES_UIN_MAP}

    data_migration_config:
      tdsql_tables:
        - table_name: t_visitor
          effect_time: "2026-02-05 20:58:00"
    fetch_check_task_batch_size: 10               # 审核任务 ETL 配置 每次从 t_check_task 表中取数据的>数量
    fetch_check_task_workers: 5                    # 审核任务 ETL 配置 从 t_check_task 表中取数据的并发数量
    clean_expired_content_recognition_period_days: 366  # 清理审核数据时，清理多久前的数据

