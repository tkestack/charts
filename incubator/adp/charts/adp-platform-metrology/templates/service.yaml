apiVersion: v1
kind: Service
metadata:
  labels:
    app: {{ .Values.appName }}
  name: {{ .Values.appName }}
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: tcp-8000
      port: 8000
      protocol: TCP
      targetPort: 8000
    - name: tcp-8081
      port: 8081
      protocol: TCP
      targetPort: 8081
    - name: tcp-8001
      port: 8001
      protocol: TCP
      targetPort: 8001
  selector:
    app: {{ .Values.appName }}
  sessionAffinity: None
  type: ClusterIP
