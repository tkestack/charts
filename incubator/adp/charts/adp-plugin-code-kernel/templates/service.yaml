apiVersion: v1
kind: Service
metadata:
  labels:
    app: adp-plugin-code-kernel
  name: adp-plugin-code-kernel
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: adp-plugin-code-kernel-8080
      port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    app: adp-plugin-code-kernel
  sessionAffinity: None
  type: ClusterIP