kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ .Release.Name }}-resource-gallery
  namespace: {{ .Release.Namespace }}
data:
  application.yaml: |
    cache_limit:
      corp_expire: 720h
      staff_expire: 120h
      intent_expire: 120h
      app_expire: 120h
      model_expire: 120h
    tione:
      secret_id: ${TIONE_SECRET_ID}
      secret_key: ${TIONE_SECRET_KEY}
      region: ${TIONE_REGION}
      sts_host: ${TIONE_STS_HOST}
      tione_host: ${TIONE_HOST}
      service_role_name: ADP_QCSLinkedRoleInTIONE
      tione_regions: ${TIONE_REGIONS}
      tione_enable_white: ${TIONE_ENABLE_WHITE}
      tione_white_uin: ${TIONE_WHITE_UIN}
    # 模型广场
    model_hub:
      model_type: llm
      model_params:
        - name: temperature
          max: 2
          min: 0
          default: 0.7
        - name: top_p
          max: 1
          min: 0
          default: 1
        - name: seed
          max: 10000
          min: 0
          default: 1024
        - name: presence_penalty
          max: 2
          min: -2
          default: 0
        - name: frequency_penalty
          max: 2
          min: -2
          default: 0
        - name: repetition_penalty
          max: 2
          min: 1
          default: 1
        - name: max_tokens
          max: 262144
          min: 1
          default: 4096
      model_tags:
        - KeyModelTagOmniModal
      model_properties:
        model_length: 64k
        input_length: 57344
      model_category_to_tags:
        generate: [KeyModelTagTextReasoning,KeyModelTagToolCalling,KeyModelTagOmniModal]
        thought: [KeyModelTagTextReasoning,KeyModelTagToolCalling,KeyModelTagOmniModal]
        standard_thought: [KeyModelTagTextReasoning,KeyModelTagToolCalling,KeyModelTagOmniModal]
        agent_thought: [KeyModelTagTextReasoning,KeyModelTagToolCalling,KeyModelTagOmniModal]
        rewrite: [KeyModelTagTextReasoning,KeyModelTagToolCalling,KeyModelTagOmniModal]
        rerank: [KeyModelTagRerankingModel]
        embedding: [KeyModelTagVectorModel]
        widget: [KeyModelTagTextReasoning]
        openclaw: [KeyModelTagTextReasoning,KeyModelTagToolCalling,KeyModelTagOmniModal]
      embedding_limit:
        enable: true
        max_vector_dimension: 4096
        default_vector_dimension: 1024
      model_finance_free_white: ${MODEL_FINANCE_FREE_WHITE}
      model_reply_format: ${MODEL_REPLY_FORMAT}
      check_models_before_delete: true

    robot_default:
      # 模型模型列表
      app_default_model:
        knowledge_qa: ${APP_DEFAULT_MODEL_KNOWLEDGE_QA}
      # 思考模型模型列表
      app_thought_model:
        standard: ${APP_THOUGHT_MODEL_STANDARD}
        agent: ${APP_THOUGHT_MODEL_AGENT}
      app_rewrite_model: ${APP_REWRITE_MODEL}
      # rerank 和embedding模型
      app_rerank_model: ${APP_RERANK_MODEL}
      app_embedding_model: ${APP_EMBEDDING_MODEL}
      app_widget_model: ${APP_WIDGET_MODEL}
      # fileparse模型
      app_fileparse_model: ${APP_FILEPARSE_MODEL}
      # openclaw使用模型
      app_openclaw_model: ${APP_OPENCLAW_MODEL}
      # 大模型输入框，角色描述，对话历史上下文上限设置
      llm_word_limit: ${LLM_WORD_LIMIT}
      search_model_free: ${SEARCH_MODEL_FREE}
      # 模型对AI通话支持的类型
      llm_support_ai_call: ${LLM_SUPPORT_AI_CALL}
      default_model_config: ${DEFAULT_MODEL_CONFIG}
    # 计费配置
    finance:
      disabled: ${FINANCE_DISABLED}
      search_disabled: ${SEARCH_DISABLED}
    limit_config_info: #限流信息设置
      expire: 4m
      max_unlock_retry: 3
      try_lock_interval: 50ms
      concurrency_key_expire: 1800
    managed_account_ids: ${MANAGED_ACCOUNT_IDS}
    #国内版多语言开关
    language_all_switch: ${LANGUAGE_ALL_SWITCH}
    deep_think_enable_model: ${DEEP_THINK_ENABLE_MODEL}
    permission_app_category:
      - permission_id: lkeRepository
        app_type: knowledge_qa
        name: 知识库问答
        logo: /qbot/public/app-icon-knowledge_qa.png
      - permission_id: lkeSummary
        app_type: summary
        name: 知识摘要
        logo: /qbot/public/app-icon-summary.png
      - permission_id: lkeClassify
        app_type: classify
        name: 标签提取
        logo: /qbot/public/app-icon-classify.png
    cipher_config:
      default_version: 1
      iv: hBb3Ls3edFBzYyrpQzTGSA==
      versions:
        1: Od3J9Ig47ztUpmdqfkRcAqXhqE7dlWHYLOFK/NDA+yU=
        2: 1ofPtcXorwOy8r74H9DYO5ZMxoTFWdTZVf0bxv5zKqQ=
        3: woEahOi+Bo6ejhBm2DqJL9wcVzQmoOx+lEE0DjYAaVo=
    prompt_version:
      max_limit: 50
      max_version: 20
    model_uin_white: ${MODEL_UIN_WHITE}
    quota_model: ${QUOTA_MODEL}
    resource_config: ${RESOURCE_CONFIG}

    openclaw_config:
      default_name: ${OPENCLAW_DEFAULT_NAME}
      icon_url_regex: ${OPENCLAW_ICON_REGEX}
      instance:
        password: ${OPENCLAW_INSTANCE_PASSWORD}
        create_regions: ${OPENCLAW_CREATE_REGIONS}
        region_map: ${OPENCLAW_CREATE_REGION_MAP}
        package_bundle_map: ${OPENCLAW_PACKAGE_BUNDLE_MAP}
      async_config: ${OPENCLAW_CREATE_ASYNC_CONFIG}
      credential:
        secret_id: ""
        secret_key: ""
      model_config: ${OPENCLAW_MODEL_CONFIG}
      channel_config: ${OPENCLAW_CHANNEL_CONFIG}
      skill_required_config: ${SKILL_REQUIRED_CONFIG}
      skill_template_config: ${OPENCLAW_SKILL_TEMPLATE_CONFIG}
      wx_kf: ${OPENCLAW_WX_KF}
      watch_skill_status_max_seconds: 120
      skill_desc_max_length: 100

    api_key_config: ${API_KEY_CONFIG}

    adp_cloud:
      model_list_url: "https://api.adp.cloud.tencent.com/v1/model/list"


