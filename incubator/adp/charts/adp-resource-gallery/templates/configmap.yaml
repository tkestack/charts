      enable_set: N #是否启用set
      full_set_name: "" #set名
      local_ip: ${POD_IP}
      container_name: ${POD_NAME}
    server: #服务端配置
      app: adp #业务的应用名
      server: resource-gallery #进程服务名
      bin_path: /usr/local/trpc/bin/ #二进制可执行文件和框架配置文件所在路径
      conf_path: /usr/local/trpc/conf/ #业务配置文件所在路径
      data_path: /usr/local/trpc/data/ #业务数据文件所在路径
      filter: #针对所有service处理函数前后的拦截器列表
        - recovery
        - opentelemetry
        - i18n-adp
        - cle-route-propagator
      admin:
        ip: ${POD_IP} #admin的ip，配置网卡nic也可以
        port: 8081 #admin的port，必须同时配置这里的ip port才会启动admin
      service: #业务服务提供的service，可以有多个
        - name: trpc.adp.resource_gallery.Login #service的路由名称，格式：`业务领域.功能模块.项目名.Pb定义的服务名`
          ip: ${POD_IP}
          port: 9092 #服务监听端口
          network: tcp #网络监听类型 tcp/udp
          protocol: trpc #应用层协议 trpc/restful
          timeout: 5000 #请求最长处理时间，单位毫秒
          filter:
            - session
            - permission
        - name: trpc.adp.resource_gallery.Admin #service的路由名称，格式：`业务领域.功能模块.项目名.Pb定义的服务名`
          ip: ${POD_IP}
          port: 9090 #服务监听端口
          network: tcp #网络监听类型 tcp/udp
          protocol: trpc #应用层协议 trpc/restful
          timeout: 120000 #请求最长处理时间，单位毫秒
        - name: trpc.adp.resource_gallery.Http #service的路由名称，格式：`业务领域.功能模块.项目名.Pb定义的服务名`
          ip: ${POD_IP}
          port: 9091 #服务监听端口
          network: tcp #网络监听类型 tcp/udp
          protocol: http #应用层协议 trpc/restful
          timeout: 120000 #请求最长处理时间，单位毫秒
        - name: trpc.adp.resource_gallery.OpenClawUnstableTask #service的路由名称
          ip: ${POD_IP}
          port: 9100 #服务监听端口 可使用占位符 ${port}
          # 定时器cron表达式: [second minute hour day month weekday]
          network: ${OPENCLAW_UNSTABLE_TASK_CRON}
          protocol: timer #应用层协议
          timeout: 3600000 #请求最长处理时间，单位毫秒
        - name: trpc.adp.resource_gallery.OpenClawExpireTask #service的路由名称
          ip: ${POD_IP}
          port: 9101 #服务监听端口 可使用占位符 ${port}
          # 定时器cron表达式: [second minute hour day month weekday]
          network: ${OPENCLAW_EXPIRE_TASK_CRON}
          protocol: timer #应用层协议
          timeout: 3600000 #请求最长处理时间，单位毫秒
        - name: trpc.adp.resource_gallery.OpenClawDeleteTask #service的路由名称
          ip: ${POD_IP}
          port: 9102 #服务监听端口 可使用占位符 ${port}
          # 定时器cron表达式: [second minute hour day month weekday]
          network: ${OPENCLAW_DELETE_TASK_CRON}
          protocol: timer #应用层协议
          timeout: 3600000 #请求最长处理时间，单位毫秒
        - name: trpc.adp.resource_gallery.ApiKeyAccessLogCleanTask
          ip: ${POD_IP}
          port: 9104 #服务监听端口 可使用占位符 ${port}
          # 定时器cron表达式: [second minute hour day month weekday]
          network: ${API_KEY_ACCESS_LOG_CLEAN_TASK_CRON}
          protocol: timer #应用层协议
          timeout: 3600000 #请求最长处理时间，单位毫秒
        - name: trpc.adp.resource_gallery.OpenClawSkillConfirmTask #service的路由名称
          ip: ${POD_IP}
          port: 9106 #服务监听端口 可使用占位符 ${port}
          # 定时器cron表达式: [second minute hour day month weekday]
          network: ${OPENCLAW_SKILL_CONFIRM_CRON}
          protocol: timer #应用层协议
          timeout: 3600000 #请求最长处理时间，单位毫秒
    plugins:
      log: #日志配置
        default: #默认日志的配置，可支持多输出
          - writer: console #控制台标准输出 默认
            level: info #标准输出日志的级别
            formatter: json
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
          - writer: file #本地文件日志
            level: debug #本地文件滚动日志的级别
            formatter: json
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
              stacktrace_key: stackTrace
            writer_config:
              filename: /app/logs/trpc.log #本地文件滚动日志存放的路径
              write_mode: 2
              roll_type: time
              max_age: 7
              max_backups: 10
              compress: false
              time_unit: day
        clues:
          - writer: console #控制台标准输出 默认
            level: info #标准输出日志的级别
          - writer: file
            level: info
            formatter: json
            writer_config:
              filename: /app/logs/clues.log
              write_mode: 2
              roll_type: time
              max_age: 7
              max_backups: 10
              compress: false
              time_unit: day
      telemetry:
        opentelemetry:
          addr: {{ ((.Values.global.observability).apm).otlp | default "" }}
          tenant_id: adp
          sampler:
            fraction: 1
          traces:
            disable_trace_body: false
          metrics:
            {{- if ((.Values.global.observability).apm).registry }}
            registry_endpoints: ["{{ .Values.global.observability.apm.registry}}"]
            {{- end }}
          logs:
            enabled: true
            level: "debug"
            trace_log_mode: "disable"
          {{- if ((.Values.global.observability).apm).attributes }}
          attributes:
            {{- range $key, $value := .Values.global.observability.apm.attributes }}
          - key: {{ $key }}
            value: {{ $value }}
            {{- end }}
          {{- end }}
      config:
        file:
          providers:
            - name: rainbow
              path: /app/conf/
            - name: global
              appid: ${RAINBOW_APP_ID} #appid
              group: global #配置所属组
              type: kv #七彩石数据格式, kv(默认), table
              env_name: ${RAINBOW_ENV_NAME}
              timeout: 2000
              enable_client_provider: true
      i18n:
        i18n:
          default_lang: zh-CN
          supported_languages:
            - zh-CN
            - en-US
          data_provider:
            type: rainbow
            prefix: biz
            error_prefix: errors
            char_scaling_factor:
              zh-CN: 1
              en-US: 3
      selector:
        polaris:
          enable_servicerouter: true #注意这里一定要使用true
    client:
      namespace: ${POD_NAMESPACE}
      filter:
        - cle-route-propagator
      service:
        - name: mysql.qbot.admin
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
