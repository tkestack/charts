        "KeyProviderDescGemini": "谷歌提供的Gemini模型",
        "KeyModelDesc_sn-edu-13b": "基于教育领域数据专项训练，适用于英语口语对话练习和教案场景。英语口语陪练场景中，支持教材课后对话练习、对话难度设定、语法分析等能力；教案场景中，支持教案生成、教案润色、教案题目生成。",
        "KeyModelDesc_hunyuan": "万亿级参数规模 MOE-32k 长文模型，具备复杂数学能力，支持 functioncall，在多语言翻译、金融法律医疗等领域应用重点优化。",
        "KeyModelDesc_finance-13b": "基于金融领域数据进行预训练和精调训练，擅长金融领域知识问答，适用于投资知识问答、金融产品问答等应用场景。",
        "KeyModelDesc_medical-6b": "基于医疗领域数据专项强化，擅长医疗领域知识问答，适用于医学实体抽取、医学对话总结、病历撰写等应用场景。",
        "KeyModelDesc_sn-edu-70b": "基于教育领域数据专项训练，适用于对于英语口语对话练习自然度和任务遵循程度、教案生成丰富度的效果表现有需求的场景。",
        "KeyModelDesc_hunyuan-turbo": "采用全新的混合专家模型（MoE）结构，相比混元大模型高级版推理效率更快，效果表现更强。",
        "KeyModelDesc_hunyuan-13B": "采用更优的路由策略，同时缓解了负载均衡和专家趋同的问题， 性价比相对更高，在平衡效果、价格的同时，可对实现对长文本输入的处理。",
        "KeyModelDesc_function-call-pro": "具备任务规划、工具选择调用以及反思纠错能力，能够支持复杂问题的规划与执行。",
        "KeyModelDesc_cs-normal-70b": "针对企业知识问答场景精调训练，擅长多模态知识问答，适合图文表答案关联输出、数学计算、逻辑推理、表格问答等复杂场景有需求的场景。",
        "KeyModelDesc_hunyuan-standard-256K": "采用更优的路由策略，同时缓解了负载均衡和专家趋同的问题。长文方面，大海捞针指标达到99.9%。MOE-256k 在长度和效果上进一步突破，极大的扩展了可输入长度。",
        "KeyModelDesc_hunyuan-role": "混元最新版角色扮演模型，混元官方精调训练推出的角色扮演模型，基于混元模型结合角色扮演场景数据集进行增训，在角色扮演场景具有更好的基础效果。",
        "KeyModelDesc_workflow-pro": "适用于同时配置问答、文档、工作流的场景，意图识别效果更佳，并且支持在角色指令中自定义配置意图。但可能会增加一定的对话耗时。",
        "KeyModelDesc_lke-deepseek-v3-function-call": "DeepSeek-V3模型最新版本，基于创新的混合专家（MoE）架构与多头潜在注意力（MLA）技术，在推理能力、代码生成和中文语义理解三大核心领域实现全面升级。",
        "KeyModelDesc_lke-deepseek-v3-0324": "DeepSeek-V3模型最新版本，基于创新的混合专家（MoE）架构与多头潜在注意力（MLA）技术，在推理能力、代码生成和中文语义理解三大核心领域实现全面升级。",
        "KeyModelDesc_lke-deepseek-r1": "强化学习（RL）驱动的推理模型，在数学、代码和推理任务中与 OpenAI-o1 表现相当。与DeepSeek助手深度思考模式为同款模型",
        "KeyModelDesc_lke-deepseek-r1-0528": "DeepSeek-R1模型最新版，在理解意图、文案生成、编程能力和逻辑推理方面均有显著提升。能更好地理解复杂指令中的约束条件和内在逻辑。支持长时思考，可以胜任更复杂、耗时的任务。",
        "KeyModelDesc_lke-deepseek-v3": "拥有6710 亿参数的混合专家（MoE）语言模型，采用多头潜在注意力（MLA）和 DeepSeekMoE 架构，结合无辅助损失的负载平衡策略，优化推理和训练效率。",
        "KeyModelDesc_lke-deepseek-r1-0528-agent": "DeepSeek-R1模型最新版，在理解意图、文案生成、编程能力和逻辑推理方面均有显著提升。能更好地理解复杂指令中的约束条件和内在逻辑。支持长时思考，可以胜任更复杂、耗时的任务。",
        "KeyModelDesc_lke-deepseek-v3-agent": "DeepSeek-V3模型最新版本，基于创新的混合专家（MoE）架构与多头潜在注意力（MLA）技术，在推理能力、代码生成和中文语义理解三大核心领域实现全面升级。",
        "KeyModelDesc_cs-normal": "针对企业知识问答场景精调训练，擅长多模态知识问答。性价比相对更高，适合需要同时平衡效果、价格的场景。",
        "KeyModelDesc_lke-deepseek-v3.1": "采用混合推理架构，具备更高的思考效率，能在更短时间给出答案。在需要多步推理的复杂搜索测试与多学科专家级难题测试上，性能已大幅提升。",
        "KeyModelDesc_lke-deepseek-v3.1-function-call": "采用混合推理架构，具备更高的思考效率，能在更短时间给出答案。在需要多步推理的复杂搜索测试与多学科专家级难题测试上，性能已大幅提升。",
        "KeyModelDesc_sn-large-multi-language-v0.2.5": "通用向量检索模型",
        "KeyModelDesc_sn-llm-embedding-2b-v0.2.2": "LLM增强向量检索模型，准确率更高，耗时将会有所增加。",
        "KeyModelDesc_sn-reranker-large-v0.4": "通用文本排序模型",
        "KeyModelDesc_sn-llm-reranker-2b-v0.2": "LLM 增强排序模型，准确率更高，耗时将会有所增加。",
        "KeyModelDesc_cs-normal-70b-1.1": "针对企业知识问答场景精调训练，擅长多模态知识问答，适合图文表答案关联输出、数学计算、逻辑推理、表格问答等复杂场景有需求的场景。",
        "KeyModelDesc_hunyuan-turbos": "混元旗舰大模型最新版本，具备更强的思考能力，更优的体验效果",
        "KeyModelDesc_hunyuan-t1": "业内首个超大规模Hybrid-Transformer-Mamba 推理模型，扩展推理能力，超强解码速度，进一步对齐人类偏好。",
