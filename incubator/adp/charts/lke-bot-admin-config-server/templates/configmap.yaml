    summary_prompt_default:
      - requirement: 1
        prompt_name: "对话总结"
        prompt_desc: "按默认的格式对输入的对话进行陈述性总结，适用客服会话小结场景"
        prompt_command: |-
                 根据下面对话，进行摘要
                 {{`.SummaryRequireCommand`}}
                 {{`.Question`}}
      - requirement: 2
        prompt_name: "自定义要求"
        prompt_desc: "自定义要求"
        prompt_command: |-
             根据下面文本内容，进行摘要
             要求：{{`.SummaryRequireCommand`}}
             文本内容：{{`.Question`}}
      - requirement: 3
        prompt_name: "会话摘要"
        prompt_desc: "按默认的格式对输入的对话按照客户诉求”、“客服回应”、“解决情况格式进行总结，适用快速阅读历史会话场景"
        prompt_command: |-
            请基于以下对话生成简短摘要。
            要求1. 简洁精炼，表达流畅  2.包含所有的关键信息  3.对复杂对话能做到有条理总结，要求不超过300字
            {{`.SummaryRequireCommand`}}
            {{`.Question`}}
      - requirement: 4
        prompt_name: "工单摘要"
        prompt_desc: "按默认的格式对输入的对话进行总结和关键信息提炼，适用工单总结场景"
        prompt_command: |-
           根据以下客服和用户之间的对话内容，请对该对话进行工单摘要和重要信息提炼。
           {{`.SummaryRequireCommand`}}
           {{`.Question`}}
      - requirement: 5
        prompt_name: "会议摘要"
        prompt_desc: "基于会议记录，话题要点和待办项"
        prompt_command: |-
           请对以下对话的内容进行总结。要求1.对各个话题进行分段 2.按话题要点生成摘要 3.最后给出待办项。
           {{`.SummaryRequireCommand`}}
           {{`.Question`}}
      - requirement: 6
        prompt_name: "文章概述"
        prompt_desc: "概述文章提纲"
        prompt_command: |-
           请对以下文章内容进行总结。要求总结文章提纲
           {{`.SummaryRequireCommand`}}
           {{`.Question `}}
      - requirement: 7
        prompt_name: "内容标题"
        prompt_desc: "基于输入的内容生成标题"
        prompt_command: |-
           生成下文标题。
           文章内容如下：{{`.SummaryRequireCommand`}} {{`.Question`}}
      - requirement: 8
        prompt_name: "笔记总结"
        prompt_desc: "基于文章总结笔记内容，包括标题、要点及关键信息"
        prompt_command: |-
           写一篇下面文章的笔记总结，要求包含标题内容，要点信息，关键时间和数字，总结中每句话必须要完整。
           文章内容如下：{{`.SummaryRequireCommand`}} {{`.Question`}}
      - requirement: 9
        prompt_name: "新闻摘要"
        prompt_desc: "基于新闻内容，总结中心思想"
        prompt_command: |-
           你是一个新闻工作者，需要给以下文章撰写摘要。要求包含新闻的中心思想，阐明时间、事件和关键信息，摘要长度限制在200字。
           文章内容如下：{{`.SummaryRequireCommand`}} {{`.Question`}}
