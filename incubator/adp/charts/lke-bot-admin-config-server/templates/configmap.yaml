  trpc_go.yaml: |
    global:
      local_ip: ${POD_IP}
      container_name: ${POD_NAME}
    server:
      app: KEP
      server: bot-admin-config-server
      bin_path: /usr/local/trpc/bin/
      conf_path: /usr/local/trpc/conf/
      data_path: /usr/local/trpc/data/
      filter:
        - recovery
        - i18n-adp
        - tpstelemetry
        - validation
        - accesslog
        - cle-route-propagator
      admin:
        ip: ${POD_IP}
        port: 8081
      service:
        - name: trpc.KEP.bot-admin-config-server.Admin
          ip: ${POD_IP}
          port: 9090 # 服务监听端口
          network: tcp # 网络监听类型 tcp/udp
          protocol: trpc # 应用层协议 trpc/restful
          timeout: 120000 # 请求最长处理时间，单位毫秒
          filter:
            - session
            - permission
        - name: trpc.KEP.bot-admin-config-server.Login
          ip: ${POD_IP}
          port: 9091
          network: tcp
          protocol: trpc
          timeout: 3000
        - name: trpc.KEP.bot-admin-config-server.Api
          ip: ${POD_IP}
          port: 9092
          network: tcp
          protocol: trpc
          timeout: 10000
        - name: trpc.KEP.bot-admin-config-server.UpdateCharSizeTask
          ip: ${POD_IP}
          port: 9095
          network: "0 15 6 * * *?scheduler=UpdateCharSizeTask&holdTime=5"
          protocol: timer
          timeout: 600000
        - name: trpc.KEP.bot-admin-config-server.AppUsageTask
          ip: ${POD_IP}
          port: 9096
          network: "0 */2 * * * *"
          protocol: timer
          timeout: 3600000
        - name: trpc.KEP.bot-admin-config-server.CacheModelPromptLimitTask
          ip: ${POD_IP}
          port: 9097
          network: "0 0 6 * * *?startAtOnce=1"
          protocol: timer
          timeout: 3600000
        - name: trpc.KEP.bot-admin-config-server.ClearAppRescourceTask
          ip: ${POD_IP}
          port: 9098
          network: "*/10 * * * * *?startAtOnce=0&scheduler=ClearAppRescourceTask&holdTime=5"
          protocol: timer
          timeout: 3600000
        - name: trpc.KEP.bot-admin-config-server.UpdateQpmTpmTask
          ip: ${POD_IP}
          port: 9099
          network: "0 * * * * *?startAtOnce=1&scheduler=UpdateQpmTpmTask&holdTime=5"
          protocol: timer
          timeout: 3600000
        - name: trpc.KEP.bot-admin-config-server.ClearRealtimeAppResourceTask
          ip: ${POD_IP}
          port: 9100
          network: "0 10 0 * * *?startAtOnce=0&scheduler=ClearRealtimeAppResourceTask&holdTime=5"
          protocol: timer
          timeout: 18000000
        - name: trpc.kafka.statistics.consumer.service
          address: ${INFRA_MIDDLEWARES_KAFKA_0_HOSTS}:${INFRA_MIDDLEWARES_KAFKA_0_PORT}?topics=adp_event_report_prod&group=event_report_consumer&batch=10&batchFlush=1000
          protocol: kafka
          timeout: 600000
    plugins:
      log:
        default:
          - writer: console                           #控制台标准输出 默认
            level: debug                              #标准输出日志的级别
            formatter: json
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
          - writer: file                              #本地文件日志
            level: debug                               #本地文件滚动日志的级别
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
              stacktrace_key: stackTrace
            writer_config:
              filename: /app/logs/trpc.log    #本地文件滚动日志存放的路径
              write_mode: 2
              max_size: 10                              #本地文件滚动日志的大小 单位 MB
              max_backups: 10                           #最大日志文件数
              max_age: 7                                #最大日志保留天数
              compress:  false
      telemetry:
        opentelemetry:
          addr: {{ ((.Values.global.observability).apm).otlp | default "" }}
          tenant_id: adp
          sampler:
            fraction: 1
          traces:
            disable_trace_body: false
          metrics:
            {{- if ((.Values.global.observability).apm).registry }}
            registry_endpoints: ["{{ .Values.global.observability.apm.registry}}"]
            {{- end }}
          logs:
            enabled: true
            level: "debug"
            trace_log_mode: "disable"
          {{- if ((.Values.global.observability).apm).attributes }}
          attributes:
            {{- range $key, $value := .Values.global.observability.apm.attributes }}
          - key: {{ $key }}
            value: {{ $value }}
            {{- end }}
          {{- end }}
      config:
        file:
          providers:
            - name: rainbow
              path: /app/conf/
            - name: global
              appid: ${RAINBOW_APP_ID}
              group: global
              type: kv
              env_name: ${RAINBOW_ENV_NAME}
              timeout: 2000
              enable_client_provider: true
      selector:
        polaris:
          enable_servicerouter: true
          enable_trans_meta: true
      i18n:
        i18n-adp:
          default_lang: zh-CN
          supported_languages:
            - zh-CN
            - en-US
          data_provider:
