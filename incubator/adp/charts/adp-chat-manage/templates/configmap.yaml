          timeout: 800
        - name: apex.router
          target: ip://apex-router-cmlb-8083-0.{{ .Release.Namespace }}.svc.cluster.local:8083
          namespace: Production
          timeout: 10000
        - callee: trpc.SmartAssistant.LLMManagerServer.Chat
          name: trpc.SmartAssistant.LLMManagerServer.Chat
