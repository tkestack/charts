  trpc_go.yaml: |
    global:
      env_name: formal
      namespace: Production
      enable_set: false         #是否启用set
      full_set_name: adp   #set名
      local_ip: ${POD_IP}
      container_name: ${POD_NAME}
    server:
      app: adp
      server: chat-manage
      conf_path: /data/app/conf/
      admin:
        ip: ${POD_IP}
        port: 8081
      filter:
        - recovery
        - accesslog
        - debuglog
        - validation
        - cle-route-propagator
        - i18n-adp    # 在recovery filter之后引用，避免filter里的错误覆盖掉i18n错误
        - opentelemetry
      service:
        - name: qbot.qbot.chat.Chat
          ip: ${POD_IP}
          port: 9090
          network: tcp
          protocol: trpc
          timeout: 10000
        - name: trpc.KEP.bot-chat-server.chat
          ip: ${POD_IP}
          port: 9091
          network: tcp
          protocol: trpc
          timeout: 30000
        - name: qbot.qbot.chat.ChatHttp
          ip: ${POD_IP}
          port: 9099                                                         # 服务监听端口 可使用占位符 ${port}
          network: tcp                                                       # 网络监听类型  tcp udp
          protocol: http                                                     # 应用层协议 trpc http
        - name: qbot.chat.chat.DeleteRealtimeDoc        # 分布式定时器
          ip: ${POD_IP}                              #服务监听ip地址 可使用占位符 ${ip},ip和nic二选一，优先ip
          port: 9001                  #服务监听端口 可使用占位符 ${port}
          network: 0 */29 * * * * ?startAtOnce=0&scheduler=redis&holdTime=5       # 使用redis分布式锁"
          protocol: timer                 #应用层协议 trpc http
          timeout: 600000                 # 请求最长处理时间 单位 毫秒
        - name: qbot.chat.chat.LoadPromptVersionFromDB        # 本地定时器
          ip: ${POD_IP}                              #服务监听ip地址 可使用占位符 ${ip},ip和nic二选一，优先ip
          port: 9002                  #服务监听端口 可使用占位符 ${port}
          network: 0 */2 * * * * ?startAtOnce=1       # 启动立马执行
          protocol: timer                 #应用层协议 trpc http
          timeout: 600000                 # 请求最长处理时间 单位 毫秒
        - name: qbot.chat.chat.UpdateRobotKeywords        # 分布式定时器
          ip: ${POD_IP}                              #服务监听ip地址 可使用占位符 ${ip},ip和nic二选一，优先ip
          port: 9003                  #服务监听端口 可使用占位符 ${port}
          network: 0 */1 * * * * ?startAtOnce=0&scheduler=redis&holdTime=5       # 使用redis分布式锁"
          protocol: timer                 #应用层协议 trpc http
          timeout: 600000                 # 请求最长处理时间 单位 毫秒
        - name: qbot.chat.chat.ClearMsgRecord        # 分布式定时器，清理消息记录表
          ip: ${POD_IP}                              #服务监听ip地址 可使用占位符 ${ip},ip和nic二选一，优先ip
          port: 9005                  #服务监听端口 可使用占位符 ${port}
          network: 0 0/5 2 * * *?startAtOnce=0&scheduler=redis&holdTime=5       # 使用redis分布式锁"每天的 2:00 - 2:55 时间段，每隔 3 分钟执行一次
          protocol: timer                 #应用层协议 trpc http
          timeout: 1200000                 # 请求最长处理时间 单位 毫秒
        - name: qbot.chat.chat.ClearMsgRecordBySession        # 分布式定时器，清理消息记录表
          ip: ${POD_IP}                              #服务监听ip地址 可使用占位符 ${ip},ip和nic二选一，优先ip
          port: 9007                  #服务监听端口 可使用占位符 ${port}
          network: 0 */5 * * * * ?startAtOnce=1       # 使用redis分布式锁"每隔 2 分钟执行一次
          protocol: timer                 #应用层协议 trpc http
          timeout: 60000                 # 请求最长处理时间 单位 毫秒   
    plugins:
      telemetry:
        opentelemetry:
          addr: {{ ((.Values.global.observability).apm).otlp | default "" }}
          tenant_id: adp
          sampler:
            fraction: 1
          traces:
            disable_trace_body: false
          metrics:
            {{- if ((.Values.global.observability).apm).registry }}
            registry_endpoints: ["{{ .Values.global.observability.apm.registry}}"]
            {{- end }}
          logs:
            enabled: true
            level: "debug"
            trace_log_mode: "disable"
          {{- if ((.Values.global.observability).apm).attributes }}
          attributes:
            {{- range $key, $value := .Values.global.observability.apm.attributes }}
          - key: {{ $key }}
            value: {{ $value }}
            {{- end }}
          {{- end }}
      config:
        file:
          providers:
            - name: rainbow
              path: /app/conf/
            - name: rainbow-comm
              path: /app/
            - name: apex
              path: /app/conf/
            - name: global
              appid: ${RAINBOW_APP_ID}  # appid
              group: global # 配置所属组
              type: kv   # 七彩石数据格式, kv(默认), table
              env_name: ${RAINBOW_ENV_NAME}
              timeout: 2000
              enable_client_provider: true
      log:
        default:                                  #默认日志的配置，可支持多输出
          - writer: console                         #控制台标准输出 默认
            level: info                            #标准输出日志的级别
            formatter: json
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
          - writer: file                            #本地文件日志
            level: info                             #本地文件滚动日志的级别
            formatter: json
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
              stacktrace_key: stackTrace
            writer_config:
              filename: /app/logs/trpc.log  #本地文件滚动日志存放的路径
              write_mode: 2
              roll_type: time
              max_age: 7
              max_backups: 10
              compress: false
              time_unit: day
        clues:
          - writer: console                         #控制台标准输出 默认
            level: info                            #标准输出日志的级别
          - writer: file
            level: info
            formatter: json
            writer_config:
              filename: /app/logs/clues.log
              write_mode: 2
              roll_type: time
              max_age: 7
              max_backups: 10
              compress: false
              time_unit: day
      selector:
        polaris:
          protocal: grpc
          discovery:
            refresh_interval: 10000
          enable_servicerouter: true
          enable_trans_meta: true
      i18n:
        i18n-adp:
          default_lang: zh-CN
          supported_languages:
            - zh-CN
            - en-US
          data_provider:
            type: rainbow
            prefix: chat
            error_prefix: error
            char_scaling_factor:
              zh: 1
              en: 3
    client:
      namespace: Production
      filter:
        - opentelemetry
        - cle-route-propagator
        - chat-trace
      service:
        - name: mysql.qbot.qbot
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: tdsql.qbot.qbot
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: trpc.mysql.adp.prompt
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: redis.qbot.qbot
          network: tcp
          protocol: redis
          target: ip://${INFRA_MIDDLEWARES_REDIS_0_HOSTS}:6379
          password: ${INFRA_MIDDLEWARES_REDIS_0_PASSWORD}
          timeout: 2000
        - name: redis.lke.limiter
