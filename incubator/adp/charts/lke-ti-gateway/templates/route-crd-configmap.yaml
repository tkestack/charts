    def register_ti(exist_route, global_reg):
        # register upstream info to gateway
        all_failed_upstream = {}
        all_failed_route = {}
        gateway_register = GatewayReigster(
            global_reg,
            args.gateway_address,
            args.crd_gateway_address,
            args.upstream_cover,
            args.route_cover,
            exist_route,
            args.api_key,
        )
        (
            is_ok,
            upstream_dict,
            failed_upstream_dict,
            failed_route_dict,
        ) = gateway_register.register_upstreams()
        if not is_ok:
            logging.error(
                "register upstream to gateway failed, upstream_name:{}".format(
                    args.upstream_name
                )
            )
            return

        for key, value in failed_upstream_dict.items():
            if key not in all_failed_upstream.keys():
                all_failed_upstream[key] = value

        for key, value in failed_route_dict.items():
            if key not in all_failed_route.keys():
                all_failed_route[key] = value

        # register route info to gateway
        count = 0
        if args.module_name == "all":
            for _, value in global_reg.get_module_name().items():
                is_ok, count, cur_failed_route_dict = gateway_register.register_routes(
                    value, upstream_dict, count
                )
                if not is_ok:
                    logging.error(
                        "register route to gateway failed, module_name:{}".format(value)
                    )
                    return

                for key, value in cur_failed_route_dict.items():
                    if key not in all_failed_route.keys():
                        all_failed_route[key] = value
        else:
            is_ok, count, cur_failed_route_dict = gateway_register.register_routes(
                args.module_name, upstream_dict, count
            )
            if not is_ok:
                logging.error(
                    "register route to gateway failed, module_name:{}".format(
                        args.module_name
                    )
                )
                return
            for key, value in cur_failed_route_dict.items():
                if key not in all_failed_route.keys():
                    all_failed_route[key] = value

        logging.info(
            "failed upstream size:{}, failed route size:{}".format(
                len(all_failed_upstream), len(all_failed_route)
            )
        )

        # register failed upstream
        max_retry = 30
        for key, upstream in failed_upstream_dict.items():
            for i in range(max_retry):
                is_ok = upstream.register_upstream(
                    args.gateway_address, args.crd_gateway_address
                )
                if not is_ok:
                    logging.error(
                        "try to register failed upstream to gateway failed, upstream_id:{}".format(
                            upstream.upstream_id
                        )
                    )
                    time.sleep(0.1)
                else:
                    break

        # register failed route
        for key, route in failed_route_dict.items():
            for i in range(max_retry):
                is_ok = route.register_route(args.gateway_address, args.crd_gateway_address)
                if not is_ok:
                    logging.error(
                        "register route to gateway failed, upstream_id:{}, route_id:{}".format(
                            route.upstream_id, route.route_id
                        )
                    )
                    time.sleep(0.1)
                else:
                    break
        logging.info("finished api register to ti-gateway")


    def register_start(global_reg):
        if args.type == "excel":
            if not os.path.isdir(global_reg.get_csv_directory()):
                os.mkdir(global_reg.get_csv_directory())
            if not prepare_csv_file(args.xls_file, global_reg.get_csv_directory()):
                logging.error("prepare csv file failed, xls-file:{}".format(args.xls_file))
                return
        exist_route = {}
        if args.route_cover:
            exist_route, is_ok = Route.get_all_exist_routes(
                args.gateway_address, args.api_key
            )
            if not is_ok:
                logging.error("get exist routes in gateway failed")
                return
            # print(exist_route)
        register_ti(exist_route, global_reg)


    def main(args):
        # create csv file from excel file, only use in dev
        logging.info("input api_key:{}, API_KEY:{}".format(args.api_key, args.api_key))
        platform = args.platform

        # 增加手动执行对应平台接口注册逻辑
        if platform == "ti":
            logging.info("register ti starting.....")
            register_start(RegisterConstTi())
            return
        if platform == "platform":
            logging.info("register platform starting.....")
            register_start(RegisterConstPlatform())
            return

        # 部署平台 ti | platform
        # 根据调用ti-auth和ti-perm-auth的返回来注册对应的接口
        reg_ti = RegisterConstTi()
        reg_platform = RegisterConstPlatform()
        reg_ti_status, reg_platform_status = status_pending, status_pending
        while True:
            reg_ti_status = register_if_needed(is_ti_register, reg_ti, reg_ti_status)
            reg_platform_status = register_if_needed(is_platform_register, reg_platform, reg_platform_status)

            if reg_ti_status == status_completed and reg_platform_status == status_completed:
                break
            logging.info("waiting for register to ti-gateway, is_ti_register:{}, "
                         "is_platform_register:{}".format(is_ti_register(), is_platform_register()))
            time.sleep(30)


    def register_if_needed(is_registered_func, register_obj, status):
        if is_registered_func() and status == status_pending:
            register_start(register_obj)
            status = status_completed
        return status


    def check_request(url):
        try:
            r = requests.get(url, timeout=5)
            if r.status_code == 200:
                return True
        except requests.exceptions.RequestException as e:
            logging.error("check_request failed, err:{}".format(e))
        return False


    def is_ti_register():
        logging.info("is_ti_register beginning")
        url = "http://ti-auth-web:80/health"
        return check_request(url)


    def is_platform_register():
        logging.info("is_platform_register beginning")
        url = "http://ti-perm-auth:8081/health"
        return check_request(url)


    def compare_upstreams(new_upstream_json, online_upstream_json):
        new_upstream_dict = {}
        online_upstream_dict = {}
        # decode new version upstream
        for new_node_item in new_upstream_json["node"]["nodes"]:
            new_upstream_dict[new_node_item["value"]["id"]] = new_node_item["value"]
        # decode online version upstream
        for online_node_item in online_upstream_json["node"]["nodes"]:
            online_upstream_dict[online_node_item["value"]["id"]] = online_node_item[
                "value"
            ]

        for key, value in online_upstream_dict.items():
            if key not in new_upstream_dict:
                logging.error("key not find in new version, key:{}".format(key))
                continue
            new_value = new_upstream_dict[key]
            # compare every value item
            for v_key in value:
                v_value = value[v_key]
                if v_key not in new_value:
                    logging.error(
                        "value key not find in new version, key:{}, online_value:{}, new_value:{}".format(
                            v_key, value, new_value
                        )
                    )
                    return
                # nodes compares
                if v_key == "nodes":
                    new_nodes = new_value["nodes"]
                    if len(new_nodes) != len(v_value):
                        logging.error(
                            "upstream nodes not the same, key:{}, online_value:{}, new_value:{}".format(
                                v_key, value, new_value
                            )
                        )
                        return
                    for n_key in v_value:
                        n_value = v_value[n_key]
                        if n_key not in new_nodes or n_value != new_nodes[n_key]:
                            logging.error(
                                "upstream nodes not the same, key:{}, online_value:{}, new_value:{}".format(
                                    v_key, value, new_value
                                )
                            )
                            return
                elif v_key in ("update_time", "create_time"):
                    continue
                else:
                    if v_value != new_value[v_key]:
                        logging.error(
                            "upstream nodes not the same, key:{}, online_value:{}, new_value:{}".format(
                                v_key, value, new_value
                            )
                        )
                        return
        return


    def compare_routes(new_route_json, online_route_json):
        new_route_dict = {}
        online_route_dict = {}
        # decode new version route
        for new_node_item in new_route_json["node"]["nodes"]:
            new_route_dict[new_node_item["value"]["id"]] = new_node_item["value"]
        # decode online version route
        for online_node_item in online_route_json["node"]["nodes"]:
            online_route_dict[online_node_item["value"]["id"]] = online_node_item["value"]

        for key, value in online_route_dict.items():
            if key not in new_route_dict:
                logging.error(
                    "key not find in new version, key:{}, online_value:{}".format(
                        key, value
                    )
                )
                continue
            new_value = new_route_dict[key]
            # compare every value item
            for v_key in value:
                v_value = value[v_key]
                if v_key not in new_value:
                    logging.error(
                        "value key not find in new version, key:{}, online_value:{}, new_value:{}".format(
                            v_key, value, new_value
                        )
                    )
                    return
                # vars compares
                if v_key == "vars" or v_key == "uris":
                    tmp_v_value = v_value
                    tmp_new_value = new_value[v_key]
                    if v_key == "vars":
                        tmp_v_value = sorted(tmp_v_value, key=lambda var: var[0])
                        tmp_new_value = sorted(tmp_new_value, key=lambda var: var[0])
                    online_list_key = ""
                    new_list_key = ""
                    for online_vars_item in tmp_v_value:
                        online_list_key = online_list_key + " ".join(online_vars_item) + ";"
                    for new_vars_item in tmp_new_value:
                        new_list_key = new_list_key + " ".join(new_vars_item) + ";"
                    if online_list_key != new_list_key:
                        logging.error(
                            "route nodes not the same, key:{}, online_value:{}, new_value:{}".format(
                                v_key, value, new_value
                            )
                        )
                        return
                elif v_key == "plugins":
                    new_plugins = new_value["plugins"]
                    if len(new_plugins) != len(v_value):
                        logging.error(
                            "route nodes not the same, key:{}, online_value:{}, new_value:{}".format(
                                v_key, value, new_value
                            )
                        )
                        return
                    for n_key in v_value:
                        n_value = v_value[n_key]
                        if n_key not in new_plugins or len(n_value) != len(
                                new_plugins[n_key]
                        ):
                            logging.error(
                                "route nodes not the same, key:{}, online_value:{}, new_value:{}".format(
                                    v_key, value, new_value
                                )
                            )
                            return
                        for p_key in n_value:
                            if (
                                    p_key not in new_plugins[n_key]
                                    or n_value[p_key] != new_plugins[n_key][p_key]
                            ):
                                logging.error(
                                    "route nodes not the same, key:{}, online_value:{}, new_value:{}".format(
                                        v_key, value, new_value
                                    )
                                )
                                return
                elif v_key in ("update_time", "create_time"):
                    continue
                else:
                    if v_value != new_value[v_key]:
                        logging.error(
                            "route nodes not the same, key:{}, online_value:{}, new_value:{}".format(
                                v_key, value, new_value
                            )
                        )
                        return
        return


    def compare_two_version(args):
        if os.path.isfile(args.new_version) and os.path.isfile(args.online_version):
            new_version_json = json.loads(open(args.new_version).read())
            online_version_json = json.loads(open(args.online_version).read())
            # decode every node detail info
            if args.compare_type == "upstream":
                compare_upstreams(new_version_json, online_version_json)
            else:
                compare_routes(new_version_json, online_version_json)
        else:
            logging.error(
                "not exist file, new_version_file:{}, online_version_file:{}".format(
                    args.new_version, args.online_version
                )
            )


