  upstream_route.py: |
    # coding=UTF-8
    import requests
    import json
    import register_const_ti
    import register_const_third_platform
    from register_const_ti import *
    from register_const_third_platform import *
    import os
    import copy
    import importlib

    is_get_cmd = os.getenv("GET_REGISTER_CMD")


    class Upstream:
        def __init__(
                self,
                author,
                service,
                address,
                upstream_id,
                uri_path=None,
                route_id=None,
                api_key=API_KEY,
                scheme="http",
        ):
            self.author = author
            self.service = service
            self.address = address
            self.upstream_id = upstream_id
            self.uri_path = uri_path
            self.route_id = route_id
            self.api_key = api_key
            self.scheme = scheme
            logging.debug(
                "author:{}, service:{}, address:{}, upstream_id:{}, uri_path:{}, route_id:{}, api_key:{}, scheme:{}".format(
                    self.author,
                    self.service,
                    self.address,
                    self.upstream_id,
                    self.uri_path,
                    self.route_id,
                    self.api_key,
                    self.scheme,
                )
            )

        def register_upstream(self, gateway_address, need_cover=False):
            if not need_cover:
                is_exist = self.is_upstream_exist(gateway_address, self.upstream_id)
                if is_exist:
                    logging.error(
                        "the upstream id is already exist, upstream_id:{}".format(
                            self.upstream_id
                        )
                    )
                    return False

            nodes_info = {self.address: 1}
            register_body = {
                "nodes": nodes_info,
                "type": "roundrobin",
                "name": self.service,
                "desc": self.service + " " + self.author,
                "scheme": self.scheme,
            }
            register_uri = (
                    "http://" + gateway_address + UPSTREAM_URI + "/" + str(self.upstream_id)
            )
            header = {"X-API-KEY": self.api_key, "Content-Type": "application/json"}

            if is_get_cmd:
                with open("./upstream_cmd.sh", "a+") as f:
                    register_cmd = (
                            "curl -X PUT "
                            + register_uri
                            + " -d '"
                            + json.dumps(register_body, ensure_ascii=False)
                            + "'"
                            + "\n"
                    )
                    f.write(register_cmd)
                    f.close()
                return True

            rsp = requests.put(
                url=register_uri, headers=header, data=json.dumps(register_body)
            )

            if rsp.status_code >= 400:
                logging.error(
                    "send http register upstream info request error, http_code: {}, upstream_id: {}, gateway_address: {}, "
                    "req:{}, rsp:{}".format(
                        rsp.status_code,
                        self.upstream_id,
                        gateway_address,
                        json.dumps(register_body),
                        rsp.text,
                    )
                )
                return False
            if "action" not in rsp.text or "set" not in rsp.text:
                logging.error(
                    "register upstream failed, rsp:{}, upstream_id:{}".format(rsp.json()),
                    self.upstream_id,
                )
                return False
            return True

        def query_upstream(self, gateway_address, upstream_id, need_all=False):
            query_uri = "http://" + gateway_address + UPSTREAM_URI
            if not need_all:
                query_uri = query_uri + "/" + str(upstream_id)
            header = {"X-API-KEY": self.api_key, "Content-Type": "application/json"}
            rsp = requests.get(url=query_uri, headers=header)
            if rsp.status_code >= 400:
                logging.error(
                    "send http query upstream info request error, http_code:{}, upstream_id:{}, gateway_address:{}, rsp:{}".format(
                        rsp.status_code, upstream_id, gateway_address, rsp.text
                    )
                )
                return ""
            return rsp.text

        def is_upstream_exist(self, gateway_address, upstream_id):
            query_rsp = self.query_upstream(gateway_address, upstream_id)
            if len(query_rsp) < 1:
                return True
            if "action" not in query_rsp:
                return False
            else:
                return True


    class Route:
        def __init__(
                self,
                global_reg,
                desc,
                service,
                upstream_id,
                route_id,
                vars=None,
                uri=None,
                action=None,
                upstream_address=None,
                api_key=API_KEY,
                scheme="http",
                forward_uri=None,
                ex_vars=None,
        ):
            self.desc = desc
            self.global_reg = global_reg
            self.service = str(service)
            self.upstream_id = str(upstream_id)
            self.route_id = str(route_id)
            self.vars = vars
            self.uri = uri
            self.action = action
            self.upstream_address = upstream_address
            self.api_key = api_key
            self.scheme = scheme
            self.redis_passwd = os.getenv("REDIS_PASSWORD")
            self.redis_port = os.getenv("REDIS_PORT")
            self.redis_sentinel = os.getenv("REDIS_SENTINEL")
            self.forward_uri = forward_uri
            self.ex_vars = ex_vars

        @staticmethod
        def create_base_route_body(global_reg, uri, desc, upstream_id, service_name, action=None):
            route_body = {
                "uri": uri,
                "enable_websocket": True,
                "desc": desc,
                "labels": {"interface_type": "ti-platform"},
                "upstream_id": int(upstream_id),
            }
            if global_reg.is_web_service(service_name):
                route_body["labels"] = {"interface_type": "ti-web"}
            plugins_dict = Route.create_route_plugins_by_service(
                global_reg, service_name, action, is_base=True
            )
            if len(plugins_dict) > 0:
                route_body["plugins"] = plugins_dict

            return route_body

        @staticmethod
        def create_crd_base_route_interface(
                global_reg,
                uris,
                desc,
                service_name,
                upstream_address,
                action=None,
                is_base=False,
                scheme="http",
                forward_uri=None,
                ex_vars=None,
        ):
            if not action:
                interface_name = uris[0].lower()
            else:
                interface_name = action.lower()
                if scheme == "grpc":
                    uris.clear()
                    uris = [action]
            # ex_vars 路由需要加后缀区分，避免同一 batch 内 interface_name 重复
            if ex_vars:
                interface_name = interface_name + "-exvars"
            # 从 service_name 中提取版本后缀，加到 interface_name 末尾
            # 确保同一 action 不同版本的路由 interface_name 不冲突
            import re as _re
            _ver_match = _re.search(r'-(\d{4}-\d{2}-\d{2})$', service_name.lower())
            if _ver_match:
                interface_name = interface_name + "-" + _ver_match.group(1)
            service_info = upstream_address.split(":")
            if len(service_info) < 2:
                upstream_address = upstream_address + ":80"
            nodes_info = {upstream_address: TI_DEFAULT_WEIGHT}
            priority = 35
            if ex_vars :
                priority = 110
            # 从 service_name 中去掉版本后缀，用于 upstream name 和 plugins 匹配
            _svc_base = service_name
            _ver_match2 = _re.search(r'-(\d{4}-\d{2}-\d{2})$', _svc_base)
            if _ver_match2:
                _svc_base = _svc_base[:_ver_match2.start()]
            route_detail = {
                "interface_name": interface_name,
                "uris": uris,
                "enable_websocket": True,
                "desc": desc,
                "scheme": scheme,
                "priority": priority,
                "interface_type": "platform",
                "forward_uri": forward_uri,
                "upstream": {
                    "type": "roundrobin",
                    "nodes": nodes_info,
                    "name": _svc_base,
                    "scheme": scheme,
                },
            }

            if global_reg.is_web_service(_svc_base):
                route_detail["interface_type"] = "web"
            plugins_dict = Route.create_route_plugins_by_service(
                global_reg, _svc_base, action, is_base=is_base, scheme=scheme,uris=uris
            )

            if len(plugins_dict) > 0:
                route_detail["plugins"] = plugins_dict
            return route_detail

        @staticmethod
        def create_crd_base_route_body(
                global_reg, uri, desc, service_name, upstream_address, action=None, scheme="http"
        ):
            route_name = service_name.lower()
            if not action:
                route_name = route_name + "-" + uri.lower()
            else:
                route_name = route_name + "-" + action.lower()
            route_name = (
                route_name.replace("/", "-")
                .replace(".", "-")
                .replace("*", "")
                .replace(";", "-")
                .strip("-")
                .strip()
            )
            if len(route_name) > 64:
                route_name = route_name[0:65].strip("-")
            service_infos = upstream_address.split(":")[0].split(".")
            if len(service_infos) < 2:
                logging.error(
                    "upstream address info illegal, service:{}".format(upstream_address)
                )
                return None
            namespace = service_infos[1]

            uris = uri.split(";")
            route_detail = Route.create_crd_base_route_interface(
                global_reg, uris, desc, service_name, upstream_address, action, True, scheme=scheme
            )
            routes = [route_detail]
            route_body = {
                "route_name": route_name,
                "namespace": namespace,
                "action": "update",
                "routes": routes,
            }

            return route_body

        @staticmethod
        def construct_limit_conn_plugin(
                redis_passwd, redis_port, redis_sentinel, conn=25, burst=0, reject_code=503
        ):
            limit_conn_dict = {}
            if not redis_passwd or not redis_port or not redis_sentinel:
                return None
            else:
                host_list = redis_sentinel.lstrip("sentinel://").split(",")
                if len(host_list) > 0:
                    limit_conn_dict["limit-conn"] = {
                        "conn": conn,
                        "burst": burst,
                        "default_conn_delay": 0.1,
                        "rejected_code": reject_code,
                        "key": "route_id",
                        "policy": "redis-sentinel",
                        "redis_sentinel_nodes": host_list,
                        "redis_password": redis_passwd,
                        "redis_sentinel_master_name": "mymaster",
                    }
            return limit_conn_dict

        @staticmethod
        def create_route_plugins_by_service_uri(
                global_reg, service_name, action, is_base=False, scheme="http", uris=None,
        ):
            if uris is None or len(uris) == 0 :
                return None, False
            uri = uris[0]
            service_name = service_name.upper()
            service_name = service_name.replace('-', '_')
            service_name = service_name+"_plugins"

            plugins_module = importlib.import_module("register_const_third_platform")
            if hasattr(plugins_module, service_name):
                print(f"The object '{service_name}' exists in 'my_module'.")
                plugins_dict = getattr(plugins_module, service_name)
                content = plugins_dict.get(uri, {})
                if len(content) > 0:
                    return content, True

            plugins_module = importlib.import_module("register_const_ti")
            if hasattr(plugins_module, service_name):
                plugins_dict = getattr(plugins_module, service_name)
                content = plugins_dict.get(uri, {})
                if len(content) > 0:
                    return content, True
            # TMP_TI_PLUGINS_DICT = copy.deepcopy(global_reg.get_plugin_dict())
            # if service_name == "adp-apex" and action is None and len(uris)>0 and uris[0].startswith("/v1/qbot/chat"):
            #     logging.debug("ti-auth with auth uri")
            #     return TMP_TI_PLUGINS_DICT["noAuthWeb"]
            # # adp-apex同时需要支持前端v1请求和api请求，v1请求时不需要rewrite-ti插件
            # if service_name == "adp-apex" and action is None and len(uris)>0 and uris[0].startswith("/v1"):
            #     logging.debug("ti-auth with auth uri")
            #     return TMP_TI_PLUGINS_DICT["authWeb"]
            return None, False

        @staticmethod
        def create_route_plugins_by_service_name(
                global_reg, service_name, action, is_base=False, scheme="http", uris=None,
        ):
            # base service do not need plugins
            TMP_TI_PLUGINS_DICT = copy.deepcopy(global_reg.get_plugin_dict())
            if "base" in global_reg.get_special_service_dict() and service_name in global_reg.get_special_service_dict()["base"]:
                return {}, True
            # ti-train-data-center exist in upload and service_header set, need deal special
            if service_name == "ti-train-data-center":
                if is_base:
                    return TMP_TI_PLUGINS_DICT["upload"],True
                else:
                    return TMP_TI_PLUGINS_DICT["withAuthor"],True
            # service need plugins, include ingress or normal service
            for key, service_set in global_reg.get_special_service_dict().items():
                if service_name in service_set:
                    logging.debug("key:{}, service_name:{}".format(key, service_name))
                    if key in TMP_TI_PLUGINS_DICT.keys():
                        return TMP_TI_PLUGINS_DICT[key],True
            # no service template find, check no author action
            if (
                    action is not None
                    and len(action) > 0
                    and action in global_reg.get_no_auth_action()
            ):
                logging.debug("no author action:{}".format(action))
                return TMP_TI_PLUGINS_DICT["noAuthor"],True
            if (
                    action is not None
                    and len(action) > 0
                    and action in PLATFORM_LKE_AND_ID_ROUTES_ACTION
            ):
                logging.debug("lke_and_id action:{}".format(action))
                return TMP_TI_PLUGINS_DICT["rewrite-lke-and-request-id"],True
            if scheme == "grpc":
                logging.debug("grpc service action:{}".format(action))
                return TMP_TI_PLUGINS_DICT["grpc"],True
            # ti-auth uri no auth interface
            if (service_name == "ti-auth") and action is None:
                logging.debug("ti-auth no auth uri")
                return TMP_TI_PLUGINS_DICT["noAuthWeb"],True
            return None, False

        @staticmethod
        def create_route_plugins_by_service(
                global_reg, service_name, action, is_base=False, scheme="http", uris=None,
        ):
            TMP_TI_PLUGINS_DICT = copy.deepcopy(global_reg.get_plugin_dict())

            # 1.根据service的uri精确匹配
            dict,hasFind = Route.create_route_plugins_by_service_uri(
                global_reg, service_name, action, is_base, scheme, uris)
            if hasFind :
                return dict

            # 2.跟service的name匹配
            dict,hasFind = Route.create_route_plugins_by_service_name(
                global_reg, service_name, action, is_base, scheme, uris)
            if hasFind :
                return dict

            # 3.默认规则
            return TMP_TI_PLUGINS_DICT["withAuthor"]

        @staticmethod
        def create_crd_route_with_vars(
               global_reg, desc, service_name, upstream_address, vars, action=None, scheme="http", forward_uri=None, ex_vars=None
        ):
            # logging.error("service_name:{}, upstream_address:{}".format(
            # service_name, upstream_address))
            # 从 service_name 中分离版本后缀（格式: adp-apex-2025-11-12）
            # 版本放到 route_name 末尾，保持与 apisix_tool.sh 一致
            service_base = service_name.lower()
            version_suffix = ""
            # service_name 格式为 "service-version"，version 是日期格式如 2025-11-12
            # 在 register_from_xls.py 中通过 line[4] + "-" + line[6] 拼接
            import re
            version_match = re.search(r'-(\d{4}-\d{2}-\d{2})$', service_base)
            if version_match:
                version_suffix = version_match.group(1)
                service_base = service_base[:version_match.start()]

            route_name = service_base
            if action:
                route_name = route_name + "-" + action.lower()

            if ex_vars:
                route_name = route_name + "-" + "exvars"

            # 版本后缀放在末尾
            if version_suffix:
                route_name = route_name + "-" + version_suffix

            route_name = (
                route_name.replace("/", "-")
                .replace(".", "-")
                .replace("*", "")
                .strip("-")
                .strip()
            )
            service_infos = upstream_address.split(":")[0].split(".")
            if len(service_infos) < 2:
                logging.error(
                    "upstream address info illegal, service:{}".format(upstream_address)
                )
                return None
            namespace = service_infos[1]
            # exvars 路由使用 /cgi/capi*，非 exvars 路由使用 /gateway* 支持前端访问
            # arg_action exvars 路由需要同时匹配 /gateway* 和 /cgi/capi*
            if ex_vars:
                is_arg_action = any(v[0] == "arg_action" for v in ex_vars)
                if is_arg_action:
                    uris = ["/gateway*", "/cgi/capi*"]
                else:
                    uris = ["/cgi/capi*"]
            else:
                uris = ["/","/gateway*"]
            route_detail = Route.create_crd_base_route_interface(
                global_reg,
                uris,  
                desc,
                service_name,
                upstream_address,
                action,
                scheme=scheme,
                forward_uri=forward_uri,
                ex_vars=ex_vars,
            )
            if ex_vars:
                route_detail["vars"] = ex_vars
            else:
                route_detail["vars"] = vars
            # 兜底路由（不带 version 条件）降低 priority，避免与带 version 的路由同 priority 导致匹配顺序不确定
            actual_vars = ex_vars if ex_vars else vars
            has_version = any(v[0] in ("http_X-TC-Version", "http_x_tc_version") for v in (actual_vars or []))
            if not has_version:
                if ex_vars:
                    route_detail["priority"] = 100  # exvars 兜底: 110 -> 100
                else:
                    route_detail["priority"] = 20   # header 兜底: 35 -> 20, 必须 > ti-web-static(10) 且 < 精确版本(35)
            routes = [route_detail]
            route_body = {
                "route_name": route_name,
                "namespace": namespace,
                "action": "update",
                "routes": routes,
            }

            return route_body

        @staticmethod
        def create_route_with_vars(global_reg, desc, upstream_id, service_name, vars, action=None):
            route_body = {
                "uris": ["/gateway*", "/api*"],
                "vars": vars,
                "enable_websocket": True,
                "desc": desc,
                "labels": {"interface_type": "ti-platform"},
                "upstream_id": int(upstream_id),
            }

            plugins_dict = Route.create_route_plugins_by_service(global_reg, service_name, action)
            if len(plugins_dict) > 0:
                route_body["plugins"] = plugins_dict
            if service_name in TI_NEED_SERVICE_HEADER:
                route_body["priority"] = 1

            return route_body

        def get_register_address(self, gateway_address, crd_gateway_address):
            if self.service in TI_GATEWAY_UPSTREAM_SERVICE:
                return "http://" + gateway_address + ROUTE_URI + "/" + str(self.route_id)
            else:
                return "http://" + crd_gateway_address + ROUTE_URI

        def register_route(self, gateway_address, crd_gateway_address):
            register_uri = self.get_register_address(gateway_address, crd_gateway_address)
            if not self.vars:
                if self.service in TI_GATEWAY_UPSTREAM_SERVICE:
                    register_body = Route.create_base_route_body(
                        self.global_reg,
                        self.uri.strip(),
                        self.desc,
                        self.upstream_id,
                        self.service.strip(),
                        self.action,
                    )
                else:
                    register_body = Route.create_crd_base_route_body(
                        self.global_reg,
                        self.uri.strip(),
                        self.desc,
                        self.service.strip(),
                        self.upstream_address.strip(),
                        self.action,
                        scheme=self.scheme,
                    )
            else:
                if self.service in TI_GATEWAY_UPSTREAM_SERVICE:
                    register_body = Route.create_route_with_vars(
                        self.global_reg, self.desc, self.upstream_id, self.service, self.vars, self.action
                    )
                else:
                    register_body = Route.create_crd_route_with_vars(
                        self.global_reg,
                        self.desc,
                        self.service.strip(),
                        self.upstream_address.strip(),
                        self.vars,
                        self.action,
                        scheme=self.scheme,
                        forward_uri=self.forward_uri,
                        ex_vars=self.ex_vars,
                    )
            header = {"X-API-KEY": self.api_key, "Content-Type": "application/json"}
            if not register_body:
                return False
            if self.uri and self.uri in TI_NEED_LIMIT_CONN_URI:
                logging.info("add limit conn, uri:{}".format(self.uri))
                limit_conn_dict = Route.construct_limit_conn_plugin(
                    redis_passwd=self.redis_passwd,
                    redis_port=self.redis_port,
                    redis_sentinel=self.redis_sentinel,
                    reject_code=504,
                    conn=25,
                )
                if (
                        register_body["routes"]
                        and register_body["routes"][0]
                        and register_body["routes"][0]["plugins"]
                        and limit_conn_dict
                ):
                    register_body["routes"][0]["plugins"]["limit-conn"] = limit_conn_dict[
                        "limit-conn"
                    ]
            logging.info("req body:{}".format(register_body))

            if is_get_cmd:
                with open("./route_cmd.sh", "a+") as f:
                    register_cmd = (
                            "curl -X PUT "
                            + register_uri
                            + " -d '"
                            + json.dumps(register_body, ensure_ascii=False)
                            + "'"
                            + "\n"
                    )
                    f.write(register_cmd)
                    f.close()
                return True
            rsp = requests.put(
                url=register_uri, headers=header, data=json.dumps(register_body)
            )

            if rsp.status_code >= 400:
                logging.error(
                    "send http register route info request error, http_code: {}, upstream_id: {}, route_id:{}, gateway_address:{}, req:{}, rsp:{}".format(
                        rsp.status_code,
                        self.upstream_id,
                        self.route_id,
                        gateway_address,
                        json.dumps(register_body),
                        rsp.text,
                    )
                )
                return False
            if self.service in TI_GATEWAY_UPSTREAM_SERVICE:
                if "action" not in rsp.text or "set" not in rsp.text:
                    logging.error(
                        "register route failed, rsp:{}, register_body:{}".format(
                            rsp.json(), register_body
                        )
                    )
                    return False
            else:
                if "Ok" not in rsp.text or "Success" not in rsp.text:
                    if "namespaces" in rsp.text and "not found" in rsp.text:
                        if register_body["namespace"] in TI_IGNORE_NAMESPACE:
                            logging.warning(
                                "register route failed, rsp:{}, register_body:{}".format(
                                    rsp.json(), register_body
                                )
                            )
                            return True
                    logging.error(
                        "register route failed, rsp:{}, register_body:{}".format(
                            rsp.json(), register_body
                        )
                    )
                    return False
            return True

        @staticmethod
        def register_route_batch(route_bodies, crd_gateway_address, api_key=API_KEY):
            """批量注册路由：将多个route_body的routes数组合并到一个请求中发送
            route_bodies: list of route_body dict，要求同一route_name和namespace
            返回 (success_count, fail_count, failed_bodies)
            """
            if not route_bodies:
                return 0, 0, []

            # 以第一个body为基础，合并所有routes
            merged_body = {
                "route_name": route_bodies[0]["route_name"],
                "namespace": route_bodies[0]["namespace"],
                "action": route_bodies[0]["action"],
                "routes": [],
            }
            for body in route_bodies:
                merged_body["routes"].extend(body["routes"])

            register_uri = "http://" + crd_gateway_address + ROUTE_URI
            header = {"X-API-KEY": api_key, "Content-Type": "application/json"}

            logging.info("batch register routes, route_name:{}, namespace:{}, routes_count:{}".format(
                merged_body["route_name"], merged_body["namespace"], len(merged_body["routes"])))

            if is_get_cmd:
                with open("./route_cmd.sh", "a+") as f:
                    register_cmd = (
                        "curl -X PUT "
                        + register_uri
                        + " -d '"
                        + json.dumps(merged_body, ensure_ascii=False)
                        + "'"
                        + "\n"
                    )
                    f.write(register_cmd)
                return len(merged_body["routes"]), 0, []

            rsp = requests.put(
                url=register_uri, headers=header, data=json.dumps(merged_body)
            )

            if rsp.status_code >= 400:
                logging.error(
                    "batch register route failed, http_code:{}, route_name:{}, rsp:{}".format(
                        rsp.status_code, merged_body["route_name"], rsp.text
                    )
                )
                return 0, len(merged_body["routes"]), route_bodies

            if "Ok" not in rsp.text or "Success" not in rsp.text:
                if "namespaces" in rsp.text and "not found" in rsp.text:
                    if merged_body["namespace"] in TI_IGNORE_NAMESPACE:
                        logging.warning(
                            "batch register route ignored namespace, rsp:{}, route_name:{}".format(
                                rsp.json(), merged_body["route_name"]
                            )
                        )
                        return len(merged_body["routes"]), 0, []
                logging.error(
                    "batch register route failed, rsp:{}, route_name:{}".format(
                        rsp.json(), merged_body["route_name"]
                    )
                )
                return 0, len(merged_body["routes"]), route_bodies

            return len(merged_body["routes"]), 0, []

        @staticmethod
        def query_routes(gateway_address, route_id, need_all=False, api_key=API_KEY):
            query_uri = "http://" + gateway_address + ROUTE_URI
            if not need_all:
                query_uri = query_uri + "/" + str(route_id)
            header = {"X-API-KEY": api_key, "Content-Type": "application/json"}
            rsp = requests.get(url=query_uri, headers=header)
            if rsp.status_code >= 400:
                logging.error(
                    "send http query upstream info request error, http_code:{}, api_key:{}, route_id:{}, gateway_address:{}, rsp:{}".format(
                        rsp.status_code, api_key, route_id, gateway_address, rsp.text
                    )
                )
                return rsp
            return rsp

        @staticmethod
        def get_all_exist_routes(gateway_address, api_key):
            if is_get_cmd:
                return {}, True
            query_rsp = Route.query_routes(
                gateway_address, route_id=None, need_all=True, api_key=api_key
            )
            exist_routes = {}
            if len(query_rsp.text) < 1:
                logging.error(
                    "get already exist route in gateway failed, gateway_address:{}".format(
                        gateway_address
                    )
                )
                return {}, False
            if "action" not in query_rsp.text or "get" not in query_rsp.text:
                logging.error("query all route failed, rsp:{}".format(query_rsp.text))
                return {}, False
            query_rsp_json = query_rsp.json()
            if "node" in query_rsp_json:
                node = query_rsp_json["node"]
                if "nodes" in node:
                    route_nodes = node["nodes"]
                    for node_item in route_nodes:
                        route_detail = node_item["value"]
                        route_key = ""
                        # construct key for route dict
                        if "vars" in route_detail:
                            for var_item in route_detail["vars"]:
                                route_key = route_key + " ".join(var_item) + ";"
                        elif "uri" in route_detail:
                            route_key = route_detail["uri"]
                        elif "uris" in route_detail:
                            route_key = " ".join(route_detail["uris"])
                        else:
                            logging.error(
                                "unknown routes exist, node info:{}".format(
                                    json.dumps(node_item)
                                )
                            )
                            return {}, False

                        exist_routes[route_key] = {}
                    return exist_routes, True
                else:
                    return {}, False
            return {}, False