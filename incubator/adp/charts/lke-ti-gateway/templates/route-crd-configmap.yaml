  register_from_xls.py: |
    # coding=UTF-8
    import argparse
    import csv
    import os
    import sys
    from termcolor import colored, cprint
    from openpyxl import load_workbook
    import logging
    from pathlib import Path
    from upstream_route import *
    from register_const_ti import *
    from register_const_third_platform import *
    import register_const_third_platform
    import multiprocessing
    import re
    import requests
    from concurrent.futures import ThreadPoolExecutor, as_completed

    __version__ = "0.0.1"

    status_pending = "Pending"
    status_completed = "Completed"


    # global_reg = {}
    class PrepareCSV:
        def __init__(self, xls_file, csv_directory):
            self.xls_file = xls_file
            self.csv_directory = csv_directory

        def load_xls(self):
            self.wb = load_workbook(self.xls_file)
            if not self.wb:
                logging.error("load xls failed")
                return False
            return True

        def prepare_upstream_csv(self):
            for upstream_name in UPSTREAM_ADDR_COLUMN.keys():
                tmp_res = self.write_upstream_csv(upstream_name)
                if not tmp_res:
                    return False
            return True

        def prepare_route_csv(self):
            for module_name in self.wb.sheetnames:
                if module_name not in TI_MODULE_NAME:
                    continue
                tmp_res = self.write_route_csv(module_name)
                if not tmp_res:
                    return False
            return True

        def prepare_csv(self):
            is_ok = self.load_xls()
            if not is_ok:
                return False
            logging.info("load xls file success, xls_file:{}".format(self.xls_file))
            # prepare upstream csv file
            is_ok = self.prepare_upstream_csv()
            if not is_ok:
                return False
            logging.info("prepare upstream csv file success")
            # prepare route csv file
            is_ok = self.prepare_route_csv()
            if not is_ok:
                return False
            logging.info("prepare route csv file success")
            return True

        def write_upstream_csv(self, upstream_name):
            def filter_func(x):
                if (
                        x.column < 3
                        or x.column == UPSTREAM_ADDR_COLUMN[upstream_name]
                        or x.column > 9
                ):
                    return x

            ws = self.wb[SERVICE_SHEET_NAME]
            if not ws:
                logging.error(
                    "upstream sheet not find, sheet name:{}".format(SERVICE_SHEET_NAME)
                )
                return False
            res = self.write_csv(
                ws, self.csv_directory + "upstream_" + upstream_name + ".csv", filter_func
            )
            if not res:
                logging.error(
                    "failed to save upstream csv, upstream_name:{}".format(upstream_name)
                )
                return False
            return True

        def write_route_csv(self, module_name):
            def filter_func(x):
                return x

            ws = self.wb[module_name]
            if not ws:
                return False
            res = self.write_csv(
                ws, self.csv_directory + TI_MODULE_NAME[module_name] + ".csv", filter_func
            )
            if not res:
                logging.error(
                    "failed to save route csv, module_name:{}".format(module_name)
                )
                return False
            return True

        def write_csv(self, ws, filename, filter_func):
            with open(filename, "w", newline="") as f:
                c = csv.writer(f)
                for r in ws.rows:
                    csv_line = list(filter(filter_func, r))
                    values = []
                    for v in csv_line:
                        if (
                                v.data_type == "n"
                                and v.value is not None
                                and int(v.value) == v.value
                        ):
                            values.append(int(v.value))
                        elif type(v).__name__ == "MergedCell":
                            values.append(v.value)
                        elif v.is_date and v.value is not None:
                            values.append(v.value.strftime("%Y-%m-%d"))
                        else:
                            values.append(v.value)
                    c.writerow(v for v in values)
            return True


    class GatewayReigster:
        def __init__(
                self,
                global_reg,
                gateway_host,
                crd_host,
                upstream_cover=True,
                route_cover=True,
                exist_route={},
                api_key=API_KEY,
        ):
            self.global_reg = global_reg
            self.host = gateway_host
            self.crd_host = crd_host
            self.upstream_cover = upstream_cover
            self.route_cover = route_cover
            self.exist_route = exist_route
            self.cur_register_route = {}
            self.api_key = api_key

        def register_upstreams(self):
            upstream_dict = {}
            failed_upstream_dict = {}
            failed_route_dict = {}
            # reader upstream info from csv
            upstream_file = self.global_reg.get_csv_directory() + "upstream_" + self.global_reg.get_upstream_name() + ".csv"
            if not os.path.isfile(upstream_file):
                logging.error("upstream file not exist, file:{}".format(upstream_file))
                return False, upstream_dict, failed_upstream_dict, failed_route_dict
            csv_reader = csv.reader(open(upstream_file))
            upstream_infos = []

            for line in csv_reader:
                if csv_reader.line_num < 2 or len(line[0]) < 1:
                    continue
                logging.debug(line)
                if len(line[3]) < 1:
                    logging.error(
                        "illegal route info, can't register to gateway, {}".format(line)
                    )
                    continue
                if line[2] == "-":
                    logging.warning(
                        "illegal route info, can't register to gateway, {}".format(line)
                    )
                    continue
                if len(line) > 6 and len(line[6]) > 0:
                    cur_upstream = Upstream(
                        author=line[0],
                        service=line[1],
                        address=line[2],
                        upstream_id=line[3],
                        uri_path=line[4],
                        route_id=line[5],
                        api_key=self.api_key,
                        scheme=line[6],
                    )
                else:
                    cur_upstream = Upstream(
                        author=line[0],
                        service=line[1],
                        address=line[2],
                        upstream_id=line[3],
                        uri_path=line[4],
                        route_id=line[5],
                        api_key=self.api_key,
                    )
                if cur_upstream.service in TI_DELETE_UPSTREAM_SERVICE:
                    logging.warning(
                        "delete upstream info, don't need register to gateway, {}".format(
                            line
                        )
                    )
                    continue
                upstream_infos.append(cur_upstream)
                upstream_dict[str(cur_upstream.upstream_id)] = cur_upstream
            route_infos = []
            # register cos upstream to gateway, and prepare need register special route
            for upstream in upstream_infos:
                # only service not in k8s need register upstream
                if upstream.service in TI_GATEWAY_UPSTREAM_SERVICE:
                    is_ok = upstream.register_upstream(self.host, self.upstream_cover)
                    if not is_ok:
                        logging.error(
                            "register upstream to gateway failed, upstream_id:{}".format(
                                upstream.upstream_id
                            )
                        )
                        failed_upstream_dict[str(upstream.upstream_id)] = upstream
                        # return False, upstream_dict
                # need register apisix route crd in k8s
                if len(upstream.route_id) > 0:
                    # check current route is already register in gateway
                    if not self.route_cover:
                        if upstream.uri_path in self.exist_route:
                            logging.error(
                                "try to register same route to gateway, route_info: {}".format(
                                    upstream.uri_path
                                )
                            )
                            continue
                            # return False, upstream_dict
                    # remember have register route info this time, to avoid same route exist in csv file
                    if upstream.uri_path in self.cur_register_route:
                        logging.error(
                            "try to register same route to gateway, route_info: {}, one_csv:{}, other_csv:{}".format(
                                upstream.uri_path,
                                self.global_reg.get_upstream_name(),
                                self.cur_register_route[upstream.uri_path],
                            )
                        )
                        # return False
                        continue
                    else:
                        self.cur_register_route[upstream.uri_path] = self.global_reg.get_upstream_name()
                    desc = upstream.service + " " + upstream.author
                    route_infos.append(
                        Route(
                            self.global_reg,
                            desc=desc,
                            service=upstream.service,
                            upstream_id=upstream.upstream_id,
                            route_id=upstream.route_id,
                            uri=upstream.uri_path,
                            upstream_address=upstream.address,
                            api_key=self.api_key,
                            scheme=upstream.scheme,
                        )
                    )
                    # fileManager UploadPart interface need do special limit(bandwidth, limit-conn)
                    if upstream.service == "ti-file-manager":
                        route_infos.append(
                            Route(
                                self.global_reg,
                                desc=desc,
                                service=upstream.service,
                                upstream_id=upstream.upstream_id,
                                route_id="ti_file_manager_uploadpart",
                                uri="/FileManager/UploadPart*",
                                upstream_address=upstream.address,
                                api_key=self.api_key,
                                scheme=upstream.scheme,
                            )
                        )

            # register apisix route crd in k8s（并发注册）
            def _register_one_route(route):
                return route, route.register_route(self.host, self.crd_host)

            with ThreadPoolExecutor(max_workers=20) as executor:
                futures = {executor.submit(_register_one_route, route): route for route in route_infos}
                for future in as_completed(futures):
                    route, is_ok = future.result()
                    if not is_ok:
                        logging.error(
                            "register route to gateway failed, upstream_id:{}, route_id:{}".format(
                                route.upstream_id, route.route_id
                            )
                        )
                        failed_route_dict[str(route.route_id)] = route
            return True, upstream_dict, failed_upstream_dict, failed_route_dict

        def run_multi(self, route_info, index):
            route = route_info[index]
            is_ok = route.register_route(self.host, self.crd_host)
            logging.warning(
                "start register route, route_service:{}, route_address:{}".format(
                    route.service, route.upstream_address
                )
            )
            if not is_ok:
                logging.error(
                    "register route to gateway failed, upstream_id:{}, route_id:{}".format(
                        route.upstream_id, route.route_id
                    )
                )
                return False
            return True

        def check_route(self, route_csv_file, vars):
            route_key = ""
            for var_item in vars:
                route_key = route_key + " ".join(var_item) + ";"
            # check current route is already register in gateway
            if not self.route_cover:
                if route_key in self.exist_route:
                    logging.error(
                        "try to register same route to gateway, route_info: {}".format(
                            route_key
                        )
                    )
                    return False
            # remember have register route info this time, to avoid same route exist in csv file
            if route_key in self.cur_register_route:
                logging.error(
                    "try to register same route to gateway, route_info: {}, one_csv:{}, other_csv:{}".format(
                        route_key, route_csv_file, self.cur_register_route[route_key]
                    )
                )
                return False
            else:
                self.cur_register_route[route_key] = route_csv_file

        def register_routes(self, route_csv_file, upstream_dict, count):
            # read route info from csv
            failed_route_dict = {}
            route_file = self.global_reg.get_csv_directory() + route_csv_file + ".csv"
            if not os.path.isfile(route_file):
                logging.error("route file not exist, file:{}".format(route_file))
                return False, count

            csv_reader = csv.reader(open(route_file))
            route_infos = []
            for line in csv_reader:
                if csv_reader.line_num < 3 or len(line[0]) < 1:
                    continue
                logging.debug(line)
                if len(line[7]) < 1 or len(line[8]) < 1:
                    logging.error(
                        "illegal route info, can't register to gateway, line:{}".format(
                            line
                        )
                    )
                    continue

                desc = line[1] + " " + line[2] + " " + line[3]
                version = line[6]
                vars = []
                vars.append(["http_X-TC-Action", "==", line[5]])
                # 2023-11-30 为兜底版本，不加 version 条件，前端不带 version 时也能匹配
                if version != "2023-11-30":
                    vars.append(["http_X-TC-Version", "==", version])
                self.global_reg.set_service_header(vars, line[4])
                if self.check_route(route_csv_file, vars) == False:
                    continue

                ex_vars = []
                if len(line) > 12 and line[12]:
                    pattern = r'^(.*?)='
                    match = re.search(pattern, line[12])
                    if match:
                        cmd = match.group(1)
                        ex_vars.append([cmd, "==", line[5]])
                        # 2023-11-30 为兜底版本，不加 version 条件
                        if version != "2023-11-30":
                            ex_vars.append(["http_X-TC-Version", "==", version])
                        if self.check_route(route_csv_file, ex_vars) == False:
                            continue
                else:
                    # CSV 第13列为空时，自动生成 arg_action 匹配的 exvars 路由
                    # 支持前端通过 /gateway?action=xxx 方式访问
                    ex_vars.append(["arg_action", "==", line[5]])
                    if version != "2023-11-30":
                        ex_vars.append(["http_X-TC-Version", "==", version])
                    if self.check_route(route_csv_file, ex_vars) == False:
                        continue
                forward_uri = None
                if len(line) > 11:
                    forward_uri = line[11]

                # arg_action exvars 路由需要 forward_uri 让 rewrite-lke 插件重写 URI
                # 当 CSV 中 forward_uri 为空时，自动设置为 /<action>
                ex_forward_uri = forward_uri
                if not ex_forward_uri and len(ex_vars) > 0:
                    is_arg_action = any(v[0] == "arg_action" for v in ex_vars)
                    if is_arg_action:
                        ex_forward_uri = "/" + line[5]

                # service 名称后拼接版本后缀，确保不同版本的路由名唯一
                service_name = line[4] + "-" + line[6]

                if str(line[7]) in upstream_dict:
                    route_infos.append(
                        Route(
                            self.global_reg,
                            desc,
                            service=service_name,
                            upstream_id=line[7],
                            route_id=line[8],
                            vars=vars,
                            action=line[5],
                            upstream_address=upstream_dict[str(line[7])].address,
                            api_key=self.api_key,
                            scheme=upstream_dict[str(line[7])].scheme,
                            forward_uri=forward_uri,
                        )
                    )
                    if len(ex_vars) > 0:
                        route_infos.append(
                            Route(
                                self.global_reg,
                                desc,
                                service=service_name,
                                upstream_id=line[7],
                                route_id=line[8],
                                vars=vars,
                                action=line[5],
                                upstream_address=upstream_dict[str(line[7])].address,
                                api_key=self.api_key,
                                scheme=upstream_dict[str(line[7])].scheme,
                                forward_uri=ex_forward_uri,
                                ex_vars=ex_vars,
                            )
                        )
                else:
                    if line[4] in TI_DELETE_UPSTREAM_SERVICE:
                        logging.warning(
                            "delete upstream info, don't need register to gateway, {}".format(
                                line
                            )
                        )
                    else:
                        logging.error(
                            "illegal route info, can't register to gateway, line:{}".format(
                                line
                            )
                        )
                    continue

            # 按 route_name 分组，构建批量请求体
            BATCH_SIZE = 50  # 每批最多50条路由，避免单个CRD对象过大
            route_body_groups = {}  # key: (upstream_address, namespace) -> list of (route, route_body)
            gateway_route_infos = []  # 走 apisix admin API 的路由（非CRD）

            for route in route_infos:
                if route.service in TI_GATEWAY_UPSTREAM_SERVICE:
                    gateway_route_infos.append(route)
                    continue
                # 构建 route_body
                if not route.vars:
                    route_body = Route.create_crd_base_route_body(
                        self.global_reg,
                        route.uri.strip(),
                        route.desc,
                        route.service.strip(),
                        route.upstream_address.strip(),
                        route.action,
                        scheme=route.scheme,
                    )
                else:
                    route_body = Route.create_crd_route_with_vars(
                        self.global_reg,
                        route.desc,
                        route.service.strip(),
                        route.upstream_address.strip(),
                        route.vars,
                        route.action,
                        scheme=route.scheme,
                        forward_uri=route.forward_uri,
                        ex_vars=route.ex_vars,
                    )
                if not route_body:
                    continue

                # 按 (upstream_address, namespace) 分组
                namespace = route_body.get("namespace", "")
                group_key = (route.upstream_address.strip(), namespace)
                if group_key not in route_body_groups:
                    route_body_groups[group_key] = []
                route_body_groups[group_key].append((route, route_body))

            # 批量注册 CRD 路由：按分组拆分为多个批次并发发送
            batch_tasks = []  # (merged_body, batch_routes)
            for group_key, items in route_body_groups.items():
                upstream_addr, namespace = group_key
                # 用 upstream service 名生成统一的 CRD route_name
                service_base = upstream_addr.split(":")[0].split(".")[0]
                for batch_idx, i in enumerate(range(0, len(items), BATCH_SIZE)):
                    batch = items[i:i + BATCH_SIZE]
                    # 批次编号后缀，避免单个CRD过大
                    batch_suffix = "-batch-{}".format(batch_idx) if len(items) > BATCH_SIZE else ""
                    merged_body = {
                        "route_name": service_base + batch_suffix,
                        "namespace": namespace,
                        "action": "update",
                        "routes": [],
                    }
                    batch_routes = []
                    seen_interface_names = set()
                    for route, body in batch:
                        for route_item in body.get("routes", []):
                            iname = route_item.get("interface_name", "")
                            if iname in seen_interface_names:
                                logging.warning("skip duplicated interface_name in batch: {}".format(iname))
                                continue
                            seen_interface_names.add(iname)
                            merged_body["routes"].append(route_item)
                        batch_routes.append(route)
                    batch_tasks.append((merged_body, batch_routes))

            def _register_batch(task):
                merged_body, batch_routes = task
                register_uri = "http://" + self.crd_host + ROUTE_URI
                header = {"X-API-KEY": self.api_key, "Content-Type": "application/json"}
                logging.info("batch register routes, route_name:{}, namespace:{}, routes_count:{}".format(
                    merged_body["route_name"], merged_body["namespace"], len(merged_body["routes"])))

                if is_get_cmd:
                    with open("./route_cmd.sh", "a+") as f:
                        register_cmd = (
                            "curl -X PUT "
                            + register_uri
                            + " -d '"
                            + json.dumps(merged_body, ensure_ascii=False)
                            + "'"
                            + "\n"
                        )
                        f.write(register_cmd)
                    return batch_routes, True

                rsp = requests.put(
                    url=register_uri, headers=header, data=json.dumps(merged_body)
                )
                if rsp.status_code >= 400:
                    logging.error(
                        "batch register route failed, http_code:{}, route_name:{}, rsp:{}".format(
                            rsp.status_code, merged_body["route_name"], rsp.text))
                    return batch_routes, False
                if "Ok" not in rsp.text or "Success" not in rsp.text:
                    if "namespaces" in rsp.text and "not found" in rsp.text:
                        if merged_body["namespace"] in TI_IGNORE_NAMESPACE:
                            logging.warning("batch register route ignored namespace, route_name:{}".format(
                                merged_body["route_name"]))
                            return batch_routes, True
                    logging.error("batch register route failed, rsp:{}, route_name:{}".format(
                        rsp.json(), merged_body["route_name"]))
                    return batch_routes, False
                return batch_routes, True

            # 并发发送批量请求（不同分组之间并发，同分组内已合并）
            with ThreadPoolExecutor(max_workers=20) as executor:
                futures = {executor.submit(_register_batch, task): task for task in batch_tasks}
                for future in as_completed(futures):
                    batch_routes, is_ok = future.result()
                    if not is_ok:
                        for route in batch_routes:
                            failed_route_dict[str(route.route_id)] = route
                    count += len(batch_routes)

            # 走 apisix admin API 的路由仍然逐条注册（数量很少）
            for route in gateway_route_infos:
                is_ok = route.register_route(self.host, self.crd_host)
                if not is_ok:
                    logging.error(
                        "register route to gateway failed, upstream_id:{}, route_id:{}".format(
                            route.upstream_id, route.route_id))
                    failed_route_dict[str(route.route_id)] = route
                count += 1

            return True, count, failed_route_dict


    def prepare_csv_file(xls_file, csv_directory):
        if os.path.isfile(xls_file):
            # load xls
            prepare_csv = PrepareCSV(xls_file, csv_directory)
            is_ok = prepare_csv.prepare_csv()
            if not is_ok:
                return False
            logging.info("prepare csv file success, xls_file:{}".format(xls_file))
            return True
        else:
            logging.error("input xls file is not exist, xls_file path:{}".format(xls_file))
            return False


