  trpc_go.yaml: |
    global:
      env_name: test
      namespace: Development
    server:                                            #服务端配置
      app: adp                                        #业务的应用名
      server: kb-retrieval                             #进程服务名
      bin_path: /app/bin/                   #二进制可执行文件和框架配置文件所在路径
      conf_path: /app/conf/                 #业务配置文件所在路径
      data_path: /app/data/                 #业务数据文件所在路径
      admin:
        ip: ${POD_IP}
        port: 8081
        write_timeout: 600000 # ms. 处理的超时时间
      filter:                                          #针对所有service处理函数前后的拦截器列表
        - validation
        - recovery
        - i18n-adp
        - debuglog
        - querylog
        - errorrewrite
        - cle-route-propagator
        - opentelemetry
      service:
        - name: trpc.KEP.bot-retrieval-server.retrieval
          ip: ${POD_IP}
          port: 8000
          network: tcp
          protocol: trpc
          timeout: 20000   # 请求最长处理时间，单位毫秒
        - name: trpc.KEP.bot-retrieval-server.Retrieval
          ip: ${POD_IP}
          port: 9090
          network: tcp
          protocol: trpc
          timeout: 20000   # 请求最长处理时间，单位毫秒
        - name: trpc.KEP.bot-retrieval-server.DirectIndex
          ip: ${POD_IP}
          port: 9091
          network: tcp
          protocol: trpc
          timeout: 20000
        - name: trpc.KEP.bot-retrieval-server.CronCleanData   #service的路由名称,
          ip: ${POD_IP}   # 私有云使用eth0
          port: 9900   #服务监听端口
          network: "0 */10 0-6,20-23 * * *"   # 每10分钟执行一次
          protocol: timer   #应用层协议
          timeout: 480000   # 请求最长处理时间，单位毫秒
    plugins:                                          #插件配置
      error:
        rewrite:
      tracing:
        querylog:
      telemetry:
        opentelemetry:
          addr: {{ ((.Values.global.observability).apm).otlp | default "" }}
          tenant_id: adp
          sampler:
            fraction: 1
          traces:
            disable_trace_body: false
          metrics:
            {{- if ((.Values.global.observability).apm).registry }}
            registry_endpoints: ["{{ .Values.global.observability.apm.registry}}"]
            {{- end }}
          logs:
            enabled: true
            level: "debug"
            trace_log_mode: "disable"
          {{- if ((.Values.global.observability).apm).attributes }}
          attributes:
            {{- range $key, $value := .Values.global.observability.apm.attributes }}
          - key: {{ $key }}
            value: {{ $value }}
            {{- end }}
          {{- end }}
      config:
        file:
          providers:
            - name: rainbow
              path: /app/conf/
            - name: global
              appid: ${RAINBOW_APP_ID}  # appid
              group: global # 配置所属组
              type: kv   # 七彩石数据格式, kv(默认), table
              env_name: ${RAINBOW_ENV_NAME}
              timeout: 2000
              enable_client_provider: true

      log:
        default:                                  #默认日志的配置，可支持多输出
          - writer: console                         #控制台标准输出 默认
            level: info                            #标准输出日志的级别
            formatter: json
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
          - writer: file                            #本地文件日志
            level: info                             #本地文件滚动日志的级别
            formatter: json
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
              stacktrace_key: stackTrace
            writer_config:
              filename: /app/logs/trpc.log  #本地文件滚动日志存放的路径
              write_mode: 2
              roll_type: time
              max_age: 7
              max_backups: 10
              compress: false
              time_unit: day
        clues:
          - writer: console                         #控制台标准输出 默认
            level: info                            #标准输出日志的级别
          - writer: file
            level: info
            formatter: json
            writer_config:
              filename: /app/logs/clues.log
              write_mode: 2
              roll_type: time
              max_age: 7
              max_backups: 10
              compress: false
              time_unit: day

      i18n:
        i18n-adp:                    # [可选]: i18n配置，如未设置，不进行任何翻译
          default_lang: zh-CN    # [可选]: 如未设置，默认为en-US; 如需使用简体中文，需要显式设置为zh-CN
          supported_languages:   # [可选]: 系统支持的语言列表
            - zh-CN
            - en-US
          data_provider:         # [可选]: 多语言数据提供者，如不配置，不进行翻译
            type: rainbow        # [可选]: 多语言数据提供者类型，当前只支持rainbow
            prefix: retrieval         # [可选]: 完整key为{prefix}_{lang}.json。多语言文件key的前缀，与语言后缀拼成完整的key，如 chat_zh-CN.json
            error_prefix: error  # [可选]: 错误码文件前缀，完整可以为{error_prefix}_{lang}.json, 如 error_zh-CN.json
            char_scaling_factor:
              zh: 1
              en: 3
    client:
      namespace: Test
      filter:
        - opentelemetry
        - cle-route-propagator
      service:
        - name: mysql.db_llm_robot
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: mysql.db_text2sql
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: tdsql.db_llm_robot
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: mysql.qbot.admin.delete
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: isearch.tdsql.db_llm_robot
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: tdsql.qbot.graph
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_graph?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: redis.qbot.qbot
          target: ip://${INFRA_MIDDLEWARES_REDIS_0_HOSTS}:6379/1
          password: ${INFRA_MIDDLEWARES_REDIS_0_PASSWORD}
          timeout: 3000
        - name: trpc.SmartAssistant.VectorDBManager.VectorObj
          callee: trpc.smartassistant.vectordbmanager.VectorObj
          target: ip://adp-kb-vdb-proxy.{{ .Release.Namespace }}.svc.cluster.local:10001
          protocol: trpc
          network: tcp
          timeout: 30000
          method:
            DeleteGroup:
              timeout: 10000
            Embedding:
              timeout: 5000
            AddVector:
              timeout: 5000
            CreateGroup:
              timeout: 10000
            DeleteCollection:
              timeout: 10000
        - callee: trpc.KEP.bot_admin_config_server.Api
          namespace: Test
          target: ip://adp-app-admin-proxy.{{ .Release.Namespace }}.svc.cluster.local:9092
          protocol: trpc
          timeout: 20000
        - name: pipeline-flow-detail
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot_history?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: trpc.SmartAssistant.LLMManagerServer.Chat
          target: ip://adp-llm.{{ .Release.Namespace }}.svc.cluster.local:8000
          service_name: trpc.SmartAssistant.LLMManagerServer.Chat
          timeout: 15000
        - name: trpc.adp.ai-gateway.api
          target: ip://adp-ai-gateway.{{ .Release.Namespace }}.svc.cluster.local:9090
          protocol: http
          network: tcp
          timeout: 14000
        - name: trpc.adp.app_config.Admin
          namespace: Test
