apiVersion: v1
kind: Service
metadata:
  labels:
    app: adp-plugin-code-interpret
  name: adp-plugin-code-interpret
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: adp-plugin-code-interpret-8000
      port: 8000
      protocol: TCP
      targetPort: 8000
    - name: adp-plugin-code-interpret-8001
      port: 8001
      protocol: TCP
      targetPort: 8001
    - name: adp-plugin-code-interpret-8081
      port: 8081
      protocol: TCP
      targetPort: 8081
  selector:
    app: adp-plugin-code-interpret
  sessionAffinity: None
  type: ClusterIP