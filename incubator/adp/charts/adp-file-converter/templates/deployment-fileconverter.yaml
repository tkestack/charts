apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-file-converter
  namespace: {{ .Release.Namespace }}
  labels:
    app: adp-file-converter
    app.kubernetes.io/name: adp-file-converter
    {{- if .Values.global.customLabels }}
    {{- range $key, $value := .Values.global.customLabels }}
    {{ $key }}: {{ $value | toString | quote }}
    {{- end }}
    {{- end }}
  {{- if .Values.global.customAnnotations }}
  annotations:
    {{- range $key, $value := .Values.global.customAnnotations }}
    {{ $key }}: {{ $value | toString | quote }}
    {{- end }}
  {{- end }}
spec:
  {{- if eq .Values.global.clusterSize "minimal" }}
  replicas: 1
  {{- else if eq .Values.global.clusterSize "standard" }}
  replicas: 2
  {{- else }}
  replicas: 3
  {{- end }}
  selector:
    matchLabels:
      app: adp-file-converter
  template:
    metadata:
      labels:
        app: adp-file-converter
        {{- if .Values.global.customLabels }}
        {{- range $key, $value := .Values.global.customLabels }}
        {{ $key }}: {{ $value | toString | quote }}
        {{- end }}
        {{- end }}
      {{- if .Values.global.customAnnotations }}
      annotations:
        {{- range $key, $value := .Values.global.customAnnotations }}
        {{ $key }}: {{ $value | toString | quote }}
        {{- end }}
      {{- end }}
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - adp-file-converter
              topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: GPUName
                    operator: DoesNotExist
            - weight: 50
              preference:
                matchExpressions:
                  - key: product
                    operator: In
                    values:
                      - lke
      terminationGracePeriodSeconds: 90
      {{- if eq (include "needInitContainer" .) "true" }}
      serviceAccountName: adp-reader
      {{- end }}
      initContainers:
        {{- include "dependencyChecker.initContainer" . | nindent 8 }}
      containers:
        - env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          image: {{(index .Values.images "adp-file-converter").url}}
          imagePullPolicy: Always
          command: ["bash","-c","/usr/local/bin/start.sh"]
          name: adp-file-converter
          {{- if eq .Values.global.clusterSize "minimal" }}
          resources:
            limits:
              cpu: "500m"
              memory: "1Gi"
            requests:
              cpu: "200m"
              memory: "512Mi"
          {{- else if eq .Values.global.clusterSize "standard" }}
          resources:
            limits:
              cpu: "500m"
              memory: "1Gi"
            requests:
              cpu: "200m"
              memory: "512Mi"
          {{- else }}
          resources:
            limits:
              cpu: "1"
              memory: "2Gi"
            requests:
              cpu: "200m"
              memory: "512Mi"
          {{- end }}
          volumeMounts:
            - mountPath: /adp-file-converter/config.json
              name: config
              subPath: config.json
            - mountPath: /var/lib/onlyoffice
              name: onlyoffice-data
            - mountPath: /app/conf/infrastructure.yaml
              name: infrastructure
              subPath: infrastructure.yaml
      #  - name: fileconvertor-sidecar
      #    image: {{(index .Values.images "adp-file-converter-sidecar").url}}
      #    imagePullPolicy: Always
      #    resources:
      #      limits:
      #        cpu: "500m"
      #        memory: "512Mi"
      #      requests:
      #        cpu: "250m"
      #        memory: "256Mi"
      #    volumeMounts:
      #      - mountPath: /var/lib/onlyoffice
      #        name: onlyoffice-data
      volumes:
        {{- include "dependencyChecker.volumes" . | nindent 8 }}
        - name: config
          configMap:
            defaultMode: 420
            name: {{ .Release.Name }}-file-converter
        - name: onlyoffice-data
          emptyDir: {}

        - configMap:
            defaultMode: 420
            name: infrastructure
          name: infrastructure
