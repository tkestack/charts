{{- if .Values.defrag.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-defrag
  namespace: {{ .Release.Namespace }}
  labels:
    app: etcd
    component: defrag
spec:
  schedule: "{{ .Values.defrag.schedule | default "0 3 * * *" }}"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: etcd
            component: defrag
        spec:
          restartPolicy: Never
          containers:
            - name: etcd-defrag
              image: {{ include "resolveImageUrl" (dict "url" (index .Values.images "etcd").url "context" .) }}
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  ENDPOINTS="http://etcd-0.etcd-headless.{{ .Release.Namespace }}.svc.cluster.local:2379,http://etcd-1.etcd-headless.{{ .Release.Namespace }}.svc.cluster.local:2379,http://etcd-2.etcd-headless.{{ .Release.Namespace }}.svc.cluster.local:2379"

                  echo "[$(date)] Checking etcd status before defrag..."
                  etcdctl endpoint status --endpoints=${ENDPOINTS} -w table

                  echo "[$(date)] Running defrag on each endpoint..."
                  for ep in $(echo ${ENDPOINTS} | tr ',' ' '); do
                    echo "[$(date)] Defragmenting ${ep}..."
                    etcdctl defrag --endpoints=${ep} --command-timeout=120s || echo "WARN: defrag failed for ${ep}"
                    sleep 2
                  done

                  echo "[$(date)] Checking etcd status after defrag..."
                  etcdctl endpoint status --endpoints=${ENDPOINTS} -w table

                  echo "[$(date)] Defrag completed."
{{- end }}
