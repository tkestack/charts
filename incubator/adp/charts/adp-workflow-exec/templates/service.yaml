apiVersion: v1
kind: Service
metadata:
  labels:
    app: adp-workflow-exec
  name: adp-workflow-exec
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: adp-workflow-exec-8000
      port: 8000
      protocol: TCP
      targetPort: 8000
    - name: adp-workflow-exec-8001
      port: 8001
      protocol: TCP
      targetPort: 8001
    - name: adp-workflow-exec-8002
      port: 8002
      protocol: TCP
      targetPort: 8002
    - name: adp-workflow-exec-8081
      port: 8081
      protocol: TCP
      targetPort: 8081
  selector:
    app: adp-workflow-exec
  sessionAffinity: None
  type: ClusterIP