    callback:
      worker_num: 5
      retry_limit: 3
      batch_size: 50
      channel_size: 200
      fetch_interval: 2000
    refresh_data:
      worker_num: 1
      retry_limit: 3
      batch_size: 50
      channel_size: 200
      fetch_interval: 30000
      refresh_data_count: 100000
    auditor_callback_failed:
      worker_num: 1
      retry_limit: 3
      batch_size: 5
      channel_size: 200
      fetch_interval: 120000
      auditor_callback_failed_count: 10000
      audit_timeout: 300
      audit_timeout_tian_yu: 300
      audit_timeout_xin_an: 900
    auditor_failed_tmp_list_uin:
    tianyu_biz_type:
      569: QD_CM
      259: QD_CM
      563: QD_CM
      1228: QD_CM
      851: QD_CM
      1540: QD_CM
      3232: QD_JT
      5038: QD_ZF
      5535: QD_CM
      298: QD_CM
    is_direct: true
    tianyu:
      type: {{ (.Values.global.contentSecurity).type | default "sdk" }}
      disable_image_check: {{ .Values.global.contentSecurity.disableImageCheck }}
      http:
        app_id : {{ .Values.global.contentSecurity.appId }}
        uin: {{ .Values.global.contentSecurity.uin }}
        sub_account_uin: {{ .Values.global.contentSecurity.subUin }}
        tms_url: {{ .Values.global.contentSecurity.tmsUrl | default "" }} 
        ims_url: {{ .Values.global.contentSecurity.imsUrl | default "" }} 
        tms_biz_type: {{ .Values.global.contentSecurity.bizType }}
        ims_biz_type: {{ .Values.global.contentSecurity.bizType }}  
      sdk:
        secret_id: {{ (.Values.global.contentSecurity).secretId | default "" }}
        secret_key: {{ (.Values.global.contentSecurity).secretKey | default "" }}
        biz_type: {{ (.Values.global.contentSecurity).bizType | default "" }}
        region: {{ (.Values.global.contentSecurity).region | default "" }}
        channel_id: 17
        ims_endpoint: {{ if hasKey .Values.global.contentSecurity "imsEndpoint" }}{{ .Values.global.contentSecurity.imsEndpoint }}{{ else }}"ims.internal.tencentcloudapi.com"{{ end }}
        tms_endpoint: {{ if hasKey .Values.global.contentSecurity "tmsEndpoint" }}{{ .Values.global.contentSecurity.tmsEndpoint }}{{ else }}"tms.internal.tencentcloudapi.com"{{ end }}
        ams_endpoint: {{ if hasKey .Values.global.contentSecurity "amsEndpoint" }}{{ .Values.global.contentSecurity.amsEndpoint }}{{ else }}"ams.internal.tencentcloudapi.com"{{ end }}
        vm_endpoint: {{ if hasKey .Values.global.contentSecurity "vmEndpoint" }}{{ .Values.global.contentSecurity.vmEndpoint }}{{ else }}"vm.internal.tencentcloudapi.com"{{ end }}
        callback_url: {{ if hasKey .Values.global.contentSecurity "callbackUrl" }}{{ .Values.global.contentSecurity.callbackUrl }}{{ else }}""{{ end }}
      label_result_type:
        Normal: 100 
        Polity: 20001
        Porn: 20002
        Illegal: 20006
        Abuse: 20007
        Terror: 24001
        Ad: 10001
        Custom: 21000
      suggestion:
        Block: 建议屏蔽
        Review: 建议人工复审
        Pass: 建议通过
      image_sdk_err:
        InvalidParameterValue.EmptyImageContent: 图片内容参数为空。
        InvalidParameterValue.InvalidImageContent: 图片内容错误。
        ResourceUnavailable.InvalidImageContent: 图片资源错误。
        ResourceUnavailable.ImageDownloadError: 图片文件下载失败。
        RequestLimitExceeded: "超过了每秒频率上限"
        ClientError.NetworkError: "网络错误"
    xinan:
      path: /interface/request/json
      sid: 
      appid: 
      password: 
    clear_check_task_interval: 72h

  placeholder.yaml: |
    INFOSEC_REDIS_PORT: 6379
    INFOSEC_REDIS_DB_NUMBER: 2
    INFOSEC_RISKCONTROL_TARGET: dns://riskcontrol.csigssd.tencent.com
    INFOSEC_RISKCONTROL_TIMEOUT: 2000
    INFOSEC_RISKCONTROL_NAMESPACE: Production
    APP_ADMIN_PROXY_API_TARGET: "ip://adp-app-admin-proxy.{{ .Release.Namespace }}.svc.cluster.local:9092"

  trpc_go.yaml: |
    global:
      namespace: Test
      env_name: test
      enable_set: false         #是否启用set
      full_set_name: adp   #set名
      local_ip: ${POD_IP}
      container_name: ${POD_NAME}  
    server:
      app: adp
      server: platform-content-moderation
      admin:
        ip: 0.0.0.0
        port: 8081
      filter:
        - recovery
        - opentelemetry
        - validation
        - accesslog
      service:
        - name: qbot.qbot.infosec.Infosec
          ip: 0.0.0.0
          port: 9090
          network: tcp
          protocol: trpc
          timeout: 10000
        - name: qbot.qbot.infosec.Http
          ip: 0.0.0.0
          port: 9091
          network: tcp
          protocol: http_no_protocol
          timeout: 50000
        - name: qbot.qbot.infosec.GenerateAuditDataDashboardTask
          ip: 0.0.0.0
          port: 9101
          network: "5 10 1 */1 * *"
          protocol: timer #应用层协议
          timeout: 60000000
        - name: qbot.qbot.infosec.ClearCheckDataTask
          ip: 0.0.0.0
          port: 9102
          network: "0 10 0 * * *"
          protocol: timer #应用层协议
          timeout: 60000000


    plugins:
      config:
        file:
          providers:
            - name: rainbow
              path: /app/conf/
            - name: global
              appid: ${RAINBOW_APP_ID}  # appid
              group: global # 配置所属组
              type: kv   # 七彩石数据格式, kv(默认), table
              env_name: ${RAINBOW_ENV_NAME}
              timeout: 2000
              enable_client_provider: true
      telemetry:
        opentelemetry:
          addr: {{ ((.Values.global.observability).apm).otlp | default "" }}
          tenant_id: adp
          sampler:
            fraction: 1
          traces:
            disable_trace_body: false
          metrics:
            {{- if ((.Values.global.observability).apm).registry }}
            registry_endpoints: ["{{ .Values.global.observability.apm.registry}}"]
            {{- end }}
          logs:
            enabled: true
            level: "debug"
            trace_log_mode: "disable"
          {{- if ((.Values.global.observability).apm).attributes }}
          attributes:
            {{- range $key, $value := .Values.global.observability.apm.attributes }}
          - key: {{ $key }}
            value: {{ $value }}
            {{- end }}
          {{- end }}
      log:
        default:
          - writer: console
            level: info
            formatter: json
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
              stacktrace_key: stackTrace
          - writer: file
            level: info
            formatter: json
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
              stacktrace_key: stackTrace
            writer_config:
              filename: /app/logs/trpc.log
              write_mode: 2
              roll_type: time
              max_age: 7
              max_backups: 10
              compress: false
              time_unit: day

    client:
      service:
        - name: mysql.qbot.qbot
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: tdsql.qbot.qbot
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local

        - name: redis.qbot.infosec
          network: tcp
          protocol: redis
          target: ip://${INFRA_MIDDLEWARES_REDIS_0_HOSTS}:6379/2
          password: ${INFRA_MIDDLEWARES_REDIS_0_PASSWORD}
          timeout: 800
        - name: apigw.riskcontrol.csigssd
          network: tcp
          protocol: http2
          target: dns://riskcontrol.csigssd.tencent.com
          timeout: ${INFOSEC_RISKCONTROL_TIMEOUT}
          namespace: ${INFOSEC_RISKCONTROL_NAMESPACE}
        - name: trpc.adp.platform_manager.Admin
          target: ip://adp-platform-manager.{{ .Release.Namespace }}.svc.cluster.local:9090
          namespace: Production
          protocol: trpc
          timeout: 50000
