  trpc_go.yaml: |
    global: #全局配置
      namespace: Test #环境类型，分正式production和非正式development两种类型
      env_name: test #环境名称，非正式环境下多环境的名称
      enable_set: false #是否启用set
      full_set_name: adp #set名
      local_ip: ${POD_IP}
      container_name: ${POD_NAME}
    server: #服务端配置
      app: adp #业务的应用名
      server: rag-exec #进程服务名
      bin_path: /usr/local/trpc/bin/ #二进制可执行文件和框架配置文件所在路径
      conf_path: /data/app/conf/ #业务配置文件所在路径
      data_path: /usr/local/trpc/data/ #业务数据文件所在路径
      filter: #针对所有service处理函数前后的拦截器列表
        - recovery #拦截框架创建的业务处理协程panic
        - cle-route-propagator
        - i18n-adp
        - chat-trace
        - opentelemetry
      admin:
        ip: ${POD_IP}
        port: 8081
      service:
        - name: trpc.KEP.bot-rag-server.rpc
          ip: ${POD_IP}
          port: 8001
          network: tcp
          protocol: trpc
          timeout: 30000 #业务服务提供的service，可以有多个
        - name: trpc.KEP.bot-rag-server.chat #service的路由名称
          ip: ${POD_IP} #服务监听ip地址 可使用占位符 ${ip},ip和nic二选一，优先ip
          port: 8000 #服务监听端口 可使用占位符 ${port}
          network: tcp #网络监听类型 tcp udp
          protocol: http #应用层协议 trpc http
          timeout: 0 #请求最长处理时间 单位 毫秒
          server_async: true #开启异步处理
          idletime: 600000 #idletime，设置tcp空闲等待时间，避免耗时过长的操作导致trpc-go将tcp关闭
        - name: qbot.chat.chat.LoadPromptVersionFromDB #本地定时器
          ip: ${POD_IP} #服务监听ip地址 可使用占位符 ${ip},ip和nic二选一，优先ip
          port: 9001 #服务监听端口 可使用占位符 ${port}
          network: "0 */2 * * * * ?startAtOnce=1" #启动立马执行
          protocol: timer #应用层协议 trpc http
          timeout: 600000 #请求最长处理时间 单位 毫秒
        - name: qbot.chat.chat.GetRejectAnswer #本地定时器
          ip: ${POD_IP} #服务监听ip地址 可使用占位符 ${ip},ip和nic二选一，优先ip
          port: 9002 #服务监听端口 可使用占位符 ${port}
          network: "0 */2 * * * * ?startAtOnce=1" #启动立马执行
          protocol: timer #应用层协议 trpc http
          timeout: 600000
    plugins: #插件配置
      log: #日志配置
        default: #默认日志的配置，可支持多输出
          - writer: console #控制台标准输出 默认
            level: info #标准输出日志的级别
            formatter: json
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
          - writer: file #本地文件日志
            level: info #本地文件滚动日志的级别
            formatter: json
            formatter_config:
              time_cmt: 2006-01-02T15:04:05.999999999Z07:00
              time_key: time
              level_key: level
              name_key: name
              caller_key: caller
              message_key: message
              stacktrace_key: stackTrace
            writer_config:
              filename: /app/logs/trpc.log #本地文件滚动日志存放的路径
              max_size: 200 #本地文件滚动日志的大小 单位 MB
              max_backups: 10 #最大日志文件数
              max_age: 7 #最大日志保留天数
              compress: false #日志文件是否压缩
      telemetry:
        opentelemetry:
          addr: {{ ((.Values.global.observability).apm).otlp | default "" }}
          tenant_id: adp
          sampler:
            fraction: 1
          traces:
            disable_trace_body: false
          metrics:
            {{- if ((.Values.global.observability).apm).registry }}
            registry_endpoints: ["{{ .Values.global.observability.apm.registry}}"]
            {{- end }}
          logs:
            enabled: true
            level: "debug"
            trace_log_mode: "disable"
          {{- if ((.Values.global.observability).apm).attributes }}
          attributes:
            {{- range $key, $value := .Values.global.observability.apm.attributes }}
          - key: {{ $key }}
            value: {{ $value }}
            {{- end }}
          {{- end }}
      config:
        file:
          providers:
            - name: rainbow
              path: /app/conf/
            - name: global
              appid: ${RAINBOW_APP_ID} #appid
              group: global #配置所属组
              type: kv #七彩石数据格式, kv(默认), table
              env_name: ${RAINBOW_ENV_NAME}
              timeout: 2000
              enable_client_provider: true
      i18n:
        i18n-adp:
          default_lang: zh-CN
          supported_languages:
            - zh-CN
            - en-US
          data_provider:
            type: rainbow
            prefix: rag
            error_prefix: error
            char_scaling_factor:
              zh: 1
              en: 3
    client:
      namespace: Test
      filter:
        - opentelemetry
        - cle-route-propagator
        - chat-trace
      service:
        - name: mysql.qbot.qbot
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: tdsql.qbot.qbot
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: mysql.adp.prompt
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: redis.qbot.qbot
          network: tcp
          protocol: redis
          target: ip://${INFRA_MIDDLEWARES_REDIS_0_HOSTS}:6379
          password: "${INFRA_MIDDLEWARES_REDIS_0_PASSWORD}"
          timeout: 800
        - name: redis.lke.limiter
          network: tcp
          protocol: redis
          target: ip://${INFRA_MIDDLEWARES_REDIS_0_HOSTS}:6379/4
          password: "${INFRA_MIDDLEWARES_REDIS_0_PASSWORD}"
          timeout: 800
        - callee: trpc.KEP.bot_knowledge_config_server.Api
          name: trpc.KEP.bot-knowledge-config-server.Api
          target: ip://adp-kb-config.{{ .Release.Namespace }}.svc.cluster.local:9092
          namespace: Test
          protocol: trpc
          timeout: 600000
        - name: qbot.finance.finance.Finance
          namespace: Test
          target: ip://adp-platform-charger.{{ .Release.Namespace }}.svc.cluster.local:9090
          network: tcp
          timeout: 30000
        - name: trpc.KEP.bot-llm-server.llm
          callee: trpc.KEP.bot_llm_server.llm
          namespace: Test
          target: ip://adp-llm.{{ .Release.Namespace }}.svc.cluster.local:8000
          network: tcp
          timeout: 5000
        - callee: trpc.KEP.bot_admin_config_server.Api
          namespace: Test
          target: ip://adp-app-admin-proxy.{{ .Release.Namespace }}.svc.cluster.local:9092
          protocol: trpc
          timeout: 20000
        - callee: trpc.adp.app_admin_proxy.Api
          namespace: Test
          target: ip://adp-app-admin-proxy.{{ .Release.Namespace }}.svc.cluster.local:9092
          protocol: trpc
          timeout: 20000
        - callee: trpc.KEP.bot_workflow_dm_server.WorkflowDm
          name: trpc.KEP.bot-workflow-dm-server.workflow-dm
          namespace: Test
          target: ip://adp-workflow-exec.{{ .Release.Namespace }}.svc.cluster.local:8000
