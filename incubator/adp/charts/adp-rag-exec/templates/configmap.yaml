kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ .Release.Name }}-rag-exec
  namespace: {{ .Release.Namespace }}
data:
  application.yaml: |
    sse:
      data_channel: 1000
    bot:
      timeout: 280
      rejected_reply: 这个问题我不是很清楚，我所提供的答案或建议可能会存在不准确的地方。建议您转到人工，由专业顾问为您提供服务。
      empty_reply: 抱歉，目前我无法提供关于这个问题的答复。为了更好地帮助您，请您尝试提出其他问题或需求。
      summary_reject: 对不起，作为知识库问答应用里的人工智能，我无法帮您总结文档。请告诉我你需要了解的其他信息，我会尽力为你提供帮助。
      multi_intent_reply: 在知识库中找到多个内容可以回答您的问题。请问您是想问哪个问题：
      clarify_confirm_reply: 请描述您的问题
      intent_achievements:
        0 : ["qa","workflow","self_awareness","doc","search_engine","llm","default"]
      rewrite:
        rewrite_threshold: 100
      intent_threshold: 5000
      search_threshold: 5000
      busy_replies:
        1: 抱歉，当前咨询量大，请重新再问我一次。
        4: 当前用量大，会话摘要生成失败。
        5: 当前用量大，会话小结生成失败。
      throttles:
        check: 20
        streaming: 5
      response_channel_size: 1500
      answer_from_knowledge_timeout: 2
      single_message_limit: 5000
      role_description: ${ROLE_DESCRIPTION}
      bot_role_description: ${BOT_ROLE_DESCRIPTION}
      self_awareness_direct_reply_models: ${SELF_AWARENESS_DIRECT_REPLY_MODELS}
      content_limit: 192000
      role_command_regx:
        role_name_regex: "#+\\s*角色名称: (.*)"
        speech_style_regex: "#+\\s*言谈风格:\\n((?:.|\\n)+?)\\n\\n#+\\s*性格特点:"
        personality_regex: "#+\\s*性格特点:\\n((?:.|\\n)+?)\\n\\n#+\\s*经历和背景:"
        experience_regex: "#+\\s*经历和背景:\\n((?:.|\\n)+?)\\n\\n#+\\s*能力限制:"
        capability_limit_regex: "#+\\s*能力限制:\\n(.*?)\\n\\n"
        skills_regex: "(#+\\s*意图\\s*\\d+)：([\\s\\S]*?)(#+\\s*意图描述)：([\\s\\S]*?)(#+\\s*意图实现)：([\\s\\S]*?)#"
      recommend_regex: "\\[推荐问题.*?\\](.*?)\\n"
      placeholder_conf:
        start_placeholders:
          "[" : 25
          "h" : 25
      channel_type_list: [10000,10001,10002,10003,10004,10005,10009]
    unsatisfied_reply:
      context_length:
        above: 15
        below: 15
    reject_answer_judge_length: 20
    space_limiter_account: ${SPACE_USER_ACCOUNT}
    use_placeholder_models: ${USE_PLACEHOLDER_MODELS}
    app:
      knowledge_summary:
    multi_modal:
      model_name_dialog: ${MODEL_NAME_DIALOG}
      only_cos_url: ${ONLY_COS_URL}
      white_list: ${MULTI_MODEL_WHITE_LIST}
      history_limit: 3
      get_caption_prompt: 用200字以内描述这张图片
      get_multi_prompt: 分别用200字以内描述以上图片
      rewrite_prefix: 用户的问题是：
      placeholder: <ut_im##age_here_index>%d</ut_im##age_here_index>
      placeholderv2: "Picture %d: <image>[Picture %d]"
      max_image_count: 20
      one_image_token_length: 1248
      multi_modal_comprehension:
        model_name: ${MLLM_MODEL_NAME}
        white_list: ${MLLM_WHITE_LIST}
      can_use_multi_modal_search: ${CAN_USE_MULTI_MODAL_SEARCH}
    procedure:
      knowledge: 调用知识库
      task_flow: 调用任务流程
      search_engine: 调用搜索引擎
      image: 调用图片理解
      large_language_model: 大模型直接回复
      pot_math: 调用计算器
      file: 阅读文件
      workflow: 调用工作流
      agent: 运行Agent
      model_generate: 大模型生成中
    limiter:
      report_judge_length: 100
    hunyuan_config:
      # 注意这里B是大写 跟其他的不一样
      hunyuan_standard: ${HUNYUAN_CONFIG_HUNYUAN_STANDARD}
      hunyuan_search: ${HUNYUAN_CONFIG_HUNYUAN_SEARCH}
      whitelist: ${HUNYUAN_CONFIG_WHITELIST}
      enable_instruction_list: ${HUNYUAN_CONFIG_ENABLE_INSTRUCTION_LIST}
    workflow_config:
      model_name: {{ .Values.global.RagServer.workflow_config_model_name }}
      close_token_report: ${WORKFLOW_CONFIG_CLOSE_TOKEN_REPORT}
    model:
      prompt_length: ${MODEL_PROMPT_LENGHT}
      white_list: ${MODEL_WHITE_LIST}
      prompt_list: ${MODEL_PROMPT_LIST}
    reference:
      patterns:
        - 【passage (\d+)】
        - \[passage (\d+?)\]
      hunyuan_switch: ${REFERENCE_HUNYUAN_SWITCH}
      hunyuan_patterns:
        - （passage (\d+)）
        - 以上信息来源于【passage (\d+)】(。|和【passage (\d+)】。)
        - \n引用的passage编号：(\d+)
        - \n引用的passage编号是：(\d+)
        - \n\*\*引用passage编号\*\*：\[(\d+)\]
        - \[passage (\d+)\]
        - \n引用的passage编号是：
        - \n引用的passage编号为：
        - \n\*\*引用passage编号：\*\*
    finance:
      default_qpm: ${RAG_DEFAULT_QPM}
      default_tpm: ${RAG_DEFAULT_TPM}
      ds_default_qpm: ${RAG_DS_DEFAULT_QPM}
      ds_default_tpm: ${RAG_DS_DEFAULT_TPM}
      model_config:
        # "TCADP/glm-5":
        #   default_qpm: 10
        #   default_tpm: 20000
        # "TCADP/minimax-m2.5":
        #   default_qpm: 10
        #   default_tpm: 20000
        # "TCADP/kimi-k2.5":
        #   default_qpm: 10
        #   default_tpm: 20000
    clarify_confirm: # 澄清确认、猜你想问白名单
      top_n: ${CLARIFY_CONFIRM_TOP_N}
      white_list: ${CLARIFY_CONFIRM_WHITE_LIST}
    intent_model:
      # 加白是意图中不添加文档
      white_list: ${INTENT_MODEL_WHITE_LIST}
      is_qa_not_first: ${INTENT_MODEL_IS_QA_NOT_FIRST}
      no_faq: ${INTENT_MODEL_NO_FQA}
      system_intent:
        -1: 其他问题
        1: 指令跟随回答
        2: 代码问题
        3: 数学计算
        4: 逻辑推理
        5: 自我认知
        6: 聊天
        7: 天气
        8: 全文处理
        9: 知识问答
      system_intent_map:
        指令跟随回答: knowledge_qa
        代码问题: knowledge_qa
        数学计算: mathematics_calculate
        逻辑推理: mathematics_calculate
        自我认知: knowledge_qa
        聊天: knowledge_qa
        天气: knowledge_qa
        全文处理: doc_summary
        其他问题: knowledge_qa
        知识问答: knowledge_qa
        搜索引擎: search_engine
        # 临时给微盛指定
        兜底回复: model_chat 
      system_intent_white_list: ${SYSTEM_INTENT_WHITE_LIST}
      explicit_intent: ${EXPLICIT_INTENT}
      ds_faq_reject_model: ${DS_FAQ_REJECT_MODEL}
      rerank_score: -3
      guide_of_opt_cards: "请从下面几个选项中进行选择。"
      is_free: ${RAG_INTENT_MODEL_FREE}
    mock:
      enable_llm: false
      enable_search: false
      enable_workflow: false
    retrieval_config:
      close_priority: []
      ner_threshold: 100
    need_search_global_knowledge: ${NEED_SEARCH_GLOBAL_KNOWLEDGE}
    thought_conf:
      thought_icon: ${RAG_THOUGHT_ICON}
      status_title:
        stop: 思考已停止
        success: 思考已完成
        processing: 思考中
    stage_task_name:
      dialog_ppl: 1_dialog_ppl
      basic_search: 2.2_basic_search
      query_rewrite: 2.3_query_rewrite
      intent_recognize: 3_intent_recognize
      search_pro_for_ds: 4_search_pro_for_ds
      search_knowledge: 4_search_knowledge
      workflow: 5_workflow
      llm_reply: 5_llm_reply
    error_downgrade_conf: ${ERROR_DOWNGRADE_CONF}
    is_private: true
    deep_seek_conf:
      model_name: ${DEEP_SEEK_CONF_MODEL_NAME}
      model_has_think: ${DEEP_SEEK_CONF_MODEL_HAS_THINK}
      image_quiz_white_list: ${DEEP_SEEK_CONF_IMAGE_QUIZE_WHITE_LIST} # 图文问答白名单列表
      qd_ds_start_time: ${DEEP_SEEK_CONF_QD_DS_START_TIME}
      search_secret_id: ${RAG_SEARCH_SECRET_ID}
      search_secret_key: ${RAG_SEARCH_SECRET_KEY}
      search_result_size: 9
      search_enable_free: false
      exclude_search_engine: ["mp"]
      no_think_prompt: "<think>\n完成全部分析思考，按照用户要求直接输出答案，不再输出分析步骤或者其他思考内容。\n</think>\n\n"
      no_think_model_params: "{\"seed\": 0, \"top_p\": 1, \"temperature\": 0, \"max_tokens\": 1000, \"remove_cot\": true}"
    local_cache: ${LOCAL_CACHE}
    search_engine: ${SEARCH_ENGINE}

