apiVersion: apps/v1
kind: Deployment
metadata:
  name: lke-ti-perm-auth-proxy
  namespace: {{ .Release.Namespace }}
  annotations:
    ti.cloud.tencent.com/resource-quota: unlimited
    configmap.reloader.stakater.com/reload: {{ .Release.Name }}-ti-perm-auth-proxy
    {{- if .Values.global.customAnnotations }}
    {{- range $key, $value := .Values.global.customAnnotations }}
    {{ $key }}: {{ $value | toString | quote }}
    {{- end }}
    {{- end }}
  labels:
    app: lke-ti-perm-auth-proxy
    app.kubernetes.io/name: lke-ti-perm-auth-proxy
    {{- if .Values.global.customLabels }}
    {{- range $key, $value := .Values.global.customLabels }}
    {{ $key }}: {{ $value | toString | quote }}
    {{- end }}
    {{- end }}
spec:
  {{- if eq .Values.global.clusterSize "minimal" }}
  replicas: 1
  {{- else if eq .Values.global.clusterSize "standard" }}
  replicas: 2
  {{- else }}
  replicas: 3
  {{- end }}
  selector:
    matchLabels:
      app: lke-ti-perm-auth-proxy
  template:
    metadata:
      labels:
        app: lke-ti-perm-auth-proxy
        {{- if .Values.global.customLabels }}
        {{- range $key, $value := .Values.global.customLabels }}
        {{ $key }}: {{ $value | toString | quote }}
        {{- end }}
        {{- end }}
      {{- if .Values.global.customAnnotations }}
      annotations:
        {{- range $key, $value := .Values.global.customAnnotations }}
        {{ $key }}: {{ $value | toString | quote }}
        {{- end }}
      {{- end }}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - lke-ti-perm-auth-proxy
              topologyKey: kubernetes.io/hostname
            weight: 1
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: GPUName
                    operator: DoesNotExist
            - weight: 50
              preference:
                matchExpressions:
                  - key: product
                    operator: In
                    values:
                      - lke
      terminationGracePeriodSeconds: 90
      {{- if eq (include "needInitContainer" .) "true" }}
      serviceAccountName: adp-reader
      {{- end }}
      initContainers:
        {{- include "dependencyChecker.initContainer" . | nindent 8 }}
      containers:
        - env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: DEPLOYMENT_ENVIRONMENT
              value: TKE
            - name: NAME_SPACE
              value: default
            - name: SERVER_LOG_LEVEL
              value: info
            - name: mysql_host
              value: {{ .Values.global.components.db.host | quote }}
            - name: mysql_port
              value: {{ .Values.global.components.db.port | quote }}
            - name: mysql_pwd
              value: {{ .Values.global.components.db.password | quote }}
            - name: mysql_user
              value: {{ .Values.global.components.db.user | quote }}
            - name: mysql_db
              value: ti_auth_proxy
          image: {{(index .Values.images "lke-ti-perm-auth-proxy").url}}
          imagePullPolicy: Always
          name: lke-ti-perm-auth-proxy
         # command: ["/app/bin/agent-config", "-conf", "/app/conf/trpc_go.yaml"]
          #command: ["sh", "-c", "while true; do sleep 1800; done"]
          livenessProbe:
            failureThreshold: 2
            initialDelaySeconds: 20
            periodSeconds: 3
            successThreshold: 1
            tcpSocket:
              port: 80
            timeoutSeconds: 2
          readinessProbe:
            failureThreshold: 2
            initialDelaySeconds: 2
            periodSeconds: 3
            successThreshold: 1
            tcpSocket:
              port: 80
            timeoutSeconds: 2
          {{- if eq .Values.global.clusterSize "minimal" }}
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "200m"
              memory: "512Mi"
          {{- else if eq .Values.global.clusterSize "standard" }}
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "200m"
              memory: "512Mi"
          {{- else }}
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
            requests:
              cpu: "200m"
              memory: "512Mi"
          {{- end }}
          volumeMounts:
            - mountPath: /etc/localtime
              name: localtime
            - mountPath: /usr/local/services/ti-perm-auth-proxy/log
              name: new-volume
            - mountPath: /usr/local/services/ti-auth-proxy/conf/config.yml
              name: ti-perm-auth-proxy-cm
              subPath: config.yml
            - mountPath: /usr/local/services/ti-auth-proxy/conf/sso_config.json
              name: ti-perm-auth-proxy-cm
              subPath: sso_config.json
            - mountPath: /app/conf/infrastructure.yaml
              name: infrastructure
              subPath: infrastructure.yaml
      restartPolicy: Always
      volumes:
        {{- include "dependencyChecker.volumes" . | nindent 8 }}
        - hostPath:
            path: /etc/localtime
          name: localtime
        - hostPath:
            path: /data/ti-platform/log/ti-perm-auth-proxy
            type: DirectoryOrCreate
          name: new-volume
        - configMap:
            defaultMode: 420
            name:  {{ .Release.Name }}-ti-perm-auth-proxy
          name: ti-perm-auth-proxy-cm
        - configMap:
            defaultMode: 420
            name: infrastructure
          name: infrastructure
