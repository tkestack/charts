apiVersion: apps/v1
kind: Deployment
metadata:
  name: ti-auth-web
  namespace: {{ .Release.Namespace }}
  annotations:
    configmap.reloader.stakater.com/reload: "ti-auth-web-config,ti-web-nginx-config,ti-web-platform-title-logo,ti-web-tab-title-logo"
    {{- if .Values.global.customAnnotations }}
    {{- range $key, $value := .Values.global.customAnnotations }}
    {{ $key }}: {{ $value | toString | quote }}
    {{- end }}
    {{- end }}
  labels:
    app: ti-auth-web
    {{- if .Values.global.customLabels }}
    {{- range $key, $value := .Values.global.customLabels }}
    {{ $key }}: {{ $value | toString | quote }}
    {{- end }}
    {{- end }}
spec:
  progressDeadlineSeconds: 600
  {{- if eq .Values.global.clusterSize "minimal" }}
  replicas: 1
  {{- else if eq .Values.global.clusterSize "standard" }}
  replicas: 2
  {{- else }}
  replicas: 3
  {{- end }}
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: ti-auth-web
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ti-auth-web
        {{- if .Values.global.customLabels }}
        {{- range $key, $value := .Values.global.customLabels }}
        {{ $key }}: {{ $value | toString | quote }}
        {{- end }}
        {{- end }}
      {{- if .Values.global.customAnnotations }}
      annotations:
        {{- range $key, $value := .Values.global.customAnnotations }}
        {{ $key }}: {{ $value | toString | quote }}
        {{- end }}
      {{- end }}
    spec:
      {{- if eq (include "needInitContainer" .) "true" }}
      serviceAccountName: adp-reader
      {{- end }}
      initContainers:
        {{- include "dependencyChecker.initContainer" . | nindent 8 }}
      containers:
        - env:
            - name: pathprefix
              value: {{.Values.global.rsa.publicKey}}
            - name: RsaPublicKey
              value: {{.Values.global.rsa.publicKey}}
          image: {{(index .Values.images "ti-auth-web").url}}
          #command: ["sh", "-c", "nginx -c /etc/nginx/nginx.conf -g 'daemon off;'"]
          imagePullPolicy: IfNotPresent
          name: ti-auth-web
          ports:
            - containerPort: 12000
              protocol: TCP
          {{- if eq .Values.global.clusterSize "minimal" }}
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "200m"
              memory: "512Mi"
          {{- else if eq .Values.global.clusterSize "standard" }}
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "200m"
              memory: "512Mi"
          {{- else }}
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
            requests:
              cpu: "200m"
              memory: "512Mi"
          {{- end }}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File

          volumeMounts:
            - mountPath: /web/config/config.js
              name: ti-auth-web-config
              subPath: config.js
            # - mountPath: /web/config/platform-title-logo.png
            #   name: ti-web-platform-title-logo
            #   subPath: platform-title-logo.png
            # - mountPath: /web/config/ti-web-qrcode-image.png
            #   name: ti-web-qrcode-image
            #   subPath: ti-web-qrcode-image.png
            # - mountPath: /web/config/favicon.ico
            #   name: ti-web-tab-title-logo
            #   subPath: favicon.ico
            - mountPath: /etc/nginx/conf.d/ti.conf
              name: ti-web-nginx-config
              subPath: ti.conf
            # - mountPath: /web/config/home-banner-logo.png
            #   name: ti-web-home-banner-logo
            #   subPath: home-banner-logo.png
            # - mountPath: /web/config/login-icon-logo.png
            #   name: ti-web-login-icon-logo
            #   subPath: login-icon-logo.png
            - mountPath: /app/conf/infrastructure.yaml
              name: infrastructure
              subPath: infrastructure.yaml
          readinessProbe:
            tcpSocket:
              port: 12000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 12000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
        {{- include "dependencyChecker.volumes" . | nindent 8 }}
        - configMap:
            defaultMode: 420
            name: {{ .Release.Name }}-ti-auth-web-config
          name: ti-auth-web-config
        - configMap:
            defaultMode: 420
            name: {{ .Release.Name }}-ti-web-nginx-config
          name: ti-web-nginx-config
        # - configMap:
        #     defaultMode: 420
        #     name: ti-web-platform-title-logo
        #   name: ti-web-platform-title-logo
        # - configMap:
        #     defaultMode: 420
        #     name: ti-web-qrcode-image
        #   name: ti-web-qrcode-image
        # - configMap:
        #     defaultMode: 420
        #     name: ti-web-nginx-config
        #   name: ti-web-nginx-config
        # - configMap:
        #     defaultMode: 420
        #     name: ti-web-tab-title-logo
        #   name: ti-web-tab-title-logo
        # - configMap:
        #     defaultMode: 420
        #     name: ti-web-login-icon-logo
        #   name: ti-web-login-icon-logo
        # - configMap:
        #     defaultMode: 420
        #     name: ti-web-home-banner-logo
        #   name: ti-web-home-banner-logo

        - configMap:
            defaultMode: 420
            name: infrastructure
          name: infrastructure
