kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ .Release.Name }}-platform-permission-config
  namespace: {{ .Release.Namespace }}
data:
  application.yaml: |
    is_private: ${IS_PRIVATE}

    ######################
    # 角色相关配置
    ######################
    role_conf:
      business_role_name: 管理员
      business_role_description: 主账号管理员角色
      role_id_salt: ${ROLE_ID_SALT}

    get_user_nickname_conc_limit: ${GET_USER_NICKNAME_CONC_LIMIT}
    space_member_limit: ${SPACE_MEMBER_LIMIT}

    ######################
    # 子账号默认功能权限
    ######################
    sub_uin_default_base_permission_ids: ${SUB_UIN_DEFAULT_BASE_PERMISSION_IDS}

    resource_view_permission_ids: ${RESOURCE_VIEW_PERMISSION_IDS}

    resource_edit_permission_ids: ${RESOURCE_EDIT_PERMISSION_IDS}

    resource_no_permission_id_map: ${RESOURCE_NO_PERMISSION_ID_MAP}

    ######################
    # 不可用权限id
    ######################
    disable_permission_ids: ${DISABLE_PERMISSION_IDS}

    ######################
    # adp产品所有权限id
    ######################
    adp_all_permission_ids: ${ADP_ALL_PERMISSION_IDS}

    ######################
    # ti-auth 账号服务配置
    ######################
    ti_auth_account_conf:
      account_host: /DescribeSelfInfo
      describe_users: /DescribeUsers
      describe_main_user_names: /DescribeMainUserNames
      create_user: /CreateUser
      delete_users: /DeleteUsers
      modify_user_info: /ModifyUser
      describe_sub_accounts_by_main_user: /DescribeSubAccountsByMainUser
      disable_user: /DisableUser
      enable_user: /EnableUser
      describe_user: /DescribeUser
      describe_user_depts: /DescribeUserDepts
      describe_depts: /DescribeDepts
      describe_dept_details: /DescribeDeptDetails
      describe_parent_dept_chain_ids: /DescribeParentDeptChainIDs
      add_user_to_dept: /AddUserToDept
      remove_user_from_dept: /RemoveUserFromDept
      create_dept: /CreateDept
      delete_dept: /DeleteDept
      delete_space_data: /DeleteSpaceData
      describe_child_dept_ids: /DescribeChildDeptIDs
      get_dept_user_list: /DescribeDeptUsers

    resource_name_map:
      app: 应用开发
      knowledge: 知识库
      plugin: 插件广场
      prompt_template: 提示词模板
      widget: Widget
      skill: 技能中心

    super_admin_conf:
      necessary_permissions:
        lke:
          - lkeApp.basic
      special_platform_permissions_ids: ${SPECIAL_PLATFORM_PERMISSIONS_IDS}
      necessary_resource_permissions:
        - lke
      permission_resource_type_map: ${PERMISSION_RESOURCE_TYPE_MAP}

