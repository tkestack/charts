    #application.yaml end
  trpc_go.yaml: |
    global:
      namespace: ${NAMESPACE}            #环境类型，分正式production和非正式development两种类型
      env_name: ${GLOBAL_ENV_NAME}                    #环境名称，非正式环境下多环境的名称
      enable_set: ${ENABLE_SET}         #是否启用set
      full_set_name: ${FULL_SET_NAME}   #set名
      local_ip: ${POD_IP}
      container_name: ${POD_NAME}

    server:
      app: adp
      server: platform-permission-config
      filter:
        - recovery
        - i18n-adp
        - accesslog
        - cle-route-propagator
        - opentelemetry
      stream_filter:
        - opentelemetry
      admin:
        ip: ${POD_IP}
        port: 8081
      service:
        - name: trpc.adp.platform_permission_config.Admin
          ip: ${POD_IP}
          port: 9090 # 服务监听端口
          network: tcp # 网络监听类型 tcp/udp
          protocol: trpc # 应用层协议 trpc/restful
          timeout: 120000 # 请求最长处理时间，单位毫秒
          filter:
            - session
            - permission
        - name: trpc.adp.platform_permission_config.Api
          ip: ${POD_IP}
          port: 9092 # 服务监听端口
          network: tcp # 网络监听类型 tcp/udp
          protocol: trpc # 应用层协议 trpc/restful
          timeout: 25000 # 请求最长处理时间，单位毫秒


    plugins:                                          #插件配置
      log:                                            #日志配置
        default:                                      #默认日志的配置，可支持多输出
          - writer: console
            level: error
          - writer: file  # 本地文件日志
            level: debug  # 标准输出日志的级别，开发提测环境可以用debug，线上建议用info
            writer_config:  # 本地文件输出具体配置
              filename: /app/log/trpc.log  # 本地文件滚动日志存放的路径
              max_size: 100   # 本地文件滚动日志大小，单位 MB
              max_backups: 10 # 最大日志文件数
              max_age: 7      # 最大日志保留天数
              compress: false # 日志文件是否压缩
      telemetry:
        opentelemetry:
          addr: {{ ((.Values.global.observability).apm).otlp | default "" }}
          tenant_id: adp
          sampler:
            fraction: 1
          traces:
            disable_trace_body: false
          metrics:
            {{- if ((.Values.global.observability).apm).registry }}
            registry_endpoints: ["{{ .Values.global.observability.apm.registry}}"]
            {{- end }}
          logs:
            enabled: true
            level: "debug"
            trace_log_mode: "disable"
          {{- if ((.Values.global.observability).apm).attributes }}
          attributes:
            {{- range $key, $value := .Values.global.observability.apm.attributes }}
          - key: {{ $key }}
            value: {{ $value }}
            {{- end }}
          {{- end }}
      config:
        file:
          providers:
            - name: rainbow
              path: /app/conf/
            - name: global
              appid: ${RAINBOW_APP_ID}  # appid
              group: global # 配置所属组
              type: kv   # 七彩石数据格式, kv(默认), table
              env_name: ${RAINBOW_ENV_NAME}
              timeout: 2000
              enable_client_provider: true
      registry:
        polaris:
      selector:
        polaris:
          enable_servicerouter: true
      i18n:
        i18n:
          default_lang: zh-CN
          supported_languages:
            - zh-CN
            - en-US
          data_provider:
            type: rainbow
            prefix: permission
            error_prefix: error
            char_scaling_factor:
              zh: 1
              en: 3

    client:                                            #客户端调用的后端配置
      filter:                                          #针对所有后端调用函数前后的拦截器列表
        - cle-route-propagator
        - opentelemetry
      namespace: ${NAMESPACE}                          #针对所有后端的环境
      timeout: 10000                                    #针对所有后端的请求最长处理时间
      service:                                         #针对单个后端的配置，默认都有默认值，可以完全不用配置
        - name: mysql.adp.permission
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/openplatform_permission_data?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: mysql.adp.conf
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/openplatform_conf_data?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - callee: trpc.adp.app_admin_proxy.Api
          namespace: ${NAMESPACE}
          target: ip://adp-app-admin-proxy.{{ .Release.Namespace }}.svc.cluster.local:9092
          protocol: trpc
          timeout: 20000
        - callee: trpc.adp.app_admin_proxy.Login
          namespace: ${NAMESPACE}
          target:  ip://adp-app-admin-proxy.{{ .Release.Namespace }}.svc.cluster.local:9091
          protocol: trpc
          timeout: 20000
        - callee: trpc.adp.platform_charger.Finance
          namespace: ${NAMESPACE}
          target: ip://adp-platform-charger.{{ .Release.Namespace }}.svc.cluster.local:9090
          protocol: trpc
          timeout: 20000
        - name: trpc.adp.platform_manager.Login
          namespace: ${NAMESPACE}
          target: ip://adp-platform-manager.{{ .Release.Namespace }}.svc.cluster.local:9091
          timeout: 30000
        - callee: tencent-account-http
          target: dns://account.tencentyun.com:50001
          network: tcp
          protocol: http
          timeout: 10000
        - callee: tencent-sts-http
          target: dns://sts.tencentyun.com:50020
          network: tcp
          protocol: http
          timeout: 10000
        - name: trpc.adp.platform_authenticator.Authenticator
          namespace: ${NAMESPACE}
          target: ip://adp-platform-authenticator.{{ .Release.Namespace }}.svc.cluster.local:9090
          protocol: trpc
          timeout: 10000
        - callee: ti-auth-account-http
          target: dns://ti-perm-auth.{{ .Release.Namespace }}.svc.cluster.local:8081
          network: tcp
          protocol: http
          timeout: 10000
