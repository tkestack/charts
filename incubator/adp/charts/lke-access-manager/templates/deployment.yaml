apiVersion: apps/v1
kind: Deployment
metadata:
  name: adp-access-manager
  namespace: {{ .Release.Namespace }}
  labels:
    app: adp-access-manager
    app.kubernetes.io/name: adp-access-manager
    app.kubernetes.io/part-of: {{ .Release.Namespace }}
    {{- if .Values.global.customLabels }}
    {{- range $key, $value := .Values.global.customLabels }}
    {{ $key }}: {{ $value | toString | quote }}
    {{- end }}
    {{- end }}
  annotations:
    configmap.reloader.stakater.com/reload: "adp-access-manager"
    ti.cloud.tencent.com/resource-quota: '{"adp-access-manager":"2c4Gi"}'
    {{- if .Values.global.customAnnotations }}
    {{- range $key, $value := .Values.global.customAnnotations }}
    {{ $key }}: {{ $value | toString | quote }}
    {{- end }}
    {{- end }}
spec:
  {{- if eq .Values.global.clusterSize "minimal" }}
  replicas: 1
  {{- else if eq .Values.global.clusterSize "standard" }}
  replicas: 2
  {{- else }}
  replicas: 3
  {{- end }}
  selector:
    matchLabels:
      app: adp-access-manager
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 50%
    type: RollingUpdate
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: adp-access-manager
        {{- if .Values.global.customLabels }}
        {{- range $key, $value := .Values.global.customLabels }}
        {{ $key }}: {{ $value | toString | quote }}
        {{- end }}
        {{- end }}
      {{- if .Values.global.customAnnotations }}
      annotations:
        {{- range $key, $value := .Values.global.customAnnotations }}
        {{ $key }}: {{ $value | toString | quote }}
        {{- end }}
      {{- end }}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - adp-access-manager
              topologyKey: kubernetes.io/hostname
            weight: 1
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: GPUName
                    operator: DoesNotExist
            - weight: 50
              preference:
                matchExpressions:
                  - key: product
                    operator: In
                    values:
                      - lke
      terminationGracePeriodSeconds: 90
      {{- if eq (include "needInitContainer" .) "true" }}
      serviceAccountName: adp-reader
      {{- end }}
      initContainers:
        {{- include "dependencyChecker.initContainer" . | nindent 8 }}
      containers:
        - env:
            - name: MKL_NUM_THREADS
              value: "2"
            - name: LOG_SPACES
              value: "2097152"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: DEPLOYMENT_ENVIRONMENT
              value: TKE
            - name: NAME_SPACE
              value: default
            - name: ENV
              value: tcs
            - name: APP
              value: SmartService
            - name: SERVER
              value: AccessManagerServer
            - name: APP_NAME
              value: SmartService
            - name: SERVER_NAME
              value: AccessManagerServer
            - name: MYSQL_HOST
              value: {{ .Values.global.components.db.host | quote }}
            - name: MYSQL_PORT
              value: {{ .Values.global.components.db.port | quote }}
            - name: MYSQL_PWD
              value: {{ .Values.global.components.db.password | quote }}
            - name: MYSQL_USER
              value: {{ .Values.global.components.db.user | quote }}
            - name: RedisMod
              value: sentine
            - name: RedisMasterName
              value: mymaster
            - name: RedisAddr
              value: master://{{- range $host := .Values.global.components.redis.hosts -}} {{- $host}}:{{$.Values.global.components.redis.port -}} {{- end }}
            - name: RedisPassword
              value: {{ .Values.global.components.redis.password | quote }}
            - name: RedisPort
              value: {{ .Values.global.components.redis.port | quote }}
            - name: RedisUsername
              value: ""
            - name: RedisDB
              value: "3"
          image: {{(index .Values.images "adp-access-manager").url}}
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec", "/app/bin/AccessManagerServer -conf /app/conf/trpc_go.yaml"]
          #command: ["sh", "-c", "while true; do sleep 100; done"]
          name: adp-access-manager
          volumeMounts:
            - mountPath: /app/conf/infrastructure.yaml
              name: infrastructure
              subPath: infrastructure.yaml
            - name: accessmanagerserverconfig
              mountPath: /app/conf/trpc_go.yaml
              subPath: trpc_go.yaml
            - name: accessmanagerserverconfig
              mountPath: /app/conf/AccessManagerServer
              subPath: AccessManagerServer
            - name: log
              mountPath: /app/log
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pgrep -f "/app/bin/AccessManagerServer"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pgrep -f "/app/bin/AccessManagerServer"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          {{- if eq .Values.global.clusterSize "minimal" }}
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "200m"
              memory: "256Mi"
          {{- else if eq .Values.global.clusterSize "standard" }}
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "200m"
              memory: "256Mi"
          {{- else }}
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
            requests:
              cpu: "200m"
              memory: "256Mi"
          {{- end }}
      volumes:
        {{- include "dependencyChecker.volumes" . | nindent 8 }}
        - name: accessmanagerserverconfig
          configMap:
            name: {{ .Release.Name }}-access-manager
            items:
              - key: key-trpc_go.yaml
                path: trpc_go.yaml
              - key: key-AccessManagerServer
                path: AccessManagerServer
           # - key: access-manager
           #   path: access-manager
           # - key: access_en-US.json
           #   path: access_en-US.json
           # - key: access_zh-CN.json
           #   path: access_zh-CN.json
           # - key: error_en-US.json
           #   path: error_en-US.json
           # - key: error_zh-CN.json
           #   path: error_zh-CN.json
        - name: log
          hostPath:
            path: /data/ti-platform/log/adp-access-manager
            type: DirectoryOrCreate

        - configMap:
            defaultMode: 420
            name: infrastructure
          name: infrastructure
