            tail_overlap_size: 2
            trim_by_symbols: ["。", "？", "！", "\n", "；", "!", ";", "?", "、", "，"]
      max_avatar_size: 10485760
      max_desc_size: 150 
      max_background_image_size: 31457280 # 30M
      max_opening_questions_item: 3       
      max_opening_questions_item_length: 100
      allowed_media_type: doc,docx,ppt,pptx,pdf,txt,xls,xlsx,md,jpg,png,jpeg,bmp
      workflow: 
        is_enabled: true
        use_pdl: false
        workflow_confidence: 0.2
        workflow_relevant_top_size: 100
        workflow_uniq_relevant_top_size: 5
      app_var_types: ["STRING"]
      search_model_free:
        - lke-deepseek-r1
        - lke-deepseek-v3
        - lke-deepseek-r1-vip
        - lke-deepseek-v3-vip
        - lke-deepseek-v3-0324
        - lke-deepseek-r1-0528
      intent_achievement_priority:
        - name: qa
          desc: 问答回复
        - name: workflow
          desc: 工作流回复
        - name: doc
          desc: 文档回复
        - name: llm
          desc: 大模型回复
      vip_group: ${APP_OPERATION_VIP_GROUP}
    app_config_white: []
    app_sync_json: true

    unsatisfied_replay_default_labels: 
      - group_name: 理解有误
        label_names:
          - 答非所问
          - 未理解要求
          - 未理解上下文信息
      - group_name: 答案存在错误
        label_names:
          - 存在事实错误
          - 存在逻辑问题
          - 出现重复内容
          - 格式/语法错误
          - 内容不专业
      - group_name: 存在违法违规信息
        label_names:
          - 存在违法信息
          - 存在偏见与歧视
          - 其他价值观问题
      - group_name: 效果不好
        label_names:
          - 没有理解问题
          - 没有完成任务
          - 编造事实
          - 废话太多
          - 文风不好
          - 没有创意
          - 输出重复内容
          - 系统报错
      - group_name: 内容有风险
        label_names:
          - 有害/不安全
          - 隐私相关
    inner_access_control: ${INNER_ACCESS_CONTROL}
    app_share:
      base_url: "{{ .Values.global.scheme }}://{{ .Values.global.clb }}/webim/#/chat"
      immediately_base_url: "{{ .Values.global.scheme }}://{{ .Values.global.clb }}/webim/#/chat"
      expired_time: 0
      share_code_len: 6
      white_app_id: ${APP_SHARE_WHITE_APP_ID}
      access_control_max_account_count: 100

