    global:
      namespace: Production
    server:
      app: adp
      server: app-config
      bin_path: /app/bin/
      conf_path: /app/conf/
      log_path: /app/logs/
      admin:
        ip: ${POD_IP}
        port: 8081
        read_timeout: 3000
        write_timeout: 60000
      filter:
        - recovery
        - i18n-adp
        - accesslog
        - cle-route-propagator
        - opentelemetry
        - cos_rewrite
      service:
        - name: trpc.adp.app_config.Admin
          ip: ${POD_IP}
          port: 9090
          network: tcp
          protocol: trpc
          timeout: 30000
        - name: trpc.adp.app_config.Api
          ip: ${POD_IP}
          port: 9091
          network: tcp
          protocol: trpc
          timeout: 10000
        - name: trpc.adp.app_config.AppConfigExternal
          ip: ${POD_IP}
          port: 9000
          network: tcp
          protocol: trpc
          timeout: 30000
          filter:
            - session
            - permission
        - name: trpc.adp.app_config.UpdateCharSizeTask
          ip: ${POD_IP}
          port: 9095
          network: "0 15 6 * * *?scheduler=UpdateCharSizeTask&holdTime=5"
          protocol: timer
          timeout: 600000
        - name: trpc.adp.app_config.AppUsageTask
          ip: ${POD_IP}
          port: 9096
          network: "0 */2 * * * *"
          protocol: timer
          timeout: 3600000
        - name: trpc.adp.app_config.CacheModelPromptLimitTask
          ip: ${POD_IP}
          port: 9097
          network: "0 0 6 * * *?startAtOnce=1"
          protocol: timer
          timeout: 3600000
        - name: trpc.adp.app_config.ClearAppRescourceTask
          ip: ${POD_IP}
          port: 9098
          network: "*/10 * * * * *?startAtOnce=0&scheduler=ClearAppRescourceTask&holdTime=5"
          protocol: timer
          timeout: 3600000
        - name: trpc.adp.app_config.UpdateQpmTpmTask
          ip: ${POD_IP}
