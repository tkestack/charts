apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    ti.cloud.tencent.com/resource-quota: unlimited
    configmap.reloader.stakater.com/reload: "adp-app-config"
    {{- if .Values.global.customAnnotations }}
    {{- range $key, $value := .Values.global.customAnnotations }}
    {{ $key }}: {{ $value | toString | quote }}
    {{- end }}
    {{- end }}
  labels:
    app: {{ .Values.appName }}
    app.kubernetes.io/name: {{ .Values.appName }}
    {{- if .Values.global.customLabels }}
    {{- range $key, $value := .Values.global.customLabels }}
    {{ $key }}: {{ $value | toString | quote }}
    {{- end }}
    {{- end }}
  name: {{ .Values.appName }}
  namespace: {{ .Release.Namespace }}
spec:
  {{- if eq .Values.global.clusterSize "minimal" }}
  replicas: 1
  {{- else if eq .Values.global.clusterSize "standard" }}
  replicas: 2
  {{- else }}
  replicas: 3
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.appName }}
  strategy : {}
  template:
    metadata:
      labels:
        app: {{ .Values.appName }}
        {{- if .Values.global.customLabels }}
        {{- range $key, $value := .Values.global.customLabels }}
        {{ $key }}: {{ $value | toString | quote }}
        {{- end }}
        {{- end }}
      {{- if .Values.global.customAnnotations }}
      annotations:
        {{- range $key, $value := .Values.global.customAnnotations }}
        {{ $key }}: {{ $value | toString | quote }}
        {{- end }}
      {{- end }}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - {{ .Values.appName }}
              topologyKey: kubernetes.io/hostname
            weight: 1
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: GPUName
                    operator: DoesNotExist
            - weight: 50
              preference:
                matchExpressions:
                  - key: product
                    operator: In
                    values:
                      - lke
      {{- if eq (include "needInitContainer" .) "true" }}
      serviceAccountName: adp-reader
      {{- end }}
      initContainers:
        {{- include "dependencyChecker.initContainer" . | nindent 8 }}
      containers:
        - env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: DEPLOYMENT_ENVIRONMENT
              value: TKE
            - name: ENV
              value: tcs
            - name: SERVER_LOG_LEVEL
              value: info
            - name: ADP_HOST
              value: "{{ .Values.global.scheme }}://{{ .Values.global.clb }}"
            {{- if .Values.global.components.s3.cos.stsKey }}
            - name: ADP_ASSUME_ROLE_SECRET_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.components.s3.cos.stsKey }}
                  key: ADP_ASSUME_ROLE_SECRET_ID
                  optional: true
            - name: ADP_ASSUME_ROLE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.components.s3.cos.stsKey }}
                  key: ADP_ASSUME_ROLE_SECRET_KEY
                  optional: true
            {{- end }}
          image: {{ include "resolveImageUrl" (dict "url" (index .Values.images "adp-app-config").url "context" .) }}
          imagePullPolicy: Always
          #command: ["sh","/usr/local/app/start.sh"]
          #command: ["sleep","inf"]
          name: {{ .Values.appName }}
          {{- if eq .Values.global.clusterSize "minimal" }}
          resources:
            limits:
              cpu: "500m"
              memory: "2Gi"
            requests:
              cpu: "125m"
              memory: "512Mi"
          {{- else if eq .Values.global.clusterSize "standard" }}
          resources:
            limits:
              cpu: "1"
              memory: "2Gi"
            requests:
              cpu: "500m"
              memory: "1Gi"
          {{- else }}
          resources:
            limits:
              cpu: "1"
              memory: "2Gi"
            requests:
              cpu: "500m"
              memory: "1Gi"
          {{- end }}
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 3
            successThreshold: 1
            tcpSocket:
              port: 9090
            timeoutSeconds: 2
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 3
            successThreshold: 1
            tcpSocket:
              port: 9090
            timeoutSeconds: 2
          volumeMounts:
            - mountPath: /etc/localtime
              name: localtime
            - mountPath: /app/logs
              name: logdata
              subPathExpr: $(POD_NAME)
            - mountPath: /app/conf/trpc_go.yaml
              name: config
              subPath: trpc_go.yaml
            - mountPath: /app/conf/application.yaml
              name: config
              subPath: application.yaml
            - mountPath: /app/conf/placeholder.yaml
              name: config
              subPath: placeholder.yaml
            - mountPath: /app/conf/knowledge_qa_model.yaml
              name: config
              subPath: knowledge_qa_model.yaml
            - mountPath: /app/conf/thought_model.yaml
              name: config
              subPath: thought_model.yaml
            - mountPath: /app/conf/workflow_model.yaml
              name: config
              subPath: workflow_model.yaml
            - mountPath: /app/conf/plugin_model.yaml
              name: config
              subPath: plugin_model.yaml
            - mountPath: /app/conf/parse_model.yaml
              name: config
              subPath: parse_model.yaml
            - mountPath: /app/conf/white_list.yaml
              name: config
              subPath: white_list.yaml
            - mountPath: /app/conf/app-config_en-US.json
              name: config
              subPath: app-config_en-US.json
            - mountPath: /app/conf/app-config_zh-CN.json
              name: config
              subPath: app-config_zh-CN.json
            - mountPath: /app/conf/errors_en-US.json
              name: config
              subPath: errors_en-US.json
            - mountPath: /app/conf/errors_zh-CN.json
              name: config
              subPath: errors_zh-CN.json
            - mountPath: /app/conf/infrastructure.yaml
              name: infrastructure
              subPath: infrastructure.yaml
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      volumes:
        {{- include "dependencyChecker.volumes" . | nindent 8 }}
        - hostPath:
            path: /etc/localtime
          name: localtime
        - hostPath:
            path: /data/ti-platform/log/{{ .Values.appName }}
            type: DirectoryOrCreate
          name: logdata
        - configMap:
            defaultMode: 420
            name: {{ .Release.Name }}-app-config
          name: config

        - configMap:
            defaultMode: 420
            name: infrastructure
          name: infrastructure
