apiVersion: v1
kind: Service
metadata:
  labels:
    app: adp-app-config
  name: adp-app-config
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: tcp-8081
      port: 8081
      protocol: TCP
      targetPort: 8081
    - name: tcp-9090
      port: 9090
      protocol: TCP
      targetPort: 9090
    - name: tcp-9091
      port: 9091
      protocol: TCP
      targetPort: 9091
    - name: tcp-9000
      port: 9000
      protocol: TCP
      targetPort: 9000
  selector:
    app: adp-app-config
  sessionAffinity: None
  type: ClusterIP
