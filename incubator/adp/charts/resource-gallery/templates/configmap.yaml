kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ .Release.Name }}-resource-gallery
  namespace: {{ .Release.Namespace }}
data:
  application.yaml: |
    cache_limit:
      corp_expire: 720h
      staff_expire: 120h
      intent_expire: 120h
      app_expire: 120h
      model_expire: 120h
    tione:
      secret_id: ""
      secret_key: ""
      region: "ap-guangzhou"
      sts_host: sts.test.tencentcloudapi.com
      tione_host: tione.test.tencentcloudapi.com
      service_role_name: ADP_QCSLinkedRoleInTIONE
      tione_regions:
        - ap-beijing
        - ap-guangzhou
        - ap-nanjing
        - ap-shanghai
      tione_enable_white: true
      tione_white_uin: ${tione_white_uin}
    # 模型广场
    model_hub:
      model_type: llm
      model_params:
        - name: temperature
          max: 2
          min: 0
          default: 0.7
        - name: top_p
          max: 1
          min: 0
          default: 1
        - name: seed
          max: 10000
          min: 0
          default: 1024
        - name: presence_penalty
          max: 2
          min: -2
          default: 0
        - name: frequency_penalty
          max: 2
          min: -2
          default: 0
        - name: repetition_penalty
          max: 2
          min: 1
          default: 1
        - name: max_tokens
          max: 262144
          min: 1
          default: 4096
      model_tags:
        - KeyModelTagOmniModal
      model_properties:
        # 模型上下文长度
        model_length: 64k
        # 模型输入长度56K（1024）
        input_length: 57344
      model_category_to_tags:
        generate: [文本推理, 工具调用, 全模态,KeyModelTagTextReasoning,KeyModelTagToolCalling,KeyModelTagOmniModal]
        thought: [文本推理, 工具调用, 全模态,KeyModelTagTextReasoning,KeyModelTagToolCalling,KeyModelTagOmniModal]
        rerank: [排序模型,KeyModelTagRerankingModel]
        embedding: [向量模型,KeyModelTagVectorModel]
      embedding_limit:
        enable: true
        max_vector_dimension: 4096
        default_vector_dimension: 1024
      model_finance_free_white:
        - workflow-light-32b
    robot_default:
      # 模型模型列表
      app_default_model:
        knowledge_qa: ${app_default_model}
      # 思考模型模型列表
      app_thought_model:
        standard: ${app_thought_model_standard}
        agent: ${app_thought_model_agent}
      # rerank 和embedding模型
      app_rerank_model:
        #- alias_name: youtu-reranker-llm
        #  name: sn-llm-reranker-2b-v0.2
        #  desc: |
        #    LLM 增强排序模型，准确率更高，耗时将会有所增加。
        #  is_default: true
        #  is_free: true
        - alias_name: youtu-reranker
          name: sn-reranker-large-v0.4
          desc: |
            通用文本排序模型
          is_default: true
          is_free: true
      app_embedding_model:
        - alias_name: youtu-embedding
          name: sn-large-multi-language-v0.2.5
          is_default: true
          is_free: true
      # 大模型输入框，角色描述，对话历史上下文上限设置
      llm_word_limit:
        default:
          input_limit: 2500   # 对话框模型输入上限
          role_len_limit: 4000  # 角色描述输入上限
          history_words_limit: 2000  # 历史上下文输入上限
        4K:
          input_limit: 2500
          role_len_limit: 4000
          history_words_limit: 2000
        8K:
          input_limit: 6000
          role_len_limit: 4000
          history_words_limit: 4000
        16K:
          input_limit: 12000
          role_len_limit: 4000
          history_words_limit: 8000
        32K:
          input_limit: 12000
          role_len_limit: 10000
          history_words_limit: 8000
        64K:
          input_limit: 20000
          role_len_limit: 20000
          history_words_limit: 12000
        96K:
          input_limit: 20000
          role_len_limit: 20000
          history_words_limit: 12000
        128K:
          input_limit: 20000
          role_len_limit: 20000
          history_words_limit: 12000
        256K:
          input_limit: 200000
          role_len_limit: 20000
          history_words_limit: 20000
        512K:
          input_limit: 200000
          role_len_limit: 50000
          history_words_limit: 100000
        1000K:
          input_limit: 500000
          role_len_limit: 100000
          history_words_limit: 200000
      search_model_free:
        - lke-deepseek-r1
        - lke-deepseek-v3
        - lke-deepseek-r1-vip
      # 模型对AI通话支持的类型
      llm_support_ai_call:
        support: ${llm_support_ai_call_support}
        poor_support: ${llm_support_ai_call_poor_support}
        not_support: ${llm_support_ai_call_not_support}
    finance:
      disabled: ${finance_disabled}
      search_disabled: ${finance_search_disabled}
    license: ${license}
    limit_config_info: #限流信息设置
      expire: 4m
      max_unlock_retry: 3
      try_lock_interval: 50ms
      concurrency_key_expire: 1800
      qpm: ${qpm}
      tpm: ${tpm}
      ds_qpm: ${ds_qpm}
      ds_tpm: ${ds_tpm}
    managed_account_ids: ${managed_account_ids}
    experience_uin: ${experience_uin}
    #国内版多语言开关
    language_all_switch: ${language_all_switch}
    permission_app_category: ${permission_app_category}
    cipher_config:
      default_version: 1
      iv: hBb3Ls3edFBzYyrpQzTGSA==
      versions:
        1: Od3J9Ig47ztUpmdqfkRcAqXhqE7dlWHYLOFK/NDA+yU=
        2: 1ofPtcXorwOy8r74H9DYO5ZMxoTFWdTZVf0bxv5zKqQ=
        3: woEahOi+Bo6ejhBm2DqJL9wcVzQmoOx+lEE0DjYAaVo=
    prompt_version:
      max_limit: 50
      max_version: 20
    adp_cloud:
      model_list_url: "https://api.adp.cloud.tencent.com/v1/model/list"

