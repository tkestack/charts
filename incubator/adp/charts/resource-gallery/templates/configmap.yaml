  trpc_go.yaml: |
    global:                             #全局配置
      namespace: Test            #环境类型，分正式production和非正式development两种类型
      env_name: test                    #环境名称，非正式环境下多环境的名称
      enable_set: ${ENABLE_SET}         #是否启用set
      full_set_name: ${FULL_SET_NAME}   #set名
      local_ip: ${POD_IP}
      container_name: ${POD_NAME}

    server:                                            #服务端配置
      app: adp                                        #业务的应用名
      server: resource-gallery                         #进程服务名
      bin_path: /usr/local/trpc/bin/                   #二进制可执行文件和框架配置文件所在路径
      conf_path: /usr/local/trpc/conf/                 #业务配置文件所在路径
      data_path: /usr/local/trpc/data/                 #业务数据文件所在路径
      filter:                                          #针对所有service处理函数前后的拦截器列表
      - recovery
      - opentelemetry
      - i18n-adp
      - cle-route-propagator
      admin:
        ip: ${POD_IP}  # admin 的 ip，配置网卡 nic 也可以
        port: 8081   # admin 的 port，必须同时配置这里的 ip port 才会启动 admin
      service:                                         #业务服务提供的service，可以有多个
      - name: trpc.adp.resource_gallery.Login   # service的路由名称，格式：`业务领域.功能模块.项目名.Pb定义的服务名`
        ip: ${POD_IP}
        port: 9092   # 服务监听端口
        network: tcp   # 网络监听类型 tcp/udp
        protocol: trpc   # 应用层协议 trpc/restful
        timeout: 5000   # 请求最长处理时间，单位毫秒
        filter:
        - session
        - permission
      - name: trpc.adp.resource_gallery.Admin   # service的路由名称，格式：`业务领域.功能模块.项目名.Pb定义的服务名`
        ip: ${POD_IP}
        port: 9090   # 服务监听端口
        network: tcp   # 网络监听类型 tcp/udp
        protocol: trpc   # 应用层协议 trpc/restful
        timeout: 120000   # 请求最长处理时间，单位毫秒
      - name: trpc.adp.resource_gallery.Http   # service的路由名称，格式：`业务领域.功能模块.项目名.Pb定义的服务名`
        ip: ${POD_IP}
        port: 9091   # 服务监听端口
        network: tcp   # 网络监听类型 tcp/udp
        protocol: http   # 应用层协议 trpc/restful
        timeout: 120000   # 请求最长处理时间，单位毫秒
    plugins:
      log:                                            #日志配置
        default:                                  #默认日志的配置，可支持多输出
        - writer: console                         #控制台标准输出 默认
          level: info                            #标准输出日志的级别
        #caller_skip: 3
          formatter: json
          formatter_config:
            time_cmt: 2006-01-02T15:04:05.999999999Z07:00
            time_key: time
            level_key: level
            name_key: name
            caller_key: caller
            message_key: message
        - writer: file                            #本地文件日志
          level: info                             #本地文件滚动日志的级别
          formatter: json
          formatter_config:
            time_cmt: 2006-01-02T15:04:05.999999999Z07:00
            time_key: time
            level_key: level
            name_key: name
            caller_key: caller
            message_key: message
            stacktrace_key: stackTrace
          writer_config:
            filename: /app/logs/trpc.log  #本地文件滚动日志存放的路径
            write_mode: 2
            roll_type: time
            max_age: 7
            max_backups: 10
            compress: false
            time_unit: day
        clues:
        - writer: console                         #控制台标准输出 默认
          level: info                            #标准输出日志的级别
        - writer: file
          level: info
          formatter: json
          writer_config:
            filename: /app/logs/clues.log
            write_mode: 2
            roll_type: time
            max_age: 7
            max_backups: 10
            compress: false
            time_unit: day
      telemetry:
        opentelemetry:
          addr: {{ ((.Values.global.observability).apm).otlp | default "" }}
          tenant_id: adp
          sampler:
            fraction: 1
          traces:
            disable_trace_body: false
          metrics:
            {{- if ((.Values.global.observability).apm).registry }}
            registry_endpoints: ["{{ .Values.global.observability.apm.registry}}"]
            {{- end }}
          logs:
            enabled: true
            level: "debug"
            trace_log_mode: "disable"
          {{- if ((.Values.global.observability).apm).attributes }}
          attributes:
            {{- range $key, $value := .Values.global.observability.apm.attributes }}
          - key: {{ $key }}
            value: {{ $value }}
            {{- end }}
          {{- end }}
      config:
        file:
          providers:
          - name: rainbow
            path: /app/conf/
      i18n:
        i18n:
          default_lang: zh-CN
          supported_languages:
          - zh-CN
          - en-US
          data_provider:
            type: rainbow
            prefix: biz
            error_prefix: errors
            char_scaling_factor:
              zh-CN: 1
              en-US: 3
      selector:
        polaris:
          enable_servicerouter: true # 注意这里一定要使用 true
    client:
      namespace: Test
      filter:
      - opentelemetry
      - cle-route-propagator
      service:
      - name: mysql.qbot.admin
        target: ${mysqlCli}
      - name: tdsql.qbot.qbot
        target: ${mysqlCli}
      - name: redis.qbot.admin
        target: ${redisCli}
        timeout: 3000
      - callee: trpc.KEP.agent_config_server.AgentConfigApi
        name: trpc.KEP.agent-config-server.AgentConfigApi
        target: ${agentConfigApi}
        protocol: trpc
        timeout: 60000
      - name: trpc.adp.ai_gateway.Admin
        network: tcp
        protocol: trpc
        target: ${ai_gateway_admin}
        timeout: 2000
      - callee: qbot.finance.finance.Finance
        name: qbot.finance.finance.Finance
        target: ${finance}
        network: tcp
        protocol: trpc
        timeout: 20000
      - name: trpc.adp.ai-gateway.api
        network: tcp
        timeout: 4500000
        target: ${ai_gateway_api}
        protocol: http
      - callee: trpc.KEP.plugin_config_server.PluginConfigApi
        name: trpc.KEP.plugin-config-server.PluginConfigApi
        target: ${pluginConfigApi}
        protocol: trpc
        timeout: 60000
      - name: trpc.KEP.bot-task-config-server.task-config
        target: ${task_config}
        callee: trpc.KEP.bot_task_config_server.TaskConfig
        timeout: 3000
      - name: trpc.adp.kb-config.Api
        target: ${kb_config_Api}
        protocol: trpc
        callee: trpc.adp.kb_config.Api
        timeout: 5000
      - name: trpc.adp.platform_manager.Admin
        target: ${platform_manager_Admin}
        timeout: 30000
      - name: trpc.adp.app_config.Admin
        target: ${app_config_Admin}
        protocol: trpc
        timeout: 5000
      - callee: trpc.KEP.bot_data_statistics_server.Api
        target: ${statistics_server_Api}
        protocol: trpc
        timeout: 20000
      - callee: trpc.KEP.bot_admin_config_server.Login
        target: ${admin_login}
        protocol: trpc
        timeout: 20000
      - callee: trpc.KEP.bot_admin_config_server.Api
        target: ${admin_api}
        protocol: trpc
        timeout: 20000

