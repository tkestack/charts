  biz_zh-CN.json: |
    {
        "KeyModelConnectivityErr": "模型连通性错误:%s",
        "KeyProviderAliasNameYoutu": "腾讯优图",
        "KeyProviderAliasNameHunyuan": "腾讯混元",
        "KeyProviderAliasNameQwen": "通义千问",
        "KeyProviderAliasNameBaichuan": "百川智能",
        "KeyProviderAliasNameZhipu": "智谱AI",
        "KeyProviderAliasNameOpenAI": "OpenAI Compatible",
        "KeyProviderAliasNameMoonshot": "月之暗面",
        "KeyProviderAliasNameDeepSeek": "深度求索",
        "KeyProviderAliasNameMinimax": "Minimax",
        "KeyProviderAliasNameStepfun": "阶跃星辰",
        "KeyProviderAliasNameVolcengine": "火山引擎",
        "KeyProviderAliasNameTIONE": "腾讯云TI-ONE",
        "KeyProviderAliasNameYi": "零一万物",
        "KeyProviderAliasNameOfficial": "OpenAI",
        "KeyProviderAliasNameAnthropic": "ANTHROPIC\\C",
        "KeyProviderAliasNameXAI": "xAI",
        "KeyProviderAliasNameGemini": "Gemini",
        "KeyProviderDescHunyuan": "腾讯全链路自研的通用大模型，具备强大的中文理解、逻辑推理及多模态能力代表模型有混元Turbo系列等。",
        "KeyProviderDescYoutu": "专注于人工智能领域的前沿技术研究和产业实践落地，涵盖了视觉感知理解、大语言模型、多模态理解和生成、计算加速等技术研究领域。",
        "KeyProviderDescQwen": "通义千问具备多语言与多模态理解、逻辑推理、代码生成、文档处理及音视频理解能力，并积极构建开源生态，代表模型有Qwen系列等",
        "KeyProviderDescZhipu": "源自清华大学，致力于新一代认知智能通用模型研发，其GLM系列模型在推理、长上下文处理、多语言、多模态能力方面表现突出，代表模型有GLM-4系列等",
        "KeyProviderDescStepfun": "多模态AGI先锋，专注于视觉、语音、视频全栈能力，在推理、代码、数学和知识方面表现突出，代表模型有Step-2等",
        "KeyProviderDescBaichuan": "致力于构建优秀的大模型底座，其Baichuan系列模型在长文本处理、多模态理解、数学和代码能力方面表现突出，代表模型有Baichuan4系列等",
        "KeyProviderDescOpenAI": "支持通过兼容OpenAI API协议的方式，灵活接入各类自定义或第三方大模型服务",
        "KeyProviderDescVolcengine": "火山引擎推出的一站式大模型服务平台，提供模型训练、推理、评测、精调等全流程服务，支持多模态理解、长上下文窗口和强大的推理能力，并集成了豆包大模型等多种主流模型",
        "KeyProviderDescMoonshot": "专注于通用人工智能领域，旗下模型支持超长上下文，并具备强大的Agent能力和多模态理解与生成能力，代表模型有Kimi K2等",
        "KeyProviderDescDeepSeek": "专注于通用人工智能底层模型与技术研究，以开源、高性能和卓越推理能力著称，代表模型有DeepSeek-R1（推理模型）和DeepSeek-V3（MoE架构，兼具性能与成本效益）",
        "KeyProviderDescMinimax": "领先的通用人工智能科技公司，自主研发多模态大模型，在长上下文处理、推理、代码和多模态理解与生成方面表现突出，代表模型有M1系列模型等。",
        "KeyProviderDescTIONE": "腾讯云为AI工程师打造的一站式机器学习平台，提供从数据接入、模型训练、模型管理到模型服务的全流程开发支持，支持多种训练方式和算法框架，并内置大模型库。",
        "KeyProviderDescYi": "由李开复博士创办，其Yi系列模型在代码、数学、推理和指令遵循能力上表现出色，并在全球开源评测中取得优异成绩，代表模型有Yi-Lightning等",
        "KeyProviderDescOfficial": "OpenAI提供的模型，例如GPT-4、GPT5等。",
        "KeyProviderDescAnthropic": "Anthropic提供的Claude系列模型",
        "KeyProviderDescXAI": "xAI 提供的LLMs，xAI是一家致力于研发人工智能（AI）以加速人类科学发现的公司。",
        "KeyProviderDescGemini": "谷歌提供的Gemini模型",
        "KeyModelDesc_sn-edu-13b": "基于教育领域数据专项训练，适用于英语口语对话练习和教案场景。英语口语陪练场景中，支持教材课后对话练习、对话难度设定、语法分析等能力；教案场景中，支持教案生成、教案润色、教案题目生成。",
        "KeyModelDesc_hunyuan": "万亿级参数规模 MOE-32k 长文模型，具备复杂数学能力，支持 functioncall，在多语言翻译、金融法律医疗等领域应用重点优化。",
        "KeyModelDesc_finance-13b": "基于金融领域数据进行预训练和精调训练，擅长金融领域知识问答，适用于投资知识问答、金融产品问答等应用场景。",
        "KeyModelDesc_medical-6b": "基于医疗领域数据专项强化，擅长医疗领域知识问答，适用于医学实体抽取、医学对话总结、病历撰写等应用场景。",
        "KeyModelDesc_sn-edu-70b": "基于教育领域数据专项训练，适用于对于英语口语对话练习自然度和任务遵循程度、教案生成丰富度的效果表现有需求的场景。",
        "KeyModelDesc_hunyuan-turbo": "采用全新的混合专家模型（MoE）结构，相比混元大模型高级版推理效率更快，效果表现更强。",
        "KeyModelDesc_hunyuan-13B": "采用更优的路由策略，同时缓解了负载均衡和专家趋同的问题， 性价比相对更高，在平衡效果、价格的同时，可对实现对长文本输入的处理。",
        "KeyModelDesc_function-call-pro": "具备任务规划、工具选择调用以及反思纠错能力，能够支持复杂问题的规划与执行。",
        "KeyModelDesc_cs-normal-70b": "针对企业知识问答场景精调训练，擅长多模态知识问答，适合图文表答案关联输出、数学计算、逻辑推理、表格问答等复杂场景有需求的场景。",
        "KeyModelDesc_hunyuan-standard-256K": "采用更优的路由策略，同时缓解了负载均衡和专家趋同的问题。长文方面，大海捞针指标达到99.9%。MOE-256k 在长度和效果上进一步突破，极大的扩展了可输入长度。",
        "KeyModelDesc_hunyuan-role": "混元最新版角色扮演模型，混元官方精调训练推出的角色扮演模型，基于混元模型结合角色扮演场景数据集进行增训，在角色扮演场景具有更好的基础效果。",
        "KeyModelDesc_workflow-pro": "适用于同时配置问答、文档、工作流的场景，意图识别效果更佳，并且支持在角色指令中自定义配置意图。但可能会增加一定的对话耗时。",
        "KeyModelDesc_lke-deepseek-v3-function-call": "DeepSeek-V3模型最新版本，基于创新的混合专家（MoE）架构与多头潜在注意力（MLA）技术，在推理能力、代码生成和中文语义理解三大核心领域实现全面升级。",
        "KeyModelDesc_lke-deepseek-v3-0324": "DeepSeek-V3模型最新版本，基于创新的混合专家（MoE）架构与多头潜在注意力（MLA）技术，在推理能力、代码生成和中文语义理解三大核心领域实现全面升级。",
        "KeyModelDesc_lke-deepseek-r1": "强化学习（RL）驱动的推理模型，在数学、代码和推理任务中与 OpenAI-o1 表现相当。与DeepSeek助手深度思考模式为同款模型",
        "KeyModelDesc_lke-deepseek-r1-0528": "DeepSeek-R1模型最新版，在理解意图、文案生成、编程能力和逻辑推理方面均有显著提升。能更好地理解复杂指令中的约束条件和内在逻辑。支持长时思考，可以胜任更复杂、耗时的任务。",
