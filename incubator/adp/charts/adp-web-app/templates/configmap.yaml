kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ .Release.Name }}-web-app
  namespace: {{ .Release.Namespace }}
data:
  config.js: |
    window.TIWEB_CONFIG = {
      domain: '{{ .Values.global.scheme }}://{{ .Values.global.clb }}/',
      // 如果需要配置header logo, 配置路径'/portal/config/platform-title-logo.png'，同时修改platform-title-logo.png文件
      HeaderTitle: '/portal/config/platform-title-logo.png',
      // 登陆页面
      LoginPage: {
        Title: '云小微客服机器人',
        SubTitle: '智能客服机器人',
      },
      // 主页参数
      HomePage: {
        Title: '腾讯云小微',
        SubTitle: '腾讯云小微，通过自主研发的全栈 AI技术与各垂直行业领域相结合，从对话智能到情感智能，聚焦体验、效率与转化，支持企业服务和营销实现数智化转型升级。',
      },
      Iaas: true,
      multiModal: false,
      RsaPublicKey: '{{ .Values.global.rsa.publicKey }}',
      chatFileUpload: false,
      minioPort: 30900,
      enableASRTTS: false,
      ASRUrl: 'wss://{{ .Values.global.clb }}:7777/asr',
      TTSUrl: 'wss://{{ .Values.global.clb }}:7777/tts',
      CanEmbedIframe: true,
      objectStorageType: '{{ .Values.global.components.s3.providerType }}',
      Favicon: '/portal/config/favicon.ico',
      MaxDocLen: 100,
      objectStorageAddr: 'https://obs.cn-east-3.myhuaweicloud.com',
      IsGenerateFromDoc: true
    };

  nginx.conf: |
    user root root;
    worker_processes 2;
    error_log /web/logs/nginx_error.log crit;
    worker_rlimit_nofile 65535;
    events
    {
      use epoll;
      worker_connections 65535;
    }
    http {
      include mime.types;
      default_type application/octet-stream;
      log_format main  '$remote_addr - $remote_user [$time_local] "$request" '
          '$status $body_bytes_sent "$http_referer" '
          '"$http_user_agent" $http_x_forwarded_for';

      server_names_hash_bucket_size 128;
      client_header_buffer_size 32k;
      large_client_header_buffers 4 32k;
      client_max_body_size 8m;

      sendfile on;
      tcp_nopush on;
      keepalive_timeout 60;
      tcp_nodelay on;
      fastcgi_connect_timeout 300;
      fastcgi_send_timeout 300;
      fastcgi_read_timeout 300;
      fastcgi_buffer_size 64k;
      fastcgi_buffers 4 64k;
      fastcgi_busy_buffers_size 128k;
      fastcgi_temp_file_write_size 128k;
      gzip on;
      gzip_comp_level 2; # 2级压缩 节省cpu
      gzip_min_length 1k; # 文件小于1K完全没必要压缩
      gzip_buffers 4 16k; # 压缩内存空间大小
      gzip_http_version 1.0;
      gzip_proxied any; # ? 对反向代理的内容进进行压缩
      gzip_vary on; # 启用应答头"Vary: Accept-Encoding(表示在传送数据时，给客户端说明我使用了gzip压缩)"
      gzip_disable "MSIE [1-6]\.";
      gzip_types # 要被压缩的content-type
        application/javascript
        application/x-javascript
        text/javascript
        text/css
        text/xml
        application/xhtml+xml
        application/xml
        application/atom+xml
        application/rdf+xml
        application/rss+xml
        application/geo+json
        application/json
        application/ld+json
        application/manifest+json
        application/x-web-app-manifest+json
        image/svg+xml
        text/x-cross-domain-policy;

      server {
          listen 30002;
          access_log on;
          server_name localhost;
          index index.html index.htm index.php;
          root /web/html;
          resolver kube-dns.kube-system.svc.cluster.local valid=10s;

          location / {
            alias /web/html/manage/;
            try_files $uri $uri/ /adp/index.html;
          }

          location /adp/ {
            alias /web/html/manage/;
            try_files $uri $uri/ /adp/index.html;
          }
          location /adp/assets/static/ {
            alias /web/html/manage/static/;
          }
          location /preview/ {
            alias /web/html/manage/preview/;
          }
          location /qbot/ {
            alias /web/html/qbot/;
          }
          location /webim/assets/static/ {
            alias /web/html/qbot/static/;
          }
          location /webim/ {
            alias /web/html/qbot/;
          }
          location /static/adp/ {
            alias /web/html/qbot/static/;
          }
          location /workflow/ {
            alias /web/html/workflow/;
          }
          location /workflow/preview {
            alias /web/html/workflow/;
          }
          location /workflow/pdl {
            alias /web/html/workflow/;
          }
          location /workflow/asyncTask {
            alias /web/html/workflow/;
          }
          location /workflow/snapshot {
            alias /web/html/workflow/;
          }
          location /workflow/cloudapp {
            alias /web/html/workflow/;
          }
          location /s/ {
            set $short_url_upstream http://adp-app-shorturl.adp.svc.cluster.local:8080;
            rewrite ^/s/(.*)$ /$1 break;
            proxy_pass $short_url_upstream;
          }
          location /renderfile {
            set $file_converter_upstream http://adp-file-converter.adp.svc.cluster.local:30007;
            proxy_pass $file_converter_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_read_timeout 120s;
            proxy_send_timeout 60s;
          }
        }
    }
