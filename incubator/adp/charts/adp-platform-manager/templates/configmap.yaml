  trpc_go.yaml: |
    global:
      namespace: Production
    server:
      app: adp
      server: platform-manager
      bin_path: /app/bin/
      conf_path: /app/conf/
      log_path: /app/logs/
      admin:
        ip: ${POD_IP}
        port: 8081
        read_timeout: 3000
        write_timeout: 60000
      filter:
        - recovery
        - i18n
        - validation
        - accesslog
        - debuglog
        - cle-route-propagator
        - opentelemetry
      service:
        - name: trpc.adp.platform_manager.Admin
          ip: ${POD_IP}
          port: 9090
          network: tcp
          protocol: trpc
          timeout: 120000
        - name: trpc.adp.platform_manager.Api
          ip: ${POD_IP}
          port: 9093
          network: tcp
          protocol: trpc
          timeout: 120000
        - name: trpc.adp.platform_manager.Login
          ip: ${POD_IP}
          port: 9091
          network: tcp
          protocol: trpc
          timeout: 3000
        - name: trpc.adp.platform_manager.PlatformManagerExternal
          ip: ${POD_IP}
          port: 9000
          network: tcp
          protocol: trpc
          timeout: 30000
          filter:
            - session
            - permission
        - name: trpc.adp.platform_manager.audit_log_consumer
          address: ${INFRA_MIDDLEWARES_KAFKA_0_HOSTS}:${INFRA_MIDDLEWARES_KAFKA_0_PORT}?topics=adp_audit_log_prod&group=platform-manager-prod&batch=5&batchFlush=1000
          protocol: kafka
          timeout: 30000
        - name: trpc.adp.platform_manager.AutoRefreshTokenTask
          ip: ${POD_IP}
          port: 9092
          network: "0 */5 * * * *?disable=1&scheduler=AutoRefreshTokenTask&holdTime=5"
          protocol: timer
          timeout: 3600000
        - name: trpc.adp.platform_manager.ReportKnowledgeCapacityTask
          ip: ${POD_IP}
          port: 9094
          network: "0 0 */1 * * *?disable=0&scheduler=ReportKnowledgeCapacityTask&holdTime=5"
          protocol: timer
          timeout: 3600000
        - name: trpc.adp.platform_manager.RefreshInnerUinTask
          ip: ${POD_IP}
          port: 9096
          network: "*/10 * * * * *?disable=0&scheduler=RefreshInnerUinTask&holdTime=5"
          protocol: timer
          timeout: 3600000
        - name: trpc.adp.platform_manager.CheckLicense
          ip: 0.0.0.0
          port: 9095
          network: 5 */1 * * * *?disable=0&startAtOnce=1&holdTime=5
          protocol: timer
          timeout: 60000

    plugins:
      telemetry:
        opentelemetry:
          addr: {{ ((.Values.global.observability).apm).otlp | default "" }}
          tenant_id: adp
          sampler:
            fraction: 1
          traces:
            disable_trace_body: false
          metrics:
            {{- if ((.Values.global.observability).apm).registry }}
            registry_endpoints: ["{{ .Values.global.observability.apm.registry}}"]
            {{- end }}
          logs:
            enabled: true
            level: "debug"
            trace_log_mode: "disable"
          {{- if ((.Values.global.observability).apm).attributes }}
          attributes:
            {{- range $key, $value := .Values.global.observability.apm.attributes }}
          - key: {{ $key }}
            value: {{ $value }}
            {{- end }}
          {{- end }}
      log:
        default:
          - writer: console
            level: error
          - writer: file
            level: debug
            writer_config:
              filename: /app/logs/trpc.log
              max_size: 100
              max_backups: 10
              max_age: 7
              compress: false
      config:
        file:
          providers:
            - name: rainbow
              path: /app/conf/
            - name: global
              appid: ${RAINBOW_APP_ID}  # appid
              group: global # 配置所属组
              type: kv   # 七彩石数据格式, kv(默认), table
              env_name: ${RAINBOW_ENV_NAME}
              timeout: 2000
              enable_client_provider: true
      i18n:
        i18n:
          default_lang: zh-CN
          supported_languages:
            - zh-CN
            - en-US
          data_provider:
            type: rainbow
            prefix: biz
            error_prefix: errors
            char_scaling_factor:
              zh-CN: 1
              en-US: 3
      registry:
        polaris:
      selector:
        polaris:
          enable_servicerouter: true

    client:
      filter:
        - cle-route-propagator
        - opentelemetry
      service:
        - name: mysql.qbot.admin
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=1s&parseTime=true&interpolateParams=true&loc=Local
        - name: tdsql.qbot.admin
          target: dsn://${INFRA_MIDDLEWARES_DB_0_USER}:${INFRA_MIDDLEWARES_DB_0_PASSWORD}@tcp(${INFRA_MIDDLEWARES_DB_0_HOST}:${INFRA_MIDDLEWARES_DB_0_PORT})/db_llm_robot?charset=utf8mb4&timeout=10s&readTimeout=30s&writeTimeout=30s&parseTime=true&loc=Local
        - name: redis.qbot.admin
          target: redis://:${INFRA_MIDDLEWARES_REDIS_0_PASSWORD}@${INFRA_MIDDLEWARES_REDIS_0_HOSTS}:6379
          timeout: 800
        - name: redis.lke.limiter
          target: redis://:${INFRA_MIDDLEWARES_REDIS_0_PASSWORD}@${INFRA_MIDDLEWARES_REDIS_0_HOSTS}:6379/4
          timeout: 800
        - name: trpc.adp.platform_charger.Finance
          target: ip://adp-platform-charger.{{ .Release.Namespace }}.svc.cluster.local:9090
          namespace: Production
          network: tcp
          protocol: trpc
