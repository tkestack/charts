      18: 10 # ReplyMethodAgent(智能体回复) -> APP_CALL_REPLY_METHOD_LLM_DIRECT
      19: 10 # ReplyMethodMultiIntent(多意图回复) -> APP_CALL_REPLY_METHOD_LLM_DIRECT
