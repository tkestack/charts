# ADP Platform - 对外配置
# global 下的配置会自动传递给所有子 Chart

# ============================
# 全局配置 (自动传递给子 Chart)
# ============================
global:
  # 集群类型：包含 [minimal]、[standard] 和 [recommended] 三个配置段
  clusterSize: minimal
  # CLB 域名（必填）https://console.cloud.tencent.com/clb/instance
  clb: "xx.adp-private.com"
  # 是否校验 K8s 集群剩余资源是否充足（当部署超级节点时需要关闭）
  checkK8sResources: true
  # CLB ID（必填）
  clbId: lb-example
  # 协议: http 或 https （必填）
  scheme: https
  # CLB HTTPS 证书 ID（scheme 为 https 时必填）https://console.cloud.tencent.com/ssl
  clbCertId: "<YOUR_CLB_CERT_ID>"
  # 无需关注
  secapi_enable: false
  # 镜像仓库地址（勿动）
  imageRegistry: "ccr.ccs.tencentyun.com"

  # RSA 密钥配置（必填）用于前后端加解密登录密码
  # 生成方法:
  #   1. 生成私钥: openssl genrsa -out private.pem 2048
  #   2. 生成公钥: openssl rsa -in private.pem -pubout -out public.pem
  #   3. Base64编码: cat private.pem | base64 -w 0 > privateKey.txt
  #                  cat public.pem | base64 -w 0 > publicKey.txt
  rsa:
    privateKey: "<YOUR_RSA_PRIVATE_KEY_BASE64>"
    publicKey: "<YOUR_RSA_PUBLIC_KEY_BASE64>"

  # ============================
  # 基础组件配置 (components)
  # ============================
  # vendor: 云厂商标识 (tencent/aws/alibaba/azure/gcp/huawei/self)
  # providerType: 具体产品类型，结合 vendor 唯一标识组件实现
  components:
    # 数据库配置 (必填) https://cloud.tencent.com/product/tdsql
    db:
      vendor: tencent
      providerType: tdsql  # tencent: tdsql/cynosdb | aws: aurora/rds | alibaba: polardb | self: mysql/mariadb
      host: "192.168.0.1"
      port: 3306
      user: "<YOUR_DB_USER>"
      password: "<YOUR_DB_PASSWORD>"

    # Redis 缓存配置 (必填) https://cloud.tencent.com/product/crs
    redis:
      vendor: tencent
      providerType: crs  # tencent: crs | aws: elasticache | alibaba: kvstore | self: redis
      cluster: master
      hosts:
        - 192.168.0.1
      port: 6379
      password: "<YOUR_REDIS_PASSWORD>"

    # Elasticsearch 配置 (必填) https://cloud.tencent.com/product/es
    es:
      vendor: tencent
      providerType: es  # tencent: es | aws: opensearch | alibaba: elasticsearch | self: elasticsearch
      hosts:
        - 192.168.0.1
      port: 9200
      user: elastic
      password: "<YOUR_ES_PASSWORD>"

    # 对象存储配置 (必填) https://cloud.tencent.com/product/cos
    s3:
      vendor: tencent
      providerType: cos  # tencent: cos | aws: s3 | alibaba: oss | azure: blob | gcp: gcs | self: minio
      # COS 专用配置 (providerType=cos 时生效)
      cos:
        secretId: "<YOUR_COS_SECRET_ID>"
        secretKey: "<YOUR_COS_SECRET_KEY>"
        appId: "<YOUR_COS_APP_ID>"
        bucket: "<YOUR_COS_BUCKET>"
        region: "<YOUR_COS_REGION>"
        domain: myqcloud.com
        subPath: "public"
        expireTime: 3600s
        credentialTime: 3600s


    # 消息队列CKafka版 https://console.cloud.tencent.com/ckafka/instance
    kafka:
      vendor: tencent
      providerType: kafka
      hosts:
        - 192.168.0.1
      port: 9092

    # clickhouse
    clickhouse:
      vendor: tencent
      providerType: clickhouse  # tencent: clickhouse |
      hosts:
        - 192.168.0.1
      port: 9000
      user: "<YOUR_CLICKHOUSE_USER>"
      password: "<YOUR_CLICKHOUSE_PASSWORD>"

  # ============================
  # 可观测性配置 (observability)
  # ============================
  observability:
    # CLS 日志收集配置 (可选) https://console.cloud.tencent.com/cls/topic
    cls:
      enabled: true # 建议开启
      logsetId: "<YOUR_CLS_LOGSET_ID>"
      topicId: "<YOUR_CLS_TOPIC_ID>"

    # Prometheus 监控配置 (可选) https://console.cloud.tencent.com/tke2/prometheus2
    prometheus:
      enabled: false

    # APM 链路追踪配置 (可选) https://console.cloud.tencent.com/monitor/apm/system/list
    apm:
      vendor: tencent
      providerType: tps  # tencent: tps | aws: xray | self: jaeger
      otlp: "pl.ap-beijing.apm.tencentcs.com:4319"
      registry: ""
      attributes:
        token: "<YOUR_APM_TOKEN>"

  # ====================================================================================
  # 以下配置皆为可选配置，如需使用，请联系技术支持人员。
  # ====================================================================================

  # ============================
  # 内容安全配置 (content-security)
  # ===========================
  contentSecurity:
    # 类型: sdk（必填）
    type: sdk
    # 是否禁用内容检查（可选，填写 true 或 false）
    disableContentCheck: true
    # 审核开关（可选，填写 true 或 false）
    auditSwitch: false
    # 是否禁用图片检查（可选，填写 true 或 false）
    disableImageCheck: false
    # `bizType` （启用审核时 必选）
    bizType: "<YOUR_BIZ_TYPE>"
    # 文本内容安全配置 (可选) https://cloud.tencent.com/document/product/1124/51860
    region: ap-guangzhou
    appId: "<YOUR_APP_ID>"
    uin: "<YOUR_UIN>"
    subUin: "<YOUR_SUB_UIN>"
    secretId: "<YOUR_SECRET_ID>"
    secretKey: "<YOUR_SECRET_KEY>"
    callbackUrl: "<YOUR_CALLBACK_URL>"

  # ============================================================
  # 微信第三方平台信息
  # ============================================================
  # 申请微信开放平台账号后，第三方平台信息详情中可获取以下配置
  wechat:
    componentAppId: "<YOUR_WECHAT_THIRD_PLATFORM_APPID>"
    componentAppSecret: "<YOUR_WECHAT_THIRD_PLATFORM_SECRET>"
    componentToken: "<YOUR_WECHAT_THIRD_PLATFORM_TOKEN>"
    componentAesKey: "<YOUR_WECHAT_THIRD_PLATFORM_AES_KEY>"

  # ============================
  # 业务配置 (从 tad.global 迁移)
  # ============================
  finance:
    disabled: true
    search_disabled: true
    report_disabled: false

  deploy_mode: "standard"
  free_preview: false
  productType: "adp"
  weakPasswordList: []

  admin:
    qpm: 100
    tpm: 100000

  delete_data:
    chat_server_retention_days: 30
    retrieval_server_retention_days: 30
    plugin_config_server_retention_minutes: 1440

  retrieval_config:
    vector_recall_enable: true

  ChatServer:
    max_concurrence: 10
    role_intent_model_name: ""
    tipwords_opt_hunyuan_version: ""
    widget_optimize_model_name: ""
    workflow_config_model_name: ""
    workflow_intent_model_name: ""
    workflow_role_model_name: ""
    multi_modal:
      disabled: false

  RagServer:
    ds_faq_reject_model_name: ""
    search_secret_id: ""
    search_secret_key: ""
    workflow_config_model_name: ""

  channelmsgsvr:
    component_app_id: ""

  ti_license:
    appId: ""
    secretKey: ""

  easygraph:
    credentials:
      username: ""
      password: ""

  # ============================
  # objectstorage 兼容层（旧版引用兼容）
  # ============================
  objectstorage:
    provider: "cos"
    minio:
      host: "minio.adp.svc.cluster.local"
      port: 80
    obs:
      host: ""
      port: 443
    cos:
      host: ""
      port: 443
    csp:
      host: ""
      port: 443
    s3:
      accessKey: ""
      secretKey: ""
      region: ""

  # 自定义 annotations，部署时会注入到所有服务的 Deployment/StatefulSet/Job 中
  # 不需要时留空或注释掉具体条目即可
  # 示例:
  #   Icp-notify.cloud.infra/sync-to-cmdb: "true"
  #   Icp-notify.cloud.infra/app-name-key: nonstandardAppName
  customAnnotations: {}

  # 自定义 labels，部署时会注入到所有服务的 Deployment/StatefulSet/Job 中
  # 不需要时留空或注释掉具体条目即可
  # 示例:
  #   nonstandardAppName: "txadp"
  #   envType: "PROD"
  customLabels: {}
